<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PUBLICITÉ - Activités</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Scripts Firebase obligatoires -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif; background-color: #050508; color: #ffffff;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* Conteneur Smartphone PWA */
        .app-container {
            width: 100%; height: 100%; max-width: 450px;
            background: #020308;
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* --- HEADER --- */
        .app-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #060713;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            font-size: 14px;
        }
        .header-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #00ffcc;
        }

        /* --- ZONE DE SÉLECTION (BOUTONS VITRINE ET MIROIR) --- */
        .selection-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 20px;
            z-index: 5;
            overflow-y: auto;
        }

        /* Bouton avec effet miroir, verre (Glassmorphic) et pulsation */
        .wall-btn {
            width: 100%;
            max-width: 340px;
            padding: 25px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            animation: pulse-glow 3s infinite ease-in-out;
        }

        .wall-btn:active {
            transform: scale(0.97);
        }

        /* Différentes couleurs de pulsation pour MyLead vs OGAds */
        .btn-mylead { animation-delay: 0s; border-color: rgba(0, 255, 204, 0.2); }
        .btn-ogads { animation-delay: 1.5s; border-color: rgba(155, 81, 224, 0.2); }

        /* Effet Miroir / Reflet qui passe à travers le bouton */
        .wall-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transform: skewX(-25deg);
            animation: shine 4s infinite linear;
        }
        .btn-mylead::before { animation-delay: 0s; }
        .btn-ogads::before { animation-delay: 2s; }

        .wall-btn i {
            font-size: 35px;
            margin-bottom: 5px;
        }
        .btn-mylead i { color: #00ffcc; text-shadow: 0 0 15px rgba(0,255,204,0.4); }
        .btn-ogads i { color: #9b51e0; text-shadow: 0 0 15px rgba(155,81,224,0.4); }

        .wall-btn h2 {
            margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.5px;
        }
        .wall-btn p {
            margin: 0; font-size: 12px; color: #8a8d9f; font-weight: 400;
        }

        /* --- CONTENEUR D'IFRAME PLEIN ÉCRAN (CACHÉ PAR DÉFAUT) --- */
        .fullscreen-overlay {
            position: absolute;
            top: 67px; /* Juste en dessous du header */
            left: 0; width: 100%;
            bottom: 65px; /* Juste au-dessus de la nav bar */
            background: #050508;
            z-index: 100;
            display: none; /* Masqué */
            flex-direction: column;
        }

        iframe {
            width: 100%;
            flex: 1;
            border: none;
            background: #050508;
        }

        /* Bouton flotant discret pour fermer l'Iframe */
        .btn-close-wall {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 4a, 4a, 0.9);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 74, 74, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 101;
        }

        /* Animations */
        @keyframes shine {
            0% { left: -150%; }
            50% { left: 150%; }
            100% { left: 150%; }
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
            50% { transform: scale(1.02); box-shadow: 0 8px 40px 0 rgba(0, 255, 204, 0.1); }
            100% { transform: scale(1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        }
        
        .loading-placeholder {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #555875; font-size: 14px;
        }
        .loading-placeholder i { font-size: 32px; margin-bottom: 12px; color: #00ffcc; }

        /* --- NAV BAR DU BAS --- */
        .nav-bar {
            background: #03040b; border-top: 1px solid rgba(255,255,255,0.06);
            padding: 14px 20px 22px 20px; display: flex; justify-content: space-around; align-items: center;
            z-index: 10;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: #555875; text-decoration: none; font-size: 11px; font-weight: 500; cursor: pointer;
        }
        .nav-item.active { color: #00ffcc; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- En-tête -->
        <header class="app-header">
            <div class="btn-back" id="header-back-btn" onclick="window.history.back()"><i class="fa-solid fa-chevron-left"></i></div>
            <h1 class="header-title" id="wall-title">Publicité+ Missions</h1>
            <div style="width: 36px;"></div>
        </header>

        <!-- Menu de sélection avec gros boutons style miroir / vitrine -->
        <div class="selection-menu" id="selection-menu">
            
            <div class="wall-btn btn-mylead" onclick="openWall('mylead')">
                <i class="fa-solid fa-wallet"></i>
                <h2>Gagner avec MyLead</h2>
                <p>Complétez des offres et sondages rapides</p>
            </div>

            <div class="wall-btn btn-ogads" onclick="openWall('ogads')">
                <i class="fa-solid fa-bolt"></i>
                <h2>Gagner avec OGAds</h2>
                <p>Installez des applications et des jeux</p>
            </div>

        </div>

        <!-- Zone d'affichage plein écran dynamique pour l'Iframe active -->
        <div class="fullscreen-overlay" id="wall-overlay">
            <div id="iframe-area" style="width:100%; height:100%; display:flex; flex-direction:column;">
                <!-- Injecté dynamiquement par JavaScript -->
            </div>
            <button class="btn-close-wall" onclick="closeWall()"><i class="fa-solid fa-xmark"></i> Quitter le mur</button>
        </div>

        <!-- Navigation -->
        <nav class="nav-bar">
            <div class="nav-item" onclick="location.href='index.html'">
                <i class="fa-solid fa-house nav-icon"></i>
                <span>Accueil</span>
            </div>
            <div class="nav-item" onclick="location.href='messages.html'">
                <i class="fa-regular fa-comment-dots nav-icon"></i>
                <span>Messages</span>
            </div>
            <div class="nav-item" onclick="location.href='stats.html'">
                <i class="fa-solid fa-chart-simple nav-icon"></i>
                <span>Stats</span>
            </div>
            <div class="nav-item active">
                <i class="fa-solid fa-bolt nav-icon"></i>
                <span>Activités</span>
            </div>
        </nav>

    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBAL9enbjp1vnv7h6yariu_sWvUp5QeRVQ",
            authDomain: "publicite-6445c.firebaseapp.com",
            projectId: "publicite-6445c",
            storageBucket: "publicite-6445c.firebasestorage.app",
            messagingSenderId: "663385244466",
            appId: "1:663385244466:web:b72a95c96a8e2b8e6bcd2b",
            measurementId: "G-T37TGB3SR0"
        };

        firebase.initializeApp(firebaseConfig);

        let currentUserUid = null;

        // Écoute de l'état d'authentification
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUserUid = user.uid;
            } else {
                currentUserUid = null;
            }
        });

        // Fonction pour ouvrir un mur en plein écran
        function openWall(type) {
            const overlay = document.getElementById('wall-overlay');
            const iframeArea = document.getElementById('iframe-area');
            const mainTitle = document.getElementById('wall-title');
            const backBtn = document.getElementById('header-back-btn');

            // Si l'utilisateur n'est pas connecté
            if (!currentUserUid) {
                alert("Veuillez d'abord vous connecter pour ouvrir les missions et stocker vos points.");
                return;
            }

            overlay.style.display = 'flex';
            
            // On modifie l'action du bouton retour physique du header pour fermer le mur
            backBtn.setAttribute('onclick', 'closeWall()');

            if (type === 'mylead') {
                mainTitle.innerText = "MyLead Pub";
                iframeArea.innerHTML = `
                    <div class="loading-placeholder" id="loader-node"><i class="fa-solid fa-circle-notch fa-spin"></i> Chargement sécurisé de MyLead...</div>
                    <iframe 
                        src="https://reward-me.eu/840ccbb0-79f9-11f1-9081-8a5fb7be40ea?player_id=${currentUserUid}" 
                        sandbox="allow-top-navigation allow-scripts allow-same-origin allow-popups allow-forms"
                        onload="document.getElementById('loader-node').style.display='none'">
                    </iframe>
                `;
            } else if (type === 'ogads') {
                mainTitle.innerText = "OGAds Missions";
                iframeArea.innerHTML = `
                    <div class="loading-placeholder" id="loader-node" style="color:#9b51e0;"><i class="fa-solid fa-circle-notch fa-spin" style="color:#9b51e0;"></i> Connexion au serveur OGAds...</div>
                    <iframe 
                        src="https://appsave.online/cl/i/grjgep?aff_sub=${currentUserUid}"
                        onload="document.getElementById('loader-node').style.display='none'">
                    </iframe>
                `;
            }
        }

        // Fonction pour fermer le mur actif et revenir aux boutons
        function closeWall() {
            document.getElementById('wall-overlay').style.display = 'none';
            document.getElementById('iframe-area').innerHTML = '';
            document.getElementById('wall-title').innerText = "Publicité+ Missions";
            
            // Remettre le bouton retour du header à sa fonction d'origine (historique précédent)
            document.getElementById('header-back-btn').setAttribute('onclick', 'window.history.back()');
        }
    </script>

</body>
</html>
