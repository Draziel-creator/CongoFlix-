<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PUBLICITÉ - Activités</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Scripts Firebase obligatoires -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif; background-color: #050508; color: #ffffff;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* Conteneur Smartphone PWA */
        .app-container {
            width: 100%; height: 100%; max-width: 450px;
            background: #020308;
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* --- HEADER PUR ET DISCRET --- */
        .app-header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #060713;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }
        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            font-size: 14px;
        }
        .header-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #00ffcc;
        }

        /* --- ZONE CARROUSEL AVEC SWIPE CORRIGÉ --- */
        .offerwall-slider {
            flex: 1;
            display: flex;
            width: 100%;
            overflow-x: scroll; /* Activé explicitement pour le swipe */
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* Fluidité swipe sur iOS/Android */
        }
        /* Masquer la barre de défilement tout en gardant le swipe actif */
        .offerwall-slider::-webkit-scrollbar { display: none; }

        /* Chaque slide est forcé à prendre exactement 100% de la largeur disponible */
        .slide {
            min-width: 100%;
            width: 100%;
            max-width: 100%;
            height: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* Ajustement plein écran des iframes */
        iframe {
            width: 100%;
            flex: 1;
            border: none;
            background: #050508;
        }
        
        .loading-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #555875;
            font-size: 14px;
        }
        .loading-placeholder i {
            font-size: 32px;
            margin-bottom: 12px;
            color: #9b51e0;
        }

        /* --- NAV BAR DU BAS --- */
        .nav-bar {
            background: #03040b; border-top: 1px solid rgba(255,255,255,0.06);
            padding: 14px 20px 22px 20px; display: flex; justify-content: space-around; align-items: center;
            z-index: 10;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: #555875; text-decoration: none; font-size: 11px; font-weight: 500; cursor: pointer;
        }
        .nav-item.active { color: #00ffcc; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- En-tête -->
        <header class="app-header">
            <div class="btn-back" onclick="window.history.back()"><i class="fa-solid fa-chevron-left"></i></div>
            <h1 class="header-title" id="wall-title">MyLead Pub</h1>
            <div style="width: 36px;"></div>
        </header>

        <!-- Conteneur coulissant (Swipe) -->
        <div class="offerwall-slider" id="slider">
            
            <!-- MUR 1 : MYLEAD -->
            <div class="slide" data-title="MyLead Pub">
                <div id="mylead-target" class="loading-placeholder">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                    Initialisation MyLead sécurisée...
                </div>
            </div>

            <!-- MUR 2 : OGADS -->
            <div class="slide" data-title="OGAds Missions">
                <div id="ogads-target" class="loading-placeholder">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                    Initialisation OGAds...
                </div>
            </div>

        </div>

        <!-- Navigation -->
        <nav class="nav-bar">
            <div class="nav-item" onclick="location.href='index.html'">
                <i class="fa-solid fa-house nav-icon"></i>
                <span>Accueil</span>
            </div>
            <div class="nav-item" onclick="location.href='messages.html'">
                <i class="fa-regular fa-comment-dots nav-icon"></i>
                <span>Messages</span>
            </div>
            <div class="nav-item" onclick="location.href='stats.html'">
                <i class="fa-solid fa-chart-simple nav-icon"></i>
                <span>Stats</span>
            </div>
            <div class="nav-item active">
                <i class="fa-solid fa-bolt nav-icon"></i>
                <span>Activités</span>
            </div>
        </nav>

    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBAL9enbjp1vnv7h6yariu_sWvUp5QeRVQ",
            authDomain: "publicite-6445c.firebaseapp.com",
            projectId: "publicite-6445c",
            storageBucket: "publicite-6445c.firebasestorage.app",
            messagingSenderId: "663385244466",
            appId: "1:663385244466:web:b72a95c96a8e2b8e6bcd2b",
            measurementId: "G-T37TGB3SR0"
        };

        firebase.initializeApp(firebaseConfig);

        // Détection de l'utilisateur et injection des Iframes
        firebase.auth().onAuthStateChanged((user) => {
            const myleadContainer = document.getElementById('mylead-target');
            const ogadsContainer = document.getElementById('ogads-target');
            
            if (user) {
                const playerUid = user.uid;
                
                // Injection MyLead
                myleadContainer.outerHTML = `
                    <iframe 
                        src="https://reward-me.eu/840ccbb0-79f9-11f1-9081-8a5fb7be40ea?player_id=${playerUid}" 
                        sandbox="allow-top-navigation allow-scripts allow-same-origin allow-popups allow-forms">
                    </iframe>
                `;

                // Injection OGAds
                ogadsContainer.outerHTML = `
                    <iframe 
                        src="https://appsave.online/cl/i/grjgep?aff_sub=${playerUid}">
                    </iframe>
                `;
            } else {
                const lockHTML = `
                    <div class="loading-placeholder" style="color: #ff4a4a;">
                        <i class="fa-solid fa-lock" style="color: #ff4a4a;"></i>
                        Veuillez vous connecter pour accéder aux tâches.
                    </div>
                `;
                myleadContainer.innerHTML = lockHTML;
                ogadsContainer.innerHTML = lockHTML;
            }
        });

        // Changement de titre dynamique lors du swipe
        const slider = document.getElementById('slider');
        const wallTitle = document.getElementById('wall-title');

        slider.addEventListener('scroll', () => {
            const position = slider.scrollLeft;
            const slideWidth = slider.clientWidth;
            
            // Calcul précis de l'index de la slide visible
            const index = Math.round(position / slideWidth);
            const activeSlide = slider.querySelectorAll('.slide')[index];
            
            if(activeSlide) {
                wallTitle.innerText = activeSlide.getAttribute('data-title');
            }
        });
    </script>

</body>
</html>
