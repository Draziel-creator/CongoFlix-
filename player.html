<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoFlix Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --card: #111; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* LECTEUR PLEIN ÉCRAN HAUT (Style MovieBox) */
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .back-btn { position: absolute; top: 15px; left: 15px; z-index: 100; width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.5); text-decoration: none; }

        /* BARRE D'INTERACTION */
        .stats-bar { display: flex; justify-content: space-around; padding: 15px 0; background: var(--bg); border-bottom: 1px solid #222; }
        .stat-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #888; cursor: pointer; }
        .stat-item i { font-size: 22px; color: var(--gold); margin-bottom: 5px; }

        /* CONTENU & DESCRIPTION */
        .content { padding: 20px; }
        .movie-title { font-size: 24px; color: var(--gold); margin: 0; font-weight: 900; text-transform: uppercase; }
        .desc-box { margin-top: 15px; padding: 15px; background: var(--card); border-radius: 12px; border-left: 4px solid var(--gold); font-size: 14px; color: #ccc; line-height: 1.5; }

        /* CASTING HORIZONTAL */
        .section-title { color: var(--gold); font-size: 14px; font-weight: bold; margin: 25px 0 15px 0; text-transform: uppercase; }
        .cast-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .actor-card { flex-shrink: 0; width: 75px; text-align: center; }
        .actor-img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; margin-bottom: 5px; }
        .actor-name { font-size: 10px; color: #fff; display: block; height: 24px; overflow: hidden; }

        /* POCHE COMMENTAIRES (Style TikTok) */
        #commentPocket { position: fixed; bottom: 0; width: 100%; height: 70vh; background: #0d0d0d; border-radius: 20px 20px 0 0; transform: translateY(100%); transition: 0.4s ease; z-index: 2000; display: flex; flex-direction: column; border-top: 1px solid #333; }
        #commentPocket.active { transform: translateY(0); }
        .tk-header { text-align: center; padding: 15px; font-size: 13px; font-weight: bold; border-bottom: 1px solid #222; position: relative; }
        #commentList { flex: 1; overflow-y: auto; padding: 15px; }
        
        .comment-item { display: flex; gap: 12px; margin-bottom: 20px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #333; }
        .comment-main { flex: 1; }
        .comment-user { font-size: 12px; color: #888; font-weight: bold; }
        .comment-text { font-size: 14px; color: #eee; margin-top: 2px; }

        .tk-input-box { display: flex; gap: 10px; padding: 15px; border-top: 1px solid #222; background: #000; }
        #commInput { flex: 1; background: #1a1a1a; border: none; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

    <div class="player-container">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="videoContainer" style="width:100%; height:100%;"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><i class="fa-solid fa-eye"></i> <span id="v-count">0</span></div>
        <div class="stat-item" onclick="handleLike()"><i class="fa-solid fa-heart" id="like-icon"></i> <span id="l-count">0</span></div>
        <div class="stat-item" onclick="toggleComments()"><i class="fa-solid fa-comment"></i> <span id="c-count">0</span></div>
        <div class="stat-item" onclick="handleFavoris()"><i class="fa-solid fa-star" id="fav-icon"></i> <span id="fav-status">Favoris</span></div>
    </div>

    <div class="content">
        <h1 id="movieTitle" class="movie-title">...</h1>
        <div class="desc-box">
            <p id="movieDesc">Chargement des données...</p>
        </div>

        <div class="section-title">Casting</div>
        <div id="castList" class="cast-row"></div>
    </div>

    <div id="commentPocket">
        <div class="tk-header">
            <span id="c-count-top">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark" onclick="toggleComments()" style="position:absolute; right:20px; cursor:pointer;"></i>
        </div>
        <div id="commentList"></div>
        <div class="tk-input-box">
            <input type="text" id="commInput" placeholder="Ajouter un commentaire...">
            <button onclick="sendComment()" style="background:none; border:none; color:var(--gold); font-size:22px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, increment, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const filmId = urlParams.get('id') || "MUSHOTA_VS_KARANI_01";
    const userId = localStorage.getItem('user_id') || "user_" + Math.random().toString(36).substr(2, 9);
    const userName = localStorage.getItem('user_name') || "Fan CongoFlix";
    const userImg = localStorage.getItem('user_img') || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    function init() {
        const filmRef = doc(db, "films", filmId);

        onSnapshot(filmRef, (s) => {
            const data = s.data();
            if(!data) return;

            // Titre et description (Sécurité anti-undefined)
            document.getElementById('movieTitle').innerText = data.titre || data.title || "Titre inconnu";
            document.getElementById('movieDesc').innerText = data.description || "Aucune description.";

            // Vidéo sans cadre
            const vBox = document.getElementById('videoContainer');
            if(!vBox.innerHTML) {
                vBox.innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
            }

            // Stats
            document.getElementById('v-count').innerText = data.views || 0;
            document.getElementById('l-count').innerText = (data.likes || []).length;
            document.getElementById('like-icon').style.color = (data.likes || []).includes(userId) ? "red" : "var(--gold)";

            // Casting
            if(data.acteurs_full) {
                document.getElementById('castList').innerHTML = data.acteurs_full.map(a => `
                    <div class="actor-card">
                        <img src="${a.photo}" class="actor-img">
                        <span class="actor-name">${a.nom}</span>
                    </div>
                `).join('');
            }

            // Commentaires
            const comms = data.comments || [];
            document.getElementById('c-count').innerText = comms.length;
            document.getElementById('c-count-top').innerText = comms.length;
            document.getElementById('commentList').innerHTML = comms.slice().reverse().map(c => `
                <div class="comment-item">
                    <img src="${c.photo || userImg}" class="user-avatar">
                    <div class="comment-main">
                        <div class="comment-user">${c.nom}</div>
                        <div class="comment-text">${c.text}</div>
                    </div>
                </div>
            `).join('');
        });
    }

    window.handleLike = async () => {
        const snap = await getDoc(doc(db, "films", filmId));
        const likes = snap.data().likes || [];
        await updateDoc(doc(db, "films", filmId), {
            likes: likes.includes(userId) ? arrayRemove(userId) : arrayUnion(userId)
        });
    };

    window.sendComment = async () => {
        const input = document.getElementById('commInput');
        if(!input.value.trim()) return;
        await updateDoc(doc(db, "films", filmId), {
            comments: arrayUnion({ nom: userName, photo: userImg, text: input.value, date: Date.now() })
        });
        input.value = "";
    };

    window.handleFavoris = async () => {
        const filmSnap = await getDoc(doc(db, "films", filmId));
        const fData = filmSnap.data();
        await setDoc(doc(db, "users", userId), {
            favorites: arrayUnion({ id: filmId, titre: fData.titre || fData.title, image: fData.poster || "" })
        }, { merge: true });
        document.getElementById('fav-icon').style.color = "white";
        document.getElementById('fav-status').innerText = "Ma Liste";
    };

    window.toggleComments = () => document.getElementById('commentPocket').classList.toggle('active');

    init();
</script>
</body>
</html>
