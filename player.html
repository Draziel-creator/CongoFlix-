<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - Le Miroir de la RDC</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --gold: #ffd700; 
            --bg: #000; 
            --tk-gray: #121212; 
            --tk-input: #262626; 
            --red: #ff3b5c; 
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(255, 215, 0, 0.2);
            --drawer-bg: #222222;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LECTEUR PRINCIPAL --- */
        .video-box { 
            width: 100vw; aspect-ratio: 16/9; background: #000; position: relative; z-index: 10;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }

        .back-btn { 
            position: absolute; top: 15px; left: 15px; z-index: 20; 
            width: 40px; height: 40px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; background: rgba(0,0,0,0.5); text-decoration: none;
        }

        /* --- TITRE ET ACTIONS --- */
        .title-container { padding: 15px; }
        #txtTitle { font-size: 20px; font-weight: bold; margin: 0; }

        .actions { 
            display: flex; justify-content: space-around; padding: 10px; 
            border-bottom: 1px solid #1a1a1a;
        }
        .act-item { text-align: center; color: #999; font-size: 11px; flex: 1; }
        .act-item i { font-size: 22px; color: #fff; margin-bottom: 5px; display: block; }
        .act-item.is-liked i { color: var(--red); }
        .act-item.is-fav i { color: var(--gold); }

        /* --- LISTE ÉPISODES --- */
        .info-pane { padding: 15px; }
        .season-wrapper { margin-bottom: 10px; }
        .season-pocket {
            padding: 15px; background: #111; display: flex; 
            justify-content: space-between; font-weight: bold;
        }
        .season-content { display: none; padding: 10px 0; }
        .season-wrapper.active .season-content { display: block; }

        .ep-card {
            display: flex; align-items: center; gap: 12px; margin-bottom: 15px;
            background: #0f0f0f; padding: 10px; border-radius: 8px;
        }
        .ep-poster-box { width: 100px; aspect-ratio: 16/9; border-radius: 4px; overflow: hidden; position: relative; }
        .ep-poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .ep-info { flex: 1; }
        .ep-title { font-size: 14px; font-weight: 500; }
        .detail-btn { background: #333; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; }

        /* --- MODAL STYLE CAPTURE --- */
        #detailDrawer {
            position: fixed; bottom: 0; width: 100%; height: auto; min-height: 400px;
            background: var(--drawer-bg); border-radius: 15px 15px 0 0;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0, 0, 0.2, 1);
            z-index: 3000; padding-bottom: 30px;
        }
        #detailDrawer.active { transform: translateY(0); }

        .drawer-header {
            padding: 15px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .drawer-title-box { display: flex; align-items: center; gap: 10px; }
        .drawer-title-box i { 
            background: #444; width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 14px;
        }

        .drawer-buttons {
            display: flex; gap: 10px; padding: 20px 15px;
        }
        .btn-modal {
            flex: 1; border: none; padding: 12px; border-radius: 6px;
            font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center;
        }
        .btn-gray { background: #3a3a3a; color: #fff; }
        .btn-blue { background: #007bff; color: #fff; }

        /* ZONE CONTENU (PUB OU LECTEUR) */
        .drawer-media-zone {
            margin: 0 15px; background: #000; border-radius: 8px;
            min-height: 250px; overflow: hidden; display: flex;
            align-items: center; justify-content: center;
            position: relative;
        }
        #drawerPlayerContainer { width: 100%; height: 100%; display: none; }
        #drawerAdContainer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        /* --- COMMENTAIRES TIKTOK --- */
        #tkDrawer { position: fixed; bottom: 0; width: 100%; height: 70vh; background: var(--tk-gray); border-radius: 15px 15px 0 0; transform: translateY(100%); transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; }
        #tkDrawer.active { transform: translateY(0); }
        .tk-header { padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #222; }
        .tk-list { flex: 1; overflow-y: auto; padding: 15px; }
        .tk-input-box { padding: 10px; background: #1a1a1a; display: flex; gap: 10px; align-items: center; }
        .input-pill { flex: 1; background: #333; border-radius: 20px; padding: 5px 15px; }
        .input-pill input { background: transparent; border: none; color: #fff; width: 100%; padding: 8px 0; outline: none; }

        #authAlert { display:none; position:fixed; bottom:20px; left:5%; width:90%; background:var(--red); padding:15px; border-radius:10px; z-index:9000; text-align:center; }
    </style>
</head>
<body>

    <!-- LECTEUR PRINCIPAL -->
    <div class="video-box">
        <a href="javascript:void(0)" onclick="triggerBackAd()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>
    </div>

    <div class="title-container">
        <h1 id="txtTitle">Chargement...</h1>
    </div>

    <div class="actions">
        <div class="act-item"><i class="fa-solid fa-play"></i> <span id="statV">0</span></div>
        <div class="act-item" id="mainLikeBtn"><i class="fa-regular fa-heart"></i> <span id="statL">0</span></div>
        <div class="act-item" onclick="toggleTk()"><i class="fa-regular fa-comment"></i> <span id="statC">0</span></div>
        <div class="act-item" id="mainFavBtn"><i class="fa-regular fa-bookmark"></i> <span id="favText">Ma Liste</span></div>
    </div>

    <div class="info-pane">
        <div id="episodesList"></div>
    </div>

    <!-- MODAL STYLE CAPTURE -->
    <div id="detailDrawer">
        <div class="drawer-header">
            <div class="drawer-title-box">
                <i class="fa-solid fa-arrow-down"></i>
                <div>
                    <div style="font-size:14px; font-weight:bold;">Téléchargement <span style="color:#4caf50">1 fichier(s)</span></div>
                    <div id="detEpTitle" style="font-size:11px; color:#aaa;">Nom de l'épisode</div>
                </div>
            </div>
            <i class="fa-solid fa-xmark" style="font-size:20px; color:#666" onclick="closeDetails()"></i>
        </div>

        <div style="padding: 15px 15px 0; font-size: 13px; color: #ccc;">
            Regardez-le maintenant pendant le téléchargement, sans utilisation de données supplémentaire.
        </div>

        <div class="drawer-buttons">
            <button class="btn-modal btn-gray" id="btnDownloadNow">Voir le téléchargement</button>
            <button class="btn-modal btn-blue" id="btnWatchNow">Regarder maintenant</button>
        </div>

        <!-- ZONE DE CONTENU DYNAMIQUE -->
        <div class="drawer-media-zone">
            <!-- LECTEUR (Caché au départ) -->
            <div id="drawerPlayerContainer"></div>
            
            <!-- PUB (Affichée au départ) -->
            <div id="drawerAdContainer">
                <script type="text/javascript">
                    atOptions = {
                        'key' : 'f37eede0de06b709e6c6db90820d116e',
                        'format' : 'iframe',
                        'height' : 300,
                        'width' : 160,
                        'params' : {}
                    };
                </script>
                <script type="text/javascript" src="https://www.highperformanceformat.com/f37eede0de06b709e6c6db90820d116e/invoke.js"></script>
            </div>
        </div>
    </div>

    <!-- TIROIR COMMENTAIRES -->
    <div id="tkDrawer">
        <div class="tk-header"> <span id="hCount">0</span> COMMENTAIRES </div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <div class="input-pill"><input type="text" id="tkField" placeholder="Ajouter un commentaire..."></div>
            <button onclick="handlePost()" style="background:none; border:none; color:var(--gold); font-size:20px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="authAlert"> <span id="authAlertMsg">Connecte-toi !</span> </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
            authDomain: "congo-streaming-51333.firebaseapp.com",
            projectId: "congo-streaming-51333",
            appId: "1:304286627819:android:36e0b43b8b10508a054bae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const params = new URLSearchParams(window.location.search);
        const filmId = params.get('id') || "MUSHOTA_VS_KARANI_01";
        let currentUser = null;
        let userId = "GUEST_" + Math.floor(Math.random()*9999);
        let currentFilmData = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user; userId = user.uid;
                const uSnap = await getDoc(doc(db, "users", user.uid));
                if(uSnap.exists() && (uSnap.data().favorites || []).some(f => f.id === filmId)) {
                    document.getElementById('mainFavBtn').classList.add('is-fav');
                }
            }
        });

        onSnapshot(doc(db, "films", filmId), (snap) => {
            const data = snap.data(); if(!data) return;
            currentFilmData = data;
            document.getElementById('txtTitle').innerText = data.titre || "CongoFlix";
            document.getElementById('statV').innerText = data.views || 0;
            document.getElementById('statL').innerText = (data.likes || []).length;
            
            if(!document.getElementById('playerRoot').innerHTML.trim() && data.url) {
                document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
            }
            renderEpisodes(data.episodes || []);
            renderComments(data.comments || []);
        });

        function renderEpisodes(epArray) {
            const container = document.getElementById('episodesList');
            let seasons = {};
            for (let i = 0; i < epArray.length; i += 3) {
                const img = epArray[i], title = epArray[i+1], link = epArray[i+2];
                let sName = title.includes(':') ? title.split(':')[0].trim() : "Saison 1";
                if(!seasons[sName]) seasons[sName] = [];
                seasons[sName].push({img, title, link});
            }
            container.innerHTML = Object.keys(seasons).map(s => `
                <div class="season-wrapper active">
                    <div class="season-pocket" onclick="this.parentElement.classList.toggle('active')">
                        <span>${s}</span> <i class="fa-solid fa-chevron-down"></i>
                    </div>
                    <div class="season-content">
                        ${seasons[s].map(ep => `
                            <div class="ep-card" onclick="openDetails('${ep.title.replace(/'/g, "\\'")}', '${ep.link}')">
                                <div class="ep-poster-box"><img src="${ep.img}"></div>
                                <div class="ep-info"><div class="ep-title">${ep.title}</div></div>
                                <button class="detail-btn">Détails</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        window.openDetails = (title, link) => {
            document.getElementById('detEpTitle').innerText = title;
            // Reset zone media : afficher pub, cacher lecteur
            document.getElementById('drawerAdContainer').style.display = 'flex';
            document.getElementById('drawerPlayerContainer').style.display = 'none';
            document.getElementById('drawerPlayerContainer').innerHTML = "";
            
            document.getElementById('detailDrawer').classList.add('active');

            document.getElementById('btnWatchNow').onclick = () => {
                // Le lecteur remplace la pub dans le modal
                document.getElementById('drawerAdContainer').style.display = 'none';
                const p = document.getElementById('drawerPlayerContainer');
                p.style.display = 'block';
                p.innerHTML = `<iframe src="${link}" allowfullscreen></iframe>`;
            };

            document.getElementById('btnDownloadNow').onclick = () => {
                window.open(link, '_blank');
            };
        };

        window.closeDetails = () => {
            document.getElementById('detailDrawer').classList.remove('active');
            document.getElementById('drawerPlayerContainer').innerHTML = "";
        };

        window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');

        window.handlePost = async () => {
            const f = document.getElementById('tkField');
            if(!f.value.trim() || !currentUser) return;
            const ref = doc(db, "films", filmId);
            const snap = await getDoc(ref);
            let c = snap.data().comments || [];
            c.push({ id: Date.now(), nom: currentUser.displayName || "Fan", text: f.value, date: Date.now() });
            await updateDoc(ref, { comments: c });
            f.value = "";
        };

        function renderComments(comms) {
            document.getElementById('statC').innerText = comms.length;
            document.getElementById('hCount').innerText = comms.length;
            document.getElementById('tkList').innerHTML = comms.map(c => `
                <div style="margin-bottom:15px">
                    <b style="font-size:12px; color:var(--gold)">${c.nom}</b>
                    <div style="font-size:14px">${c.text}</div>
                </div>
            `).join('');
        }

        window.triggerBackAd = () => { history.back(); };
    </script>
</body>
</html>
