<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - La Vitrine de la RDC</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --gold: #ffd700; 
            --bg: #000; 
            --tk-gray: #121212; 
            --tk-input: #262626; 
            --red: #ff3b5c; 
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(255, 215, 0, 0.2);
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LECTEUR ET HALO AMBIANT --- */
        .video-box { 
            width: 100vw; 
            aspect-ratio: 16/9; 
            background: #000; 
            position: relative; 
            z-index: 10;
        }

        .video-box::after {
            content: "";
            position: absolute;
            bottom: -15px; left: 5%; right: 5%;
            height: 25px;
            background: var(--gold);
            filter: blur(40px); /* Halo augmenté */
            opacity: 0.8;
            z-index: -1;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        .back-btn { 
            position: absolute; top: 15px; left: 15px; z-index: 20; 
            width: 42px; height: 42px; border-radius: 50%; 
            border: 2px solid var(--gold); display: flex; 
            align-items: center; justify-content: center; 
            color: var(--gold); background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(5px); text-decoration: none;
        }

        /* --- TITRE REMONTÉ --- */
        .title-container { 
            text-align: center; 
            padding: 15px 15px 5px; /* Marges réduites pour remonter */
        }

        #txtTitle { 
            font-size: 24px; 
            color: #fff; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin: 0;
        }

        /* --- ACTIONS --- */
        .actions { 
            display: flex; justify-content: space-around; 
            padding: 15px 10px; border-bottom: 1px solid #1a1a1a; 
        }

        .act-item { text-align: center; color: #999; font-size: 11px; flex: 1; cursor: pointer; }
        .act-item i { font-size: 24px; color: var(--gold); margin-bottom: 4px; display: block; }
        .act-item.is-liked i { color: var(--red) !important; }

        /* --- INFO PANE (IMAGE SUPPRIMÉE ICI) --- */
        .info-pane { padding: 15px; padding-bottom: 100px; }

        .glass-box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
        }

        #txtDesc { font-size: 14px; color: #ccc; line-height: 1.6; margin: 0; }

        /* --- SYSTÈME DE SAISONS CLIQUABLES --- */
        .season-wrapper { margin-bottom: 15px; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.03); }
        
        .season-pocket {
            background: linear-gradient(90deg, rgba(255,215,0,0.15), transparent);
            color: var(--gold);
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-left: 4px solid var(--gold);
        }

        .season-content { display: none; padding: 10px; } /* Caché par défaut */
        .season-wrapper.active .season-content { display: block; }
        .season-wrapper.active .fa-chevron-down { transform: rotate(180deg); }

        .ep-card {
            background: rgba(40, 40, 40, 0.4);
            border-radius: 10px; padding: 10px;
            margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
        }

        .ep-poster-box { width: 90px; height: 55px; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
        .ep-poster-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .ep-info { flex: 1; }
        .ep-title { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        
        .progress-bg { width: 100%; height: 4px; background: #333; border-radius: 5px; margin-bottom: 5px; }
        .progress-fill { height: 100%; background: var(--gold); width: 100%; }

        /* --- COMMENTAIRES TIKTOK --- */
        #tkDrawer { 
            position: fixed; bottom: 0; width: 100%; height: 75vh; 
            background: var(--tk-gray); border-radius: 15px 15px 0 0; 
            transform: translateY(100%); transition: 0.4s ease; z-index: 3000; 
            display: flex; flex-direction: column; 
        }
        #tkDrawer.active { transform: translateY(0); }
        .tk-header { padding: 15px; text-align: center; border-bottom: 1px solid #222; position: relative; font-weight: bold; }
        .tk-close { position: absolute; right: 15px; top: 15px; font-size: 20px; }
        .tk-list { flex: 1; overflow-y: auto; padding: 15px; }
        .comment { display: flex; gap: 10px; margin-bottom: 20px; }
        .c-avatar { width: 35px; height: 35px; border-radius: 50%; }
        .c-user { font-size: 12px; color: #888; font-weight: bold; }
        .c-text { font-size: 14px; color: #eee; }

        .tk-input-box { padding: 10px 15px 30px; display: flex; gap: 10px; background: #121212; }
        .input-pill { flex: 1; background: #262626; border-radius: 20px; padding: 0 15px; }
        #tkField { width: 100%; background: transparent; border: none; color: #fff; padding: 10px 0; outline: none; }
        .tk-send { color: var(--gold); border: none; background: none; font-size: 20px; opacity: 0.5; }
        .tk-send.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="video-box">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>
    </div>

    <div class="title-container">
        <h1 id="txtTitle">Chargement...</h1>
    </div>

    <div class="actions">
        <div class="act-item"><i class="fa-solid fa-play"></i><span id="statV">0</span></div>
        <div class="act-item" id="mainLikeBtn"><i class="fa-solid fa-heart"></i><span id="statL">0</span></div>
        <div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment"></i><span id="statC">0</span></div>
        <div class="act-item" id="mainFavBtn"><i class="fa-solid fa-bookmark"></i><span id="favText">Ajouter</span></div>
    </div>

    <div class="info-pane">
        <div class="glass-box">
            <p id="txtDesc">...</p>
        </div>

        <div id="episodesList"></div>
    </div>

    <div id="tkDrawer">
        <div class="tk-header">COMMENTAIRES <i class="fa-solid fa-times tk-close" onclick="toggleTk()"></i></div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <div class="input-pill"><input type="text" id="tkField" placeholder="Votre avis..."></div>
            <button id="tkSend" class="tk-send" onclick="handlePost()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const filmId = params.get('id') || "demo";
    let currentUser = null;

    onSnapshot(doc(db, "films", filmId), (snapshot) => {
        if (!snapshot.exists()) return;
        const data = snapshot.data();
        
        document.getElementById('txtTitle').innerText = data.titre || "Film";
        document.getElementById('txtDesc').innerText = data.description || "";
        document.getElementById('statV').innerText = data.views || 0;
        document.getElementById('statL').innerText = (data.likes || []).length;
        document.getElementById('statC').innerText = (data.comments || []).length;

        if(!document.getElementById('playerRoot').innerHTML.trim() && data.url) {
            document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
            updateDoc(doc(db, "films", filmId), { views: increment(1) });
        }

        renderEpisodes(data.episodes || []);
        renderComments(data.comments || []);
    });

    function renderEpisodes(epArray) {
        const container = document.getElementById('episodesList');
        let html = "";
        let seasons = {};

        // Grouper par saison
        for (let i = 0; i < epArray.length; i += 3) {
            const img = epArray[i], title = epArray[i+1], link = epArray[i+2];
            const seasonName = title.split(':')[0] || "Saison 1";
            if(!seasons[seasonName]) seasons[seasonName] = [];
            seasons[seasonName].push({img, title, link});
        }

        for (let sName in seasons) {
            html += `
            <div class="season-wrapper">
                <div class="season-pocket" onclick="this.parentElement.classList.toggle('active')">
                    <span><i class="fa-solid fa-layer-group"></i> ${sName}</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="season-content">
                    ${seasons[sName].map(ep => `
                        <div class="ep-card" onclick="window.location.href='${ep.link}'">
                            <div class="ep-poster-box"><img src="${ep.img}"></div>
                            <div class="ep-info">
                                <div class="ep-title">${ep.title}</div>
                                <div class="progress-bg"><div class="progress-fill"></div></div>
                                <span style="font-size:9px; color:var(--gold)">LIRE L'ÉPISODE</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    function renderComments(comms) {
        const list = document.getElementById('tkList');
        list.innerHTML = comms.reverse().map(c => `
            <div class="comment">
                <img src="${c.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="c-avatar">
                <div class="c-main">
                    <div class="c-user">${c.nom}</div>
                    <div class="c-text">${c.text}</div>
                </div>
            </div>
        `).join('');
    }

    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');

    document.getElementById('tkField').oninput = function() {
        document.getElementById('tkSend').classList.toggle('active', this.value.length > 0);
    };

    onAuthStateChanged(auth, u => currentUser = u);
</script>
</body>
</html>
