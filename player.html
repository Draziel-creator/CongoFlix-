<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - La Vitrine de la RDC</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- SYSTÈME DE DESIGN CONGOFLIX --- */
        :root { 
            --gold: #ffd700; 
            --bg: #000; 
            --tk-gray: #121212; 
            --tk-input: #262626; 
            --red: #ff3b5c; 
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(255, 215, 0, 0.2);
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 1. LECTEUR VIDÉO PREMIUM --- */
        .video-box { 
            width: 100vw; aspect-ratio: 16/9; background: #000; position: relative; 
            z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-box::after {
            content: ""; position: absolute; bottom: -5px; left: 10%; right: 10%;
            height: 10px; background: var(--gold); filter: blur(25px); opacity: 0.6; z-index: -1;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        .back-btn { 
            position: absolute; top: 15px; left: 15px; z-index: 20; 
            width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; color: var(--gold); 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); text-decoration: none;
        }

        /* --- 2. EN-TÊTE ET TITRAGE --- */
        .title-container { text-align: center; padding: 10px 15px 5px; }
        #txtTitle { 
            font-size: 22px; color: #fff; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.8); margin: 0;
        }

        /* --- 3. BARRE D'ACTIONS --- */
        .actions { 
            display: flex; justify-content: space-around; padding: 10px; 
            border-bottom: 1px solid #1a1a1a; background: linear-gradient(to bottom, transparent, #080808);
        }
        .act-item { text-align: center; color: #999; font-size: 12px; flex: 1; cursor: pointer; }
        .act-item i { font-size: 26px; color: var(--gold); margin-bottom: 6px; display: block; }
        .act-item.is-liked i { color: var(--red) !important; }
        .act-item.is-fav i { color: var(--gold) !important; text-shadow: 0 0 20px var(--gold); transform: scale(1.1); }

        /* --- 4. PANNEAU D'INFORMATIONS --- */
        .info-pane { padding: 20px; padding-bottom: 100px; }
        .glass-box {
            background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border-gold);
            border-radius: 15px; padding: 30px 20px 20px; position: relative; margin-bottom: 35px;
        }
        .glass-box::before {
            content: "\201C"; position: absolute; top: -5px; left: 20px;
            font-size: 60px; color: var(--gold); font-family: serif; opacity: 0.5;
        }
        #txtDesc { font-size: 14.5px; color: #ddd; line-height: 1.7; margin: 0; }

        /* --- 5. CASTING VISUEL --- */
        .cast-label { 
            color: var(--gold); font-size: 13px; font-weight: 800; text-transform: uppercase; 
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
        }
        .cast-label::after { content: ""; flex: 1; height: 1px; background: var(--border-gold); }
        .cast-row-imgs { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .actor-img { width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; flex-shrink: 0; }
        .cast-list-vertical { margin-top: 15px; border-left: 2px solid var(--border-gold); padding-left: 20px; }
        .cast-name-item { font-size: 14px; color: #eee; margin-bottom: 12px; }

        /* --- 6. GESTION DES SAISONS --- */
        .season-wrapper { margin-bottom: 15px; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.03); }
        .season-pocket {
            background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent); color: var(--gold);
            padding: 15px; font-weight: bold; display: flex; justify-content: space-between; border-left: 5px solid var(--gold); cursor: pointer;
        }
        .season-content { display: none; padding: 10px; }
        .season-wrapper.active .season-content { display: block; }
        .ep-card {
            background: rgba(25, 25, 25, 0.6); border-radius: 14px; padding: 14px; margin-bottom: 18px;
            display: flex; align-items: center; gap: 18px; border: 1px solid rgba(255, 215, 0, 0.08);
        }
        .ep-poster-box { width: 110px; height: 65px; border-radius: 8px; overflow: hidden; position: relative; flex-shrink: 0; }
        .ep-poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .ep-hd-tag { position: absolute; top: 5px; right: 5px; background: var(--gold); color: #000; font-size: 9px; font-weight: 900; padding: 2px 5px; border-radius: 4px; }
        .ep-info { flex: 1; }
        .ep-title { font-size: 14px; font-weight: 600; color: #fff; }
        .detail-btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; }

        /* --- 7. MODAL DE DÉTAILS ÉSTHÉTIQUE --- */
        #detailDrawer {
            position: fixed !important; bottom: 0 !important; left: 0 !important; width: 100% !important; 
            height: auto !important; max-height: 90vh !important; background: #141414 !important; z-index: 99999 !important; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8) !important; border-radius: 20px 20px 0 0 !important; 
            box-sizing: border-box !important; padding-bottom: calc(env(safe-area-inset-bottom) + 15px) !important; 
            transform: translateY(110%) !important; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1) !important;
        }
        #detailDrawer.active { transform: translateY(0) !important; }

        .drawer-header {
            padding: 15px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .drawer-buttons { display: flex; gap: 10px; padding: 15px; }
        .btn-modal { flex: 1; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gray { background: #333; color: #fff; }
        .btn-blue { background: #007bff; color: #fff; }

        .drawer-media-zone {
            width: 100% !important; height: auto !important; display: flex !important; flex-direction: column !important; 
            align-items: center !important; justify-content: center !important; margin-top: 15px !important; padding: 0 !important;
        }
        #modalPlayerContainer { width: 100%; aspect-ratio: 16/9; display: none; }
        
        #modalAdContainer { 
            width: 100% !important; height: 65px !important; min-height: 65px !important; max-height: 65px !important; 
            display: flex !important; justify-content: center !important; align-items: center !important; 
            overflow: hidden !important; background: transparent !important; margin: 10px 0 0 0 !important; padding: 0 !important; box-sizing: border-box !important;
        }

        /* --- 8. COMMENTAIRES (STYLE TIKTOK) --- */
        #tkDrawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: var(--tk-gray); border-radius: 12px 12px 0 0; transform: translateY(100%); transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; }
        #tkDrawer.active { transform: translateY(0); }
        .tk-header { padding: 15px; text-align: center; border-bottom: 0.5px solid #222; position: relative; font-weight: bold; font-size: 13px; }
        .tk-list { flex: 1; overflow-y: auto; padding: 20px; }
        .tk-input-box { padding: 10px 15px 30px; background: var(--tk-gray); border-top: 0.5px solid #222; display: flex; align-items: center; gap: 12px; }
        .input-pill { flex: 1; background: var(--tk-input); border-radius: 22px; padding: 0 15px; }
        #tkField { background: transparent; border: none; color: #fff; padding: 10px 0; width: 100%; outline: none; font-size: 14px; }
        
        .c-foot { display: flex; gap: 15px; margin-top: 8px; font-size: 11px; color: var(--gold); font-weight: bold; cursor: pointer; }
        .replies-pocket { display: none; margin-top: 10px; padding-left: 10px; border-left: 1px solid #333; }
        .replies-pocket.open { display: block; }

        #authAlert { display:none; position:fixed; bottom:30px; left:5%; width:90%; background:var(--red); padding:18px; border-radius:15px; z-index:5000; text-align:center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="video-box">
        <a href="javascript:void(0)" onclick="triggerBackAd()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>

        <div class="drawer-media-zone">

            <div id="modalAdContainer">
                <iframe src="https://ad.a-ads.com/2443411?size=320x50" scrolling="no" style="border:0; padding:0; margin:0; width:320px; height:65px; overflow:hidden; background:transparent; display:block; vertical-align:top;"></iframe>
            </div>

    <div id="tkDrawer">
        <div class="tk-header">
            <span id="hCount">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark" style="position:absolute; right:20px; font-size: 18px;" onclick="toggleTk()"></i>
        </div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <img id="myAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:32px; height:32px; border-radius:50%">
            <div class="input-pill"><input type="text" id="tkField" placeholder="Ajouter un commentaire..."></div>
            <button id="tkSend" style="background:none; border:none; color:var(--gold); font-size:22px;" onclick="handlePost()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>

    <div id="authAlert"> <span id="authAlertMsg">Connecte-toi !</span> </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, increment, collection, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const filmId = params.get('id') || "MUSHOTA_VS_KARANI_01";
    let currentUser = null;
    let userId = "GUEST_" + Math.floor(Math.random()*9999);
    let userName = "Fan CongoFlix";
    let userImg = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    let currentFilmData = null;
    let targetCommentId = null;
    let descriptionComplete = "";
    let globalTimeout = null;
       // --- VARIABLES DE ROTATION DE PUBLICITÉ (CONGOFLIX) ---
    let cyclePub = 1; 
    let pubRotationInterval = null;

    // Fonction sécurisée pour récupérer et formater les dates des commentaires et réponses
    function recupererDateFormattee(timestamp) {
        if (!timestamp) return new Date().toLocaleDateString();
        try {
            if (typeof formatDate === 'function') {
                return formatDate(timestamp);
            }
            return new Date(timestamp).toLocaleDateString();
        } catch (e) {
            return new Date(timestamp).toLocaleDateString();
        }
    }

    window.toggleInfoPocket = (pocketElement) => {
        const wrapper = pocketElement.parentElement;
        const content = document.getElementById('infoPocketContent');
        wrapper.classList.toggle('active');
        if (wrapper.classList.contains('active')) {
            content.style.display = 'block';
            lancerMachineAEcrire(descriptionComplete);
        } else {
            content.style.display = 'none';
            if(globalTimeout) clearTimeout(globalTimeout);
        }
    };

  // 1. Initialisation unique à l'extérieur
    let machineAudioCtx = null;

    function lancerMachineAEcrire(texte) {
        try {
            const txtDesc = document.getElementById('txtDesc');
            if (!txtDesc) return; // Sécurité si l'élément HTML n'existe pas encore
            
            txtDesc.innerText = "";
            let i = 0;
            if(globalTimeout) clearTimeout(globalTimeout);

            // Initialisation de l'audio uniquement si supporté
            if (!machineAudioCtx) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (AudioContextClass) machineAudioCtx = new AudioContextClass();
            }

            // Fonction interne pour le son de touche mécanique
            function jouerSonClavier() {
                try {
                    if (!machineAudioCtx) return;
                    if (machineAudioCtx.state === 'suspended') {
                        machineAudioCtx.resume();
                    }

                    const osc1 = machineAudioCtx.createOscillator();
                    const osc2 = machineAudioCtx.createOscillator();
                    const gainNode = machineAudioCtx.createGain();

                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(600, machineAudioCtx.currentTime);

                    osc2.type = 'triangle';
                    osc2.frequency.setValueAtTime(300, machineAudioCtx.currentTime);

                    gainNode.gain.setValueAtTime(0.5, machineAudioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, machineAudioCtx.currentTime + 0.03);

                    osc1.connect(gainNode);
                    osc2.connect(gainNode);
                    gainNode.connect(machineAudioCtx.destination);

                    osc1.start();
                    osc2.start();
                    
                    osc1.stop(machineAudioCtx.currentTime + 0.03);
                    osc2.stop(machineAudioCtx.currentTime + 0.03);
                } catch (audioErr) {
                    console.log("Le son n'a pas pu être joué :", audioErr);
                }
            } // <-- Fermeture correcte de jouerSonClavier

            function taper() {
                if (i < texte.length) {
                    let caractereActuel = texte.charAt(i);
                    txtDesc.innerText += caractereActuel;
                    
                    if (caractereActuel !== '\n' && caractereActuel !== '\r') {
                        jouerSonClavier();
                    }

                    i++;
                    
                    let delai = 180; 
                    if (caractereActuel === '.' || caractereActuel === '!') {
                        delai = 950; 
                    } else if (caractereActuel === ',') {
                        delai = 600; 
                    } else if (caractereActuel === ' ') {
                        delai = 140; 
                    }
                    
                    globalTimeout = setTimeout(taper, delai);
                }
            } // <-- Fermeture correcte de taper
            
            taper(); // Lance l'écriture

        } catch (globalErr) {
            // S'il y a la moindre erreur dans tout ce code, elle est capturée ici
            // et cela N'EMPÊCHE PAS le reste de ta page (likes, commentaires, etc.) de fonctionner !
            console.error("Erreur générale machine à écrire sécurisée :", globalErr);
        }
    } // <-- Fermeture définitive de lancerMachineAEcrire
    // ==========================================
    // UN SEUL ÉCOUTEUR AUTH TRACKING UNIQUE ET PROPRE
    // ==========================================
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user; 
            userId = user.uid;
            
            // ÉTAPE 1 : On applique IMMEDIATEMENT les infos de sa session Firebase (Google ou e-mail)
            userName = user.displayName || user.email.split('@')[0];
            userImg = user.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

            const myAvatarImg = document.getElementById('myAvatar');
            if(myAvatarImg) myAvatarImg.src = userImg;

            try {
                // ÉTAPE 2 : On cherche si un profil personnalisé existe dans Firestore collection "users"
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()){
                    const d = snap.data();
                    if(d.name) userName = d.name;
                    if(d.photoURL) userImg = d.photoURL;
                    
                    // On met à jour l'avatar au cas où Firestore a une photo plus récente
                    if(myAvatarImg) myAvatarImg.src = userImg;
                    
                    // Gestion du bouton favoris
                    if((d.favorites || []).some(f => f.id === filmId)) {
                        const favBtn = document.getElementById('mainFavBtn');
                        const favText = document.getElementById('favText');
                        if(favBtn) favBtn.classList.add('is-fav');
                        if(favText) favText.innerText = "Ma Liste";
                    }
                }
            } catch(err) {
                console.log("Erreur récupération profil base de données:", err);
            }

            // ÉTAPE 3 : Enregistrement de l'historique nettoyé et compatible avec l'index
            setTimeout(async () => {
                try {
                    const userRef = doc(db, "users", userId);
                    
                    // On utilise 'title' et 'poster' pour correspondre exactement à l'index.html !
                    const historyItem = { 
                        id: filmId, 
                        title: currentFilmData?.titre || filmId, 
                        poster: currentFilmData?.poster || "",
                        date: Date.now() 
                    };
                    
                    // 1. Récupération de l'historique actuel
                    const docSnap = await getDoc(userRef);
                    let currentHistory = [];
                    if(docSnap.exists()) {
                        currentHistory = docSnap.data().history || [];
                    }
                    
                    // 2. Supprime l'ancien doublon si la série/film a déjà été vu(e)
                    currentHistory = currentHistory.filter(item => item.id !== filmId);
                    
                    // 3. Place l'élément tout au début de la liste (le plus récent en premier)
                    currentHistory.unshift(historyItem);
                    
                    // 4. Limite à 15 éléments maximum pour ne pas ralentir le chargement
                    if(currentHistory.length > 15) currentHistory = currentHistory.slice(0, 15);
                    
                    // 5. Sauvegarde du tableau mis à jour dans Firestore
                    await updateDoc(userRef, { history: currentHistory });
                } catch(e) {
                    console.log("Erreur enregistrement historique :", e);
                }
            }, 2500);
        }
    }); // <-- FERMETURE DU BLOC UNIQUE PARFAITEMENT RESPECTÉE ICI

    // ==========================================
    // 1. INJECTION DU CSS (STABILISATION + PUB)
    // ==========================================
    const styleStabilisateur = document.createElement('style');
    styleStabilisateur.innerHTML = `
        .ep-card { display: flex !important; align-items: center !important; justify-content: space-between !important; gap: 15px !important; width: 100% !important; box-sizing: border-box !important; position: relative !important; margin-bottom: 8px !important; cursor: pointer; }
        .ep-info { flex: 1 !important; min-width: 0 !important; position: relative !important; display: flex !important; align-items: center !important; justify-content: flex-start !important; overflow: hidden !important; }
        .ep-title-wrapper { width: 100% !important; max-width: 100% !important; overflow: hidden !important; position: relative !important; display: inline-block !important; }
        .ep-title { white-space: nowrap !important; font-size: 14px; color: #fff; display: inline-block !important; transform: translateX(0); animation: scrollRebondLeft 10s ease-in-out infinite alternate !important; }
        @keyframes scrollRebondLeft { 0% { transform: translateX(0); } 25% { transform: translateX(0); } 75% { transform: translateX(calc(-100% + 100px)); } 100% { transform: translateX(calc(-100% + 100px)); } }
        .detail-btn { flex-shrink: 0 !important; }
        .btn-voir-plus-poche { display: flex !important; align-items: center !important; justify-content: center !important; gap: 8px !important; background-color: #007bff !important; color: #ffffff !important; padding: 12px 20px !important; border-radius: 6px !important; font-size: 13px !important; font-weight: bold !important; margin-top: 2px !important; margin-bottom: 10px !important; cursor: pointer !important; border: none !important; width: 100% !important; box-sizing: border-box !important; transition: background 0.2s; }
        .btn-voir-plus-poche:hover { background-color: #0056b3 !important; }
        .suite-hidden { display: none !important; }
        #detailDrawer { position: fixed !important; bottom: 0 !important; left: 0 !important; width: 100% !important; height: auto !important; max-height: 85vh !important; background: #141414 !important; z-index: 99999 !important; box-shadow: 0 -10px 30px rgba(0,0,0,0.7) !important; border-radius: 20px 20px 0 0 !important; box-sizing: border-box !important; padding-bottom: env(safe-area-inset-bottom); transform: translateY(100%) !important; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1) !important; pointer-events: none !important; }
        #detailDrawer.active { transform: translateY(0) !important; pointer-events: auto !important; }

        /* --- CONTRAINTE STRICTE POUR LA SOCIAL BAR ADSTERRA --- */
        div[id^="at_sb_"], .at-social-bar, div[class^="adsterra-"] {
            top: auto !important;
            bottom: 15px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            position: fixed !important;
            z-index: 999999 !important;
            display: block !important;
        }
    `;
    document.head.appendChild(styleStabilisateur);

    // ==========================================
    // 2. GESTION DES DONNÉES FIRESTORE
    // ==========================================
    let listeEp_Partie1 = [];
    let listeEp_Partie2 = [];

    function fusionnerEtAfficher() {
        const tousLesEpisodes = [...listeEp_Partie1, ...listeEp_Partie2];
        renderEpisodes(tousLesEpisodes);
    }

    // ÉCOUTEUR PRINCIPAL DU DOCUMENT SERIE / FILM
    onSnapshot(doc(db, "films", filmId), (snap) => {
        const data = snap.data(); if(!data) return;
        currentFilmData = data;
        
        document.getElementById('txtTitle').innerText = data.titre || "CongoFlix";
        descriptionComplete = data.description || "Aucune description disponible.";
        document.getElementById('txtDesc').innerText = descriptionComplete;
        document.getElementById('statV').innerText = data.views || 0;

        if(!document.getElementById('playerRoot').innerHTML.trim() && data.url) {
            document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
        }

        renderCasting(data);
        listeEp_Partie1 = data.episodes || data.partie || data.film || data.Saison || data.Saison1 || [];
        fusionnerEtAfficher();
    });

    onSnapshot(doc(db, "films", filmId + "-suite"), (snap) => {
        if (snap.exists()) {
            const dataSuite = snap.data();
            listeEp_Partie2 = dataSuite.episodes || dataSuite.partie || dataSuite.film || dataSuite.Saison || dataSuite.Saison1 || [];
        } else {
            listeEp_Partie2 = [];
        }
        fusionnerEtAfficher();
    });

    // ÉCOUTEUR EN TEMPS RÉEL DES COMMENTAIRES
    onSnapshot(collection(db, "films", filmId, "comments"), (snapshot) => {
        let comms = [];
        snapshot.forEach((docSnap) => {
            comms.push({ id: docSnap.id, ...docSnap.data() });
        });
        renderComments(comms);
    });

    // ÉCOUTEUR UNIQUE DU COMPTEUR DE LIKES
    onSnapshot(collection(db, "films", filmId, "likes"), (snapshot) => {
        const statL = document.getElementById('statL');
        if (statL) statL.innerText = snapshot.size;

        const likeBtn = document.getElementById('mainLikeBtn');
        let userHasLiked = false;
        snapshot.forEach((docSnap) => {
            if(docSnap.id === userId) userHasLiked = true;
        });

        if(currentUser && userHasLiked) {
            likeBtn.classList.add('is-liked');
        } else {
            likeBtn.classList.remove('is-liked');
        }
    });

    // ==========================================
    // 3. FONCTIONS DE RENDU (DOM)
    // ==========================================
    function renderEpisodes(epArray) {
        const container = document.getElementById('episodesList');
        if(!container) return;
        let html = ""; let seasons = {};
        
        for (let i = 0; i < epArray.length; i += 4) {
            const img = epArray[i];
            const title = epArray[i+1];
            const linkWatch = epArray[i+2];    
            const linkDownload = epArray[i+3]; 
            
            if (!title) continue; 

            let sName = title.includes(':') ? title.split(':')[0].trim() : "Épisodes";
            if(!seasons[sName]) seasons[sName] = [];
            seasons[sName].push({img, title, linkWatch, linkDownload});
        }
        
        for (let s in seasons) {
            let cartesHtml = "";
            let boutonVoirPlusHtml = "";
            let modificateursSuite = false;

            seasons[s].forEach((ep) => {
                if (ep.title.toLowerCase().includes("voir plus")) {
                    modificateursSuite = true;
                    boutonVoirPlusHtml = `
                        <button class="btn-voir-plus-poche" id="btn-more-${s}" onclick="afficherLaSuiteDeLaPoche('${s}')">
                            <i class="fa-solid fa-circle-plus"></i> Voir plus d'épisodes
                        </button>
                    `;
                } else {
                    let classeCachee = modificateursSuite ? `suite-hidden partie-suite-${s}` : "";
                    let titreAffiche = ep.title;
                    if (ep.title.includes(':')) {
                        const morceaux = ep.title.split(':');
                        morceaux.shift();
                        titreAffiche = morceaux.join(':').trim();
                    }

                    let safeTitle = ep.title.replace(/["']/g, " ");

                    cartesHtml += `
                        <div class="ep-card ${classeCachee}" onclick="openDetails('${safeTitle}', '${ep.linkWatch || ''}', '${ep.linkDownload || ''}')">
                            <div class="ep-poster-box"><img src="${ep.img}"><div class="ep-hd-tag">HD</div></div>
                            <div class="ep-info">
                                <div class="ep-title-wrapper">
                                    <div class="ep-title">${titreAffiche}</div>
                                </div>
                            </div>
                            <button class="detail-btn">Détails</button>
                        </div>
                    `;
                }
            });

            html += `
            <div class="season-wrapper" style="margin-bottom: 25px;">
                <div class="season-pocket" onclick="this.parentElement.classList.toggle('active')">
                    <span><i class="fa-solid fa-layer-group"></i> ${s}</span> <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="season-content">
                    ${cartesHtml}
                    ${boutonVoirPlusHtml}
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }

    window.afficherLaSuiteDeLaPoche = (saisonId) => {
        const elementsSuite = document.querySelectorAll(`.partie-suite-${saisonId}`);
        elementsSuite.forEach(el => el.classList.remove('suite-hidden'));
        const boutonMore = document.getElementById(`btn-more-${saisonId}`);
        if(boutonMore) boutonMore.style.display = 'none';
    };

    window.openDetails = (title, linkWatch, linkDownload) => {
        document.getElementById('detEpTitle').innerText = title;
        
        const adContainer = document.getElementById('modalAdContainer');
        adContainer.style.display = 'flex';
        adContainer.innerHTML = ""; 

        if (pubRotationInterval) clearInterval(pubRotationInterval);

        const structureDebut = `<div style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 5px 0; overflow: hidden;">`;
        const structureFin = `</div>`;

        const pubs = [
            `${structureDebut}<div style="width: 320px; height: 50px; overflow: hidden; display: flex; justify-content: center;"><iframe src="adsterra-banner.html" style="border:0; padding:0; width:320px; height:50px; overflow:hidden; background:transparent;"></iframe></div>${structureFin}`,
            `${structureDebut}<div style="width: 320px; height: 50px; overflow: hidden; display: flex; justify-content: center;"><iframe src="adsterra-native.html" style="border:0; padding:0; width:320px; height:50px; overflow:hidden; background:transparent;"></iframe></div>${structureFin}`,
            `${structureDebut}<div style="width: 320px; height: 50px; display: flex; justify-content: center;"><iframe src="https://ad.a-ads.com/2443411?size=320x50" style="border:0; padding:0; width:320px; height:50px; overflow:hidden; background-color:transparent;"></iframe></div>${structureFin}`
        ];

        const totalCards = document.querySelectorAll('.ep-card').length;

        if (totalCards <= 1) {
            let indexRotation = 0;
            adContainer.innerHTML = pubs[indexRotation];
            pubRotationInterval = setInterval(() => {
                indexRotation++;
                if (indexRotation >= pubs.length) { clearInterval(pubRotationInterval); } 
                else { adContainer.innerHTML = pubs[indexRotation]; }
            }, 1500); 
        } else {
            if (cyclePub === 1) { adContainer.innerHTML = pubs[0]; cyclePub = 2; } 
            else if (cyclePub === 2) { adContainer.innerHTML = pubs[1]; cyclePub = 3; } 
            else { adContainer.innerHTML = pubs[2]; cyclePub = 1; }
        }

        document.getElementById('modalPlayerContainer').style.display = 'none';
        document.getElementById('modalPlayerContainer').innerHTML = "";
        document.getElementById('detailDrawer').classList.add('active');
        
        document.getElementById('btnWatchNow').onclick = () => {
            if (pubRotationInterval) clearInterval(pubRotationInterval); 
            document.getElementById('modalAdContainer').style.display = 'none';
            const container = document.getElementById('modalPlayerContainer');
            container.style.display = 'block';
            container.innerHTML = `<iframe src="${linkWatch}" allowfullscreen></iframe>`;
        };
        
        document.getElementById('btnDownloadNow').onclick = () => {
            if(linkDownload) { window.open(linkDownload, '_blank'); } 
            else { alert("Lien de téléchargement indisponible"); }
        };
    };

    window.closeDetails = () => {
        if (pubRotationInterval) clearInterval(pubRotationInterval); 
        document.getElementById('detailDrawer').classList.remove('active');
        document.getElementById('modalPlayerContainer').innerHTML = "";
    };

    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');

    window.handlePost = async () => {
        if(!currentUser) return showAuthAlert("Connecte-toi pour commenter !");
        const f = document.getElementById('tkField');
        const val = f.value.trim();
        if(!val) return;
        
        try {
            const uniqueId = "ID-" + Date.now() + "-" + Math.floor(Math.random() * 1000);
            if(targetCommentId) {
                const replyData = { id: uniqueId, nom: userName, text: val, photo: userImg, date: Date.now() };
                await updateDoc(doc(db, "films", filmId, "comments", targetCommentId), { replies: arrayUnion(replyData) });
            } else {
                const newComment = { id: uniqueId, nom: userName, text: val, photo: userImg, date: Date.now(), replies: [] };
                await setDoc(doc(db, "films", filmId, "comments", uniqueId), newComment);
            }
            f.value = ""; targetCommentId = null; f.placeholder = "Ajouter un commentaire...";
        } catch (err) { console.error("Erreur commentaire : ", err); }
    };

    window.prepareReply = (cid, name) => {
        targetCommentId = cid;
        const field = document.getElementById('tkField');
        field.placeholder = "Répondre à " + name + "...";
        field.focus();
    };

    function renderComments(comms) {
        const list = document.getElementById('tkList');
        if(!list) return;
        
        document.getElementById('statC').innerText = comms.length;
        document.getElementById('hCount').innerText = comms.length;
        const commsTries = [...comms].sort((a,b) => b.date - a.date);

        list.innerHTML = commsTries.map(c => {
            let dateCommentaire = recupererDateFormattee(c.date);
            return `
            <div style="display:flex; gap:12px; margin-bottom:20px; align-items:flex-start; position:relative;">
                <img src="${c.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:35px; height:35px; border-radius:50%">
                <div style="flex:1; padding-right:30px;">
                    <div style="font-size:12px; color:#999; font-weight:bold">${c.nom} <span style="font-weight:normal; color:#555; margin-left:6px;">${dateCommentaire}</span></div>
                    <div style="font-size:14px; color:#eee; margin-top:2px;">${c.text}</div>
                    <div class="c-foot" style="margin-top:4px;"><span onclick="prepareReply('${c.id}', '${c.nom}')" style="cursor:pointer; color:#777; font-size:12px;">Répondre</span></div>
                     ${(c.replies || []).length > 0 ? `
                        <div style="margin-top:10px; font-size:12px; color:var(--gold); cursor:pointer" onclick="this.nextElementSibling.classList.toggle('open')">——— Afficher les réponses</div>
                        <div class="replies-pocket">
                            ${(c.replies || []).map(r => {
                                let dateReponse = recupererDateFormattee(r.date);
                                return `
                                <div style="display:flex; gap:8px; margin-top:12px; position:relative;">
                                    <img src="${r.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:24px; height:24px; border-radius:50%">
                                    <div style="flex:1; padding-right:25px;">
                                        <div style="font-size:11px; color:#777; font-weight:bold">${r.nom} <span style="font-weight:normal; color:#555; margin-left:6px;">${dateReponse}</span></div>
                                        <div style="font-size:13px; color:#eee; margin-top:1px;">${r.text}</div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    ` : ''}
                </div>
            </div>`;
        }).join('');
    }

    function renderCasting(data) {
        document.getElementById('rowCastImgs').innerHTML = (data.acteurs || []).map(url => `<img src="${url}" class="actor-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">`).join('');
        document.getElementById('listCastNames').innerHTML = (data.noms_acteurs || []).map(n => `<div class="cast-name-item"><i class="fa-solid fa-star" style="color:var(--gold); margin-right:10px; font-size: 8px;"></i> ${n}</div>`).join('');
    }

    document.getElementById('mainLikeBtn').onclick = async () => {
        if(!currentUser) return showAuthAlert("Connecte-toi pour liker !");
        const likeRef = doc(db, "films", filmId, "likes", userId);
        const likeSnap = await getDoc(likeRef);
        if (likeSnap.exists()) { await deleteDoc(likeRef); } 
        else { await setDoc(likeRef, { liked: true }); }
    };

    document.getElementById('mainFavBtn').onclick = async () => { 
        if(!currentUser) return showAuthAlert("Connecte-toi pour enregistrer !");
        const btn = document.getElementById('mainFavBtn');
        const userRef = doc(db, "users", userId);
        let inversion = { id: filmId, titre: currentFilmData.titre || filmId, image: currentFilmData.poster || "" };
        if(btn.classList.contains('is-fav')) {
            await updateDoc(userRef, { favorites: arrayRemove(inversion) });
            btn.classList.remove('is-fav');
            document.getElementById('favText').innerText = "Enregistrer";
        } else {
            await updateDoc(userRef, { favorites: arrayUnion(inversion) });
            btn.classList.add('is-fav');
            document.getElementById('favText').innerText = "Ma Liste";
        }
    };

    window.triggerBackAd = () => { history.back(); };
    window.showAuthAlert = (m) => { 
        const a = document.getElementById('authAlert');
        document.getElementById('authAlertMsg').innerText = m || "Action requise";
        a.style.display='block'; setTimeout(()=>a.style.display='none', 3000);
    };

    setTimeout(async () => {
        try { await updateDoc(doc(db, "films", filmId), { views: increment(1) }); } 
        catch(e) { console.log("Erreur vue:", e); }
    }, 1200);
</script>
