<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* LECTEUR FULL BORD À BORD */
        .player-wrapper { width: 100vw; aspect-ratio: 16/9; background: #000; position: relative; margin: 0; padding: 0; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        .back-nav { position: absolute; top: 12px; left: 12px; z-index: 100; width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.4); text-decoration: none; }

        /* BARRE D'OUTILS ÉPURÉE */
        .interaction-bar { display: flex; justify-content: space-around; padding: 15px 5px; background: var(--bg); }
        .tool { text-align: center; color: #888; font-size: 11px; flex: 1; cursor: pointer; }
        .tool i { font-size: 24px; color: var(--gold); margin-bottom: 6px; display: block; }

        /* DESCRIPTION STYLE PROFESSIONNEL */
        .main-content { padding: 0 20px 20px 20px; }
        .movie-title { font-size: 26px; color: var(--gold); margin: 10px 0; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }
        .description-vibe { padding: 15px; background: rgba(255,255,255,0.03); border-radius: 0 15px 15px 15px; border-left: 4px solid var(--gold); font-size: 14px; color: #ddd; line-height: 1.6; margin-bottom: 25px; }

        /* CASTING HORIZONTAL AVEC NOMS */
        .cast-header { color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .cast-scroll { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cast-scroll::-webkit-scrollbar { display: none; }
        .actor-unit { flex-shrink: 0; width: 70px; text-align: center; }
        .actor-unit img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; margin-bottom: 7px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .actor-unit b { font-size: 10px; color: #fff; display: block; line-height: 1.2; font-weight: 500; }

        /* DESIGN COMMENTAIRES STYLE TIKTOK */
        #commentPanel { position: fixed; bottom: 0; width: 100%; height: 75vh; background: #121212; border-radius: 16px 16px 0 0; transform: translateY(100%); transition: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1); z-index: 2000; display: flex; flex-direction: column; }
        #commentPanel.show { transform: translateY(0); }
        .panel-header { padding: 15px; text-align: center; font-size: 13px; font-weight: 700; border-bottom: 1px solid #222; position: relative; }
        .close-panel { position: absolute; right: 20px; top: 15px; font-size: 20px; color: #666; }
        
        #commentList { flex: 1; overflow-y: auto; padding: 20px; }
        .tk-comment { display: flex; gap: 12px; margin-bottom: 22px; align-items: flex-start; }
        .tk-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #333; }
        .tk-content { flex: 1; }
        .tk-user { font-size: 12px; color: #777; font-weight: 700; margin-bottom: 2px; }
        .tk-text { font-size: 14px; color: #efefef; line-height: 1.4; }
        .tk-meta { font-size: 11px; color: #555; margin-top: 6px; font-weight: 600; }
        .tk-like-side { text-align: center; color: #444; padding-left: 5px; }
        .tk-like-side i { font-size: 18px; margin-bottom: 2px; }
        .tk-like-side small { font-size: 10px; display: block; }

        /* BARRE D'ÉCRITURE TIKTOK */
        .tk-input-area { padding: 12px 15px 30px 15px; background: #121212; border-top: 1px solid #222; display: flex; align-items: center; gap: 12px; }
        .tk-field { flex: 1; background: #262626; border: none; color: #fff; padding: 10px 18px; border-radius: 22px; font-size: 14px; outline: none; }
        .tk-send { color: var(--gold); font-size: 24px; background: none; border: none; padding: 0; }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <a href="javascript:history.back()" class="back-nav"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="videoOutlet" style="width:100%; height:100%;"></div>
    </div>

    <div class="interaction-bar">
        <div class="tool"><i class="fa-solid fa-eye"></i> <span id="viewCount">0</span></div>
        <div class="tool" onclick="handleLike()"><i class="fa-solid fa-heart" id="likeIcon"></i> <span id="likeCount">0</span></div>
        <div class="tool" onclick="toggleComments()"><i class="fa-solid fa-comment"></i> <span id="commCount">0</span></div>
        <div class="tool" onclick="handleFavoris()"><i class="fa-solid fa-star" id="favIcon"></i> <span id="favText">Favoris</span></div>
    </div>

    <div class="main-content">
        <h1 id="mTitle" class="movie-title">CHARGEMENT...</h1>
        <div class="description-vibe">
            <span id="mDesc">...</span>
        </div>

        <div class="cast-header">Casting du film</div>
        <div id="castScroll" class="cast-scroll"></div>
    </div>

    <div id="commentPanel">
        <div class="panel-header">
            <span id="commHeaderCount">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark close-panel" onclick="toggleComments()"></i>
        </div>
        <div id="commentList"></div>
        <div class="tk-input-area">
            <input type="text" id="tkInput" class="tk-field" placeholder="Ajouter un commentaire...">
            <button onclick="postComment()" class="tk-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const urlParams = new URLSearchParams(window.location.search);
    const filmId = urlParams.get('id') || "MUSHOTA_VS_KARANI_01";
    const userId = localStorage.getItem('user_id') || "U-" + Math.floor(Math.random()*100000);
    const userName = localStorage.getItem('user_name') || "Fan CongoFlix";

    function startService() {
        onSnapshot(doc(db, "films", filmId), (snap) => {
            const data = snap.data();
            if(!data) return;

            // Données de base
            document.getElementById('mTitle').innerText = data.titre || data.title || "";
            document.getElementById('mDesc').innerText = data.description || "";
            document.getElementById('viewCount').innerText = data.views || 0;
            document.getElementById('likeCount').innerText = (data.likes || []).length;
            document.getElementById('likeIcon').style.color = (data.likes || []).includes(userId) ? "#ff3b5c" : "#ffd700";

            // Injecteur Vidéo sans bordure
            const vZone = document.getElementById('videoOutlet');
            if(!vZone.innerHTML) {
                vZone.innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
            }

            // Casting avec noms
            if(data.acteurs_full) {
                document.getElementById('castScroll').innerHTML = data.acteurs_full.map(a => `
                    <div class="actor-unit">
                        <img src="${a.photo}">
                        <b>${a.nom}</b>
                    </div>
                `).join('');
            }

            // Rendu TikTok des commentaires
            const cList = data.comments || [];
            document.getElementById('commCount').innerText = cList.length;
            document.getElementById('commHeaderCount').innerText = cList.length;
            document.getElementById('commentList').innerHTML = cList.slice().reverse().map(c => `
                <div class="tk-comment">
                    <img src="${c.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="tk-avatar">
                    <div class="tk-content">
                        <div class="tk-user">${c.nom}</div>
                        <div class="tk-text">${c.text}</div>
                        <div class="tk-meta">Répondre</div>
                    </div>
                    <div class="tk-like-side">
                        <i class="fa-solid fa-heart"></i>
                        <small>0</small>
                    </div>
                </div>
            `).join('');
        });
    }

    window.handleLike = async () => {
        const ref = doc(db, "films", filmId);
        const s = await getDoc(ref);
        const l = s.data().likes || [];
        await updateDoc(ref, { likes: l.includes(userId) ? arrayRemove(userId) : arrayUnion(userId) });
    };

    window.postComment = async () => {
        const inp = document.getElementById('tkInput');
        if(!inp.value.trim()) return;
        await updateDoc(doc(db, "films", filmId), {
            comments: arrayUnion({ nom: userName, text: inp.value, date: Date.now() })
        });
        inp.value = "";
    };

    window.handleFavoris = async () => {
        const snap = await getDoc(doc(db, "films", filmId));
        await setDoc(doc(db, "users", userId), { 
            favorites: arrayUnion({ id: filmId, titre: snap.data().titre || snap.data().title }) 
        }, { merge: true });
        document.getElementById('favIcon').style.color = "#fff";
        document.getElementById('favText').innerText = "Ma Liste";
        try { window.location.href = "appcreator24://favoris/" + filmId; } catch(e) {}
    };

    window.toggleComments = () => document.getElementById('commentPanel').classList.toggle('show');

    startService();
</script>
</body>
</html>
