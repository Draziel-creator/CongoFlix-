<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoFlix - Player Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --card: #0a0a0a; --glass: rgba(255, 215, 0, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* HEADER */
        .player-header { width: 100%; position: relative; aspect-ratio: 16/9; background: #000; border-bottom: 2px solid var(--gold); }
        .back-btn { position: absolute; top: 15px; left: 15px; z-index: 100; width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.7); }

        /* OPTIONS BAR */
        .stats-bar { display: flex; justify-content: space-around; padding: 15px; background: #050505; border-bottom: 1px solid #1a1a1a; }
        .stat-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #777; cursor: pointer; transition: 0.3s; }
        .stat-item i { font-size: 22px; color: #444; margin-bottom: 4px; }
        .stat-item.active i, .stat-item.active { color: var(--gold) !important; text-shadow: 0 0 10px var(--gold); }

        /* DESCRIPTION UNIQUE */
        .content { padding: 20px; }
        .movie-title { font-size: 24px; color: var(--gold); margin: 0; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .desc-container { 
            margin: 20px 0; padding: 15px; background: var(--glass); 
            border-radius: 0 25px 0 25px; border-left: 4px solid var(--gold);
            box-shadow: inset 5px 5px 15px rgba(0,0,0,0.5);
        }
        .movie-desc { font-size: 14px; color: #ddd; line-height: 1.5; margin: 0; }

        /* CASTING : IMAGES H / NOMS V */
        .cast-title { font-size: 14px; color: var(--gold); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .cast-imgs-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .actor-circle { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; flex-shrink: 0; }
        .cast-names-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; padding-left: 5px; }
        .actor-name-item { font-size: 13px; color: #aaa; display: flex; align-items: center; }
        .actor-name-item::before { content: "►"; color: var(--gold); font-size: 8px; margin-right: 10px; }

        /* COMMENT POCKET TIKTOK */
        #commentPocket { 
            position: fixed; bottom: 0; width: 100%; height: 70vh; 
            background: #0d0d0d; border-radius: 20px 20px 0 0; 
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; 
            display: flex; flex-direction: column; border-top: 1px solid #333;
        }
        #commentPocket.active { transform: translateY(0); }
        .tk-header { 
            padding: 15px; text-align: center; font-size: 13px; font-weight: bold; 
            position: relative; border-bottom: 1px solid #222; 
        }
        .close-comm { position: absolute; right: 20px; top: 15px; font-size: 18px; color: #888; cursor: pointer; }

        #commentList { flex: 1; overflow-y: auto; padding: 15px; }
        .tk-comment { display: flex; gap: 12px; margin-bottom: 20px; }
        .tk-avatar { 
            width: 35px; height: 35px; border-radius: 50%; background: var(--gold); 
            color: #000; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 14px; flex-shrink: 0;
        }
        .tk-user { font-size: 12px; color: #777; font-weight: bold; }
        .tk-text { font-size: 14px; color: #eee; margin-top: 3px; line-height: 1.4; }
        .tk-reply-btn { font-size: 11px; color: #555; margin-top: 8px; font-weight: bold; cursor: pointer; }

        .tk-input-box { display: flex; gap: 10px; padding: 15px; background: #151515; border-top: 1px solid #222; }
        #commInput { flex: 1; background: #222; border: 1px solid #333; color: #fff; padding: 10px 15px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

    <div class="player-header">
        <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></div>
        <div id="videoContainer" style="width:100%; height:100%;"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><i class="fa-solid fa-eye"></i> <span id="v-count">0</span></div>
        <div class="stat-item" id="likeBtn" onclick="handleLike()"><i class="fa-solid fa-heart"></i> <span id="l-count">0</span></div>
        <div class="stat-item" onclick="toggleComments()"><i class="fa-solid fa-comment"></i> <span id="c-count">0</span></div>
        <div class="stat-item" id="favBtn" onclick="toggleFavorite()"><i class="fa-solid fa-star"></i> <span id="f-text">Favoris</span></div>
    </div>

    <div class="content">
        <h1 id="movieTitle" class="movie-title">CHARGEMENT...</h1>
        <div class="desc-container">
            <p id="movieDesc" class="movie-desc">...</p>
        </div>

        <div class="cast-section">
            <div class="cast-title">Casting du film</div>
            <div id="castImgs" class="cast-imgs-row"></div>
            <div id="castNames" class="cast-names-list"></div>
        </div>
    </div>

    <div id="commentPocket">
        <div class="tk-header">
            <span id="c-count-top">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark close-comm" onclick="toggleComments()"></i>
        </div>
        <div id="commentList"></div>
        <div class="tk-input-box">
            <input type="text" id="commInput" placeholder="Ajouter un commentaire...">
            <button onclick="sendComment()" style="background:none; border:none; color:var(--gold); font-size:20px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const filmId = urlParams.get('id') || "MUSHOTA_VS_KARANI_01";
    const userId = localStorage.getItem('user_id') || "GUEST_" + Math.floor(Math.random()*9999);
    const userName = localStorage.getItem('user_name') || "Fan CongoFlix";

    async function initPlayer() {
        const filmRef = doc(db, "films", filmId);
        const userRef = doc(db, "users", userId);

        // 1. Charger l'état initial (Favoris/Likes)
        const uSnap = await getDoc(userRef);
        if(uSnap.exists()) {
            const favs = uSnap.data().favorites || [];
            if(favs.includes(filmId)) {
                document.getElementById('favBtn').classList.add('active');
                document.getElementById('f-text').innerText = "Ma Liste";
            }
        }

        // 2. Ecoute en temps réel de Firebase
        onSnapshot(filmRef, (s) => {
            const data = s.data();
            if(!data) return;

            // Titre & Desc
            document.getElementById('movieTitle').innerText = data.title || data.titre || "SANS TITRE";
            document.getElementById('movieDesc').innerText = data.description || "Aucune description disponible.";
            
            // Vidéo
            const videoDiv = document.getElementById('videoContainer');
            if(!videoDiv.innerHTML) {
               videoDiv.innerHTML = data.url.includes('iframe') ? data.url : `<iframe src="${data.url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            }

            // Stats
            document.getElementById('v-count').innerText = data.views || 0;
            const likes = data.likes || [];
            document.getElementById('l-count').innerText = likes.length;
            if(likes.includes(userId)) document.getElementById('likeBtn').classList.add('active');

            // Casting
            const acteurs = data.acteurs || [];
            const noms = data.acteurs_noms || ["Muta Mushota", "Karani", "Mama RDC"];
            document.getElementById('castImgs').innerHTML = acteurs.map(url => `<img src="${url}" class="actor-circle">`).join('');
            document.getElementById('castNames').innerHTML = acteurs.map((_, i) => `<div class="actor-name-item">${noms[i] || "Acteur"}</div>`).join('');

            // Commentaires
            const comments = data.comments || [];
            document.getElementById('c-count').innerText = comments.length;
            document.getElementById('c-count-top').innerText = comments.length;
            
            document.getElementById('commentList').innerHTML = comments.slice().reverse().map(c => `
                <div class="tk-comment">
                    <div class="tk-avatar">${(c.nom || "F").charAt(0).toUpperCase()}</div>
                    <div>
                        <div class="tk-user">${c.nom}</div>
                        <div class="tk-text">${c.text}</div>
                        <div class="tk-reply-btn" onclick="setReply('${c.nom}')">Répondre</div>
                    </div>
                </div>
            `).join('');
        });

        // Incrémenter les vues
        updateDoc(filmRef, { views: increment(1) }).catch(()=>{});
    }

    // ACTIONS
    window.handleLike = async () => {
        const filmRef = doc(db, "films", filmId);
        const s = await getDoc(filmRef);
        const likes = s.data().likes || [];
        if(likes.includes(userId)) {
            await updateDoc(filmRef, { likes: arrayRemove(userId) });
            document.getElementById('likeBtn').classList.remove('active');
        } else {
            await updateDoc(filmRef, { likes: arrayUnion(userId) });
            document.getElementById('likeBtn').classList.add('active');
        }
    };

    window.toggleFavorite = async () => {
        const userRef = doc(db, "users", userId);
        const uSnap = await getDoc(userRef);
        const favs = uSnap.exists() ? (uSnap.data().favorites || []) : [];

        if(favs.includes(filmId)) {
            await updateDoc(userRef, { favorites: arrayRemove(filmId) });
            document.getElementById('favBtn').classList.remove('active');
            document.getElementById('f-text').innerText = "Favoris";
        } else {
            // On crée le document utilisateur s'il n'existe pas, puis on ajoute
            await updateDoc(userRef, { favorites: arrayUnion(filmId) }).catch(async () => {
                import { setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
                await setDoc(userRef, { favorites: [filmId], name: userName });
            });
            document.getElementById('favBtn').classList.add('active');
            document.getElementById('f-text').innerText = "Ma Liste";
        }
    };

    window.toggleComments = () => document.getElementById('commentPocket').classList.toggle('active');

    window.setReply = (name) => {
        const input = document.getElementById('commInput');
        input.value = `@${name} `;
        input.focus();
    };

    window.sendComment = async () => {
        const text = document.getElementById('commInput').value;
        if(!text.trim()) return;
        await updateDoc(doc(db, "films", filmId), {
            comments: arrayUnion({ nom: userName, text: text, date: Date.now() })
        });
        document.getElementById('commInput').value = "";
    };

    initPlayer();
</script>
</body>
</html>
