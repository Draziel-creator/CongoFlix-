<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* LECTEUR : ZÉRO BORDURE, TOUCHE LE HAUT ET LES CÔTÉS */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        .back-circle { position: absolute; top: 15px; left: 15px; z-index: 10; width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.5); text-decoration: none; }

        /* BARRE D'ACTIONS RÉACTIVE */
        .action-bar { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid #1a1a1a; }
        .action-item { text-align: center; color: #888; font-size: 11px; flex: 1; cursor: pointer; transition: 0.2s; }
        .action-item:active { transform: scale(0.9); }
        .action-item i { font-size: 24px; color: var(--gold); margin-bottom: 5px; display: block; }

        /* TEXTE ET DESCRIPTION */
        .details { padding: 20px; }
        .movie-title { font-size: 24px; color: var(--gold); font-weight: bold; margin: 0 0 10px 0; text-transform: uppercase; }
        .movie-desc { font-size: 14px; color: #bbb; line-height: 1.6; border-left: 3px solid var(--gold); padding-left: 15px; margin-bottom: 30px; }

        /* CASTING : CLIQUABLE ET PROPRE */
        .section-label { color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .cast-list { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .cast-list::-webkit-scrollbar { display: none; }
        .actor-btn { flex-shrink: 0; width: 80px; text-align: center; background: none; border: none; padding: 0; cursor: pointer; outline: none; }
        .actor-btn img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; margin-bottom: 8px; transition: 0.3s; }
        .actor-btn:active img { border-color: #fff; transform: scale(0.95); }
        .actor-btn span { font-size: 11px; color: #fff; display: block; font-weight: 500; }

        /* COMMENTAIRES STYLE TIKTOK */
        #commentDrawer { position: fixed; bottom: 0; width: 100%; height: 70vh; background: #0f0f0f; border-radius: 20px 20px 0 0; transform: translateY(100%); transition: 0.4s ease; z-index: 1000; border-top: 1px solid #333; display: flex; flex-direction: column; }
        #commentDrawer.active { transform: translateY(0); }
        .drawer-top { padding: 15px; text-align: center; border-bottom: 1px solid #222; position: relative; font-weight: bold; font-size: 13px; }
        #closeDrawer { position: absolute; right: 20px; font-size: 20px; color: #777; }
        
        .list-com { flex: 1; overflow-y: auto; padding: 20px; }
        .c-row { display: flex; gap: 12px; margin-bottom: 20px; }
        .c-avatar { width: 35px; height: 35px; border-radius: 50%; background: #333; }
        .c-info { flex: 1; }
        .c-user { font-size: 12px; color: #666; font-weight: bold; }
        .c-text { font-size: 14px; color: #eee; margin-top: 3px; }

        .input-bar { padding: 15px; background: #000; border-top: 1px solid #222; display: flex; gap: 10px; }
        .input-bar input { flex: 1; background: #1a1a1a; border: none; color: #fff; padding: 12px 20px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

    <div class="video-container">
        <a href="javascript:history.back()" class="back-circle"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="mainPlayer" style="width:100%; height:100%;"></div>
    </div>

    <div class="action-bar">
        <div class="action-item"><i class="fa-solid fa-eye"></i> <span id="vNum">0</span></div>
        <div class="action-item" id="btnLike"><i class="fa-solid fa-heart"></i> <span id="lNum">0</span></div>
        <div class="action-item" onclick="openComs()"><i class="fa-solid fa-comment"></i> <span id="cNum">0</span></div>
        <div class="action-item" id="btnFav"><i class="fa-solid fa-star"></i> <span>Favoris</span></div>
    </div>

    <div class="details">
        <h1 id="fTitle" class="movie-title">CHARGEMENT...</h1>
        <div class="movie-desc" id="fDesc">...</div>

        <div class="section-label">Casting du film</div>
        <div id="actorList" class="cast-list"></div>
    </div>

    <div id="commentDrawer">
        <div class="drawer-top">
            <span id="cHeader">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark" id="closeDrawer" onclick="openComms()"></i>
        </div>
        <div id="comContent" class="list-com"></div>
        <div class="input-bar">
            <input type="text" id="comInput" placeholder="Écrire un commentaire...">
            <button onclick="pushCom()" style="background:none; border:none; color:var(--gold); font-size:22px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(cfg);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const filmId = params.get('id') || "MUSHOTA_VS_KARANI_01";
    const myId = localStorage.getItem('user_id') || "U" + Date.now();

    onSnapshot(doc(db, "films", filmId), (s) => {
        const d = s.data(); if(!d) return;

        document.getElementById('fTitle').innerText = d.titre || d.title || "";
        document.getElementById('fDesc').innerText = d.description || "";
        document.getElementById('vNum').innerText = d.views || 0;
        
        const likes = d.likes || [];
        document.getElementById('lNum').innerText = likes.length;
        document.getElementById('btnLike').querySelector('i').style.color = likes.includes(myId) ? "#ff3b5c" : "#ffd700";

        if(!document.getElementById('mainPlayer').innerHTML) {
            document.getElementById('mainPlayer').innerHTML = `<iframe src="${d.url}" allowfullscreen></iframe>`;
        }

        // CASTING CLIQUABLE
        if(d.acteurs_full) {
            document.getElementById('actorList').innerHTML = d.acteurs_full.map(a => `
                <button class="actor-btn" onclick="alert('Profil de ${a.nom}')">
                    <img src="${a.photo}">
                    <span>${a.nom}</span>
                </button>
            `).join('');
        }

        const comms = d.comments || [];
        document.getElementById('cNum').innerText = comms.length;
        document.getElementById('cHeader').innerText = comms.length;
        document.getElementById('comContent').innerHTML = comms.slice().reverse().map(c => `
            <div class="c-row">
                <img src="${c.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="c-avatar">
                <div class="c-info">
                    <div class="c-user">${c.nom}</div>
                    <div class="c-text">${c.text}</div>
                </div>
            </div>
        `).join('');
    });

    document.getElementById('btnLike').onclick = async () => {
        const snap = await getDoc(doc(db, "films", filmId));
        const l = snap.data().likes || [];
        await updateDoc(doc(db, "films", filmId), { likes: l.includes(myId) ? arrayRemove(myId) : arrayUnion(myId) });
    };

    window.pushCom = async () => {
        const val = document.getElementById('comInput'); if(!val.value.trim()) return;
        await updateDoc(doc(db, "films", filmId), { comments: arrayUnion({ nom: "Fan CongoFlix", text: val.value, date: Date.now() }) });
        val.value = "";
    };

    document.getElementById('btnFav').onclick = async () => {
        const snap = await getDoc(doc(db, "films", filmId));
        await setDoc(doc(db, "users", myId), { favorites: arrayUnion({ id: filmId, titre: snap.data().titre }) }, { merge: true });
        alert("Ajouté aux favoris");
    };

    window.openComms = () => document.getElementById('commentDrawer').classList.toggle('active');
</script>
</body>
</html>
