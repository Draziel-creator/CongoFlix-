<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --tk-gray: #121212; --tk-input: #262626; --red: #ff3b5c; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; 
        }

        /* 1. LECTEUR BORD À BORD TOTAL */
        .video-box { 
            width: 100vw; 
            aspect-ratio: 16/9; 
            background: #000; 
            position: relative; 
            margin: 0; 
            padding: 0;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        /* EFFET TROU DE LUMIÈRE AUGMENTÉ */
        .light-hole {
            width: 100%;
            height: 4px;
            background: var(--gold);
            box-shadow: 0 10px 45px 15px rgba(255, 215, 0, 0.7); /* Lumière plus intense */
            position: relative;
            z-index: 1;
        }

        .back-btn { position: absolute; top: 15px; left: 15px; z-index: 10; width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.6); text-decoration: none; }

        /* 2. TITRE RÉDUIT STYLE STREAMING */
        .title-container { text-align: center; padding: 25px 10px 10px; }
        #txtTitle { 
            font-size: 18px; /* Plus petit */
            color: #fff; 
            font-weight: 300; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin: 0;
            opacity: 0.9;
        }

        /* 3. BARRE D'ACTIONS AVEC LIKE TIKTOK */
        .actions { display: flex; justify-content: space-around; padding: 15px 5px; margin-bottom: 10px; }
        .act-item { text-align: center; color: #888; font-size: 11px; flex: 1; cursor: pointer; transition: 0.3s; }
        .act-item i { font-size: 24px; color: var(--gold); margin-bottom: 4px; display: block; }
        /* État "liké" en rouge */
        .act-item.liked i { color: var(--red) !important; transform: scale(1.1); }
        .act-item.liked span { color: var(--red); }

        /* 4. DESCRIPTION STYLE GPT */
        .info-pane { padding: 0 20px 30px; }
        .glass-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 15px;
            padding: 20px;
            position: relative;
            margin: 10px 0 30px;
        }
        .glass-box::before {
            content: "\201C";
            position: absolute;
            top: -5px; left: 12px;
            font-size: 40px;
            color: var(--gold);
            opacity: 0.5;
        }
        #txtDesc { font-size: 13px; color: #bbb; line-height: 1.5; margin: 0; padding-top: 10px; }

        /* 5. CASTING : IMAGES (H) + LISTE D'APPEL (V) */
        .cast-section { margin-top: 20px; }
        .cast-label { color: var(--gold); font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; }
        
        /* Photos en Horizontal */
        .cast-imgs { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .cast-imgs::-webkit-scrollbar { display: none; }
        .c-img-circle { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; flex-shrink: 0; }

        /* Noms en Liste Verticale (Liste d'appel) */
        .cast-list-call { border-left: 1px solid rgba(255,215,0,0.3); padding-left: 15px; margin-top: 10px; }
        .call-item { font-size: 13px; color: #eee; margin-bottom: 8px; display: flex; align-items: center; }
        .call-item::before { content: "•"; color: var(--gold); margin-right: 10px; font-size: 18px; }

        /* 6. COMMENTAIRES (CONSERVÉS) */
        #tkDrawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: var(--tk-gray); border-radius: 20px 20px 0 0; transform: translateY(100%); transition: 0.3s; z-index: 2000; display: flex; flex-direction: column; }
        #tkDrawer.active { transform: translateY(0); }
        .tk-header { padding: 15px; text-align: center; font-weight: bold; border-bottom: 0.5px solid #222; }
        .tk-list { flex: 1; overflow-y: auto; padding: 20px; }
        .comment { display: flex; gap: 12px; margin-bottom: 20px; }
        .c-avatar { width: 35px; height: 35px; border-radius: 50%; }
        .tk-input-box { padding: 10px 15px 30px; display: flex; gap: 10px; background: var(--tk-gray); }
        .input-pill { flex: 1; background: var(--tk-input); border-radius: 20px; padding: 0 15px; display: flex; align-items: center; }
        #tkField { width: 100%; background: transparent; border: none; color: #fff; padding: 10px 0; outline: none; }
    </style>
</head>
<body>

    <div class="video-box">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>
    </div>
    
    <div class="light-hole"></div>

    <div class="title-container">
        <h1 id="txtTitle">Chargement...</h1>
    </div>

    <div class="actions">
        <div class="act-item"><i class="fa-solid fa-eye"></i> <span id="statV">0</span></div>
        <div class="act-item" id="mainLikeBtn"><i class="fa-solid fa-heart"></i> <span id="statL">0</span></div>
        <div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment"></i> <span id="statC">0</span></div>
        <div class="act-item" id="mainFavBtn"><i class="fa-solid fa-star"></i> <span>Favoris</span></div>
    </div>

    <div class="info-pane">
        <div class="glass-box">
            <p id="txtDesc">...</p>
        </div>
        
        <div class="cast-section">
            <span class="cast-label">Casting Visual</span>
            <div id="castImgs" class="cast-imgs"></div> <div id="castListCall" class="cast-list-call"></div> </div>
    </div>

    <div id="tkDrawer">
        <div class="tk-header">COMMENTAIRES <i class="fa-solid fa-xmark" style="float:right" onclick="toggleTk()"></i></div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <div class="input-pill"><input type="text" id="tkField" placeholder="Ajouter un commentaire..."></div>
            <button style="background:none; border:none; color:var(--gold); font-size:22px;" onclick="handlePost()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const filmId = params.get('id') || "MUSHOTA_VS_KARANI_01";
    const userId = localStorage.getItem('user_id') || "U" + Math.floor(Math.random()*9999);

    onSnapshot(doc(db, "films", filmId), (snapshot) => {
        const data = snapshot.data();
        if(!data) return;

        document.getElementById('txtTitle').innerText = data.titre || filmId.replace(/_/g, ' ');
        document.getElementById('txtDesc').innerText = data.description || "Pas de description.";
        document.getElementById('statV').innerText = data.views || 0;
        
        // Gérer l'état du Like (Rouge si liké)
        const likes = data.likes || [];
        document.getElementById('statL').innerText = likes.length;
        const likeBtn = document.getElementById('mainLikeBtn');
        if(likes.includes(userId)) {
            likeBtn.classList.add('liked');
        } else {
            likeBtn.classList.remove('liked');
        }

        if(!document.getElementById('playerRoot').innerHTML && data.url) {
            document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
        }

        // Casting : Photos horizontales et Noms verticaux
        const acteurs = data.acteurs || [];
        const noms = data.noms_acteurs || ["Acteur 1", "Acteur 2", "Acteur 3"]; // Fallback si pas de noms dans FB
        
        document.getElementById('castImgs').innerHTML = acteurs.map(url => `
            <img src="${url}" class="c-img-circle" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
        `).join('');

        document.getElementById('castListCall').innerHTML = noms.map(n => `
            <div class="call-item">${n}</div>
        `).join('');

        // Commentaires
        const comms = (data.comments || []).filter(c => typeof c === 'object');
        document.getElementById('statC').innerText = comms.length;
        document.getElementById('tkList').innerHTML = comms.slice().reverse().map(c => `
            <div class="comment">
                <img src="${c.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="c-avatar">
                <div>
                    <div style="font-size:11px; color:var(--gold); font-weight:bold">${c.nom}</div>
                    <div style="font-size:13px; color:#fff">${c.text}</div>
                </div>
            </div>
        `).join('');
    });

    // Actions
    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');

    document.getElementById('mainLikeBtn').onclick = async () => {
        const ref = doc(db, "films", filmId);
        const s = await getDoc(ref);
        const l = s.data().likes || [];
        if(l.includes(userId)) {
            await updateDoc(ref, { likes: arrayRemove(userId) });
        } else {
            await updateDoc(ref, { likes: arrayUnion(userId) });
        }
    };

    window.handlePost = async () => {
        const val = document.getElementById('tkField').value.trim();
        if(!val) return;
        const ref = doc(db, "films", filmId);
        const snap = await getDoc(ref);
        let allComms = (snap.data().comments || []).filter(c => typeof c === 'object');
        allComms.push({ id: "C-"+Date.now(), nom: localStorage.getItem('user_name') || "Fan CongoFlix", text: val, photo: localStorage.getItem('user_img'), date: Date.now() });
        await updateDoc(ref, { comments: allComms });
        document.getElementById('tkField').value = "";
    };
</script>
</body>
</html>
