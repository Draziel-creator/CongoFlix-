<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --tk-gray: #121212; --tk-input: #262626; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* LECTEUR BORD À BORD SANS AUCUN CADRE */
        .video-box { width: 100vw; aspect-ratio: 16/9; background: #000; position: relative; margin: 0; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .back-btn { position: absolute; top: 12px; left: 12px; z-index: 10; width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.4); text-decoration: none; }

        /* BARRE D'ACTIONS */
        .actions { display: flex; justify-content: space-around; padding: 15px 5px; border-bottom: 1px solid #1a1a1a; }
        .act-item { text-align: center; color: #888; font-size: 11px; flex: 1; cursor: pointer; }
        .act-item i { font-size: 24px; color: var(--gold); margin-bottom: 4px; display: block; }

        /* ÉTAPE ACTUELLE : INFOS FILM & CASTING RÉTABLIS */
        .info-pane { padding: 20px; }
        #txtTitle { font-size: 26px; color: var(--gold); font-weight: 900; margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1px; }
        #txtDesc { font-size: 14px; color: #ccc; line-height: 1.6; border-left: 4px solid var(--gold); padding-left: 15px; margin-bottom: 30px; text-align: justify; }
        
        .cast-label { color: var(--gold); font-size: 13px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; display: block; }
        .cast-row { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .cast-row::-webkit-scrollbar { display: none; }
        
        .actor { flex-shrink: 0; width: 85px; text-align: center; transition: 0.3s; }
        .actor:active { transform: scale(0.9); }
        .actor img { width: 75px; height: 75px; border-radius: 50%; border: 2.5px solid var(--gold); object-fit: cover; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .actor b { font-size: 11px; color: #fff; display: block; line-height: 1.3; font-weight: 600; }

        /* MODULE COMMENTAIRES TIKTOK AVEC POCHE DE RÉPONSES */
        #tkDrawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: var(--tk-gray); border-radius: 12px 12px 0 0; transform: translateY(100%); transition: 0.3s cubic-bezier(0.2, 0, 0, 1); z-index: 2000; display: flex; flex-direction: column; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); }
        #tkDrawer.active { transform: translateY(0); }
        .tk-header { padding: 15px; text-align: center; font-size: 13px; font-weight: bold; border-bottom: 0.5px solid #222; position: relative; }
        .tk-close { position: absolute; right: 20px; font-size: 20px; color: #666; cursor: pointer; }

        .tk-list { flex: 1; overflow-y: auto; padding: 20px; }
        .comment { display: flex; gap: 12px; margin-bottom: 22px; align-items: flex-start; }
        .c-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #333; }
        .c-main { flex: 1; }
        .c-user { font-size: 12px; color: #777; font-weight: bold; margin-bottom: 2px; }
        .c-text { font-size: 14px; color: #eee; line-height: 1.4; }
        .c-foot { display: flex; gap: 15px; margin-top: 8px; font-size: 11px; color: #555; font-weight: bold; cursor: pointer; }

        /* LIKE DU COMMENTAIRE (FIREBASE SYNC) */
        .c-like-zone { text-align: center; color: #444; min-width: 35px; cursor: pointer; }
        .c-like-zone i { font-size: 18px; display: block; margin-bottom: 2px; transition: 0.2s; }
        .c-like-zone i.active { color: #ff3b5c; }

        /* POCHE DE RÉPONSES ACCORDÉON */
        .replies-toggle { margin-top: 12px; font-size: 12px; color: #555; display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: bold; }
        .replies-toggle::before { content: ""; width: 25px; height: 1px; background: #333; display: inline-block; }
        .replies-pocket { display: none; margin-top: 15px; padding-left: 15px; border-left: 1px solid #222; }
        .replies-pocket.open { display: block; }
        .reply-item { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
        .r-avatar { width: 24px; height: 24px; border-radius: 50%; }

        /* BARRE D'ENTRÉE TIKTOK */
        .tk-input-box { padding: 10px 15px 30px; background: var(--tk-gray); border-top: 0.5px solid #222; display: flex; align-items: center; gap: 12px; }
        .input-pill { flex: 1; background: var(--tk-input); border-radius: 22px; display: flex; align-items: center; padding: 0 15px; }
        #tkField { flex: 1; background: transparent; border: none; color: #fff; padding: 10px 0; font-size: 14px; outline: none; }
        .tk-send { color: var(--gold); font-size: 24px; background: none; border: none; opacity: 0.4; transition: 0.3s; pointer-events: none; }
        .tk-send.active { opacity: 1; transform: scale(1.1); pointer-events: auto; }
    </style>
</head>
<body>

    <div class="video-box">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>
    </div>

    <div class="actions">
        <div class="act-item"><i class="fa-solid fa-eye"></i> <span id="statV">0</span></div>
        <div class="act-item" id="mainLikeBtn"><i class="fa-solid fa-heart"></i> <span id="statL">0</span></div>
        <div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment"></i> <span id="statC">0</span></div>
        <div class="act-item" id="mainFavBtn"><i class="fa-solid fa-star"></i> <span>Favoris</span></div>
    </div>

    <div class="info-pane">
        <h1 id="txtTitle">CHARGEMENT...</h1>
        <div id="txtDesc">...</div>
        <span class="cast-label">Casting du film</span>
        <div id="rowCast" class="cast-row"></div>
    </div>

    <div id="tkDrawer">
        <div class="tk-header">
            <span id="hCount">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark tk-close" onclick="toggleTk()"></i>
        </div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <img id="myAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:32px; height:32px; border-radius:50%">
            <div class="input-pill">
                <input type="text" id="tkField" placeholder="Ajouter un commentaire...">
            </div>
            <button id="tkSend" class="tk-send" onclick="handlePost()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const filmId = params.get('id') || "MUSHOTA_VS_KARANI_01";
    
    const userId = localStorage.getItem('user_id') || "U" + Math.floor(Math.random()*9999);
    const userName = localStorage.getItem('user_name') || "Fan CongoFlix";
    const userImg = localStorage.getItem('user_img') || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    document.getElementById('myAvatar').src = userImg;

    let targetCommentId = null;

    onSnapshot(doc(db, "films", filmId), (snapshot) => {
        const data = snapshot.data();
        if(!data) return;

        // MISE À JOUR TITRE ET DESCRIPTION
        document.getElementById('txtTitle').innerText = data.titre || data.title || "Film Inconnu";
        document.getElementById('txtDesc').innerText = data.description || "Aucune description disponible pour ce film.";
        
        document.getElementById('statV').innerText = data.views || 0;
        document.getElementById('statL').innerText = (data.likes || []).length;
        document.getElementById('statC').innerText = (data.comments || []).length;
        document.getElementById('hCount').innerText = (data.comments || []).length;

        if(!document.getElementById('playerRoot').innerHTML) {
            document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
        }

        // MISE À JOUR DU CASTING (AVEC PHOTOS ET NOMS)
        if(data.acteurs_full) {
            document.getElementById('rowCast').innerHTML = data.acteurs_full.map(a => `
                <div class="actor" onclick="alert('Profil de ${a.nom}')">
                    <img src="${a.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">
                    <b>${a.nom}</b>
                </div>
            `).join('');
        } else {
            document.getElementById('rowCast').innerHTML = "<p style='font-size:11px; color:#555;'>Casting non renseigné</p>";
        }

        const comms = data.comments || [];
        document.getElementById('tkList').innerHTML = comms.slice().reverse().map(c => {
            const replies = c.replies || [];
            const hasLiked = (c.likedBy || []).includes(userId);
            
            return `
            <div class="comment">
                <img src="${c.photo || userImg}" class="c-avatar">
                <div class="c-main">
                    <div class="c-user">${c.nom}</div>
                    <div class="c-text">${c.text}</div>
                    <div class="c-foot"><span onclick="prepareReply('${c.id}', '${c.nom}')">Répondre</span></div>
                    
                    ${replies.length > 0 ? `
                        <div class="replies-toggle" onclick="togglePocket(this)">
                            Afficher les réponses (${replies.length}) <i class="fa-solid fa-chevron-down" style="font-size:10px"></i>
                        </div>
                        <div class="replies-pocket">
                            ${replies.map(r => `
                                <div class="reply-item">
                                    <img src="${r.photo || userImg}" class="r-avatar">
                                    <div class="c-main">
                                        <div class="c-user">${r.nom}</div>
                                        <div class="c-text" style="font-size:13px">${r.text}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
                <div class="c-like-zone" onclick="likeComment('${c.id}')">
                    <i class="fa-heart ${hasLiked ? 'fa-solid active' : 'fa-regular'}"></i>
                    <span>${(c.likedBy || []).length}</span>
                </div>
            </div>`;
        }).join('');
    });

    window.prepareReply = (cid, name) => {
        targetCommentId = cid;
        const field = document.getElementById('tkField');
        field.placeholder = "Répondre à " + name + "...";
        field.focus();
    };

    window.handlePost = async () => {
        const val = document.getElementById('tkField').value.trim();
        if(!val) return;
        const snap = await getDoc(doc(db, "films", filmId));
        let allComments = snap.data().comments || [];
        if(targetCommentId) {
            allComments = allComments.map(c => {
                if(c.id === targetCommentId) {
                    const reps = c.replies || [];
                    return {...c, replies: [...reps, {nom: userName, text: val, photo: userImg, date: Date.now()}]};
                }
                return c;
            });
        } else {
            allComments.push({
                id: "C-" + Date.now(),
                nom: userName,
                text: val,
                photo: userImg,
                date: Date.now(),
                likedBy: [],
                replies: []
            });
        }
        await updateDoc(doc(db, "films", filmId), { comments: allComments });
        document.getElementById('tkField').value = "";
        document.getElementById('tkField').placeholder = "Ajouter un commentaire...";
        targetCommentId = null;
    };

    window.likeComment = async (cid) => {
        const snap = await getDoc(doc(db, "films", filmId));
        const updated = (snap.data().comments || []).map(c => {
            if(c.id === cid) {
                let currentLikes = c.likedBy || [];
                if(currentLikes.includes(userId)) {
                    currentLikes = currentLikes.filter(uid => uid !== userId);
                } else {
                    currentLikes.push(userId);
                }
                return {...c, likedBy: currentLikes};
            }
            return c;
        });
        await updateDoc(doc(db, "films", filmId), { comments: updated });
    };

    window.togglePocket = (el) => {
        const pocket = el.nextElementSibling;
        const icon = el.querySelector('i');
        const isOpen = pocket.classList.toggle('open');
        icon.className = isOpen ? "fa-solid fa-chevron-up" : "fa-solid fa-chevron-down";
        el.firstChild.textContent = isOpen ? "Masquer les réponses " : `Afficher les réponses (${pocket.children.length}) `;
    };

    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');
    
    document.getElementById('tkField').oninput = function() {
        document.getElementById('tkSend').classList.toggle('active', this.value.length > 0);
    };

    document.getElementById('mainLikeBtn').onclick = async () => {
        const ref = doc(db, "films", filmId);
        const s = await getDoc(ref);
        const l = s.data().likes || [];
        await updateDoc(ref, { likes: l.includes(userId) ? arrayRemove(userId) : arrayUnion(userId) });
    };
</script>
</body>
</html>
