<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoFlix - Player Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --card: #111; --text: #fff; --glass: rgba(255, 255, 255, 0.05); }
        body.light-mode { --bg: #f9f9f9; --card: #fff; --text: #000; }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; transition: 0.3s; }

        /* HEADER & RETOUR */
        .top-nav { display: flex; align-items: center; padding: 15px; position: absolute; z-index: 10; }
        .back-circle { width: 35px; height: 35px; border: 1px solid var(--gold); border-radius: 50%; color: var(--gold); display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); transform: rotate(180deg); text-decoration: none; }

        /* PLAYER */
        .player-container { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 2px solid var(--gold); overflow: hidden; }
        iframe, video { width: 100%; height: 100%; border: none; }

        /* STATS BAR */
        .stats-bar { display: flex; justify-content: space-around; padding: 15px; background: var(--card); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stat-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; cursor: pointer; color: #888; }
        .stat-item i { font-size: 20px; color: var(--gold); }
        .active-gold { color: var(--gold) !important; filter: drop-shadow(0 0 5px var(--gold)); }

        /* CONTENT */
        .content { padding: 20px; }
        .movie-title { font-size: 22px; color: var(--gold); margin: 0; font-weight: 900; text-transform: uppercase; }
        .description-card { background: var(--glass); padding: 15px; margin-top: 15px; border-radius: 12px; border-left: 4px solid var(--gold); font-size: 14px; color: #bbb; font-style: italic; }

        /* CASTING EN LISTE VERTICALE (Style Appel) */
        .section-title { color: var(--gold); font-size: 14px; font-weight: bold; margin: 25px 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        .cast-vertical-list { display: flex; flex-direction: column; gap: 10px; }
        .actor-item { display: flex; align-items: center; gap: 15px; background: var(--card); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,215,0,0.1); }
        .actor-img { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--gold); object-fit: cover; }
        .actor-info { font-size: 14px; font-weight: 600; color: var(--text); }

        /* COMMENTAIRES (SYSTÈME ANCIEN + DESIGN POCHE) */
        #commentPocket { position: fixed; bottom: 0; left: 0; width: 100%; height: 75vh; background: #000; color: #fff; border-radius: 25px 25px 0 0; transform: translateY(100%); transition: 0.5s ease; z-index: 1000; padding: 20px; box-sizing: border-box; border-top: 1px solid #333; }
        #commentPocket.active { transform: translateY(0); }
        .pull-bar { width: 50px; height: 5px; background: #333; margin: 0 auto 15px; border-radius: 5px; cursor: pointer; }
        #commentList { height: 75%; overflow-y: auto; padding-bottom: 20px; }
        
        .comment-block { margin-bottom: 20px; border-bottom: 1px solid #111; padding-bottom: 15px; }
        .main-comment { display: flex; gap: 12px; }
        .comm-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
        .comm-text-box { flex: 1; }
        .comm-user { font-weight: bold; font-size: 12px; color: #888; }
        .comm-msg { font-size: 14px; color: #eee; margin-top: 3px; }
        
        .heart-zone { display: flex; flex-direction: column; align-items: center; min-width: 35px; cursor: pointer; }
        .comm-heart { font-size: 16px; color: #333; transition: 0.2s; }
        .heart-active { color: var(--gold) !important; }

        .replies-poche { margin-left: 50px; margin-top: 10px; display: none; border-left: 1px solid #222; padding-left: 15px; }
        .reply-item { margin-top: 10px; display: flex; gap: 10px; }
        .reply-avatar { width: 28px; height: 28px; border-radius: 50%; }
        .view-more-replies { font-size: 11px; color: var(--gold); font-weight: bold; margin-left: 50px; margin-top: 5px; cursor: pointer; }

        .comm-input-area { display: flex; gap: 10px; position: absolute; bottom: 20px; width: calc(100% - 40px); background: #111; padding: 12px; border-radius: 25px; border: 1px solid #333; }
        .comm-input-area input { flex: 1; background: transparent; border: none; color: #fff; outline: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="javascript:history.back()" class="back-circle">➔</a>
    </div>

    <div class="player-container" id="videoContainer">
        </div>

    <div class="stats-bar">
        <div class="stat-item"><i class="fa-solid fa-eye"></i> <span id="v-count">0</span></div>
        <div class="stat-item" onclick="handleLike()"><i class="fa-solid fa-heart" id="l-icon"></i> <span id="l-count">0</span></div>
        <div class="stat-item" onclick="toggleComments()"><i class="fa-solid fa-comment"></i> <span id="c-count">0</span></div>
        <div class="stat-item" onclick="toggleFavorite()"><i class="fa-solid fa-star" id="f-icon"></i> <span id="f-text">Favoris</span></div>
    </div>

    <div class="content">
        <h1 id="movie-title" class="movie-title">Chargement...</h1>
        <div class="description-card">
            <p id="movie-desc">...</p>
        </div>

        <div class="section-title">Casting & Équipe</div>
        <div id="castList" class="cast-vertical-list">
            </div>
    </div>

    <div id="commentPocket">
        <div class="pull-bar" onclick="toggleComments()"></div>
        <p id="total-header" style="text-align:center; font-size:12px; color:#555; font-weight: bold;">0 COMMENTAIRES</p>
        
        <div id="commentList"></div>

        <div class="comm-input-area">
            <input type="text" id="commInput" placeholder="Écrire un avis ou répondre avec @nom...">
            <button onclick="sendComment()" style="background:none; border:none; color:var(--gold); font-size:20px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, increment, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const filmId = urlParams.get('id') || "MAMAN_FILM_01";
    
    // Identifiants Utilisateur (Récupérés depuis ton système)
    const userId = localStorage.getItem('user_id') || "anon_" + Math.floor(Math.random()*999);
    const userName = localStorage.getItem('user_name') || "Fan CongoFlix";
    const userImg = localStorage.getItem('user_img') || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

    async function init() {
        const filmRef = doc(db, "films", filmId);

        // 1. Snapshot temps réel pour tout (Video, Stats, Commentaires)
        onSnapshot(filmRef, (d) => {
            const data = d.data(); if(!data) return;

            document.getElementById('movie-title').innerText = data.titre || data.title;
            document.getElementById('movie-desc').innerText = data.description;
            document.getElementById('v-count').innerText = data.views || 0;
            document.getElementById('l-count').innerText = data.likes?.length || 0;
            if(data.likes?.includes(userId)) document.getElementById('l-icon').classList.add('active-gold');

            // Injection Vidéo
            const vBox = document.getElementById('videoContainer');
            if(!vBox.innerHTML.trim()) {
                vBox.innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
            }

            // Casting Liste Verticale
            if(data.acteurs_full) {
                document.getElementById('castList').innerHTML = data.acteurs_full.map(a => `
                    <div class="actor-item">
                        <img src="${a.photo}" class="actor-img">
                        <div class="actor-info">${a.nom}</div>
                    </div>
                `).join('');
            }

            // Système de Commentaires & Réponses
            renderComments(data.comments || []);
        });

        // 2. Vérification Favoris
        const userDoc = await getDoc(doc(db, "users", userId));
        if(userDoc.exists() && userDoc.data().favorites?.some(f => f.id === filmId)) {
            document.getElementById('f-icon').classList.add('active-gold');
            document.getElementById('f-text').innerText = "Ma Liste";
        }

        updateDoc(filmRef, { views: increment(1) }).catch(()=>{});
    }

    function renderComments(comments) {
        const list = document.getElementById('commentList');
        document.getElementById('c-count').innerText = comments.length;
        document.getElementById('total-header').innerText = `${comments.length} COMMENTAIRES`;

        let html = "";
        const parents = comments.filter(c => !c.text.includes('@')).reverse();
        const replies = comments.filter(c => c.text.includes('@'));

        parents.forEach((p, i) => {
            const subReplies = replies.filter(r => r.text.includes(`@${p.nom}`));
            const isLiked = (p.commentLikes || []).includes(userId);

            html += `
                <div class="comment-block">
                    <div class="main-comment">
                        <img src="${p.photo}" class="comm-avatar">
                        <div class="comm-text-box">
                            <div class="comm-user">${p.nom}</div>
                            <div class="comm-msg">${p.text}</div>
                            <span style="font-size:11px; color:var(--gold); cursor:pointer; font-weight:bold;" onclick="setReply('${p.nom}')">Répondre</span>
                        </div>
                        <div class="heart-zone" onclick="handleCommentLike(${p.date})">
                            <i class="fa-solid fa-heart comm-heart ${isLiked ? 'heart-active' : ''}"></i>
                            <span style="font-size:10px; color:#555;">${(p.commentLikes || []).length}</span>
                        </div>
                    </div>
                    ${subReplies.length > 0 ? `
                        <div class="view-more-replies" onclick="showReplies('${i}')">——— Voir les ${subReplies.length} réponses</div>
                        <div class="replies-poche" id="poche-${i}">
                            ${subReplies.map(sr => `
                                <div class="reply-item">
                                    <img src="${sr.photo}" class="reply-avatar">
                                    <div class="comm-text-box">
                                        <div class="comm-user">${sr.nom}</div>
                                        <div class="comm-msg">${sr.text}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>`;
        });
        list.innerHTML = html;
    }

    // --- ACTIONS ---
    window.handleCommentLike = async (cDate) => {
        const snap = await getDoc(doc(db, "films", filmId));
        const newComms = snap.data().comments.map(c => {
            if (c.date === cDate) {
                let likes = c.commentLikes || [];
                likes.includes(userId) ? likes = likes.filter(id => id !== userId) : likes.push(userId);
                return { ...c, commentLikes: likes };
            }
            return c;
        });
        await updateDoc(doc(db, "films", filmId), { comments: newComms });
    };

    window.sendComment = async () => {
        const input = document.getElementById('commInput');
        if(!input.value.trim()) return;
        await updateDoc(doc(db, "films", filmId), {
            comments: arrayUnion({ 
                nom: userName, 
                photo: userImg, 
                text: input.value, 
                date: Date.now(), 
                commentLikes: [] 
            })
        });
        input.value = "";
    };

    window.toggleFavorite = async () => {
        const userRef = doc(db, "users", userId);
        const filmSnap = await getDoc(doc(db, "films", filmId));
        const fData = filmSnap.data();

        await updateDoc(userRef, {
            favorites: arrayUnion({ id: filmId, titre: fData.titre, image: fData.poster || "" })
        });
        document.getElementById('f-icon').classList.add('active-gold');
        document.getElementById('f-text').innerText = "Ma Liste";
    };

    window.handleLike = async () => {
        await updateDoc(doc(db, "films", filmId), { likes: arrayUnion(userId) });
    };

    window.toggleComments = () => document.getElementById('commentPocket').classList.toggle('active');
    window.setReply = (n) => { const input = document.getElementById('commInput'); input.value = `@${n} `; input.focus(); };
    window.showReplies = (id) => { const p = document.getElementById('poche-'+id); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; };

    init();
</script>
</body>
</html>
