<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - Version Stable</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --tk-gray: #121212; --tk-input: #262626; --red: #ff3b5c; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Vidéo */
        .video-box { width: 100vw; aspect-ratio: 16/9; background: #000; position: sticky; top: 0; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Stats */
        .actions { display: flex; justify-content: space-around; padding: 15px; border-bottom: 1px solid #222; }
        .act-item { text-align: center; color: var(--gold); font-size: 12px; }
        .act-item i { display: block; font-size: 20px; margin-bottom: 5px; }

        /* Tiroir TikTok */
        #tkDrawer { position: fixed; bottom: 0; width: 100%; height: 70vh; background: var(--tk-gray); border-radius: 15px 15px 0 0; transform: translateY(100%); transition: 0.3s ease-out; z-index: 2000; display: flex; flex-direction: column; }
        #tkDrawer.active { transform: translateY(0); }
        
        .tk-header { padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #333; position: relative; }
        .tk-close { position: absolute; right: 20px; top: 15px; font-size: 20px; }

        .tk-list { flex: 1; overflow-y: auto; padding: 15px; }
        .comment { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 0.5px solid #222; padding-bottom: 10px; }
        .c-avatar { width: 35px; height: 35px; border-radius: 50%; }
        .c-user { font-size: 12px; color: #888; font-weight: bold; }
        .c-text { font-size: 14px; color: #fff; margin-top: 3px; }

        /* Input Fixé en bas */
        .tk-input-box { padding: 10px 15px 30px; background: #1a1a1a; display: flex; align-items: center; gap: 10px; }
        .input-pill { flex: 1; background: #333; border-radius: 20px; padding: 0 15px; }
        #tkField { width: 100%; background: transparent; border: none; color: #fff; padding: 10px 0; outline: none; }
        
        .tk-send { background: none; border: none; color: var(--gold); font-size: 22px; opacity: 0.3; pointer-events: none; }
        .tk-send.can-send { opacity: 1; pointer-events: auto; }

        #authAlert { display:none; position:fixed; top:20%; left:10%; width:80%; background:var(--red); padding:20px; border-radius:10px; z-index:9999; text-align:center; }
    </style>
</head>
<body>

    <div class="video-box">
        <div id="playerRoot"></div>
    </div>

    <div class="actions">
        <div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment"></i> <span id="statC">0</span></div>
        <div class="act-item" id="btnLike"><i class="fa-solid fa-heart"></i> <span id="statL">0</span></div>
    </div>

    <div id="tkDrawer">
        <div class="tk-header"> COMMENTAIRES <i class="fa-solid fa-xmark tk-close" onclick="toggleTk()"></i></div>
        <div id="tkList" class="tk-list"></div>
        
        <div class="tk-input-box">
            <div class="input-pill">
                <input type="text" id="tkField" placeholder="Écrire un commentaire..." autocomplete="off">
            </div>
            <button id="tkSend" class="tk-send" onclick="handlePost()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="authAlert"> Connectez-vous d'abord ! </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const filmId = new URLSearchParams(window.location.search).get('id') || "MUSHOTA_VS_KARANI_01";
    let currentUser = null;
    let myData = { name: "Anonyme", photo: "https://cdn-icons-png.flaticon.com/512/149/149071.png" };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) {
                myData.name = snap.data().name || "Utilisateur";
                myData.photo = snap.data().photoURL || myData.photo;
            }
        }
    });

    // Lecture temps réel
    onSnapshot(doc(db, "films", filmId), (snapshot) => {
        const data = snapshot.data();
        if(!data) return;

        // Mise à jour compteur
        const comms = data.comments || [];
        document.getElementById('statC').innerText = comms.length;
        document.getElementById('statL').innerText = (data.likes || []).length;

        // Charger la vidéo une seule fois
        if(!document.getElementById('playerRoot').innerHTML) {
            document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
        }

        // Rendu des commentaires (seulement si on ne tape pas)
        const list = document.getElementById('tkList');
        if (document.activeElement !== document.getElementById('tkField')) {
            list.innerHTML = comms.sort((a,b) => b.date - a.date).map(c => `
                <div class="comment">
                    <img src="${c.photo}" class="c-avatar">
                    <div>
                        <div class="c-user">${c.nom}</div>
                        <div class="c-text">${c.text}</div>
                    </div>
                </div>
            `).join('');
        }
    });

    // LA FONCTION QUI RÉPARE TOUT
    window.handlePost = async () => {
        const input = document.getElementById('tkField');
        const btn = document.getElementById('tkSend');
        const text = input.value.trim();

        if(!currentUser) { 
            document.getElementById('authAlert').style.display='block';
            setTimeout(()=> document.getElementById('authAlert').style.display='none', 2000);
            return; 
        }

        if(!text) return;

        // 1. Désactiver le bouton immédiatement
        btn.classList.remove('can-send');
        
        // 2. Préparer l'objet
        const nouveauCom = {
            id: "ID-" + Date.now(),
            nom: myData.name,
            text: text,
            photo: myData.photo,
            date: Date.now()
        };

        // 3. EFFACER LE CHAMP TOUT DE SUITE (C'est ça le secret)
        input.value = ""; 

        try {
            // 4. Envoyer à Firebase
            await updateDoc(doc(db, "films", filmId), {
                comments: arrayUnion(nouveauCom)
            });
            console.log("Envoyé !");
        } catch (e) {
            // En cas d'erreur, on remet le texte pour que l'utilisateur ne le perde pas
            input.value = text;
            btn.classList.add('can-send');
            alert("Erreur d'envoi. Réessayez.");
        }
    };

    // Activer/Désactiver le bouton bleu
    document.getElementById('tkField').addEventListener('input', function() {
        document.getElementById('tkSend').classList.toggle('can-send', this.value.trim().length > 0);
    });

    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');

</script>
</body>
</html>
