<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - La Vitrine de la RDC</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --gold: #ffd700; 
            --bg: #000; 
            --tk-gray: #121212; 
            --tk-input: #262626; 
            --red: #ff3b5c; 
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(255, 215, 0, 0.2);
        }

        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LECTEUR --- */
        .video-box { width: 100vw; aspect-ratio: 16/9; background: #000; position: relative; z-index: 10; }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn { position: absolute; top: 15px; left: 15px; z-index: 20; width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.5); text-decoration: none; }

        /* --- TITRE & ACTIONS --- */
        .title-container { text-align: center; padding: 30px 15px 10px; }
        #txtTitle { font-size: 22px; color: #fff; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--gold); margin: 0; }
        
        .actions { display: flex; justify-content: space-around; padding: 20px 10px; border-bottom: 1px solid #1a1a1a; }
        .act-item { text-align: center; color: #999; font-size: 12px; flex: 1; cursor: pointer; }
        .act-item i { font-size: 26px; color: var(--gold); margin-bottom: 6px; display: block; }
        .act-item.is-liked i { color: var(--red) !important; }
        .act-item.is-fav i { color: var(--gold) !important; text-shadow: 0 0 15px var(--gold); }

        /* --- INFO PANE --- */
        .info-pane { padding: 20px; padding-bottom: 100px; }
        .glass-box { background: var(--glass); border: 1px solid var(--border-gold); border-radius: 15px; padding: 20px; margin-bottom: 30px; }
        #txtDesc { font-size: 14.5px; color: #ddd; line-height: 1.6; }

        /* --- CASTING --- */
        .cast-label { color: var(--gold); font-size: 13px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .cast-label::after { content: ""; flex: 1; height: 1px; background: var(--border-gold); }
        .cast-row-imgs { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; }
        .actor-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; flex-shrink: 0; }

        /* --- SAISONS --- */
        .season-wrapper { margin-bottom: 10px; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.03); }
        .season-pocket { background: rgba(255,215,0,0.1); color: var(--gold); padding: 15px; font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; }
        .season-content { display: none; padding: 10px; }
        .season-wrapper.active .season-content { display: block; }
        .ep-card { background: rgba(25, 25, 25, 0.8); border-radius: 10px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,215,0,0.1); }
        .ep-poster-box { width: 100px; height: 60px; border-radius: 5px; overflow: hidden; flex-shrink: 0; }
        .ep-poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .ep-title { font-size: 13px; font-weight: 600; flex: 1; }

        /* --- COMMENTAIRES --- */
        #tkDrawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: var(--tk-gray); border-radius: 15px 15px 0 0; transform: translateY(100%); transition: 0.3s ease; z-index: 2000; display: flex; flex-direction: column; }
        #tkDrawer.active { transform: translateY(0); }
        .tk-header { padding: 15px; text-align: center; border-bottom: 1px solid #222; }
        .tk-list { flex: 1; overflow-y: auto; padding: 20px; }
        .comment { display: flex; gap: 12px; margin-bottom: 20px; }
        .c-avatar { width: 35px; height: 35px; border-radius: 50%; }
        .c-user { font-size: 12px; color: #888; font-weight: bold; }
        .c-text { font-size: 14px; color: #fff; margin-top: 3px; }
        .c-like-zone { text-align: center; min-width: 30px; }
        .c-like-zone i.active { color: var(--red); }
        .tk-input-box { padding: 15px; background: #121212; display: flex; align-items: center; gap: 10px; border-top: 1px solid #222; }
        .input-pill { flex: 1; background: #262626; border-radius: 20px; padding: 8px 15px; }
        #tkField { background: transparent; border: none; color: #fff; width: 100%; outline: none; }
        .tk-send { color: var(--gold); border: none; background: none; font-size: 20px; opacity: 0.5; }
        .tk-send.active { opacity: 1; }

        /* --- ALERTES --- */
        #authAlert { display:none; position:fixed; bottom:20px; left:5%; width:90%; background:var(--red); padding:20px; border-radius:15px; z-index:5000; text-align:center; }
    </style>
</head>
<body>

    <div class="video-box">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>
    </div>

    <div class="title-container">
        <h1 id="txtTitle">Chargement...</h1>
    </div>

    <div class="actions">
        <div class="act-item"><i class="fa-solid fa-circle-play"></i> <span id="statV">0</span></div>
        <div class="act-item" id="mainLikeBtn"><i class="fa-solid fa-heart"></i> <span id="statL">0</span></div>
        <div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment"></i> <span id="statC">0</span></div>
        <div class="act-item" id="mainFavBtn"><i class="fa-solid fa-bookmark"></i> <span id="favText">Enregistrer</span></div>
    </div>

    <div class="info-pane">
        <div class="glass-box"><p id="txtDesc">...</p></div>
        <span class="cast-label">Casting</span>
        <div id="rowCastImgs" class="cast-row-imgs"></div>
        <div id="episodesList"></div>
    </div>

    <!-- TI-TOK STYLE COMMENTS -->
    <div id="tkDrawer">
        <div class="tk-header">
            <span id="hCount">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark" style="float:right" onclick="toggleTk()"></i>
        </div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <img id="myAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:30px; height:30px; border-radius:50%">
            <div class="input-pill"><input type="text" id="tkField" placeholder="Ajouter un commentaire..."></div>
            <button id="tkSend" class="tk-send" onclick="handlePost()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="authAlert">
        <span id="authAlertMsg">Action impossible</span><br>
        <a href="index.html" style="color:#fff; font-weight:bold; text-decoration:underline; margin-top:10px; display:block;">SE CONNECTER</a>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const filmId = new URLSearchParams(window.location.search).get('id') || "DEMO";
    let currentUser = null;
    let userId = "INVITE_" + Math.floor(Math.random()*1000);
    let userName = "Fan CongoFlix";
    let userImg = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    // --- AUTH LOGIC ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            userId = user.uid;
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()){
                const d = snap.data();
                userName = d.name || user.email.split('@')[0];
                userImg = d.photoURL || userImg;
                document.getElementById('myAvatar').src = userImg;
            }
        }
    });

    // --- SYNC DATA ---
    onSnapshot(doc(db, "films", filmId), (snapshot) => {
        const data = snapshot.data();
        if(!data) return;

        document.getElementById('txtTitle').innerText = data.titre;
        document.getElementById('txtDesc').innerText = data.description;
        document.getElementById('statV').innerText = data.views || 0;
        
        // Likes
        const likes = data.likes || [];
        document.getElementById('statL').innerText = likes.length;
        document.getElementById('mainLikeBtn').classList.toggle('is-liked', likes.includes(userId));

        // Player
        if(!document.getElementById('playerRoot').innerHTML && data.url) {
            document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
            updateDoc(doc(db, "films", filmId), { views: increment(1) });
        }

        renderCasting(data.acteurs);
        renderEpisodes(data.episodes || []);
        renderComments(data.comments || []);
    });

    function renderComments(comms) {
        const list = document.getElementById('tkList');
        document.getElementById('statC').innerText = comms.length;
        document.getElementById('hCount').innerText = comms.length;

        list.innerHTML = comms.slice().reverse().map(c => {
            const isLiked = (c.likedBy || []).includes(userId);
            return `
            <div class="comment">
                <img src="${c.photo}" class="c-avatar">
                <div style="flex:1">
                    <div class="c-user">${c.nom}</div>
                    <div class="c-text">${c.text}</div>
                </div>
                <div class="c-like-zone" onclick="window.likeComment('${c.id}')">
                    <i class="fa-heart ${isLiked ? 'fa-solid active' : 'fa-regular'}"></i>
                    <div style="font-size:10px; color:#666">${(c.likedBy || []).length}</div>
                </div>
            </div>`;
        }).join('');
    }

    // --- ACTIONS ---
    window.handlePost = async () => {
        if(!currentUser) { showAuthAlert("Connectez-vous pour commenter"); return; }
        const val = document.getElementById('tkField').value.trim();
        if(!val) return;

        const newComm = {
            id: "C" + Date.now(),
            nom: userName,
            text: val,
            photo: userImg,
            likedBy: []
        };

        await updateDoc(doc(db, "films", filmId), { comments: arrayUnion(newComm) });
        document.getElementById('tkField').value = "";
    };

    window.likeComment = async (cid) => {
        if(!currentUser) { showAuthAlert("Connectez-vous pour liker"); return; }
        const snap = await getDoc(doc(db, "films", filmId));
        const comms = snap.data().comments.map(c => {
            if(c.id === cid) {
                let current = c.likedBy || [];
                c.likedBy = current.includes(userId) ? current.filter(id => id !== userId) : [...current, userId];
            }
            return c;
        });
        await updateDoc(doc(db, "films", filmId), { comments: comms });
    };

    document.getElementById('mainLikeBtn').onclick = async () => {
        if(!currentUser) { showAuthAlert("Connectez-vous pour liker"); return; }
        const ref = doc(db, "films", filmId);
        const snap = await getDoc(ref);
        const likes = snap.data().likes || [];
        await updateDoc(ref, { 
            likes: likes.includes(userId) ? arrayRemove(userId) : arrayUnion(userId) 
        });
    };

    function renderCasting(imgs) {
        document.getElementById('rowCastImgs').innerHTML = (imgs || []).map(u => `<img src="${u}" class="actor-img">`).join('');
    }

    function renderEpisodes(eps) {
        let html = "";
        for(let i=0; i<eps.length; i+=3) {
            html += `<div class="ep-card" onclick="window.location.href='?id=${filmId}&url=${eps[i+2]}'">
                <div class="ep-poster-box"><img src="${eps[i]}"></div>
                <div class="ep-title">${eps[i+1]}</div>
                <i class="fa-solid fa-play" style="color:var(--gold)"></i>
            </div>`;
        }
        document.getElementById('episodesList').innerHTML = html;
    }

    function showAuthAlert(msg) {
        const a = document.getElementById('authAlert');
        document.getElementById('authAlertMsg').innerText = msg;
        a.style.display = 'block';
        setTimeout(() => a.style.display='none', 4000);
    }

    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');
    document.getElementById('tkField').oninput = function() {
        document.getElementById('tkSend').classList.toggle('active', this.value.length > 0);
    };

</script>
</body>
</html>
