<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoFlix - Visionnage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --glass: rgba(255, 215, 0, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        .player-header { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; border-bottom: 2px solid var(--gold); }
        .back-btn { position: absolute; top: 15px; left: 15px; z-index: 100; width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.7); cursor: pointer; }

        .stats-bar { display: flex; justify-content: space-around; padding: 15px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .stat-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #666; cursor: pointer; }
        .stat-item i { font-size: 20px; margin-bottom: 4px; }
        .active-gold { color: var(--gold) !important; text-shadow: 0 0 8px var(--gold); }

        .content { padding: 20px; }
        .movie-title { font-size: 22px; color: var(--gold); font-weight: 800; text-transform: uppercase; margin: 0; }
        
        .desc-box { 
            margin: 15px 0; padding: 15px; background: var(--glass); 
            border-radius: 0 20px 0 20px; border-left: 4px solid var(--gold);
        }
        .movie-desc { font-size: 14px; color: #ccc; line-height: 1.4; margin: 0; }

        .cast-imgs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .actor-circle { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; flex-shrink: 0; }
        .cast-names { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; color: #aaa; font-size: 13px; }
        .actor-name-item::before { content: "•"; color: var(--gold); margin-right: 10px; }

        #commentPocket { position: fixed; bottom: 0; width: 100%; height: 70vh; background: #0d0d0d; border-radius: 20px 20px 0 0; transform: translateY(100%); transition: 0.4s; z-index: 1000; display: flex; flex-direction: column; border-top: 1px solid #333; }
        #commentPocket.active { transform: translateY(0); }
        .tk-header { padding: 15px; text-align: center; border-bottom: 1px solid #222; position: relative; font-weight: bold; font-size: 14px; }
        .close-btn { position: absolute; right: 20px; top: 15px; color: #888; font-size: 20px; }
        #commentList { flex: 1; overflow-y: auto; padding: 15px; }
    </style>
</head>
<body>

    <div class="player-header">
        <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></div>
        <div id="videoContainer" style="width:100%; height:100%;"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><i class="fa-solid fa-eye active-gold"></i> <span id="v-count">0</span></div>
        <div class="stat-item" id="likeBtn" onclick="handleLike()"><i class="fa-solid fa-heart"></i> <span id="l-count">0</span></div>
        <div class="stat-item" onclick="toggleComments()"><i class="fa-solid fa-comment"></i> <span id="c-count">0</span></div>
        <div class="stat-item" id="favBtn" onclick="toggleFavorite()"><i class="fa-solid fa-star"></i> <span id="f-text">Favoris</span></div>
    </div>

    <div class="content">
        <h1 id="movieTitle" class="movie-title">CHARGEMENT...</h1>
        <div class="desc-box">
            <p id="movieDesc" class="movie-desc">Recherche des données sur CongoFlix...</p>
        </div>

        <h3 style="font-size: 14px; color: var(--gold);">CASTING DU FILM</h3>
        <div id="castImgs" class="cast-imgs"></div>
        <div id="castNames" class="cast-names"></div>
    </div>

    <div id="commentPocket">
        <div class="tk-header">
            <span id="c-count-top">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark close-btn" onclick="toggleComments()"></i>
        </div>
        <div id="commentList"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Récupération ID (On utilise celui de ta capture Firestore)
    const urlParams = new URLSearchParams(window.location.search);
    const filmId = urlParams.get('id') || "MUSHOTA_VS_KARANI_01";
    const userId = localStorage.getItem('user_id') || "USER_" + Math.floor(Math.random()*9999);

    async function startCongoFlix() {
        const filmRef = doc(db, "films", filmId);
        
        // Vérifier Favoris au démarrage
        const userRef = doc(db, "users", userId);
        const uSnap = await getDoc(userRef);
        if(uSnap.exists() && (uSnap.data().favorites || []).includes(filmId)) {
            document.getElementById('favBtn').classList.add('active-gold');
            document.getElementById('f-text').innerText = "Ma Liste";
        }

        // Ecouteur temps réel (C'est ici qu'on branche Firebase)
        onSnapshot(filmRef, (docSnap) => {
            if (!docSnap.exists()) {
                document.getElementById('movieTitle').innerText = "FILM NON TROUVÉ";
                return;
            }

            const data = docSnap.data();

            // Remplissage Vidéo (vérifie si c'est un lien direct ou iframe)
            const videoContainer = document.getElementById('videoContainer');
            if(!videoContainer.innerHTML) {
                if(data.url.includes('<iframe')) {
                    videoContainer.innerHTML = data.url;
                } else {
                    videoContainer.innerHTML = `<iframe src="${data.url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
                }
            }

            // Textes
            document.getElementById('movieTitle').innerText = data.titre || data.title || "SANS TITRE";
            document.getElementById('movieDesc').innerText = data.description || "Aucune description.";
            
            // Compteurs
            document.getElementById('v-count').innerText = data.views || 0;
            document.getElementById('l-count').innerText = (data.likes || []).length;
            document.getElementById('c-count').innerText = (data.comments || []).length;
            document.getElementById('c-count-top').innerText = (data.comments || []).length;

            if((data.likes || []).includes(userId)) document.getElementById('likeBtn').classList.add('active-gold');

            // Casting (Images + Noms Verticaux)
            const acteurs = data.acteurs || [];
            document.getElementById('castImgs').innerHTML = acteurs.map(url => `<img src="${url}" class="actor-circle">`).join('');
            document.getElementById('castNames').innerHTML = acteurs.map((_, i) => `<div class="actor-name-item">Acteur Principal ${i+1}</div>`).join('');
        });

        // Ajouter une vue
        updateDoc(filmRef, { views: increment(1) }).catch(console.error);
    }

    // Fonctions Boutons
    window.handleLike = async () => {
        const filmRef = doc(db, "films", filmId);
        const s = await getDoc(filmRef);
        const likes = s.data().likes || [];
        if(likes.includes(userId)) {
            await updateDoc(filmRef, { likes: arrayRemove(userId) });
            document.getElementById('likeBtn').classList.remove('active-gold');
        } else {
            await updateDoc(filmRef, { likes: arrayUnion(userId) });
            document.getElementById('likeBtn').classList.add('active-gold');
        }
    };

    window.toggleFavorite = async () => {
        const userRef = doc(db, "users", userId);
        const uSnap = await getDoc(userRef);
        const favs = uSnap.exists() ? (uSnap.data().favorites || []) : [];

        if(favs.includes(filmId)) {
            await updateDoc(userRef, { favorites: arrayRemove(filmId) });
            document.getElementById('favBtn').classList.remove('active-gold');
            document.getElementById('f-text').innerText = "Favoris";
        } else {
            // Création automatique si user n'existe pas encore
            try {
                await updateDoc(userRef, { favorites: arrayUnion(filmId) });
            } catch {
                import { setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
                await setDoc(userRef, { favorites: [filmId], name: "Fan CongoFlix" });
            }
            document.getElementById('favBtn').classList.add('active-gold');
            document.getElementById('f-text').innerText = "Ma Liste";
        }
    };

    window.toggleComments = () => document.getElementById('commentPocket').classList.toggle('active');

    startCongoFlix();
</script>
</body>
</html>
