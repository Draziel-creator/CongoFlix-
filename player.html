<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - La Vitrine de la RDC</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- SYSTÈME DE DESIGN CONGOFLIX --- */
        :root { 
            --gold: #ffd700; 
            --bg: #000; 
            --tk-gray: #121212; 
            --tk-input: #262626; 
            --red: #ff3b5c; 
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(255, 215, 0, 0.2);
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 1. LECTEUR VIDÉO PREMIUM --- */
        .video-box { 
            width: 100vw; aspect-ratio: 16/9; background: #000; position: relative; 
            z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-box::after {
            content: ""; position: absolute; bottom: -5px; left: 10%; right: 10%;
            height: 10px; background: var(--gold); filter: blur(25px); opacity: 0.6; z-index: -1;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        .back-btn { 
            position: absolute; top: 15px; left: 15px; z-index: 20; 
            width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--gold); 
            display: flex; align-items: center; justify-content: center; color: var(--gold); 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); text-decoration: none;
        }

        /* --- 2. EN-TÊTE ET TITRAGE --- */
        .title-container { text-align: center; padding: 10px 15px 5px; }
        #txtTitle { 
            font-size: 22px; color: #fff; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.8); margin: 0;
        }

        /* --- 3. BARRE D'ACTIONS --- */
        .actions { 
            display: flex; justify-content: space-around; padding: 10px; 
            border-bottom: 1px solid #1a1a1a; background: linear-gradient(to bottom, transparent, #080808);
        }
        .act-item { text-align: center; color: #999; font-size: 12px; flex: 1; cursor: pointer; }
        .act-item i { font-size: 26px; color: var(--gold); margin-bottom: 6px; display: block; }
        .act-item.is-liked i { color: var(--red) !important; }
        .act-item.is-fav i { color: var(--gold) !important; text-shadow: 0 0 20px var(--gold); transform: scale(1.1); }

        /* --- 4. PANNEAU D'INFORMATIONS --- */
        .info-pane { padding: 20px; padding-bottom: 100px; }
        .glass-box {
            background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border-gold);
            border-radius: 15px; padding: 30px 20px 20px; position: relative; margin-bottom: 35px;
        }
        .glass-box::before {
            content: "\201C"; position: absolute; top: -5px; left: 20px;
            font-size: 60px; color: var(--gold); font-family: serif; opacity: 0.5;
        }
        #txtDesc { font-size: 14.5px; color: #ddd; line-height: 1.7; margin: 0; }

        /* --- 5. CASTING VISUEL --- */
        .cast-label { 
            color: var(--gold); font-size: 13px; font-weight: 800; text-transform: uppercase; 
            margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
        }
        .cast-label::after { content: ""; flex: 1; height: 1px; background: var(--border-gold); }
        .cast-row-imgs { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .actor-img { width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; flex-shrink: 0; }
        .cast-list-vertical { margin-top: 15px; border-left: 2px solid var(--border-gold); padding-left: 20px; }
        .cast-name-item { font-size: 14px; color: #eee; margin-bottom: 12px; }

        /* --- 6. GESTION DES SAISONS --- */
        .season-wrapper { margin-bottom: 15px; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.03); }
        .season-pocket {
            background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent); color: var(--gold);
            padding: 15px; font-weight: bold; display: flex; justify-content: space-between; border-left: 5px solid var(--gold); cursor: pointer;
        }
        .season-content { display: none; padding: 10px; }
        .season-wrapper.active .season-content { display: block; }
        .ep-card {
            background: rgba(25, 25, 25, 0.6); border-radius: 14px; padding: 14px; margin-bottom: 18px;
            display: flex; align-items: center; gap: 18px; border: 1px solid rgba(255, 215, 0, 0.08);
        }
        .ep-poster-box { width: 110px; height: 65px; border-radius: 8px; overflow: hidden; position: relative; flex-shrink: 0; }
        .ep-poster-box img { width: 100%; height: 100%; object-fit: cover; }
        .ep-hd-tag { position: absolute; top: 5px; right: 5px; background: var(--gold); color: #000; font-size: 9px; font-weight: 900; padding: 2px 5px; border-radius: 4px; }
        .ep-info { flex: 1; }
        .ep-title { font-size: 14px; font-weight: 600; color: #fff; }
        .detail-btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; }

        /* --- 7. MODAL DE DÉTAILS --- */
        #detailDrawer {
            position: fixed; bottom: 0; width: 100%; height: auto; min-height: 480px;
            background: #1a1a1a; border-radius: 20px 20px 0 0;
            transform: translateY(100%); transition: 0.4s cubic-bezier(0, 0, 0.2, 1);
            z-index: 3000; padding-bottom: 30px; border-top: 1px solid var(--border-gold);
        }
        #detailDrawer.active { transform: translateY(0); }

        .drawer-header {
            padding: 15px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .drawer-buttons { display: flex; gap: 10px; padding: 15px; }
        .btn-modal { flex: 1; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-gray { background: #333; color: #fff; }
        .btn-blue { background: #007bff; color: #fff; }

        .drawer-media-zone {
            margin: 0 15px; background: #000; border-radius: 12px;
            min-height: 250px; overflow: hidden; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }
        #modalPlayerContainer { width: 100%; aspect-ratio: 16/9; display: none; }
        #modalAdContainer { width: 100%; padding: 10px 0; display: flex; justify-content: center; }

        /* --- 8. COMMENTAIRES (STYLE TIKTOK) --- */
        #tkDrawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: var(--tk-gray); border-radius: 12px 12px 0 0; transform: translateY(100%); transition: 0.3s; z-index: 4000; display: flex; flex-direction: column; }
        #tkDrawer.active { transform: translateY(0); }
        .tk-header { padding: 15px; text-align: center; border-bottom: 0.5px solid #222; position: relative; font-weight: bold; font-size: 13px; }
        .tk-list { flex: 1; overflow-y: auto; padding: 20px; }
        .tk-input-box { padding: 10px 15px 30px; background: var(--tk-gray); border-top: 0.5px solid #222; display: flex; align-items: center; gap: 12px; }
        .input-pill { flex: 1; background: var(--tk-input); border-radius: 22px; padding: 0 15px; }
        #tkField { background: transparent; border: none; color: #fff; padding: 10px 0; width: 100%; outline: none; font-size: 14px; }
        
        .c-foot { display: flex; gap: 15px; margin-top: 8px; font-size: 11px; color: var(--gold); font-weight: bold; cursor: pointer; }
        .replies-pocket { display: none; margin-top: 10px; padding-left: 10px; border-left: 1px solid #333; }
        .replies-pocket.open { display: block; }

        #authAlert { display:none; position:fixed; bottom:30px; left:5%; width:90%; background:var(--red); padding:18px; border-radius:15px; z-index:5000; text-align:center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="video-box">
        <a href="javascript:void(0)" onclick="triggerBackAd()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>
    </div>

    <div class="title-container">
        <h1 id="txtTitle">Chargement...</h1>
    </div>

    <div class="actions">
        <div class="act-item"><i class="fa-solid fa-play-circle"></i> <span id="statV">0</span></div>
        <div class="act-item" id="mainLikeBtn"><i class="fa-solid fa-heart"></i> <span id="statL">0</span></div>
        <div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment-dots"></i> <span id="statC">0</span></div>
        <div class="act-item" id="mainFavBtn"><i class="fa-solid fa-bookmark"></i> <span id="favText">Enregistrer</span></div>
    </div>

    <div class="info-pane">
        <div class="season-wrapper" style="margin-bottom: 25px;">
            <div class="season-pocket" onclick="toggleInfoPocket(this)">
                <span><i class="fa-solid fa-circle-info"></i> Histoire & Distribution</span> 
                <i class="fa-solid fa-chevron-down"></i>
            </div>
            <div class="season-content" id="infoPocketContent" style="padding: 15px;">
                
                <div class="glass-box" style="margin-top: 10px;">
                    <p id="txtDesc" style="white-space: pre-wrap; word-break: break-word; width: 100%; margin: 0; color: #eee; font-size: 14px; line-height: 1.5;"></p>
                </div>
                
                <span class="cast-label"><i class="fa-solid fa-users"></i> Casting Principal</span>
                <div id="rowCastImgs" class="cast-row-imgs"></div> 
                <div id="listCastNames" class="cast-list-vertical"></div> 
                
            </div>
        </div>
        
        <div id="episodesList"></div>
    </div>

    <!-- MODAL DE DÉTAILS -->
    <div id="detailDrawer">
    <div class="drawer-header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <i class="fa-solid fa-arrow-down" style="background:#333; padding:8px; border-radius:50%; font-size:12px; color: var(--gold);"></i>
            <div>
                <div style="font-size:14px; font-weight:bold;">Téléchargement <span style="color:#4caf50">1 fichier(s)</span></div>
                <div id="detEpTitle" style="font-size:11px; color:#999;">Nom de l'épisode</div>
            </div>
        </div>
        <i class="fa-solid fa-xmark" style="font-size:22px; color:#999" onclick="closeDetails()"></i>
    </div>

    <div style="padding: 15px 15px 0; font-size: 13px; color: #ccc;">
        Regardez-le maintenant pendant le téléchargement.
    </div>

    <div class="drawer-buttons">
        <button class="btn-modal btn-gray" id="btnDownloadNow"><i class="fa-solid fa-download"></i> Télécharger</button>
        <button class="btn-modal btn-blue" id="btnWatchNow"><i class="fa-solid fa-play"></i> Regarder maintenant</button>
    </div>

    <div class="drawer-media-zone">
        <div id="modalPlayerContainer"></div>
        
        <div id="modalAdContainer">
            <iframe data-aa='2438254' src='//ad.a-ads.com/2438254/?size=300x250&background_color=53b9e8&title_color=cbeb13&title_hover_color=f81313&text_color=Cdf' style='border:0; padding:0; width:300px; height:250px; overflow:hidden; display:block;'></iframe>
        </div>
    </div>
</div>
    <!-- TIROIR COMMENTAIRES -->
    <div id="tkDrawer">
        <div class="tk-header">
            <span id="hCount">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark" style="position:absolute; right:20px; font-size: 18px;" onclick="toggleTk()"></i>
        </div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <img id="myAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:32px; height:32px; border-radius:50%">
            <div class="input-pill"><input type="text" id="tkField" placeholder="Ajouter un commentaire..."></div>
            <button id="tkSend" style="background:none; border:none; color:var(--gold); font-size:22px;" onclick="handlePost()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="authAlert"> <span id="authAlertMsg">Connecte-toi !</span> </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, getDocs, increment, collection, addDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
            authDomain: "congo-streaming-51333.firebaseapp.com",
            projectId: "congo-streaming-51333",
            appId: "1:304286627819:android:36e0b43b8b10508a054bae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const params = new URLSearchParams(window.location.search);
        const filmId = params.get('id') || "MUSHOTA_VS_KARANI_01";
        
        let currentUser = null;
        let userId = "GUEST_" + Math.floor(Math.random()*9999);
        let userName = "Fan CongoFlix";
        let userImg = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        let currentFilmData = null;
        let targetCommentId = null;
        // --- LOGIQUE DE LA POCHE INFOS & EFFET MACHINE À ÉCRIRE ---
        let descriptionComplete = ""; // Stockera le texte original de Firebase
        let globalTimeout = null;

        window.toggleInfoPocket = (pocketElement) => {
            const wrapper = pocketElement.parentElement;
            const content = document.getElementById('infoPocketContent');
            
            wrapper.classList.toggle('active');
            
            if (wrapper.classList.contains('active')) {
                content.style.display = 'block';
                lancerMachineAEcrire(descriptionComplete);
            } else {
                content.style.display = 'none';
                if(globalTimeout) clearTimeout(globalTimeout);
            }
        };

        function lancerMachineAEcrire(texte) {
            const txtDesc = document.getElementById('txtDesc');
            txtDesc.innerText = "";
            let i = 0;
            if(globalTimeout) clearTimeout(globalTimeout);

            function taper() {
                if (i < texte.length) {
                    let caractereActuel = texte.charAt(i); 
                    txtDesc.innerText += caractereActuel;
                    i++;
                    
                    // ICI TES NOUVEAUX RÉGLAGES CINÉMA :
                    let delai = 70; // Plus c'est haut, plus c'est lent (Ex: 70ms par lettre)
                    
                    if (caractereActuel === '.' || caractereActuel === '!') {
                        delai = 900; // Longue pause dramatique pour respirer
                    } else if (caractereActuel === ',') {
                        delai = 600; // Pause moyenne pour la virgule
                    } else if (caractereActuel === ' ') {
                        delai = 50;  // Vitesse de l'espace
                    }
                    
                    globalTimeout = setTimeout(taper, delai);
                }
            }
            taper();
        }
        // AUTH TRACKING
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user; userId = user.uid;
                const snap = await getDoc(doc(db, "users", user.uid));
                if(snap.exists()){
                    const d = snap.data();
                    userName = d.name || user.email.split('@')[0];
                    userImg = d.photoURL || userImg;
                    document.getElementById('myAvatar').src = userImg;
                    
                    // Update Fav State UI
                    if((d.favorites || []).some(f => f.id === filmId)) {
                        document.getElementById('mainFavBtn').classList.add('is-fav');
                        document.getElementById('favText').innerText = "Ma Liste";
                    }
                }
            }
        });

// --- INJECTION DU CSS DE STABILISATION ENRICHI (TEXTE FIXE & TIROIR PARFAIT) ---
        const styleStabilisateur = document.createElement('style');
        styleStabilisateur.innerHTML = `
            .ep-card {
                display: flex !important;
                align-items: center !important;
                justify-content: space-between !important;
                gap: 15px !important;
                width: 100% !important;
                box-sizing: border-box !important;
                position: relative !important;
                margin-bottom: 8px !important;
                cursor: pointer;
            }
            .ep-info {
                flex: 1 !important;
                min-width: 0 !important;
                position: relative !important;
                display: flex !important;
                align-items: center !important;
                justify-content: flex-start !important;
                overflow: hidden !important;
            }
            
            /* Conteneur de sécurité pour empêcher le texte d'entrer sous le bouton détail ou sur la miniature */
            .ep-title-wrapper {
                width: 100% !important;
                max-width: 100% !important;
                overflow: hidden !important; 
                position: relative !important;
                display: inline-block !important;
            }
            
            .ep-title {
                white-space: nowrap !important;
                font-size: 14px;
                color: #fff;
                display: inline-block !important;
                transform: translateX(0);
                animation: scrollRebondLeft 10s ease-in-out infinite alternate !important;
            }
            
            /* Le titre glisse proprement vers la gauche à l'intérieur de sa zone dédiée */
            @keyframes scrollRebondLeft {
                0% { transform: translateX(0); }
                25% { transform: translateX(0); } /* Temps de lecture pour bien voir le numéro d'épisode */
                75% { transform: translateX(calc(-100% + 100px)); } /* Se cogne en douceur */
                100% { transform: translateX(calc(-100% + 100px)); }
            }

            .detail-btn {
                flex-shrink: 0 !important;
            }

            /* Style du bouton bleu Voir Plus - Parfaitement collé */
            .btn-voir-plus-poche {
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                gap: 8px !important;
                background-color: #007bff !important;
                color: #ffffff !important;
                padding: 12px 20px !important;
                border-radius: 6px !important;
                font-size: 13px !important;
                font-weight: bold !important;
                margin-top: 2px !important;
                margin-bottom: 10px !important;
                cursor: pointer !important;
                border: none !important;
                width: 100% !important;
                box-sizing: border-box !important;
                transition: background 0.2s;
            }
            .btn-voir-plus-poche:hover {
                background-color: #0056b3 !important;
            }
            .suite-hidden {
                display: none !important;
            }

            /* --- TIROIR MODALE AJUSTÉ ET FLUIDE --- */
            #detailDrawer {
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: auto !important; 
                max-height: 85vh !important;
                background: #141414 !important;
                z-index: 99999 !important;
                box-shadow: 0 -10px 30px rgba(0,0,0,0.7) !important;
                border-radius: 20px 20px 0 0 !important;
                box-sizing: border-box !important;
                padding-bottom: env(safe-area-inset-bottom);
                
                transform: translateY(100%) !important; 
                transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1) !important;
            }
            
            #detailDrawer.active {
                transform: translateY(0) !important;
            }
        `;
        document.head.appendChild(styleStabilisateur);

        // --- LIVE DATA LOADING (MODE DOUBLE SOURCE) ---
        let listeEp_Partie1 = [];
        let listeEp_Partie2 = [];

        function fusionnerEtAfficher() {
            const tousLesEpisodes = [...listeEp_Partie1, ...listeEp_Partie2];
            renderEpisodes(tousLesEpisodes);
        }

        onSnapshot(doc(db, "films", filmId), (snap) => {
            const data = snap.data(); if(!data) return;
            currentFilmData = data;
            
            document.getElementById('txtTitle').innerText = data.titre || "CongoFlix";
            descriptionComplete = data.description || "Aucune description disponible.";
document.getElementById('txtDesc').innerText = "...";
            
            document.getElementById('statV').innerText = data.views || 0;
            const likeList = data.likes || [];
            document.getElementById('statL').innerText = likeList.length;
            
            const likeBtn = document.getElementById('mainLikeBtn');
            if(currentUser && likeList.includes(userId)) likeBtn.classList.add('is-liked');
            else likeBtn.classList.remove('is-liked');

            if(!document.getElementById('playerRoot').innerHTML.trim() && data.url) {
    document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
}

            renderCasting(data);
            listeEp_Partie1 = data.episodes || data.partie || data.film || data.Saison || data.Saison1 || [];
            fusionnerEtAfficher();
        });

        onSnapshot(doc(db, "films", filmId + "-suite"), (snap) => {
            if (snap.exists()) {
                const dataSuite = snap.data();
                listeEp_Partie2 = dataSuite.episodes || dataSuite.partie || dataSuite.film || dataSuite.Saison || dataSuite.Saison1 || [];
            } else {
                listeEp_Partie2 = [];
            }
            fusionnerEtAfficher();
        });
      // ÉCOUTEUR TEMPS RÉEL FLUIDE : PLUS DE BLOCAGE DE PAGE
onSnapshot(collection(db, "films", filmId, "comments"), (snapshot) => {
    let comms = [];
    
    snapshot.forEach((docSnap) => {
        let commentData = docSnap.data();
        const cId = docSnap.id;
        
        // On lit directement les données sans faire de requêtes réseau bloquantes
        comms.push({ 
            id: cId, 
            ...commentData, 
            likesCount: commentData.likesCount || 0, // Sera géré par transaction plus tard si tu veux
            userHasLiked: false 
        });
    });
    
    // On envoie direct à l'affichage pour que l'interface reste instantanée
    renderComments(comms);
});
        // ÉCOUTEUR COMPTEUR DE LIKES SÉCURISÉ
        onSnapshot(collection(db, "films", filmId, "likes"), (snapshot) => {
            document.getElementById('likeCount').innerText = snapshot.size;
        });

        // --- EPISODES & SEASONS LOGIC (NETTOYAGE DU TEXTE ET SÉCURISATION) ---
        function renderEpisodes(epArray) {
            const container = document.getElementById('episodesList');
            let html = ""; let seasons = {};
            
            for (let i = 0; i < epArray.length; i += 4) {
                const img = epArray[i];
                const title = epArray[i+1];
                const linkWatch = epArray[i+2];    
                const linkDownload = epArray[i+3]; 
                
                if (!title) continue; 

                let sName = title.includes(':') ? title.split(':')[0].trim() : "Épisodes";
                if(!seasons[sName]) seasons[sName] = [];
                seasons[sName].push({img, title, linkWatch, linkDownload});
            }
            
            for (let s in seasons) {
                let cartesHtml = "";
                let boutonVoirPlusHtml = "";
                let modificateursSuite = false;

                seasons[s].forEach((ep, index) => {
                    if (ep.title.toLowerCase().includes("voir plus")) {
                        modificateursSuite = true;
                        boutonVoirPlusHtml = `
                            <button class="btn-voir-plus-poche" id="btn-more-${s}" onclick="afficherLaSuiteDeLaPoche('${s}')">
                                <i class="fa-solid fa-circle-plus"></i> Voir plus d'épisodes
                            </button>
                        `;
                    } else {
                        let classeCachee = modificateursSuite ? `suite-hidden partie-suite-${s}` : "";
                        
                        // ICI : On nettoie le titre de la carte pour enlever "Saison X :" et afficher directement l'épisode !
                        let titreAffiche = ep.title;
                        if (ep.title.includes(':')) {
                            const morceaux = ep.title.split(':');
                            morceaux.shift(); // Supprime "Saison X"
                            titreAffiche = morceaux.join(':').trim(); // Garde uniquement le mot "Épisode X..."
                        }

                        cartesHtml += `
                            <div class="ep-card ${classeCachee}" onclick="openDetails('${ep.title.replace(/'/g, "\\'")}', '${ep.linkWatch || ''}', '${ep.linkDownload || ''}')">
                                <div class="ep-poster-box"><img src="${ep.img}"><div class="ep-hd-tag">HD</div></div>
                                <div class="ep-info">
                                    <div class="ep-title-wrapper">
                                        <div class="ep-title">${titreAffiche}</div>
                                    </div>
                                </div>
                                <button class="detail-btn">Détails</button>
                            </div>
                        `;
                    }
                });

                html += `
                <div class="season-wrapper" style="margin-bottom: 25px;">
                    <div class="season-pocket" onclick="this.parentElement.classList.toggle('active')">
                        <span><i class="fa-solid fa-layer-group"></i> ${s}</span> <i class="fa-solid fa-chevron-down"></i>
                    </div>
                    <div class="season-content">
                        ${cartesHtml}
                        ${boutonVoirPlusHtml}
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        // --- ACTION DU BOUTON VOIR PLUS ---
        window.afficherLaSuiteDeLaPoche = (saisonId) => {
            const elementsSuite = document.querySelectorAll(`.partie-suite-${saisonId}`);
            elementsSuite.forEach(el => {
                el.classList.remove('suite-hidden');
            });
            
            const boutonMore = document.getElementById(`btn-more-${saisonId}`);
            if(boutonMore) boutonMore.style.display = 'none';
        };

        // --- DETAIL MODAL LOGIC ---
        window.openDetails = (title, linkWatch, linkDownload) => {
            document.getElementById('detEpTitle').innerText = title;
            document.getElementById('modalAdContainer').style.display = 'flex';
            document.getElementById('modalPlayerContainer').style.display = 'none';
            document.getElementById('modalPlayerContainer').innerHTML = "";
            document.getElementById('detailDrawer').classList.add('active');

            document.getElementById('btnWatchNow').onclick = () => {
                document.getElementById('modalAdContainer').style.display = 'none';
                const container = document.getElementById('modalPlayerContainer');
                container.style.display = 'block';
                container.innerHTML = `<iframe src="${linkWatch}" allowfullscreen></iframe>`;
            };

            document.getElementById('btnDownloadNow').onclick = () => {
                if(linkDownload) {
                    window.open(linkDownload, '_blank');
                } else {
                    alert("Lien de téléchargement indisponible");
                }
            };
        };

        window.closeDetails = () => {
            document.getElementById('detailDrawer').classList.remove('active');
            document.getElementById('modalPlayerContainer').innerHTML = "";
        };
        // COMMENTS SYSTEM
        window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');

       window.handlePost = async () => {
    if(!currentUser) return showAuthAlert("Connecte-toi pour commenter !");
    const f = document.getElementById('tkField');
    const val = f.value.trim();
    if(!val) return;
    
    try {
        const uniqueId = "ID-" + Date.now() + "-" + Math.floor(Math.random() * 1000);

        if(targetCommentId) {
            // Mode Réponse : On ajoute un ID unique à la réponse pour éviter le blocage de arrayUnion
            const replyData = {
                id: uniqueId,
                nom: userName,
                text: val,
                photo: userImg,
                date: Date.now()
            };
            const replyRef = doc(db, "films", filmId, "comments", targetCommentId);
            await updateDoc(replyRef, {
                replies: arrayUnion(replyData)
            });
        } else {
            // Mode Commentaire Principal : On force l'identifiant pour la fonction renderComments
            const newComment = {
                id: uniqueId,
                nom: userName,
                text: val,
                photo: userImg,
                date: Date.now(),
                replies: []
            };
            await addDoc(collection(db, "films", filmId, "comments"), newComment);
        }
        f.value = "";
        targetCommentId = null;
        f.placeholder = "Ajouter un commentaire...";
    } catch (err) {
        console.error("Erreur envoi commentaire : ", err);
    }
};
        window.prepareReply = (cid, name) => {
            targetCommentId = cid;
            const field = document.getElementById('tkField');
            field.placeholder = "Répondre à " + name + "...";
            field.focus();
        };

       function renderComments(comms) {
    const list = document.getElementById('tkList');
    document.getElementById('statC').innerText = comms.length;
    document.getElementById('hCount').innerText = comms.length;

    list.innerHTML = comms.sort((a,b) => b.date - a.date).map(c => {
        let dateCommentaire = "";
        try {
            dateCommentaire = typeof formatDate === 'function' ? formatDate(c.date) : new Date(c.date).toLocaleDateString();
        } catch(e) {
            dateCommentaire = new Date(c.date).toLocaleDateString();
        }

        // Configuration du style du cœur (Rouge si aimé, gris si vide)
        const heartColor = c.userHasLiked ? "#ff0050" : "#555"; 
        const heartIcon = c.userHasLiked ? "❤️" : "🤍";

        return `
        <div style="display:flex; gap:12px; margin-bottom:20px; align-items:flex-start; position:relative;">
            <img src="${c.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:35px; height:35px; border-radius:50%">
            <div style="flex:1; padding-right:30px;">
                <div style="font-size:12px; color:#999; font-weight:bold">
                    ${c.nom} <span style="font-weight:normal; color:#555; margin-left:6px;">${dateCommentaire}</span>
                </div>
                <div style="font-size:14px; color:#eee; margin-top:2px;">${c.text}</div>
                <div class="c-foot" style="margin-top:4px;"><span onclick="prepareReply('${c.id}', '${c.nom}')" style="cursor:pointer; color:#777; font-size:12px;">Répondre</span></div>
                
                ${(c.replies || []).length > 0 ? `
                    <div style="margin-top:10px; font-size:12px; color:var(--gold); cursor:pointer" onclick="this.nextElementSibling.classList.toggle('open')">——— Afficher les réponses</div>
                    <div class="replies-pocket">
                        ${(c.replies || []).map(r => {
                            let dateReponse = "";
                            try {
                                dateReponse = typeof formatDate === 'function' ? formatDate(r.date) : new Date(r.date).toLocaleDateString();
                            } catch(e) {
                                dateReponse = new Date(r.date).toLocaleDateString();
                            }

                            return `
                            <div style="display:flex; gap:8px; margin-top:12px; position:relative;">
                                <img src="${r.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:24px; height:24px; border-radius:50%">
                                <div style="flex:1; padding-right:25px;">
                                    <div style="font-size:11px; color:#777; font-weight:bold">
                                        ${r.nom} <span style="font-weight:normal; color:#555; margin-left:6px;">${dateReponse}</span>
                                    </div>
                                    <div style="font-size:13px; color:#eee; margin-top:1px;">${r.text}</div>
                                </div>
                                <div style="position:absolute; right:0; top:2px; color:#555; cursor:pointer; font-size:12px;">
                                    🤍 <span style="font-size:10px; display:block; text-align:center; color:#555;">0</span>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                ` : ''}
            </div>
            <div style="position:absolute; right:0; top:2px; color:${heartColor}; cursor:pointer; font-size:14px; text-align:center;" onclick="window.toggleLikeComment('${c.id}')">
                ${heartIcon} <span style="font-size:11px; display:block; text-align:center; color:#999; margin-top:2px;">${c.likesCount || 0}</span>
            </div>
        </div>
        `;
    }).join('');
}
       window.toggleLikeComment = async (commentId) => {
    // 1. Sécurité : Vérification de l'utilisateur connecté
    if (typeof currentUser === 'undefined' || !currentUser) {
        return typeof showAuthAlert === 'function' ? showAuthAlert("Connecte-toi pour liker !") : alert("Connecte-toi pour liker !");
    }
    
    try {
        // 2. Récupération des variables ID indispensables
        const currentUserId = typeof userId !== 'undefined' ? userId : (currentUser ? currentUser.uid : null);
        const currentFilmId = typeof filmId !== 'undefined' ? filmId : null;
        
        if (!currentUserId || !currentFilmId) {
            console.error("Identifiants manquants :", { currentFilmId, currentUserId });
            return;
        }

        // 3. Référence vers la sous-collection de Likes de ce commentaire précis
        const likeRef = doc(db, "films", currentFilmId, "comments", commentId, "likes", currentUserId);
        const likeSnap = await getDoc(likeRef);
        
        if (likeSnap.exists()) {
            // Si le like existe déjà, on l'enlève (Le cœur repassera au gris)
            await deleteDoc(likeRef);
            console.log("Like retiré pour le commentaire :", commentId);
        } else {
            // Sinon, on crée le document de like (Le cœur passera au rouge)
            await setDoc(likeRef, { liked: true });
            console.log("Like ajouté pour le commentaire :", commentId);
        }
    } catch (error) {
        console.error("Erreur lors du toggleLikeComment :", error);
    }
        // CASTING
        function renderCasting(data) {
            document.getElementById('rowCastImgs').innerHTML = (data.acteurs || []).map(url => `<img src="${url}" class="actor-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">`).join('');
            document.getElementById('listCastNames').innerHTML = (data.noms_acteurs || []).map(n => `<div class="cast-name-item"><i class="fa-solid fa-star" style="color:var(--gold); margin-right:10px; font-size: 8px;"></i> ${n}</div>`).join('');
        }

        // LIKES & FAVS CONNECTION
        document.getElementById('mainLikeBtn').onclick = async () => {
            if(!currentUser) return showAuthAlert("Connecte-toi pour liker !");
            
            // On cible un document unique pour cet utilisateur dans la sous-collection 'likes'
            const likeRef = doc(db, "films", filmId, "likes", userId);
            const likeSnap = await getDoc(likeRef);

            if (likeSnap.exists()) {
                // Si l'utilisateur avait déjà liké, on enlève son like
                await deleteDoc(likeRef);
            } else {
                // S'il n'avait pas liké, on crée le document de son like
                await setDoc(likeRef, { liked: true });
            }
        };

        document.getElementById('mainFavBtn').onclick = async () => { 
            if(!currentUser) return showAuthAlert("Connecte-toi pour enregistrer !");
            const btn = document.getElementById('mainFavBtn');
            const userRef = doc(db, "users", userId);
            const favItem = { id: filmId, titre: currentFilmData.titre || filmId, image: currentFilmData.poster || "" };
            if(btn.classList.contains('is-fav')) {
                await updateDoc(userRef, { favorites: arrayRemove(favItem) });
                btn.classList.remove('is-fav');
                document.getElementById('favText').innerText = "Enregistrer";
            } else {
                await updateDoc(userRef, { favorites: arrayUnion(favItem) });
                btn.classList.add('is-fav');
                document.getElementById('favText').innerText = "Ma Liste";
            }
        };

        // UI HELPERS
        window.triggerBackAd = () => { history.back(); };
        window.showAuthAlert = (m) => { 
            const a = document.getElementById('authAlert'); 
            document.getElementById('authAlertMsg').innerText = m || "Action requise";
            a.style.display='block'; setTimeout(()=>a.style.display='none', 3000);
        };
        // Enregistrement de la vue UNIQUE au chargement de la page (ne boucle pas !)
try {
    await updateDoc(doc(db, "films", filmId), { views: increment(1) });
} catch(e) {
    console.log("Erreur compteur vue:", e);
}
        // ENREGISTREMENT AUTOMATIQUE DANS L'HISTORIQUE DE L'UTILISATEUR
if (currentUser) {
    try {
        const userRef = doc(db, "users", userId);
        const historyItem = { 
            id: filmId, 
            titre: currentFilmData.titre || filmId, 
            image: currentFilmData.poster || "",
            date: Date.now() 
        };
        // On l'ajoute dans le tableau 'history' de l'utilisateur
        await updateDoc(userRef, { history: arrayUnion(historyItem) });
    } catch(e) {
        console.log("Erreur enregistrement historique:", e);
    }
}
    </script>
