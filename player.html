<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --tk-gray: #121212; --tk-input: #262626; --red: #ff3b5c; }
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; 
        }

        /* 1. LECTEUR BORD À BORD ET LUMIÈRE BOOSTÉE */
        .video-box { 
            width: 100vw; aspect-ratio: 16/9; background: #000; 
            position: relative; margin: 0; z-index: 2;
        }
        .video-box::after {
            content: "";
            position: absolute;
            bottom: -10px; left: 0; right: 0;
            height: 15px;
            background: var(--gold);
            filter: blur(30px);
            opacity: 0.8;
            z-index: -1;
        }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .back-btn { position: absolute; top: 12px; left: 12px; z-index: 10; width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.4); text-decoration: none; }

        /* 2. TITRE RÉDUIT */
        .title-container { text-align: center; padding: 25px 10px 5px; }
        #txtTitle { 
            font-size: 18px; 
            color: #fff; 
            font-weight: 300; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            margin: 0;
        }

        /* 3. ACTIONS AVEC COULEUR TIKTOK */
        .actions { display: flex; justify-content: space-around; padding: 15px 5px; border-bottom: 1px solid #1a1a1a; }
        .act-item { text-align: center; color: #888; font-size: 11px; flex: 1; cursor: pointer; }
        .act-item i { font-size: 24px; color: var(--gold); margin-bottom: 4px; display: block; transition: 0.3s; }
        .act-item.is-liked i { color: var(--red) !important; }
        .act-item.is-liked span { color: var(--red); }

        /* 4. DESCRIPTION EFFET VITRINE */
        .info-pane { padding: 20px; }
        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            padding: 25px 20px 20px;
            position: relative;
            margin-bottom: 30px;
        }
        .glass-box::before {
            content: "\201C";
            position: absolute; top: -10px; left: 15px;
            font-size: 50px; color: var(--gold); font-family: serif; line-height: 1;
        }
        #txtDesc { font-size: 14px; color: #ccc; line-height: 1.6; margin: 0; }

        /* 5. CASTING */
        .cast-label { color: var(--gold); font-size: 13px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .cast-row-imgs { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .cast-row-imgs::-webkit-scrollbar { display: none; }
        .actor-img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; flex-shrink: 0; }
        .cast-list-vertical { margin-top: 10px; border-left: 1px solid rgba(255,215,0,0.3); padding-left: 15px; }
        .cast-name-item { font-size: 13px; color: #eee; margin-bottom: 8px; display: flex; align-items: center; }
        .cast-name-item::before { content: "•"; color: var(--gold); margin-right: 10px; font-weight: bold; }

        /* 6. MODULE COMMENTAIRES */
        #tkDrawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: var(--tk-gray); border-radius: 12px 12px 0 0; transform: translateY(100%); transition: 0.3s cubic-bezier(0.2, 0, 0, 1); z-index: 2000; display: flex; flex-direction: column; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); }
        #tkDrawer.active { transform: translateY(0); }
        .tk-header { padding: 15px; text-align: center; font-size: 13px; font-weight: bold; border-bottom: 0.5px solid #222; position: relative; }
        .tk-close { position: absolute; right: 20px; font-size: 20px; color: #666; cursor: pointer; }
        .tk-list { flex: 1; overflow-y: auto; padding: 20px; }
        .comment { display: flex; gap: 12px; margin-bottom: 22px; align-items: flex-start; }
        .c-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .c-main { flex: 1; }
        .c-user { font-size: 12px; color: #777; font-weight: bold; margin-bottom: 2px; }
        .c-text { font-size: 14px; color: #eee; line-height: 1.4; }
        .c-foot { display: flex; gap: 15px; margin-top: 8px; font-size: 11px; color: #555; font-weight: bold; cursor: pointer; }
        .c-like-zone { text-align: center; color: #444; min-width: 35px; cursor: pointer; }
        .c-like-zone i { font-size: 18px; display: block; transition: 0.2s; }
        .c-like-zone i.active { color: #ff3b5c; }
        .replies-pocket { display: none; margin-top: 15px; padding-left: 10px; border-left: 1px solid #333; }
        .replies-pocket.open { display: block; }
        .tk-input-box { padding: 10px 15px 30px; background: var(--tk-gray); border-top: 0.5px solid #222; display: flex; align-items: center; gap: 12px; }
        .input-pill { flex: 1; background: var(--tk-input); border-radius: 22px; padding: 0 15px; }
        #tkField { flex: 1; background: transparent; border: none; color: #fff; padding: 10px 0; font-size: 14px; outline: none; width: 100%; }
        .tk-send { color: var(--gold); font-size: 24px; background: none; border: none; opacity: 0.4; pointer-events: none; }
        .tk-send.active { opacity: 1; pointer-events: auto; }

        /* ALERTE CONNEXION */
        #authAlert { 
            display:none; position:fixed; bottom:25px; left:5%; width:90%; 
            background:var(--red); color:#fff; padding:15px; border-radius:12px; 
            z-index:3000; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.5); 
            font-weight:bold; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="video-box">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>
    </div>

    <div class="title-container">
        <h1 id="txtTitle">Chargement...</h1>
    </div>

    <div class="actions">
        <div class="act-item"><i class="fa-solid fa-eye"></i> <span id="statV">0</span></div>
        <div class="act-item" id="mainLikeBtn"><i class="fa-solid fa-heart"></i> <span id="statL">0</span></div>
        <div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment"></i> <span id="statC">0</span></div>
        <div class="act-item" id="mainFavBtn"><i class="fa-solid fa-star"></i> <span>Favoris</span></div>
    </div>

    <div class="info-pane">
        <div class="glass-box">
            <p id="txtDesc">...</p>
        </div>
        <span class="cast-label">Casting Visual</span>
        <div id="rowCastImgs" class="cast-row-imgs"></div> 
        <div id="listCastNames" class="cast-list-vertical"></div> 
    </div>

    <div id="tkDrawer">
        <div class="tk-header">
            <span id="hCount">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark tk-close" onclick="toggleTk()"></i>
        </div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <img id="myAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:32px; height:32px; border-radius:50%">
            <div class="input-pill">
                <input type="text" id="tkField" placeholder="Ajouter un commentaire...">
            </div>
            <button id="tkSend" class="tk-send" onclick="handlePost()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="authAlert">
        Connecte-toi pour interagir !
        <br>
        <a href="account.html" style="display:inline-block; margin-top:10px; background:#fff; color:var(--red); padding:8px 20px; border-radius:20px; text-decoration:none; font-size:12px;">SE CONNECTER</a>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const filmId = params.get('id') || "MUSHOTA_VS_KARANI_01";
    
    let currentUser = null;
    let userId = "GUEST_" + Math.floor(Math.random()*9999);
    let userName = "Fan CongoFlix";
    let userImg = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    // --- DETECTION CONNEXION ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            userId = user.uid;
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if(userSnap.exists()){
                const d = userSnap.data();
                userName = d.name || user.email.split('@')[0];
                userImg = d.photoURL || userImg;
                document.getElementById('myAvatar').src = userImg;
                
                // AJOUT AUTOMATIQUE À L'HISTORIQUE DE L'UTILISATEUR
                const filmSnap = await getDoc(doc(db, "films", filmId));
                if(filmSnap.exists()){
                    const fData = filmSnap.data();
                    const historyItem = { id: filmId, title: fData.titre, poster: fData.poster || "" };
                    const currentHistory = d.history || [];
                    if(!currentHistory.find(h => h.id === filmId)){
                        await updateDoc(doc(db, "users", user.uid), { history: arrayUnion(historyItem) });
                    }
                }
            }
        }
    });

    window.showAuthAlert = () => {
        const alert = document.getElementById('authAlert');
        alert.style.display = 'block';
        setTimeout(() => { alert.style.display = 'none'; }, 5000);
    };

    // --- CHARGEMENT DES DONNÉES DU FILM ---
    onSnapshot(doc(db, "films", filmId), (snapshot) => {
        const data = snapshot.data();
        if(!data) return;

        document.getElementById('txtTitle').innerText = data.titre || filmId.replace(/_/g, ' ');
        document.getElementById('txtDesc').innerText = data.description || "Pas de description.";
        document.getElementById('statV').innerText = data.views || 0;
        
        const likes = data.likes || [];
        document.getElementById('statL').innerText = likes.length;
        const likeBtn = document.getElementById('mainLikeBtn');
        if(likes.includes(userId)) likeBtn.classList.add('is-liked');
        else likeBtn.classList.remove('is-liked');

        if(!document.getElementById('playerRoot').innerHTML && data.url) {
            document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
            // Incrémenter les vues une seule fois
            updateDoc(doc(db, "films", filmId), { views: increment(1) });
        }

        document.getElementById('rowCastImgs').innerHTML = (data.acteurs || []).map(url => `<img src="${url}" class="actor-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">`).join('');
        document.getElementById('listCastNames').innerHTML = (data.noms_acteurs || ["Casting officiel"]).map(n => `<div class="cast-name-item">${n}</div>`).join('');

        const comms = (data.comments || []).filter(c => typeof c === 'object');
        document.getElementById('statC').innerText = comms.length;
        document.getElementById('hCount').innerText = comms.length;

        document.getElementById('tkList').innerHTML = comms.slice().reverse().map(c => {
            const hasLiked = (c.likedBy || []).includes(userId);
            return `
            <div class="comment">
                <img src="${c.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="c-avatar">
                <div class="c-main">
                    <div class="c-user">${c.nom}</div>
                    <div class="c-text">${c.text}</div>
                    <div class="c-foot"><span onclick="prepareReply('${c.id}', '${c.nom}')">Répondre</span></div>
                    ${(c.replies || []).length > 0 ? `
                        <div style="margin-top:10px; font-size:12px; color:#555; cursor:pointer" onclick="this.nextElementSibling.classList.toggle('open')">——— Afficher ${c.replies.length} réponses</div>
                        <div class="replies-pocket">${c.replies.map(r => `<div style="display:flex; gap:8px; margin-bottom:10px"><img src="${r.photo}" style="width:24px; height:24px; border-radius:50%"><div class="c-main"><div class="c-user" style="font-size:11px">${r.nom}</div><div class="c-text" style="font-size:13px">${r.text}</div></div></div>`).join('')}</div>
                    ` : ''}
                </div>
                <div class="c-like-zone" onclick="likeComment('${c.id}')">
                    <i class="fa-heart ${hasLiked ? 'fa-solid active' : 'fa-regular'}"></i>
                    <span style="font-size:10px">${(c.likedBy || []).length}</span>
                </div>
            </div>`;
        }).join('');
    });

    // --- ACTIONS ---
    let targetCommentId = null;
    window.prepareReply = (cid, name) => {
        targetCommentId = cid;
        const field = document.getElementById('tkField');
        field.placeholder = "Répondre à " + name + "...";
        field.focus();
    };

    window.handlePost = async () => {
        if(!currentUser) { showAuthAlert(); return; }
        const val = document.getElementById('tkField').value.trim();
        if(!val) return;
        const ref = doc(db, "films", filmId);
        const snap = await getDoc(ref);
        let allComments = snap.data().comments || [];
        if(targetCommentId) {
            allComments = allComments.map(c => {
                if(c.id === targetCommentId) {
                    const reps = c.replies || [];
                    return {...c, replies: [...reps, {nom: userName, text: val, photo: userImg, date: Date.now()}]};
                }
                return c;
            });
        } else {
            allComments.push({ id: "C-" + Date.now(), nom: userName, text: val, photo: userImg, date: Date.now(), likedBy: [], replies: [] });
        }
        await updateDoc(ref, { comments: allComments });
        document.getElementById('tkField').value = "";
        targetCommentId = null;
    };

    window.likeComment = async (cid) => {
        if(!currentUser) { showAuthAlert(); return; }
        const snap = await getDoc(doc(db, "films", filmId));
        const updated = (snap.data().comments || []).map(c => {
            if(c.id === cid) {
                let currentLikes = c.likedBy || [];
                currentLikes = currentLikes.includes(userId) ? currentLikes.filter(u => u !== userId) : [...currentLikes, userId];
                return {...c, likedBy: currentLikes};
            }
            return c;
        });
        await updateDoc(doc(db, "films", filmId), { comments: updated });
    };

    document.getElementById('mainLikeBtn').onclick = async () => {
        if(!currentUser) { showAuthAlert(); return; }
        const ref = doc(db, "films", filmId);
        const s = await getDoc(ref);
        const l = s.data().likes || [];
        await updateDoc(ref, { likes: l.includes(userId) ? arrayRemove(userId) : arrayUnion(userId) });
    };

    document.getElementById('mainFavBtn').onclick = () => { 
        if(!currentUser) showAuthAlert(); 
        else alert("Ajouté à vos favoris !"); 
    };

    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');
    document.getElementById('tkField').oninput = function() { document.getElementById('tkSend').classList.toggle('active', this.value.length > 0); };
</script>
</body>
</html>
