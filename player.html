<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --glass: rgba(255, 215, 0, 0.1); --mirror: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* LECTEUR */
        .video-box { width: 100vw; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .back-btn { position: absolute; top: 12px; left: 12px; z-index: 10; width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.4); text-decoration: none; }

        /* TITRE CINÉMATIQUE */
        .title-wrap { padding: 20px 20px 10px; }
        #txtTitle { 
            background: var(--glass);
            border: 1px solid var(--gold);
            padding: 15px;
            border-radius: 8px;
            font-size: 22px;
            color: var(--gold);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
            margin: 0;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        /* ACTIONS */
        .actions { display: flex; justify-content: space-around; padding: 15px 5px; border-bottom: 1px solid #1a1a1a; margin-bottom: 10px; }
        .act-item { text-align: center; color: #888; font-size: 11px; flex: 1; }
        .act-item i { font-size: 20px; color: var(--gold); margin-bottom: 4px; display: block; }

        /* CADRE MIROIR DESCRIPTION */
        .mirror-frame {
            margin: 15px 20px;
            padding: 20px;
            background: var(--mirror);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
        }
        .mirror-frame::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(30deg); pointer-events: none;
        }
        #txtDesc { font-size: 14px; color: #eee; line-height: 1.8; font-style: italic; text-align: justify; margin: 0; }

        /* CASTING HORIZONTAL (IMAGES) */
        .cast-section { padding: 0 20px; }
        .cast-label { color: var(--gold); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; display: block; letter-spacing: 1px; }
        .cast-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cast-row::-webkit-scrollbar { display: none; }
        .actor-img-box { flex-shrink: 0; width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; background: #111; }
        .actor-img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* LISTE D'APPEL VERTICALE (NOMS) */
        .call-list { 
            margin: 20px 0;
            background: rgba(255,215,0,0.03);
            border: 1px dashed var(--gold);
            padding: 15px;
            border-radius: 4px;
        }
        .call-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            padding: 8px 0; 
            border-bottom: 0.5px solid rgba(255,215,0,0.1);
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 600;
            color: #ddd;
        }
        .call-item i { color: var(--gold); font-size: 10px; }

        /* COMMENTAIRES (STYLE TIKTOK) */
        #tkDrawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: #121212; border-radius: 15px 15px 0 0; transform: translateY(100%); transition: 0.4s cubic-bezier(0, 1, 0.5, 1); z-index: 2000; display: flex; flex-direction: column; }
        #tkDrawer.active { transform: translateY(0); }
        .tk-header { padding: 15px; text-align: center; border-bottom: 1px solid #222; font-weight: bold; }
        .tk-list { flex: 1; overflow-y: auto; padding: 15px; }
        .tk-input-box { padding: 10px 15px 30px; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        .input-pill { flex: 1; background: #262626; border-radius: 20px; padding: 8px 15px; }
        #tkField { background: transparent; border: none; color: #fff; width: 100%; outline: none; }
    </style>
</head>
<body>

    <div class="video-box">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot"></div>
    </div>

    <div class="title-wrap">
        <h1 id="txtTitle">Chargement...</h1>
    </div>

    <div class="actions">
        <div class="act-item"><i class="fa-solid fa-eye"></i> <span id="statV">0</span></div>
        <div class="act-item" id="mainLikeBtn"><i class="fa-solid fa-heart"></i> <span id="statL">0</span></div>
        <div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment"></i> <span id="statC">0</span></div>
        <div class="act-item"><i class="fa-solid fa-share-nodes"></i> <span>Partager</span></div>
    </div>

    <div class="mirror-frame">
        <p id="txtDesc">...</p>
    </div>

    <div class="cast-section">
        <span class="cast-label"><i class="fa-solid fa-film"></i> Casting Visual</span>
        <div id="rowCast" class="cast-row"></div>

        <div class="call-list">
            <span class="cast-label" style="margin-bottom:10px;">Crédits Artistiques</span>
            <div id="nameList"></div>
        </div>
    </div>

    <div id="tkDrawer">
        <div class="tk-header">COMMENTAIRES <i class="fa-solid fa-xmark" style="float:right" onclick="toggleTk()"></i></div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <div class="input-pill"><input type="text" id="tkField" placeholder="Dire quelque chose..."></div>
            <i class="fa-solid fa-paper-plane" style="color:var(--gold); font-size:20px;" onclick="handlePost()"></i>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const filmId = params.get('id') || "MUSHOTA_VS_KARANI_01";
    const userId = "U" + Math.floor(Math.random()*9999);

    onSnapshot(doc(db, "films", filmId), (snapshot) => {
        const data = snapshot.data();
        if(!data) return;

        // TITRE & DESC
        document.getElementById('txtTitle').innerText = data.titre || data.title || filmId.replace(/_/g, ' ');
        document.getElementById('txtDesc').innerText = data.description || "Inspiré par la culture congolaise, ce contenu vous transporte au cœur de l'action.";
        
        // STATS
        document.getElementById('statV').innerText = data.views || 0;
        document.getElementById('statL').innerText = (data.likes || []).length;

        // VIDEO
        if(!document.getElementById('playerRoot').innerHTML && data.url) {
            document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
        }

        // CASTING (IMAGES HORIZONTALES)
        const acteurs = data.acteurs || [];
        document.getElementById('rowCast').innerHTML = acteurs.map(url => `
            <div class="actor-img-box">
                <img src="${url}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
            </div>
        `).join('');

        // LISTE DES NOMS (VERTICALE)
        // Note: Comme ta base ne contient que des URLs d'images, j'affiche "Casting Principal" 
        // Mais si tu rajoutes des noms plus tard, le code est prêt.
        document.getElementById('nameList').innerHTML = acteurs.map((url, index) => `
            <div class="call-item">
                <i class="fa-solid fa-circle"></i> Membre du Casting #${index + 1}
            </div>
        `).join('');

        // COMMENTAIRES
        const comms = (data.comments || []).filter(c => typeof c === 'object');
        document.getElementById('statC').innerText = comms.length;
        document.getElementById('tkList').innerHTML = comms.slice().reverse().map(c => `
            <div style="margin-bottom:15px; display:flex; gap:10px;">
                <img src="${c.photo}" style="width:35px; height:35px; border-radius:50%">
                <div>
                    <div style="font-size:11px; color:#888;">${c.nom}</div>
                    <div style="font-size:13px;">${c.text}</div>
                </div>
            </div>
        `).join('');
    });

    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');

    window.handlePost = async () => {
        const val = document.getElementById('tkField').value.trim();
        if(!val) return;
        await updateDoc(doc(db, "films", filmId), {
            comments: arrayUnion({ id: Date.now(), nom: "Fan CongoFlix", text: val, photo: "https://cdn-icons-png.flaticon.com/512/149/149071.png" })
        });
        document.getElementById('tkField').value = "";
    };
</script>
</body>
</html>
