<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CongoFlix</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--gold:#FFD700;
--bg:#000;
--glass:rgba(255,255,255,0.05);
}

/* BASE */
body{
margin:0;
background:radial-gradient(circle at top,#0a0a0a,#000);
color:white;
font-family:Segoe UI;
}

/* VIDEO CINEMA */
.video-box{
width:100%;
aspect-ratio:16/9;
position:relative;
overflow:hidden;
}

.video-box::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,#000 5%,transparent);
}

/* BACK */
.back-btn{
position:absolute;
top:15px;
left:15px;
width:42px;
height:42px;
border-radius:50%;
border:1px solid var(--gold);
display:flex;
align-items:center;
justify-content:center;
color:var(--gold);
background:rgba(0,0,0,0.5);
backdrop-filter:blur(8px);
}

/* ACTIONS */
.actions{
display:flex;
justify-content:space-around;
padding:18px 0;
}

.act-item{
text-align:center;
flex:1;
color:#aaa;
font-size:12px;
}

.act-item i{
font-size:22px;
color:var(--gold);
display:block;
margin-bottom:5px;
text-shadow:0 0 10px var(--gold);
}

/* TITRE */
#txtTitle{
font-size:32px;
text-align:center;
color:var(--gold);
font-weight:900;
letter-spacing:3px;
text-shadow:0 0 20px var(--gold);
}

/* DESCRIPTION VITRINE */
#txtDesc{
margin:20px;
padding:20px;
border-radius:15px;
background:var(--glass);
backdrop-filter:blur(12px);
border:1px solid rgba(255,215,0,0.3);
box-shadow:0 0 25px rgba(255,215,0,0.2);
color:#ddd;
}

/* CAST */
.cast-label{
margin-left:20px;
color:var(--gold);
font-weight:bold;
letter-spacing:2px;
}

.cast-row{
display:flex;
gap:15px;
overflow-x:auto;
padding:20px;
}

.actor img{
width:75px;
height:75px;
border-radius:50%;
border:2px solid var(--gold);
box-shadow:0 0 12px var(--gold);
}

/* COMMENTS */
#tkDrawer{
position:fixed;
bottom:0;
width:100%;
height:75vh;
background:rgba(15,15,15,0.95);
backdrop-filter:blur(15px);
border-top:1px solid rgba(255,215,0,0.2);
transform:translateY(100%);
transition:0.3s;
display:flex;
flex-direction:column;
}

#tkDrawer.active{
transform:translateY(0);
}

.tk-header{
padding:15px;
text-align:center;
color:var(--gold);
text-shadow:0 0 10px var(--gold);
}

.tk-list{
flex:1;
overflow:auto;
padding:15px;
}

.comment{
display:flex;
gap:10px;
margin-bottom:20px;
}

.c-avatar{
width:36px;
height:36px;
border-radius:50%;
border:1px solid var(--gold);
}

.c-text{
color:#eee;
}

.input-pill{
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:5px 15px;
flex:1;
}

#tkField{
background:none;
border:none;
color:white;
width:100%;
}

.tk-send{
color:var(--gold);
font-size:22px;
background:none;
border:none;
}

</style>
</head>

<body>

<div class="video-box">
<a href="javascript:history.back()" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
</a>

<div id="playerRoot" style="width:100%;height:100%"></div>
</div>

<div class="actions">
<div class="act-item"><i class="fa-solid fa-eye"></i><span id="statV">0</span></div>
<div class="act-item" id="mainLikeBtn"><i class="fa-solid fa-heart"></i><span id="statL">0</span></div>
<div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment"></i><span id="statC">0</span></div>
<div class="act-item"><i class="fa-solid fa-star"></i><span>Favoris</span></div>
</div>

<h1 id="txtTitle">Chargement...</h1>

<div id="txtDesc">...</div>

<span class="cast-label">CASTING VISUAL</span>
<div id="rowCast" class="cast-row"></div>

<!-- COMMENTS -->
<div id="tkDrawer">
<div class="tk-header">
<span id="hCount">0</span> COMMENTAIRES
</div>

<div id="tkList" class="tk-list"></div>

<div style="display:flex;padding:10px;gap:10px;">
<input id="tkField" placeholder="Commentaire..." style="flex:1;background:#222;border:none;color:white;padding:10px;border-radius:20px;">
<button id="tkSend"><i class="fa-solid fa-paper-plane"></i></button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCoWWX...",
authDomain:"congo-streaming-51333.firebaseapp.com",
projectId:"congo-streaming-51333"
});

const db = getFirestore(app);

onSnapshot(doc(db,"films","MUSHOTA_VS_KARANI_01"),(snap)=>{
const d=snap.data();
if(!d)return;

txtTitle.innerText=d.titre || "MUSHOTA VS KARANI";
txtDesc.innerText=d.description || "...";

statV.innerText=d.views||0;
statL.innerText=(d.likes||[]).length;

if(!playerRoot.innerHTML && d.url){
playerRoot.innerHTML=`<iframe src="${d.url}"></iframe>`;
}
});

window.toggleTk=()=>{
tkDrawer.classList.toggle("active");
}

</script>

</body>
</html>
