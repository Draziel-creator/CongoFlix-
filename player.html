<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; }

        /* LECTEUR PLEIN LARGEUR (STYLE MOVIEBOX) */
        .video-header { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .video-header iframe { width: 100%; height: 100%; border: none; }
        
        .back-float { position: absolute; top: 10px; left: 10px; z-index: 10; width: 35px; height: 35px; border-radius: 50%; background: rgba(0,0,0,0.6); color: var(--gold); display: flex; align-items: center; justify-content: center; text-decoration: none; border: 1px solid var(--gold); }

        /* STATS SANS CADRE */
        .action-bar { display: flex; justify-content: space-around; padding: 15px 0; border-bottom: 1px solid #111; }
        .action-btn { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 11px; cursor: pointer; }
        .action-btn i { font-size: 20px; color: var(--gold); margin-bottom: 4px; }

        /* CONTENU CLAIR */
        .info-section { padding: 15px; }
        .title-text { font-size: 22px; color: var(--gold); font-weight: bold; margin: 0 0 10px 0; }
        .description-text { font-size: 14px; color: #bbb; line-height: 1.5; border-left: 3px solid var(--gold); padding-left: 12px; }

        /* CASTING HORIZONTAL */
        .label { color: var(--gold); font-size: 12px; font-weight: bold; text-transform: uppercase; margin: 20px 0 10px 0; }
        .cast-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .actor { flex-shrink: 0; width: 70px; text-align: center; }
        .actor img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .actor span { font-size: 10px; display: block; margin-top: 5px; color: #eee; }

        /* COMMENTAIRES TIKTOK STYLE */
        #commentSheet { position: fixed; bottom: 0; width: 100%; height: 75vh; background: #0a0a0a; border-radius: 20px 20px 0 0; transform: translateY(100%); transition: 0.3s ease-out; z-index: 100; display: flex; flex-direction: column; border-top: 1px solid #222; }
        #commentSheet.open { transform: translateY(0); }
        .sheet-head { padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #222; font-size: 13px; }
        #commentFeed { flex: 1; overflow-y: auto; padding: 15px; }

        .comm-row { display: flex; gap: 12px; margin-bottom: 15px; }
        .comm-avatar { width: 32px; height: 32px; border-radius: 50%; background: #222; }
        .comm-body { flex: 1; }
        .comm-name { font-size: 12px; color: #777; font-weight: bold; }
        .comm-msg { font-size: 14px; color: #ddd; margin-top: 2px; }

        .input-sticky { padding: 12px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        .input-sticky input { flex: 1; background: #151515; border: none; color: #fff; padding: 10px 15px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

    <div class="video-header">
        <a href="javascript:history.back()" class="back-float"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="player" style="width:100%; height:100%;"></div>
    </div>

    <div class="action-bar">
        <div class="action-btn"><i class="fa-solid fa-eye"></i> <span id="v">0</span></div>
        <div class="action-btn" onclick="doLike()"><i class="fa-solid fa-heart" id="li"></i> <span id="lc">0</span></div>
        <div class="action-btn" onclick="openComms()"><i class="fa-solid fa-comment"></i> <span id="cc">0</span></div>
        <div class="action-btn" onclick="doFav()"><i class="fa-solid fa-star" id="fi"></i> <span id="fs">Favoris</span></div>
    </div>

    <div class="info-section">
        <div id="tt" class="title-text">Chargement...</div>
        <div id="dd" class="description-text">...</div>

        <div class="label">Casting</div>
        <div id="cl" class="cast-row"></div>
    </div>

    <div id="commentSheet">
        <div class="sheet-head">COMMENTAIRES <i class="fa-solid fa-xmark" style="float:right" onclick="openComms()"></i></div>
        <div id="commentFeed"></div>
        <div class="input-sticky">
            <input type="text" id="ci" placeholder="Écrire un commentaire...">
            <button onclick="sendC()" style="background:none; border:none; color:var(--gold); font-size:20px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const cfg = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(cfg);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || "MUSHOTA_VS_KARANI_01";
    const uid = localStorage.getItem('user_id') || "u" + Date.now();
    const uname = localStorage.getItem('user_name') || "Anonyme";

    // Chargement Unique
    onSnapshot(doc(db, "films", id), (s) => {
        const d = s.data(); if(!d) return;

        document.getElementById('tt').innerText = d.titre || d.title || "Titre Indisponible";
        document.getElementById('dd').innerText = d.description || "";
        document.getElementById('v').innerText = d.views || 0;
        document.getElementById('lc').innerText = (d.likes || []).length;
        document.getElementById('li').style.color = (d.likes || []).includes(uid) ? "red" : "#ffd700";

        if(!document.getElementById('player').innerHTML) {
            document.getElementById('player').innerHTML = `<iframe src="${d.url}" allowfullscreen></iframe>`;
        }

        if(d.acteurs_full) {
            document.getElementById('cl').innerHTML = d.acteurs_full.map(a => `
                <div class="actor"><img src="${a.photo}"><span>${a.nom}</span></div>
            `).join('');
        }

        const c = d.comments || [];
        document.getElementById('cc').innerText = c.length;
        document.getElementById('commentFeed').innerHTML = c.slice().reverse().map(m => `
            <div class="comm-row">
                <img src="${m.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="comm-avatar">
                <div class="comm-body"><div class="comm-name">${m.nom}</div><div class="comm-msg">${m.text}</div></div>
            </div>
        `).join('');
    });

    window.doLike = async () => {
        const snap = await getDoc(doc(db, "films", id));
        const l = snap.data().likes || [];
        await updateDoc(doc(db, "films", id), { likes: l.includes(uid) ? arrayRemove(uid) : arrayUnion(uid) });
    };

    window.sendC = async () => {
        const i = document.getElementById('ci'); if(!i.value.trim()) return;
        await updateDoc(doc(db, "films", id), { comments: arrayUnion({ nom: uname, text: i.value, date: Date.now() }) });
        i.value = "";
    };

    window.doFav = async () => {
        const snap = await getDoc(doc(db, "films", id));
        await setDoc(doc(db, "users", uid), { favorites: arrayUnion({ id: id, titre: snap.data().titre || snap.data().title }) }, { merge: true });
        document.getElementById('fi').style.color = "#fff";
        document.getElementById('fs').innerText = "Ma Liste";
    };

    window.openComms = () => document.getElementById('commentSheet').classList.toggle('open');
</script>
</body>
</html>
