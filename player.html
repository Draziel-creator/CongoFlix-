<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoFlix Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --card: #111; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* NAV & PLAYER */
        .top-nav { padding: 15px; display: flex; align-items: center; }
        .back-circle { width: 38px; height: 38px; border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); display: flex; align-items: center; justify-content: center; text-decoration: none; transform: rotate(180deg); background: rgba(255,215,0,0.05); }
        
        .player-container { width: 95%; margin: 5px auto; border: 2px solid var(--gold); border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 16/9; }
        iframe, video { width: 100%; height: 100%; border: none; }

        /* STATS */
        .stats-bar { display: flex; justify-content: space-around; padding: 15px; background: var(--card); border-bottom: 1px solid #222; }
        .stat-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #888; cursor: pointer; }
        .stat-item i { font-size: 20px; color: var(--gold); margin-bottom: 4px; }
        .active-gold { color: var(--gold) !important; filter: drop-shadow(0 0 5px var(--gold)); }

        /* DESCRIPTION (REMISE EN PLACE) */
        .description-card { background: var(--card); padding: 15px; margin: 10px; border-radius: 12px; border-left: 4px solid var(--gold); }
        .movie-title { font-size: 18px; color: var(--gold); margin: 0 0 8px 0; font-weight: bold; }
        .synopsis { font-size: 13px; color: #bbb; line-height: 1.4; }

        /* CASTING : IMAGES HORIZONTALES + NOMS VERTICAUX */
        .section-title { color: var(--gold); font-size: 13px; font-weight: bold; margin: 20px 15px 10px; text-transform: uppercase; }
        .cast-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 0 15px; scrollbar-width: none; }
        .cast-scroll img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; flex-shrink: 0; }
        
        .cast-names-list { margin: 15px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #222; padding-top: 10px; }
        .cast-names-list span { font-size: 13px; color: #eee; display: flex; align-items: center; }
        .cast-names-list span::before { content: "•"; color: var(--gold); margin-right: 10px; font-size: 18px; }

        /* COMMENTAIRES (FIXED) */
        #commentPocket { position: fixed; bottom: 0; left: 0; width: 100%; height: 75vh; background: #000; border-radius: 25px 25px 0 0; transform: translateY(100%); transition: 0.4s ease; z-index: 1000; border-top: 1px solid #333; display: flex; flex-direction: column; }
        #commentPocket.active { transform: translateY(0); }
        .pull-bar { width: 50px; height: 5px; background: #333; margin: 12px auto; border-radius: 5px; }
        #commentList { flex: 1; overflow-y: auto; padding: 15px; }

        .comment-block { margin-bottom: 20px; }
        .main-comment { display: flex; gap: 12px; }
        .comm-avatar { width: 38px; height: 38px; border-radius: 50%; background: #222; }
        .comm-text-box { flex: 1; }
        .comm-user { font-weight: bold; font-size: 12px; color: #888; }
        .comm-msg { font-size: 14px; color: #eee; margin: 2px 0; }
        .comm-actions { font-size: 11px; color: var(--gold); font-weight: bold; cursor: pointer; }

        .heart-zone { text-align: center; min-width: 30px; }
        .heart-active { color: var(--gold) !important; }

        .replies-poche { margin-left: 50px; margin-top: 10px; border-left: 1px dotted #333; padding-left: 15px; display: none; }
        .view-more { font-size: 11px; color: #666; margin-left: 50px; margin-top: 5px; cursor: pointer; font-weight: bold; }

        .comm-input-area { display: flex; gap: 10px; padding: 15px; background: #0d0d0d; border-top: 1px solid #222; }
        .comm-input-area input { flex: 1; background: #1a1a1a; border: none; color: #fff; padding: 12px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="javascript:history.back()" class="back-circle">➔</a>
    </div>

    <div class="player-container" id="videoContainer"></div>

    <div class="stats-bar">
        <div class="stat-item"><i class="fa-solid fa-eye"></i> <span id="v-count">0</span></div>
        <div class="stat-item" onclick="handleLike()"><i class="fa-solid fa-heart" id="l-icon"></i> <span id="l-count">0</span></div>
        <div class="stat-item" onclick="toggleComments()"><i class="fa-solid fa-comment"></i> <span id="c-count">0</span></div>
        <div class="stat-item" onclick="toggleFavorite()"><i class="fa-solid fa-star" id="f-icon"></i> <span id="f-text">Favoris</span></div>
    </div>

    <div class="description-card">
        <h1 id="movie-title" class="movie-title">Chargement...</h1>
        <p id="movie-desc" class="synopsis">...</p>
    </div>

    <div class="section-title">Casting</div>
    <div id="castImages" class="cast-scroll"></div>
    <div id="castNames" class="cast-names-list"></div>

    <div id="commentPocket">
        <div class="pull-bar" onclick="toggleComments()"></div>
        <p id="total-header" style="text-align:center; font-size:12px; color:#555; font-weight:bold;">0 COMMENTAIRES</p>
        <div id="commentList"></div>
        <div class="comm-input-area">
            <input type="text" id="commInput" placeholder="Répondre ou commenter...">
            <button onclick="sendComment()" style="background:none; border:none; color:var(--gold); font-size:20px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, increment, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const urlParams = new URLSearchParams(window.location.search);
    const filmId = urlParams.get('id') || "MAMAN_FILM_01";
    
    const userId = localStorage.getItem('user_id') || "user_" + Math.floor(Math.random()*999);
    const userName = localStorage.getItem('user_name') || "Utilisateur";
    const userImg = localStorage.getItem('user_img') || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    async function init() {
        const filmRef = doc(db, "films", filmId);

        onSnapshot(filmRef, (s) => {
            const data = s.data(); if(!data) return;

            document.getElementById('movie-title').innerText = data.titre || data.title;
            document.getElementById('movie-desc').innerText = data.description;
            document.getElementById('v-count').innerText = data.views || 0;
            document.getElementById('l-count').innerText = data.likes?.length || 0;
            if(data.likes?.includes(userId)) document.getElementById('l-icon').classList.add('active-gold');

            // Vidéo
            const vBox = document.getElementById('videoContainer');
            if(!vBox.innerHTML.trim()) vBox.innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;

            // Casting
            if(data.acteurs_full) {
                document.getElementById('castImages').innerHTML = data.acteurs_full.map(a => `<img src="${a.photo}">`).join('');
                document.getElementById('castNames').innerHTML = data.acteurs_full.map(a => `<span>${a.nom}</span>`).join('');
            }

            // Commentaires
            renderComments(data.comments || []);
        });

        // Sync Favoris
        const userDoc = await getDoc(doc(db, "users", userId));
        if(userDoc.exists() && userDoc.data().favorites?.some(f => f.id === filmId)) {
            document.getElementById('f-icon').classList.add('active-gold');
            document.getElementById('f-text').innerText = "Ma Liste";
        }
    }

    function renderComments(comments) {
        const list = document.getElementById('commentList');
        document.getElementById('c-count').innerText = comments.length;
        document.getElementById('total-header').innerText = `${comments.length} COMMENTAIRES`;

        // Séparation Parents / Réponses
        const parents = comments.filter(c => !c.text.includes('@')).reverse();
        const replies = comments.filter(c => c.text.includes('@'));

        list.innerHTML = parents.map((p, i) => {
            const sub = replies.filter(r => r.text.includes(`@${p.nom}`));
            const isLiked = (p.commentLikes || []).includes(userId);
            
            return `
                <div class="comment-block">
                    <div class="main-comment">
                        <img src="${p.photo || userImg}" class="comm-avatar">
                        <div class="comm-text-box">
                            <div class="comm-user">${p.nom}</div>
                            <div class="comm-msg">${p.text}</div>
                            <div class="comm-actions" onclick="setReply('${p.nom}')">Répondre</div>
                        </div>
                        <div class="heart-zone" onclick="handleCommentLike(${p.date})">
                            <i class="fa-solid fa-heart ${isLiked ? 'heart-active' : ''}"></i>
                            <div style="font-size:10px;">${(p.commentLikes || []).length}</div>
                        </div>
                    </div>
                    ${sub.length > 0 ? `
                        <div class="view-more" onclick="showReplies('${i}')">——— Voir les ${sub.length} réponses</div>
                        <div class="replies-poche" id="poche-${i}">
                            ${sub.map(sr => `
                                <div class="main-comment" style="margin-top:10px;">
                                    <img src="${sr.photo || userImg}" class="comm-avatar" style="width:28px; height:28px;">
                                    <div class="comm-text-box">
                                        <div class="comm-user">${sr.nom}</div>
                                        <div class="comm-msg" style="font-size:12px;">${sr.text}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>`;
        }).join('');
    }

    window.handleCommentLike = async (date) => {
        const snap = await getDoc(doc(db, "films", filmId));
        const newComms = snap.data().comments.map(c => {
            if(c.date === date) {
                let l = c.commentLikes || [];
                l.includes(userId) ? l = l.filter(id => id !== userId) : l.push(userId);
                return {...c, commentLikes: l};
            }
            return c;
        });
        await updateDoc(doc(db, "films", filmId), { comments: newComms });
    };

    window.sendComment = async () => {
        const input = document.getElementById('commInput');
        if(!input.value.trim()) return;
        await updateDoc(doc(db, "films", filmId), {
            comments: arrayUnion({ nom: userName, photo: userImg, text: input.value, date: Date.now(), commentLikes: [] })
        });
        input.value = "";
    };

    window.toggleFavorite = async () => {
        const filmSnap = await getDoc(doc(db, "films", filmId));
        await updateDoc(doc(db, "users", userId), {
            favorites: arrayUnion({ id: filmId, titre: filmSnap.data().titre, image: filmSnap.data().poster || "" })
        });
        document.getElementById('f-icon').classList.add('active-gold');
        document.getElementById('f-text').innerText = "Ma Liste";
    };

    window.handleLike = async () => {
        await updateDoc(doc(db, "films", filmId), { likes: arrayUnion(userId) });
    };

    window.toggleComments = () => document.getElementById('commentPocket').classList.toggle('active');
    window.setReply = (n) => { const i = document.getElementById('commInput'); i.value = `@${n} `; i.focus(); };
    window.showReplies = (id) => { const p = document.getElementById('poche-'+id); p.style.display = p.style.display === 'block' ? 'none' : 'block'; };

    init();
</script>
</body>
</html>
