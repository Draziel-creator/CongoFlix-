<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - La Vitrine de la RDC</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --gold: #ffd700; 
            --bg: #000; 
            --tk-gray: #121212; 
            --tk-input: #262626; 
            --red: #ff3b5c; 
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(255, 215, 0, 0.2);
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- LECTEUR VIDEO --- */
        .video-box { 
            width: 100vw; 
            aspect-ratio: 16/9; 
            background: #000; 
            position: relative; 
            z-index: 10;
        }

        .video-box::after {
            content: "";
            position: absolute;
            bottom: -15px; left: 5%; right: 5%;
            height: 25px;
            background: var(--gold);
            filter: blur(40px);
            opacity: 0.6;
            z-index: -1;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        .back-btn { 
            position: absolute; top: 15px; left: 15px; z-index: 20; 
            width: 42px; height: 42px; border-radius: 50%; 
            border: 2px solid var(--gold); display: flex; 
            align-items: center; justify-content: center; 
            color: var(--gold); background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(5px); text-decoration: none;
        }

        /* --- TITRE ET ACTIONS --- */
        .title-container { 
            text-align: center; 
            padding: 20px 15px 10px;
        }

        #txtTitle { 
            font-size: 22px; 
            color: #fff; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin: 0;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .actions { 
            display: flex; justify-content: space-around; 
            padding: 15px 10px; border-bottom: 1px solid #1a1a1a; 
        }

        .act-item { text-align: center; color: #999; font-size: 11px; flex: 1; cursor: pointer; }
        .act-item i { font-size: 22px; color: var(--gold); margin-bottom: 5px; display: block; transition: 0.3s; }
        .act-item.active i { color: var(--red); }

        /* --- INFO ET DESCRIPTION --- */
        .info-pane { padding: 15px; padding-bottom: 100px; }

        .glass-box {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        #txtDesc { font-size: 14px; color: #ccc; line-height: 1.5; margin: 0; }

        /* --- SYSTÈME DE POCHE (SAISONS) --- */
        .season-wrapper { margin-bottom: 12px; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,215,0,0.05); }
        
        .season-pocket {
            background: linear-gradient(90deg, rgba(255,215,0,0.1), transparent);
            color: var(--gold);
            padding: 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-left: 3px solid var(--gold);
        }

        .season-content { display: none; padding: 10px; border-top: 1px solid rgba(255,215,0,0.05); }
        .season-wrapper.active .season-content { display: block; animation: slideDown 0.3s ease-out; }
        .season-wrapper.active .fa-chevron-down { transform: rotate(180deg); }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ep-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px; padding: 8px;
            margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
        }

        .ep-poster-box { width: 100px; height: 60px; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
        .ep-poster-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .ep-info { flex: 1; }
        .ep-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #eee; }
        .play-tag { font-size: 10px; color: var(--gold); font-weight: bold; text-transform: uppercase; }

        /* --- DRAWER COMMENTAIRES (STYLE TIKTOK PROPRE) --- */
        #tkDrawer { 
            position: fixed; bottom: 0; width: 100%; height: 70vh; 
            background: var(--tk-gray); border-radius: 15px 15px 0 0; 
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 3000; 
            display: flex; flex-direction: column; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        #tkDrawer.active { transform: translateY(0); }

        .tk-header { 
            padding: 15px; text-align: center; border-bottom: 1px solid #222; 
            font-size: 14px; font-weight: bold; letter-spacing: 1px;
        }
        .tk-close { position: absolute; right: 15px; top: 15px; font-size: 18px; color: #666; }

        .tk-list { flex: 1; overflow-y: auto; padding: 15px; }
        
        .comment { display: flex; gap: 12px; margin-bottom: 18px; align-items: flex-start; }
        .c-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .c-main { flex: 1; }
        .c-user { font-size: 12px; color: #888; margin-bottom: 2px; }
        .c-text { font-size: 14px; color: #efefef; line-height: 1.4; }

        .tk-input-box { 
            padding: 12px 15px 35px; 
            display: flex; gap: 10px; 
            background: #121212; 
            border-top: 1px solid #222;
        }
        .input-pill { 
            flex: 1; background: #262626; border-radius: 25px; 
            padding: 0 15px; display: flex; align-items: center; 
        }
        #tkField { width: 100%; background: transparent; border: none; color: #fff; padding: 10px 0; outline: none; font-size: 14px; }
        .tk-send { color: var(--gold); border: none; background: none; font-size: 22px; transition: 0.3s; opacity: 0.3; }
        .tk-send.active { opacity: 1; transform: scale(1.1); }

        /* --- LOADING SPINNER --- */
        #loader {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,215,0,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div class="video-box">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>
    </div>

    <div class="title-container">
        <h1 id="txtTitle">...</h1>
    </div>

    <div class="actions">
        <div class="act-item"><i class="fa-solid fa-eye"></i><span id="statV">0</span></div>
        <div class="act-item" id="btnLike"><i class="fa-solid fa-heart"></i><span id="statL">0</span></div>
        <div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment-dots"></i><span id="statC">0</span></div>
        <div class="act-item" id="btnFav"><i class="fa-solid fa-bookmark"></i><span>Enregistrer</span></div>
    </div>

    <div class="info-pane">
        <div class="glass-box">
            <p id="txtDesc">Chargement des détails du film...</p>
        </div>

        <div id="seasonsContainer"></div>
    </div>

    <div id="tkDrawer">
        <div class="tk-header">COMMUNAUTÉ <i class="fa-solid fa-xmark tk-close" onclick="toggleTk()"></i></div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <div class="input-pill">
                <input type="text" id="tkField" placeholder="Ajouter un commentaire public...">
            </div>
            <button id="tkSend" class="tk-send" onclick="sendComment()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Ta configuration Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const filmId = urlParams.get('id') || "MUSHOTA_VS_KARANI_01"; // ID par défaut basé sur ta capture
    let user = null;

    // 1. Surveillance des données en temps réel
    onSnapshot(doc(db, "films", filmId), (snap) => {
        if (!snap.exists()) return;
        const data = snap.data();
        
        // Mise à jour des textes
        document.getElementById('txtTitle').innerText = data.titre || data.title || "Film Congolais";
        document.getElementById('txtDesc').innerText = data.description || "Aucune description disponible pour le moment.";
        document.getElementById('statV').innerText = data.views || 0;
        document.getElementById('statL').innerText = (data.likes || []).length;
        document.getElementById('statC').innerText = (data.comments || []).length;

        // Charger l'iframe une seule fois
        if(!document.getElementById('playerRoot').innerHTML.trim() && data.url) {
            document.getElementById('playerRoot').innerHTML = `<iframe src="${data.url}" allowfullscreen></iframe>`;
            updateDoc(doc(db, "films", filmId), { views: increment(1) });
        }

        renderPockets(data.episodes || []);
        renderComments(data.comments || []);
        document.getElementById('loader').style.display = 'none';
    });

    // 2. Fonction de rendu des "Poches" (Saisons/Parties)
    function renderPockets(epArray) {
        const container = document.getElementById('seasonsContainer');
        let seasonsMap = {};

        // On groupe : epArray[0]=image, epArray[1]=titre, epArray[2]=url
        for (let i = 0; i < epArray.length; i += 3) {
            const img = epArray[i];
            const fullTitle = epArray[i+1];
            const link = epArray[i+2];

            // On extrait le nom de la saison (ex: "Saison 1" ou "Partie 1") avant les ":"
            const sName = fullTitle.includes(':') ? fullTitle.split(':')[0] : "Épisodes";
            
            if(!seasonsMap[sName]) seasonsMap[sName] = [];
            seasonsMap[sName].push({ img, title: fullTitle, link });
        }

        let html = "";
        for (let name in seasonsMap) {
            html += `
                <div class="season-wrapper">
                    <div class="season-pocket" onclick="this.parentElement.classList.toggle('active')">
                        <span><i class="fa-solid fa-clapperboard" style="margin-right:10px"></i> ${name}</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                    <div class="season-content">
                        ${seasonsMap[name].map(ep => `
                            <div class="ep-card" onclick="window.location.href='?id=${filmId}&url=${encodeURIComponent(ep.link)}'">
                                <div class="ep-poster-box"><img src="${ep.img}"></div>
                                <div class="ep-info">
                                    <div class="ep-title">${ep.title}</div>
                                    <div class="play-tag"><i class="fa-solid fa-play-circle"></i> Regarder</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    // 3. Gestion des commentaires (Sans l'image parasite)
    function renderComments(comms) {
        const list = document.getElementById('tkList');
        if (!comms || comms.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:#555; margin-top:50px;">Soyez le premier à commenter...</div>`;
            return;
        }
        
        list.innerHTML = comms.slice().reverse().map(c => `
            <div class="comment">
                <img src="${c.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="c-avatar">
                <div class="c-main">
                    <div class="c-user">${c.nom || 'Anonyme'}</div>
                    <div class="c-text">${c.text}</div>
                </div>
            </div>
        `).join('');
    }

    // 4. Actions Utilisateur
    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');

    const input = document.getElementById('tkField');
    const sendBtn = document.getElementById('tkSend');

    input.oninput = () => sendBtn.classList.toggle('active', input.value.trim().length > 0);

    window.sendComment = async () => {
        const text = input.value.trim();
        if (!text) return;

        const newComment = {
            nom: user ? (user.displayName || "Utilisateur") : "Visiteur",
            text: text,
            photo: user ? user.photoURL : "",
            date: new Date().toISOString()
        };

        try {
            await updateDoc(doc(db, "films", filmId), {
                comments: arrayUnion(newComment)
            });
            input.value = "";
            sendBtn.classList.remove('active');
        } catch (e) { alert("Erreur d'envoi"); }
    };

    onAuthStateChanged(auth, u => user = u);

</script>
</body>
</html>
