<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --tk-gray: #121212; --tk-input: #262626; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- ÉTAPE 1 : LE LECTEUR (FULL SCREEN WIDTH) --- */
        .video-box { width: 100vw; aspect-ratio: 16/9; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
        .back-btn { position: absolute; top: 12px; left: 12px; z-index: 10; width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.4); text-decoration: none; }

        /* --- ÉTAPE 2 : ACTIONS BAR --- */
        .actions { display: flex; justify-content: space-around; padding: 15px 5px; border-bottom: 1px solid #1a1a1a; }
        .act-item { text-align: center; color: #888; font-size: 11px; flex: 1; cursor: pointer; }
        .act-item i { font-size: 24px; color: var(--gold); margin-bottom: 4px; display: block; }

        /* --- ÉTAPE 3 : INFOS & CASTING --- */
        .info-pane { padding: 15px 20px; }
        .title { font-size: 24px; color: var(--gold); font-weight: bold; margin: 0 0 10px 0; }
        .desc { font-size: 14px; color: #bbb; line-height: 1.5; border-left: 3px solid var(--gold); padding-left: 15px; margin-bottom: 25px; }
        
        .cast-label { color: var(--gold); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }
        .cast-row { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cast-row::-webkit-scrollbar { display: none; }
        .actor { flex-shrink: 0; width: 70px; text-align: center; cursor: pointer; }
        .actor img { width: 65px; height: 65px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; margin-bottom: 5px; }
        .actor b { font-size: 10px; color: #fff; display: block; line-height: 1.2; }

        /* --- ÉTAPE 4 : MODULE COMMENTAIRES (STYLE TIKTOK) --- */
        #tkDrawer { position: fixed; bottom: 0; width: 100%; height: 75vh; background: var(--tk-gray); border-radius: 12px 12px 0 0; transform: translateY(100%); transition: 0.3s cubic-bezier(0.2, 0, 0, 1); z-index: 2000; display: flex; flex-direction: column; }
        #tkDrawer.active { transform: translateY(0); }
        
        .tk-header { padding: 15px; text-align: center; font-size: 13px; font-weight: bold; border-bottom: 0.5px solid #222; position: relative; }
        .tk-close { position: absolute; right: 20px; font-size: 20px; color: #666; }

        .tk-list { flex: 1; overflow-y: auto; padding: 20px; }
        .comment { display: flex; gap: 12px; margin-bottom: 22px; align-items: flex-start; }
        .c-avatar { width: 36px; height: 36px; border-radius: 50%; background: #333; }
        .c-main { flex: 1; }
        .c-user { font-size: 12px; color: #777; font-weight: bold; margin-bottom: 2px; }
        .c-text { font-size: 14px; color: #eee; line-height: 1.4; }
        .c-foot { display: flex; gap: 15px; margin-top: 8px; font-size: 11px; color: #555; font-weight: bold; }

        .c-like-zone { text-align: center; color: #444; padding-left: 5px; cursor: pointer; }
        .c-like-zone i { font-size: 18px; display: block; margin-bottom: 2px; }
        .c-like-zone i.active { color: #ff3b5c; }

        /* BARRE D'ENTRÉE TIKTOK */
        .tk-input-box { padding: 10px 15px 30px; background: var(--tk-gray); border-top: 0.5px solid #222; display: flex; align-items: center; gap: 12px; }
        .input-pill { flex: 1; background: var(--tk-input); border-radius: 22px; display: flex; align-items: center; padding: 0 15px; }
        #tkField { flex: 1; background: transparent; border: none; color: #fff; padding: 10px 0; font-size: 14px; outline: none; }
        .tk-send { color: var(--gold); font-size: 24px; background: none; border: none; opacity: 0.4; transition: 0.3s; }
        .tk-send.active { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="video-box">
        <a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>
    </div>

    <div class="actions">
        <div class="act-item"><i class="fa-solid fa-eye"></i> <span id="statV">0</span></div>
        <div class="act-item" id="btnLike"><i class="fa-solid fa-heart"></i> <span id="statL">0</span></div>
        <div class="act-item" onclick="toggleTk()"><i class="fa-solid fa-comment"></i> <span id="statC">0</span></div>
        <div class="act-item" id="btnFav"><i class="fa-solid fa-star"></i> <span>Favoris</span></div>
    </div>

    <div class="info-pane">
        <h1 id="txtTitle" class="title">...</h1>
        <div id="txtDesc" class="desc">...</div>

        <div class="cast-label">Casting du film</div>
        <div id="rowCast" class="cast-row"></div>
    </div>

    <div id="tkDrawer">
        <div class="tk-header">
            <span id="hCount">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark tk-close" onclick="toggleTk()"></i>
        </div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:32px; height:32px; border-radius:50%">
            <div class="input-pill">
                <input type="text" id="tkField" placeholder="Ajouter un commentaire...">
            </div>
            <button id="tkSend" class="tk-send" onclick="sendTk()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const config = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || "MUSHOTA_VS_KARANI_01";
    const myUid = localStorage.getItem('user_id') || "User-" + Math.floor(Math.random()*9999);

    // Gérer l'état du bouton d'envoi
    const field = document.getElementById('tkField');
    const sendBtn = document.getElementById('tkSend');
    field.addEventListener('input', () => {
        sendBtn.classList.toggle('active', field.value.trim().length > 0);
    });

    onSnapshot(doc(db, "films", id), (s) => {
        const d = s.data(); if(!d) return;

        // Rendu UI
        document.getElementById('txtTitle').innerText = d.titre || d.title || "";
        document.getElementById('txtDesc').innerText = d.description || "";
        document.getElementById('statV').innerText = d.views || 0;
        
        const likes = d.likes || [];
        document.getElementById('statL').innerText = likes.length;
        document.getElementById('btnLike').querySelector('i').style.color = likes.includes(myUid) ? "#ff3b5c" : "#ffd700";

        if(!document.getElementById('playerRoot').innerHTML) {
            document.getElementById('playerRoot').innerHTML = `<iframe src="${d.url}" allowfullscreen></iframe>`;
        }

        // Casting cliquable
        if(d.acteurs_full) {
            document.getElementById('rowCast').innerHTML = d.acteurs_full.map(a => `
                <div class="actor" onclick="alert('${a.nom}')">
                    <img src="${a.photo}">
                    <b>${a.nom}</b>
                </div>
            `).join('');
        }

        // Rendu Commentaires TikTok cliquables
        const comms = d.comments || [];
        document.getElementById('statC').innerText = comms.length;
        document.getElementById('hCount').innerText = comms.length;
        document.getElementById('tkList').innerHTML = comms.slice().reverse().map(c => `
            <div class="comment">
                <img src="${c.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="c-avatar">
                <div class="c-main">
                    <div class="c-user">${c.nom}</div>
                    <div class="c-text">${c.text}</div>
                    <div class="c-foot">
                        <span>Répondre</span>
                    </div>
                </div>
                <div class="c-like-zone" onclick="this.querySelector('i').classList.toggle('active'); this.querySelector('i').classList.toggle('fa-solid'); this.querySelector('i').classList.toggle('fa-regular')">
                    <i class="fa-regular fa-heart"></i>
                    <span>0</span>
                </div>
            </div>
        `).join('');
    });

    window.sendTk = async () => {
        if(!field.value.trim()) return;
        await updateDoc(doc(db, "films", id), {
            comments: arrayUnion({ nom: "Fan CongoFlix", text: field.value, date: Date.now() })
        });
        field.value = "";
        sendBtn.classList.remove('active');
    };

    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');

    document.getElementById('btnLike').onclick = async () => {
        const snap = await getDoc(doc(db, "films", id));
        const l = snap.data().likes || [];
        await updateDoc(doc(db, "films", id), { likes: l.includes(myUid) ? arrayRemove(myUid) : arrayUnion(myUid) });
    };
</script>
</body>
</html>
