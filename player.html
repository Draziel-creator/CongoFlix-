<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoFlix - Correction Système</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .player-header { width: 100%; aspect-ratio: 16/9; background: #111; border-bottom: 2px solid var(--gold); }
        .content { padding: 20px; }
        .movie-title { color: var(--gold); text-transform: uppercase; margin: 0; font-size: 24px; }
        .desc-box { margin-top: 15px; padding: 10px; border-left: 3px solid var(--gold); background: rgba(255,215,0,0.05); }
        .cast-row { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .actor-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
    </style>
</head>
<body>

    <div class="player-header" id="videoContainer">
        <div style="display:flex; align-items:center; justify-content:center; height:100%; color:#444;">
            Connexion au serveur CongoFlix...
        </div>
    </div>

    <div class="content">
        <h1 id="movieTitle" class="movie-title">...</h1>
        <div class="desc-box">
            <p id="movieDesc">Chargement des données...</p>
        </div>

        <h3 style="color:var(--gold); font-size:14px; margin-top:20px;">CASTING</h3>
        <div id="castImgs" class="cast-row"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Tes identifiants exacts récupérés de ton app
    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // RÉCUPÉRATION DE L'ID
    const urlParams = new URLSearchParams(window.location.search);
    // On force l'ID de ta capture si l'URL est vide pour tester
    const filmId = urlParams.get('id') || "MUSHOTA_VS_KARANI_01"; 

    function initPlayer() {
        const filmRef = doc(db, "films", filmId);

        onSnapshot(filmRef, (docSnap) => {
            if (!docSnap.exists()) {
                alert("Erreur : Le film '" + filmId + "' n'existe pas dans Firestore !");
                document.getElementById('movieTitle').innerText = "FILM INTROUVABLE";
                return;
            }

            const data = docSnap.data();
            console.log("Données reçues :", data);

            // 1. Mise à jour du Titre (Gestion du champ 'titre' ou 'title')
            document.getElementById('movieTitle').innerText = data.titre || data.title || "SANS TITRE";

            // 2. Mise à jour de la Description
            document.getElementById('movieDesc').innerText = data.description || "Aucune description.";

            // 3. Mise à jour du Lecteur (Forcer l'iframe pour tes liens)
            const videoContainer = document.getElementById('videoContainer');
            if (data.url) {
                videoContainer.innerHTML = `<iframe src="${data.url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            } else {
                videoContainer.innerHTML = "<div style='padding:20px'>Lien vidéo manquant dans Firestore.</div>";
            }

            // 4. Casting
            if (data.acteurs && data.acteurs.length > 0) {
                document.getElementById('castImgs').innerHTML = data.acteurs.map(url => 
                    `<img src="${url}" class="actor-img">`
                ).join('');
            }
        }, (error) => {
            alert("Erreur Firebase : " + error.message);
        });
    }

    initPlayer();
</script>
</body>
</html>
