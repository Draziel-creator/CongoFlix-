<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoFlix - Visionnage Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --card: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Tes styles d'origine */
        .player-header { width: 100%; position: relative; aspect-ratio: 16/9; background: #000; }
        .back-btn { position: absolute; top: 15px; left: 15px; z-index: 100; width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center; color: var(--gold); background: rgba(0,0,0,0.7); text-decoration: none; cursor:pointer; }
        .stats-bar { display: flex; justify-content: space-around; padding: 15px; background: var(--card); border-bottom: 1px solid #1a1a1a; }
        .stat-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #777; cursor: pointer; }
        .stat-item i { font-size: 22px; color: var(--gold); margin-bottom: 4px; }
        .active-gold { color: #fff !important; background: var(--gold); border-radius: 4px; padding: 2px 4px; }

        .content { padding: 20px; }
        .movie-title { font-size: 26px; color: var(--gold); margin: 0; font-weight: 900; text-transform: uppercase; }
        .desc-container { margin-top: 15px; padding: 15px; background: var(--glass); border-radius: 4px 20px 4px 20px; border-left: 4px solid var(--gold); }
        .movie-desc { font-size: 14px; color: #ccc; line-height: 1.6; margin: 0; font-style: italic; }

        .cast-imgs-row { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; }
        .actor-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; flex-shrink: 0; }

        /* Style Commentaires TikTok */
        #commentPocket { position: fixed; bottom: 0; width: 100%; height: 75vh; background: #0d0d0d; border-radius: 15px 15px 0 0; transform: translateY(100%); transition: 0.4s; z-index: 1000; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; border-top: 1px solid #333; }
        #commentPocket.active { transform: translateY(0); }
        #commentList { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .tk-input-box { display: flex; gap: 10px; padding: 10px 0; border-top: 1px solid #222; }
        #commInput { flex: 1; background: #1a1a1a; border: none; color: #fff; padding: 10px 15px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

    <div class="player-header">
        <div onclick="history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></div>
        <div id="videoContainer" style="width:100%; height:100%;"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><i class="fa-solid fa-eye"></i> <span id="v-count">0</span></div>
        <div class="stat-item" onclick="handleLike()"><i class="fa-solid fa-heart" id="like-icon"></i> <span id="l-count">0</span></div>
        <div class="stat-item" onclick="toggleComments()"><i class="fa-solid fa-comment"></i> <span id="c-count">0</span></div>
        <div class="stat-item" onclick="handleFavoris()"><i class="fa-solid fa-star" id="fav-icon"></i> <span id="fav-status">Favoris</span></div>
    </div>

    <div class="content">
        <h1 id="movieTitle" class="movie-title">...</h1>
        <div class="desc-container">
            <p id="movieDesc" class="movie-desc">...</p>
        </div>
        <div id="castImgs" class="cast-imgs-row"></div>
    </div>

    <div id="commentPocket">
        <div style="text-align: center; padding-bottom: 15px; font-weight: bold; border-bottom: 1px solid #222;">
            <span id="c-count-top">0</span> COMMENTAIRES
            <i class="fa-solid fa-xmark" onclick="toggleComments()" style="float:right; cursor:pointer; color:#888;"></i>
        </div>
        <div id="commentList"></div>
        <div class="tk-input-box">
            <input type="text" id="commInput" placeholder="Ajouter un commentaire...">
            <button onclick="sendComment()" style="background:none; border:none; color:var(--gold); font-size:22px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    let filmId = urlParams.get('id') || "MUSHOTA_VS_KARANI_01";
    let userId = localStorage.getItem('user_id') || "User_" + Math.floor(Math.random()*9000);

    async function loadFilm() {
        const filmRef = doc(db, "films", filmId);

        onSnapshot(filmRef, (s) => {
            const data = s.data();
            if(!data) return;

            // Update Infos
            document.getElementById('movieTitle').innerText = data.titre || data.title || "SANS TITRE";
            document.getElementById('movieDesc').innerText = data.description || "Pas de description.";
            
            // Video (Iframe)
            const vContainer = document.getElementById('videoContainer');
            if(!vContainer.innerHTML || vContainer.innerHTML.includes('...')) {
                vContainer.innerHTML = `<iframe src="${data.url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            }

            // Stats & Like
            const likes = data.likes || [];
            document.getElementById('v-count').innerText = data.views || 0;
            document.getElementById('l-count').innerText = likes.length;
            if(likes.includes(userId)) document.getElementById('like-icon').style.color = "red";

            // Casting
            document.getElementById('castImgs').innerHTML = (data.acteurs || []).map(url => `<img src="${url}" class="actor-circle">`).join('');

            // Affichage des commentaires
            const comments = data.comments || [];
            document.getElementById('c-count').innerText = comments.length;
            document.getElementById('c-count-top').innerText = comments.length;
            document.getElementById('commentList').innerHTML = comments.slice().reverse().map(c => `
                <div style="display:flex; gap:12px; margin-bottom:15px; animation: fadeIn 0.3s;">
                    <div style="width:35px; height:35px; background:#222; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--gold); font-weight:bold;">${(c.nom || 'F').charAt(0)}</div>
                    <div>
                        <div style="font-size:12px; color:#666; font-weight:bold;">${c.nom}</div>
                        <div style="font-size:14px; color:#eee; margin-top:2px;">${c.text}</div>
                    </div>
                </div>
            `).join('');
        });

        updateDoc(filmRef, { views: increment(1) }).catch(() => {});
    }

    // --- FONCTIONS ACTIONS ---

    window.sendComment = async () => {
        const input = document.getElementById('commInput');
        const txt = input.value.trim();
        if(!txt) return;

        const filmRef = doc(db, "films", filmId);
        await updateDoc(filmRef, {
            comments: arrayUnion({
                nom: localStorage.getItem('user_name') || "Fan CongoFlix",
                text: txt,
                date: Date.now()
            })
        });
        input.value = ""; // Vider l'input
    };

    window.handleLike = async () => {
        const filmRef = doc(db, "films", filmId);
        const snap = await getDoc(filmRef);
        const likes = snap.data().likes || [];

        if(likes.includes(userId)) {
            await updateDoc(filmRef, { likes: arrayRemove(userId) });
            document.getElementById('like-icon').style.color = "var(--gold)";
        } else {
            await updateDoc(filmRef, { likes: arrayUnion(userId) });
            document.getElementById('like-icon').style.color = "red";
        }
    };

    window.handleFavoris = () => {
        // Change l'aspect visuel immédiatement
        const btn = document.getElementById('fav-status');
        const icon = document.getElementById('fav-icon');
        
        btn.innerText = "Ma Liste";
        icon.classList.add('active-gold');
        
        // Envoi vers l'app AppCreator24
        window.location.href = "appcreator24://favoris/" + filmId;
    };

    window.toggleComments = () => document.getElementById('commentPocket').classList.toggle('active');

    loadFilm();
</script>
</body>
</html>
