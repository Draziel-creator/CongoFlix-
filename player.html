<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - La Vitrine de la RDC</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- SYSTÈME DE DESIGN CONGOFLIX --- */
        :root { 
            --gold: #ffd700; 
            --bg: #000; 
            --tk-gray: #121212; 
            --tk-input: #262626; 
            --red: #ff3b5c; 
            --glass: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(255, 215, 0, 0.2);
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 1. LECTEUR VIDÉO PREMIUM --- */
        .video-box { 
            width: 100vw; 
            aspect-ratio: 16/9; 
            background: #000; 
            position: relative; 
            margin: 0; 
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-box::after {
            content: "";
            position: absolute;
            bottom: -5px; left: 10%; right: 10%;
            height: 10px;
            background: var(--gold);
            filter: blur(25px);
            opacity: 0.6;
            z-index: -1;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }

        .back-btn { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            z-index: 20; 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            border: 2px solid var(--gold); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--gold); 
            background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(5px);
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        .back-btn:active { transform: scale(0.9); }

        /* --- 2. EN-TÊTE ET TITRAGE --- */
        .title-container { 
            text-align: center; 
            padding: 30px 15px 10px; 
        }

        #txtTitle { 
            font-size: 22px; 
            color: #fff; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.4);
            margin: 0;
            animation: fadeInTitle 1s ease-out;
        }

        @keyframes fadeInTitle {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 3. BARRE D'ACTIONS --- */
        .actions { 
            display: flex; 
            justify-content: space-around; 
            padding: 20px 10px; 
            border-bottom: 1px solid #1a1a1a; 
            background: linear-gradient(to bottom, transparent, #080808);
        }

        .act-item { 
            text-align: center; 
            color: #999; 
            font-size: 12px; 
            flex: 1; 
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .act-item i { 
            font-size: 26px; 
            color: var(--gold); 
            margin-bottom: 6px; 
            display: block; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        .act-item.is-liked i { 
            color: var(--red) !important; 
            transform: scale(1.1);
        }

        .act-item.is-fav i { 
            color: var(--gold) !important; 
            text-shadow: 0 0 20px var(--gold);
            transform: translateY(-3px);
        }

        /* --- 4. PANNEAU D'INFORMATIONS --- */
        .info-pane { padding: 20px; padding-bottom: 100px; }

        .glass-box {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-gold);
            border-radius: 15px;
            padding: 30px 20px 20px;
            position: relative;
            margin-bottom: 35px;
        }

        .glass-box::before {
            content: "\201C";
            position: absolute; top: -5px; left: 20px;
            font-size: 60px; color: var(--gold); font-family: serif; opacity: 0.5;
        }

        #txtDesc { 
            font-size: 14.5px; 
            color: #ddd; 
            line-height: 1.7; 
            margin: 0; 
            text-align: justify;
        }

        /* --- 5. CASTING VISUEL --- */
        .cast-label { 
            color: var(--gold); 
            font-size: 13px; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 20px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cast-label::after { content: ""; flex: 1; height: 1px; background: var(--border-gold); }

        .cast-row-imgs { 
            display: flex; 
            gap: 18px; 
            overflow-x: auto; 
            padding-bottom: 20px; 
            scrollbar-width: none; 
        }

        .cast-row-imgs::-webkit-scrollbar { display: none; }

        .actor-img { 
            width: 75px; 
            height: 75px; 
            border-radius: 50%; 
            border: 2px solid var(--gold); 
            object-fit: cover; 
            flex-shrink: 0; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .cast-list-vertical { 
            margin-top: 15px; 
            border-left: 2px solid var(--border-gold); 
            padding-left: 20px; 
        }

        .cast-name-item { 
            font-size: 14px; 
            color: #eee; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
        }

        /* --- 6. GESTION DES SAISONS (POCHES CLIQUABLES) --- */
        .season-wrapper { margin-bottom: 15px; border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.03); }
        
        .season-pocket {
            background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent);
            color: var(--gold);
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-left: 5px solid var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .season-content { display: none; padding: 10px; }
        .season-wrapper.active .season-content { display: block; }
        .season-wrapper.active .fa-chevron-down { transform: rotate(180deg); }

        .ep-card {
            background: rgba(25, 25, 25, 0.6);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 18px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .ep-card:active { transform: scale(0.97); }

        .ep-poster-box {
            width: 110px; height: 65px;
            border-radius: 8px; overflow: hidden;
            position: relative; flex-shrink: 0;
        }

        .ep-poster-box img { width: 100%; height: 100%; object-fit: cover; }

        .ep-hd-tag {
            position: absolute; top: 5px; right: 5px;
            background: var(--gold); color: #000;
            font-size: 9px; font-weight: 900; padding: 2px 5px; border-radius: 4px;
        }

        .ep-info { flex: 1; }
        .ep-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #fff; }
        .progress-bg { width: 100%; height: 5px; background: #333; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #fff); width: 100%; box-shadow: 0 0 12px var(--gold); }

        .dl-btn {
            color: var(--gold); font-size: 20px; text-decoration: none;
            background: rgba(255,215,0,0.12); width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
            transition: 0.3s;
            z-index: 5;
        }
        .dl-btn:hover { background: var(--gold); color: #000; }

        /* --- 7. SYSTÈME DE COMMENTAIRES TIKTOK --- */
        #tkDrawer { 
            position: fixed; bottom: 0; width: 100%; height: 78vh; 
            background: var(--tk-gray); border-radius: 15px 15px 0 0; 
            transform: translateY(100%); transition: 0.4s cubic-bezier(0.33, 1, 0.68, 1); 
            z-index: 3000; display: flex; flex-direction: column; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.9); 
        }

        #tkDrawer.active { transform: translateY(0); }

        .tk-header { 
            padding: 18px; text-align: center; font-size: 14px; font-weight: bold; 
            border-bottom: 1px solid #222; position: relative; 
        }

        .tk-close { position: absolute; right: 20px; top: 18px; font-size: 22px; color: #777; cursor: pointer; }

        .tk-list { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }

        .comment { display: flex; gap: 14px; margin-bottom: 25px; align-items: flex-start; }
        .c-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1px solid #333; }
        .c-main { flex: 1; }
        .c-user { font-size: 13px; color: #888; font-weight: bold; margin-bottom: 4px; }
        .c-text { font-size: 15px; color: #efefef; line-height: 1.5; }

        .tk-input-box { 
            padding: 12px 15px 35px; background: var(--tk-gray); 
            border-top: 1px solid #222; display: flex; align-items: center; gap: 12px; 
        }

        .input-pill { 
            flex: 1; background: var(--tk-input); border-radius: 25px; 
            padding: 0 18px; border: 1px solid #333; 
        }

        #tkField { 
            flex: 1; background: transparent; border: none; color: #fff; 
            padding: 12px 0; font-size: 15px; outline: none; width: 100%; 
        }

        .tk-send { color: var(--gold); font-size: 26px; background: none; border: none; opacity: 0.3; transition: 0.3s; }
        .tk-send.active { opacity: 1; pointer-events: auto; transform: scale(1.1); }

        /* --- 8. ALERTES ET NOTIFS --- */
        #authAlert { 
            display:none; position:fixed; bottom:30px; left:5%; width:90%; 
            background:var(--red); color:#fff; padding:18px; border-radius:15px; 
            z-index:5000; text-align:center; box-shadow:0 15px 40px rgba(0,0,0,0.6); 
            font-weight:bold; animation: slideUp 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideUp { from { transform: translateY(150px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="video-box">
        <a href="javascript:history.back()" class="back-btn" title="Retour">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div id="playerRoot" style="width:100%; height:100%;"></div>
    </div>

    <div class="title-container">
        <h1 id="txtTitle">Chargement du film...</h1>
    </div>

    <div class="actions">
        <div class="act-item">
            <i class="fa-solid fa-play-circle"></i> 
            <span id="statV">0</span> vues
        </div>
        <div class="act-item" id="mainLikeBtn">
            <i class="fa-solid fa-heart"></i> 
            <span id="statL">0</span>
        </div>
        <div class="act-item" id="openCommentBtn" onclick="toggleTk()">
            <i class="fa-solid fa-comment-dots"></i> 
            <span id="statC">0</span>
        </div>
        <div class="act-item" id="mainFavBtn">
            <i class="fa-solid fa-bookmark"></i> 
            <span id="favText">Enregistrer</span>
        </div>
    </div>

    <div class="info-pane">
        <div class="glass-box">
            <p id="txtDesc">Récupération des informations depuis la base de données CongoFlix...</p>
        </div>

        <span class="cast-label"><i class="fa-solid fa-users"></i> Casting Principal</span>
        <div id="rowCastImgs" class="cast-row-imgs"></div> 
        <div id="listCastNames" class="cast-list-vertical"></div> 

        <div id="episodesList" class="episodes-container"></div>
    </div>

    <div id="tkDrawer">
        <div class="tk-header">
            <span id="hCount">0</span> COMMENTAIRES
            <i class="fa-solid fa-times tk-close" onclick="toggleTk()"></i>
        </div>
        <div id="tkList" class="tk-list"></div>
        <div class="tk-input-box">
            <img id="myAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Moi">
            <div class="input-pill">
                <input type="text" id="tkField" placeholder="Exprimez-vous sur ce film..." autocomplete="off">
            </div>
            <button id="tkSend" class="tk-send" onclick="handlePost()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="authAlert">
        <span id="authAlertMsg">Connectez-vous pour réagir !</span>
        <br>
        <a href="index.html" style="display:inline-block; margin-top:12px; background:#fff; color:var(--red); padding:10px 25px; border-radius:25px; text-decoration:none; font-size:13px; letter-spacing:1px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">SE CONNECTER</a>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, getDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:android:36e0b43b8b10508a054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const filmId = params.get('id') || "MUSHOTA_VS_KARANI_01";
    
    let currentUser = null;
    let userId = "GUEST_" + Math.floor(Math.random()*9999);
    let userName = "Fan CongoFlix";
    let userImg = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    let currentFilmData = null;

    // Fonction pour changer la vidéo sans recharger
    window.loadVideo = (url) => {
        const player = document.getElementById('playerRoot');
        player.innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        window.scrollTo({top: 0, behavior: 'smooth'});
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            userId = user.uid;
            try {
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if(userSnap.exists()){
                    const d = userSnap.data();
                    userName = d.name || user.email.split('@')[0];
                    userImg = d.photoURL || userImg;
                    document.getElementById('myAvatar').src = userImg;
                    updateFavUI(d.favorites || []);
                }
            } catch (err) { console.error("Erreur profil:", err); }
        }
    });

    function updateFavUI(favs) {
        const btn = document.getElementById('mainFavBtn');
        const isFav = favs.some(f => f.id === filmId);
        btn.classList.toggle('is-fav', isFav);
        document.getElementById('favText').innerText = isFav ? "Ma Liste" : "Enregistrer";
    }

    onSnapshot(doc(db, "films", filmId), (snapshot) => {
        if (!snapshot.exists()) return;
        const data = snapshot.data();
        currentFilmData = data;
        document.getElementById('txtTitle').innerText = data.titre || "Sans Titre";
        document.getElementById('txtDesc').innerText = data.description || "Aucun synopsis disponible.";
        document.getElementById('statV').innerText = (data.views || 0).toLocaleString();
        
        const likes = data.likes || [];
        document.getElementById('statL').innerText = likes.length;
        
        const likeBtn = document.getElementById('mainLikeBtn');
        if(likes.includes(userId)) likeBtn.classList.add('is-liked');
        else likeBtn.classList.remove('is-liked');

        if(!document.getElementById('playerRoot').innerHTML.trim() && data.url) {
            loadVideo(data.url);
            updateDoc(doc(db, "films", filmId), { views: increment(1) });
        }

        renderCasting(data);
        renderEpisodes(data.episodes || []);
        renderComments(data.comments || []);
    });

    function renderCasting(data) {
        const rowImgs = document.getElementById('rowCastImgs');
        const listNames = document.getElementById('listCastNames');
        rowImgs.innerHTML = (data.acteurs || []).map(url => `<img src="${url}" class="actor-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">`).join('');
        listNames.innerHTML = (data.noms_acteurs || ["Casting CongoFlix"]).map(n => `<div class="cast-name-item"><i class="fa-solid fa-star" style="font-size:8px; color:var(--gold); margin-right:10px;"></i> ${n}</div>`).join('');
    }

    function renderEpisodes(epArray) {
        const container = document.getElementById('episodesList');
        let html = "";
        let seasons = {};
        for (let i = 0; i < epArray.length; i += 3) {
            const img = epArray[i], title = epArray[i+1], link = epArray[i+2];
            const lowerTitle = title.toLowerCase();
            let seasonName = "Épisodes";
            if (lowerTitle.includes('saison') || lowerTitle.includes('partie')) {
                seasonName = title.split(':')[0].trim();
            }
            if(!seasons[seasonName]) seasons[seasonName] = [];
            seasons[seasonName].push({img, title, link});
        }
        for (let sName in seasons) {
            html += `
            <div class="season-wrapper">
                <div class="season-pocket" onclick="this.parentElement.classList.toggle('active')">
                    <span><i class="fa-solid fa-layer-group"></i> ${sName}</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="season-content">
                    ${seasons[sName].map(ep => `
                        <div class="ep-card" onclick="loadVideo('${ep.link}')">
                            <div class="ep-poster-box">
                                <img src="${ep.img}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
                                <div class="ep-hd-tag">HD</div>
                            </div>
                            <div class="ep-info">
                                <div class="ep-title">${ep.title}</div>
                                <div class="progress-bg"><div class="progress-fill"></div></div>
                                <span style="font-size:10px; color:var(--gold); font-weight:bold;">LIRE L'ÉPISODE</span>
                            </div>
                            <a href="${ep.link}" download="${ep.title}.mp4" class="dl-btn" onclick="event.stopPropagation()">
                                <i class="fa-solid fa-download"></i>
                            </a>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        }
        container.innerHTML = html || "<p style='color:#666; font-size:12px;'>Aucun épisode.</p>";
    }

    // --- PARTIE COMMENTAIRE COUPEE DU CODE DE REFERENCE ---
    function renderComments(comms) {
        const list = document.getElementById('tkList');
        const validComms = comms.filter(c => typeof c === 'object');
        document.getElementById('statC').innerText = validComms.length;
        document.getElementById('hCount').innerText = validComms.length;
        list.innerHTML = validComms.slice().reverse().map(c => `
            <div class="comment">
                <img src="${c.photo || userImg}" class="c-avatar">
                <div class="c-main">
                    <div class="c-user">${c.nom}</div>
                    <div class="c-text">${c.text}</div>
                </div>
            </div>
        `).join('');
    }

    window.toggleTk = () => document.getElementById('tkDrawer').classList.toggle('active');

    window.handlePost = async () => {
        const field = document.getElementById('tkField');
        const text = field.value.trim();
        if(!currentUser) { window.showAuthAlert(); return; }
        if(!text) return;
        try {
            await updateDoc(doc(db, "films", filmId), {
                comments: arrayUnion({
                    id: "C-" + Date.now(),
                    nom: userName,
                    text: text,
                    photo: userImg,
                    date: new Date().toISOString()
                })
            });
            field.value = "";
        } catch (e) { alert("Erreur"); }
    };
    // --- FIN DE LA PARTIE COMMENTAIRE ---

    // --- GESTION DES INTERACTIONS (LIKE & FAV) ---
    document.getElementById('mainLikeBtn').onclick = async () => {
        if(!currentUser) { window.showAuthAlert(); return; }
        const filmRef = doc(db, "films", filmId);
        const isLiked = currentFilmData.likes && currentFilmData.likes.includes(userId);
        await updateDoc(filmRef, { likes: isLiked ? arrayRemove(userId) : arrayUnion(userId) });
    };

    document.getElementById('mainFavBtn').onclick = async () => {
        if(!currentUser) { window.showAuthAlert(); return; }
        const userRef = doc(db, "users", userId);
        const userSnap = await getDoc(userRef);
        const currentFavs = userSnap.data().favorites || [];
        const isFav = currentFavs.some(f => f.id === filmId);
        
        if(isFav) {
            const itemToRemove = currentFavs.find(f => f.id === filmId);
            await updateDoc(userRef, { favorites: arrayRemove(itemToRemove) });
        } else {
            await updateDoc(userRef, { favorites: arrayUnion({ id: filmId, titre: currentFilmData.titre, affiche: currentFilmData.affiche || "" }) });
        }
        const updatedSnap = await getDoc(userRef);
        updateFavUI(updatedSnap.data().favorites || []);
    };

    window.showAuthAlert = () => {
        const alert = document.getElementById('authAlert');
        alert.style.display = 'block';
        setTimeout(() => alert.style.display = 'none', 5000);
    };

    document.getElementById('tkField').oninput = function() {
        document.getElementById('tkSend').classList.toggle('active', this.value.length > 0);
    };
</script>
</body>
</html>
