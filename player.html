<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoFlix - Visionnage Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --card: #111; --gray: #222; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* HEADER CINÉMATIQUE */
        .player-header { width: 100%; position: relative; aspect-ratio: 16/9; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .back-btn { 
            position: absolute; top: 15px; left: 15px; z-index: 100;
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; background: rgba(0,0,0,0.6); text-decoration: none; font-size: 18px; border: 1px solid rgba(255,255,255,0.2);
        }

        /* BARRE DE STATS ÉPURÉE */
        .stats-bar { display: flex; justify-content: space-around; padding: 15px 10px; background: linear-gradient(to bottom, #111, #000); border-bottom: 1px solid #1a1a1a; }
        .stat-item { display: flex; flex-direction: column; align-items: center; font-size: 12px; color: #aaa; cursor: pointer; transition: 0.3s; }
        .stat-item i { font-size: 20px; color: var(--gold); margin-bottom: 4px; }
        .stat-item:active { transform: scale(0.9); }

        /* CONTENT PROFESSIONNEL */
        .content { padding: 25px 20px; }
        .movie-title { font-size: 28px; color: #fff; margin: 0; font-weight: 800; letter-spacing: -0.5px; }
        .movie-desc { font-size: 14px; color: #999; margin-top: 15px; line-height: 1.6; text-align: justify; border-left: 3px solid var(--gold); padding-left: 15px; }

        /* CASTING LISTE VERTICALE */
        .cast-section { margin-top: 30px; }
        .cast-title { font-size: 13px; color: var(--gold); font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .cast-container { display: flex; flex-direction: column; gap: 15px; }
        .actor-row { display: flex; align-items: center; gap: 15px; background: #0a0a0a; padding: 10px; border-radius: 50px 15px 15px 50px; border: 1px solid #151515; }
        .actor-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .actor-name { font-size: 15px; font-weight: 600; color: #eee; }

        /* COMMENTAIRES STYLE TIKTOK */
        #commentPocket { position: fixed; bottom: 0; width: 100%; height: 75vh; background: #0f0f0f; border-radius: 20px 20px 0 0; transform: translateY(100%); transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.1); z-index: 1000; padding: 20px; box-sizing: border-box; }
        #commentPocket.active { transform: translateY(0); }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        .tiktok-comment { display: flex; gap: 12px; margin-bottom: 20px; }
        .tk-avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--gray); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--gold); flex-shrink: 0; border: 1px solid #333; }
        .tk-body { flex: 1; }
        .tk-user { font-size: 13px; color: #888; font-weight: bold; margin-bottom: 2px; }
        .tk-text { font-size: 14px; color: #efefef; line-height: 1.4; }
        .tk-footer { font-size: 11px; color: #555; margin-top: 5px; display: flex; gap: 15px; }
        .tk-reply { font-weight: bold; color: #777; cursor: pointer; }

        .input-area { display: flex; gap: 10px; margin-top: 10px; background: #1a1a1a; padding: 10px; border-radius: 30px; border: 1px solid #333; }
        #commInput { flex: 1; background: none; border: none; color: #fff; outline: none; padding-left: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="player-header">
        <a onclick="history.back()" class="back-btn"><i class="fa-solid fa-chevron-left"></i></a>
        <div id="videoContainer" style="width:100%; height:100%;">
            </div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><i class="fa-solid fa-play-circle"></i> <span id="v-count">0</span></div>
        <div class="stat-item" onclick="handleLike()"><i class="fa-solid fa-heart"></i> <span id="l-count">0</span></div>
        <div class="stat-item" onclick="toggleComments()"><i class="fa-solid fa-comment-dots"></i> <span id="c-count">0</span></div>
        <div class="stat-item" onclick="handleFavoris()"><i class="fa-solid fa-star"></i> <span>Favoris</span></div>
    </div>

    <div class="content">
        <h1 id="movieTitle" class="movie-title">...</h1>
        <p id="movieDesc" class="movie-desc">Chargement des données...</p>

        <div class="cast-section">
            <div class="cast-title">Acteurs & Rôles</div>
            <div id="castList" class="cast-container">
                </div>
        </div>
    </div>

    <div id="commentPocket">
        <div class="comment-header">
            <span style="font-weight: bold;"><span id="c-count-top">0</span> commentaires</span>
            <i class="fa-solid fa-xmark" onclick="toggleComments()" style="font-size: 20px; color: #555;"></i>
        </div>
        
        <div id="commentList" style="height:calc(100% - 100px); overflow-y:auto; padding-right: 5px;"></div>
        
        <div class="input-area">
            <input type="text" id="commInput" placeholder="Ajouter un commentaire...">
            <button onclick="sendComment()" style="background:none; border:none; color:var(--gold); font-size:18px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCSdIitm-2_0hC1a01_ssztFUPkEsSA_lY",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        storageBucket: "congo-streaming-51333.appspot.com",
        messagingSenderId: "304286627819",
        appId: "1:304286627819:web:ee606adc4f6b4002054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    let filmId = urlParams.get('id') || localStorage.getItem('film_choisi');

    // Récupération des infos utilisateur (depuis ton espace compte)
    const userName = localStorage.getItem('user_name') || "Fan CongoFlix";
    const userPhoto = localStorage.getItem('user_photo') || "";

    async function loadFilm() {
        if(!filmId) return;
        const filmRef = doc(db, "films", filmId);

        onSnapshot(filmRef, (s) => {
            const data = s.data();
            if(!data) return;

            // Gestion du lecteur (Iframe ou Direct)
            const videoContainer = document.getElementById('videoContainer');
            if(data.url.includes('embed') || data.url.includes('vip')) {
                videoContainer.innerHTML = `<iframe src="${data.url}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
            } else {
                videoContainer.innerHTML = `<video src="${data.url}" controls poster="${data.poster}" style="width:100%; height:100%;"></video>`;
            }

            document.getElementById('movieTitle').innerText = data.title || "Sans titre";
            document.getElementById('movieDesc').innerText = data.description || "Aucune description disponible.";
            document.getElementById('v-count').innerText = data.views || 0;
            document.getElementById('l-count').innerText = data.likes?.length || 0;
            document.getElementById('c-count').innerText = (data.comments || []).length;
            document.getElementById('c-count-top').innerText = (data.comments || []).length;

            // Remplissage Casting Vertical avec Noms
            const castDiv = document.getElementById('castList');
            const noms = data.acteurs_noms || []; // Champ à ajouter dans Firebase si tu veux les vrais noms
            castDiv.innerHTML = (data.acteurs || []).map((url, i) => `
                <div class="actor-row">
                    <img src="${url}" class="actor-img">
                    <span class="actor-name">${noms[i] || "Acteur " + (i+1)}</span>
                </div>
            `).join('');

            // Remplissage Commentaires TikTok
            const cList = document.getElementById('commentList');
            cList.innerHTML = (data.comments || []).reverse().map(c => `
                <div class="tiktok-comment">
                    <div class="tk-avatar">${c.nom ? c.nom.charAt(0).toUpperCase() : 'F'}</div>
                    <div class="tk-body">
                        <div class="tk-user">@${c.nom.toLowerCase().replace(/\s/g, '')}</div>
                        <div class="tk-text">${c.text}</div>
                        <div class="tk-footer">
                            <span>${new Date(c.date).toLocaleDateString()}</span>
                            <span class="tk-reply">Répondre</span>
                        </div>
                    </div>
                </div>
            `).join('');
        });

        await updateDoc(filmRef, { views: increment(1) }).catch(e => console.log(e));
    }

    // FONCTION FAVORIS (Envoyer vers "ma liste")
    window.handleFavoris = () => {
        let favoris = JSON.parse(localStorage.getItem('ma_liste')) || [];
        if(!favoris.includes(filmId)) {
            favoris.push(filmId);
            localStorage.setItem('ma_liste', JSON.stringify(favoris));
            alert("Ajouté à votre liste !");
        } else {
            alert("Déjà dans vos favoris.");
        }
    };

    window.handleLike = () => updateDoc(doc(db, "films", filmId), { likes: arrayUnion(userName) });
    window.toggleComments = () => document.getElementById('commentPocket').classList.toggle('active');
    
    window.sendComment = async () => {
        const txt = document.getElementById('commInput').value;
        if(!txt) return;
        await updateDoc(doc(db, "films", filmId), {
            comments: arrayUnion({ 
                nom: userName, 
                text: txt, 
                date: Date.now() 
            })
        });
        document.getElementById('commInput').value = "";
    };

    loadFilm();
</script>
</body>
</html>
