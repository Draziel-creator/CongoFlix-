        function lancerCompteARebours(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            const timerEl = document.getElementById('timer');
            timerEl.style.display = "block";

            const interval = setInterval(() => {
                totalSeconds--;
                if (totalSeconds <= 0) { 
                    clearInterval(interval); 
                    location.reload(); 
                    return;
                }
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;
                
                timerEl.innerHTML = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

        function enregistrerGains() {
            try { spinSound.pause(); spinSound.currentTime = 0; } catch(e){}
            
            const statusText = document.getElementById('status-text');
            const bouton = document.getElementById('exitBtn');
            const maintenant = new Date().getTime();
