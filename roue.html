<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoFlix - Roulette Royal</title>
    <style>
        body {
            background-color: #070709;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Boîtier style table de casino haut de gamme */
        .casino-container {
            background: radial-gradient(circle at center, #152019 0%, #0a0f0b 100%); /* Fond vert tapis de casino très sombre */
            padding: 30px 20px;
            border-radius: 24px;
            border: 4px solid #d4af37; /* Bordure dorée */
            width: 320px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.25), inset 0 0 20px rgba(0, 0, 0, 0.8);
            text-align: center;
            box-sizing: border-box;
        }

        .wheel-outer-ring {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 25px auto;
            border-radius: 50%;
            padding: 8px;
            background: radial-gradient(circle, #2c1d11 0%, #110b06 100%); /* Texture bois acajou */
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,255,0.2);
            border: 2px solid #85581A;
        }

        /* La Roue Réaliste */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #d4af37;
            position: relative;
            overflow: hidden;
            /* Alternance Rouge Casino (#8b0000) et Noir (#1a1a1a) avec séparateurs dorés */
            background: conic-gradient(
                #8b0000 0deg 20deg, #d4af37 20deg 20.5deg,
                #1a1a1a 20.5deg 40deg, #d4af37 40deg 40.5deg,
                #8b0000 40.5deg 60deg, #d4af37 60deg 60.5deg,
                #1a1a1a 60.5deg 80deg, #d4af37 80deg 80.5deg,
                #8b0000 80.5deg 100deg, #d4af37 100deg 100.5deg,
                #1a1a1a 100.5deg 120deg, #d4af37 120deg 120.5deg,
                #8b0000 120.5deg 140deg, #d4af37 140deg 140.5deg,
                #1a1a1a 140.5deg 160deg, #d4af37 160deg 160.5deg,
                #8b0000 160.5deg 180deg, #d4af37 180deg 180.5deg,
                #1a1a1a 180.5deg 200deg, #d4af37 200deg 200.5deg,
                #8b0000 200.5deg 220deg, #d4af37 220deg 220.5deg,
                #1a1a1a 220.5deg 240deg, #d4af37 240deg 240.5deg,
                #8b0000 240.5deg 260deg, #d4af37 260deg 260.5deg,
                #1a1a1a 260.5deg 280deg, #d4af37 280deg 280.5deg,
                #8b0000 280.5deg 300deg, #d4af37 300deg 300.5deg,
                #1a1a1a 300.5deg 320deg, #d4af37 320deg 320.5deg,
                #8b0000 320.5deg 340deg, #d4af37 340deg 340.5deg,
                #1a1a1a 340.5deg 360deg
            );
            transition: transform 6s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        /* Textes des numéros sur la roue */
        .wheel-number {
            position: absolute;
            width: 100%;
            height: 100%;
            text-align: center;
            transform-origin: 50% 50%;
            font-weight: 800;
            font-size: 11px;
            color: #e5c158;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            padding-top: 12px;
            box-sizing: border-box;
        }

        /* Centre de la roulette en relief 3D doré */
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #f9d976 0%, #e9b646 50%, #9a6b1f 100%);
            border-radius: 50%;
            border: 3px solid #110b06;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.6);
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .wheel-center-pin {
            width: 25px;
            height: 25px;
            background: #110b06;
            border-radius: 50%;
            border: 2px solid #f9d976;
        }

        /* Flèche en haut */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 28px solid #ffcc00;
            z-index: 10;
            filter: drop-shadow(0px 3px 4px rgba(0,0,0,0.5));
        }

        .status {
            font-size: 15px;
            color: #d4af37;
            font-weight: bold;
            margin-top: 10px;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
        }

        .btn-exit {
            display: none;
            background-color: #d4af37;
            color: #000;
            border: none;
            padding: 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(212,175,55,0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="casino-container">
        <h3 style="margin: 0; color: #fff; letter-spacing: 1.5px; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">ROULETTE PREMIUM</h3>
        
        <div id="status-text" class="status">Connexion en cours... 🎰</div>

        <div class="wheel-outer-ring">
            <div class="pointer"></div>
            <div id="wheel" class="wheel">
                <!-- Génération dynamique des numéros pour éviter d'alourdir le HTML -->
            </div>
            <div class="wheel-center">
                <div class="wheel-center-pin"></div>
            </div>
        </div>

        <button id="exitBtn" class="btn-exit" onclick="declencherPubEtQuitter()"></button>
    </div>

    <!-- SDK Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // --- 1. CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBAL9enbjp1vnv7h6yariu_sWvUp5QeRVQ",
            authDomain: "publicite-6445c.firebaseapp.com",
            projectId: "publicite-6445c",
            storageBucket: "publicite-6445c.firebasestorage.app",
            messagingSenderId: "663385244466",
            appId: "1:663385244466:web:b72a95c96a8e2b8e6bcd2b",
            measurementId: "G-T37TGB3SR0"
        };
        
        // Initialisation sécurisée
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch (e) {
            console.error("Erreur d'initialisation Firebase : ", e);
        }

        const userId = localStorage.getItem("user_id_congoflix") || "utilisateur_demo";

        // Définition exacte des 18 tranches (10 gains alternés de "VIDE")
        const cases = [
            { type: "gain", points: 10, angle: 350, texte: "🎉 Gagné ! +10 Points !" },
            { type: "perdu", points: 0, angle: 330, texte: "❌ Case Vide... Retente ta chance !" },
            { type: "gain", points: 20, angle: 310, texte: "🎉 Gagné ! +20 Points !" },
            { type: "perdu", points: 0, angle: 290, texte: "❌ Case Vide... Retente ta chance !" },
            { type: "gain", points: 30, angle: 270, texte: "🎉 Gagné ! +30 Points !" },
            { type: "perdu", points: 0, angle: 250, texte: "❌ Case Vide... Retente ta chance !" },
            { type: "gain", points: 40, angle: 230, texte: "🎉 Gagné ! +40 Points !" },
            { type: "perdu", points: 0, angle: 210, texte: "❌ Case Vide... Retente ta chance !" },
            { type: "gain", points: 50, angle: 190, texte: "🎉 Gagné ! +50 Points !" },
            { type: "perdu", points: 0, angle: 170, texte: "❌ Case Vide... Retente ta chance !" },
            { type: "gain", points: 60, angle: 150, texte: "🎉 Gagné ! +60 Points !" },
            { type: "perdu", points: 0, angle: 130, texte: "❌ Case Vide... Retente ta chance !" },
            { type: "gain", points: 70, angle: 110, texte: "🎉 Gagné ! +70 Points !" },
            { type: "perdu", points: 0, angle: 90, texte: "❌ Case Vide... Retente ta chance !" },
            { type: "gain", points: 80, angle: 70, texte: "🎉 Gagné ! +80 Points !" },
            { type: "perdu", points: 0, angle: 50, texte: "❌ Case Vide... Retente ta chance !" },
            { type: "gain", points: 90, angle: 30, texte: "🎉 Gagné ! +90 Points !" },
            { type: "perdu", points: 0, angle: 10, texte: "🎰 SUPER JACKPOT ! +100 Points !" } // Représente le 100 de fin
        ];

        // Rendu visuel des textes directement sur la roue
        const wheelEl = document.getElementById('wheel');
        cases.forEach((item, index) => {
            const numDiv = document.createElement('div');
            numDiv.className = 'wheel-number';
            // Rotation individuelle de chaque chiffre pour la caler au milieu de sa part de 20°
            const rotationSpecifique = index * 20 + 10; 
            numDiv.style.transform = `rotate(${rotationSpecifique}deg)`;
            numDiv.innerHTML = item.type === "gain" ? item.points : "VIDE";
            wheelEl.appendChild(numDiv);
        });

        let indexPubActuel = 0;
        let tirage = null;

        // Liste ordonnée de tes codes publicitaires
        const listePublicites = [
            { type: "popunder", id: "clickadilla", scriptSrc: "https://js.wpadmngr.com/static/adManager.js", admpid: "447731" },
            { type: "popunder", id: "click", scriptSrc: "//data527.click/fe77c0017a3a26cb73ec/a36db4224e/?placementName=default" },
            { type: "popunder", id: "adsterra", scriptSrc: "https://pl30313217.effectivecpmnetwork.com/de/ac/ef/deacefeb17116ee3bc546f4b5ba4c252.js" },
            { type: "directlink", id: "advertica", url: "https://data527.click/8db930650dc1e3bc4df6/8bdc6ee564/?placementName=link" },
            { type: "directlink", id: "adsterra_link", url: "https://www.effectivecpmnetwork.com/uc21ey6tf?key=2f113ae182b0d7d4aeeff282e07b95be" }
        ];

        // Verrouillage du retour physique Android
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };

        // --- 2. INITIALISATION ET SÉCURITÉ ANTI-FROZE ---
        window.onload = function() {
            // Un minuteur de sécurité de 3,5 secondes. Si Firebase ne répond pas, on lance quand même la partie locale !
            const safetyTimeout = setTimeout(() => {
                console.warn("Démarrage en mode secours (Firebase trop lent)");
                demarrerProcessus(0);
            }, 3500);

            if (!db) {
                clearTimeout(safetyTimeout);
                demarrerProcessus(0);
                return;
            }

            db.collection("users").doc(userId).get().then((doc) => {
                clearTimeout(safetyTimeout); // Firebase a répondu à temps, on annule la sécurité.

                if (doc.exists) {
                    const data = doc.data();
                    const dernierBonus = data.dernierBonusTime || 0;
                    indexPubActuel = data.indexPublicite || 0;
                    const maintenant = new Date().getTime();

                    // Limite de 1 heure (3600000ms)
                    if (maintenant - dernierBonus < 3600000) {
                        const tempsRestant = Math.ceil((3600000 - (maintenant - dernierBonus)) / 60000);
                        document.getElementById('status-text').innerHTML = `Revenez dans ${tempsRestant} min !⏳`;
                        setTimeout(() => {
                            window.location.href = "activite.html";
                        }, 2500);
                    } else {
                        demarrerProcessus(indexPubActuel);
                    }
                } else {
                    // Nouvel utilisateur
                    db.collection("users").doc(userId).set({
                        points: 0,
                        dernierBonusTime: 0,
                        indexPublicite: 0
                    }).then(() => {
                        demarrerProcessus(0);
                    }).catch(() => demarrerProcessus(0));
                }
            }).catch((err) => {
                clearTimeout(safetyTimeout);
                console.error(err);
                demarrerProcessus(0); // Lancement secours si erreur réseau
            });
        };

        function demarrerProcessus(indexPub) {
            indexPubActuel = indexPub;
            preparerPublicite(indexPubActuel);
            
            const statusText = document.getElementById('status-text');
            statusText.innerHTML = "Prêt à tourner ! 🎰";
            
            // Lancement automatique de la roulette au bout d'une seconde
            setTimeout(lancerRoulette, 1000);
        }

        function preparerPublicite(index) {
            const pub = listePublicites[index];
            if (pub && pub.type === "popunder") {
                const script = document.createElement("script");
                script.async = true;
                script.src = pub.scriptSrc;
                if (pub.admpid) {
                    script.setAttribute("data-admpid", pub.admpid);
                }
                document.head.appendChild(script);
            }
        }

        function lancerRoulette() {
            const statusText = document.getElementById('status-text');
            statusText.innerHTML = "La roue tourne... ⚡";

            // Sélection aléatoire du résultat
            const indexAleatoire = Math.floor(Math.random() * cases.length);
            tirage = cases[indexAleatoire];

            // 7 tours complets minimum + angle de visée
            const rotationTotale = (360 * 7) + tirage.angle;
            wheelEl.style.transform = `rotate(${rotationTotale}deg)`;

            // Attente de la fin de l'animation de 6 secondes
            setTimeout(enregistrerGains, 6100);
        }

        function enregistrerGains() {
            const statusText = document.getElementById('status-text');
            const bouton = document.getElementById('exitBtn');
            const maintenant = new Date().getTime();
            const prochainIndexPub = (indexPubActuel + 1) % 5;

            statusText.innerHTML = "Enregistrement en cours...";

            // Si Firebase est déconnecté, on affiche quand même le résultat
            if (!db) {
                afficherResultatFinal(statusText, bouton);
                return;
            }

            let updates = {
                dernierBonusTime: maintenant,
                indexPublicite: prochainIndexPub
            };

            if (tirage.points > 0) {
                db.collection("users").doc(userId).update({
                    points: firebase.firestore.FieldValue.increment(tirage.points),
                    ...updates
                }).then(() => {
                    afficherResultatFinal(statusText, bouton);
                }).catch(() => {
                    // Fallback en cas d'échec réseau d'écriture
                    afficherResultatFinal(statusText, bouton);
                });
            } else {
                db.collection("users").doc(userId).update(updates).then(() => {
                    afficherResultatFinal(statusText, bouton);
                }).catch(() => {
                    afficherResultatFinal(statusText, bouton);
                });
            }
        }

        function afficherResultatFinal(statusText, bouton) {
            statusText.innerHTML = tirage.texte;
            
            if (tirage.points > 0) {
                statusText.style.color = "#4cd964";
                bouton.innerHTML = "RÉCUPÉRER ET SORTIR ➔";
                bouton.style.backgroundColor = "#4cd964";
                bouton.style.color = "#000";
            } else {
                statusText.style.color = "#ff3b30";
                bouton.innerHTML = "RETOURNER À L'APPLICATION ➔";
                bouton.style.backgroundColor = "#ff3b30";
                bouton.style.color = "#fff";
            }
            bouton.style.display = "block";
        }

        function declencherPubEtQuitter() {
            const pub = listePublicites[indexPubActuel];
            
            if (pub && pub.type === "directlink") {
                window.open(pub.url, "_blank");
            }
            
            window.location.href = "activite.html";
        }
    </script>
</body>
</html>
