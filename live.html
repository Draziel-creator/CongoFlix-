<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoLive Pro - Streaming</title>
    
    <!-- SDKs nécessaires -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --gold: #ffd700; --red: #ff3b5c; }
        body { margin: 0; background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        
        /* Navbar style CongoFlix */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-info img { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--gold); object-fit: cover; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 15px; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .card:hover { border-color: var(--red); }
        
        #live-overlay { position: fixed; inset: 0; background: black; display: none; z-index: 1000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-live { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--red); border: none; color: white; font-size: 24px; box-shadow: 0 4px 15px rgba(255, 59, 92, 0.4); cursor: pointer; z-index: 10; }
        
        .live-controls { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .btn-exit { background: rgba(255,0,0,0.7); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Barre supérieure connectée au compte -->
    <div class="top-bar">
        <div class="user-info">
            <img id="nav-photo" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <span id="nav-name">Chargement...</span>
        </div>
        <a href="index.html" style="color: var(--gold); text-decoration: none;"><i class="fa-solid fa-user"></i> Compte</a>
    </div>

    <h2 style="font-size: 18px; margin-top: 20px;">Lives en cours</h2>
    
    <div id="live-list" class="grid">
        <div class="card" onclick="promptID()">
            <i class="fa-solid fa-tower-broadcast" style="font-size: 30px; color: var(--red);"></i>
            <h3>Rejoindre</h3>
            <p style="font-size: 12px; color: #888;">Entrer l'ID d'un ami</p>
        </div>
    </div>

    <button class="btn-live" onclick="startStream()"><i class="fa-solid fa-video"></i></button>

    <!-- Ecran du Live plein écran -->
    <div id="live-overlay">
        <video id="videoDisplay" autoplay playsinline></video>
        
        <div class="live-controls">
            <button class="btn-exit" onclick="window.location.reload()">QUITTER</button>
        </div>

        <div style="position:absolute; bottom:40px; left:20px; background:rgba(0,0,0,0.6); padding:15px; border-radius:15px; text-align: left; border-left: 4px solid var(--gold);">
            <div id="timer" style="font-weight: bold; color: var(--gold);">00:00</div>
            <div style="font-size: 14px;">Points gagnés: <b id="points" style="color: #00ff00;">0</b></div>
        </div>
    </div>

<script type="module">
    // IMPORT FIREBASE (Même version que ton index.html)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4", 
        authDomain: "congo-streaming-51333.firebaseapp.com", 
        projectId: "congo-streaming-51333", 
        appId: "1:304286627819:android:36e0b43b8b10508a054bae" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserData = null;

    // 1. SECURITÉ & RÉCUPÉRATION DU PROFIL
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()){
                currentUserData = snap.data();
                document.getElementById('nav-name').innerText = currentUserData.name || "Utilisateur";
                if(currentUserData.photoURL) document.getElementById('nav-photo').src = currentUserData.photoURL;
            }
        } else {
            // Si pas connecté, retour au fichier index.html (ton fichier compte)
            window.location.href = "index.html";
        }
    });

    // 2. LOGIQUE PEERJS POUR LE LIVE
    const peer = new Peer('congolive-' + Math.floor(Math.random() * 10000)); 

    peer.on('open', (id) => {
        console.log("Mon ID Live est : " + id);
    });

    // Écouter les appels entrants
    peer.on('call', (call) => {
        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then((stream) => {
            call.answer(stream);
            showLiveUI(stream);
        });
    });

    // Lancer son propre live
    window.startStream = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            showLiveUI(stream);
            alert("Live lancé ! Ton ID de connexion est : " + peer.id);
        } catch (err) {
            alert("Erreur caméra : " + err);
        }
    };

    // Rejoindre un live existant
    window.promptID = () => {
        const id = prompt("Entre l'ID du streamer (ex: congolive-1234) :");
        if(id) {
            const call = peer.call(id, null);
            call.on('stream', (remoteStream) => {
                showLiveUI(remoteStream);
            });
        }
    };

    function showLiveUI(stream) {
        document.getElementById('live-overlay').style.display = 'block';
        document.getElementById('videoDisplay').srcObject = stream;
        startPoints();
    }

    function startPoints() {
        let pts = 0;
        setInterval(() => {
            pts += 10;
            document.getElementById('points').innerText = pts;
        }, 10000); // Gagne 10 points toutes les 10 secondes
    }
</script>
</body>
</html>
