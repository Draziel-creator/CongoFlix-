<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoLive Pro - Final Fix</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #ff3b5c; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        #debug-console { position: fixed; top: 10px; left: 10px; right: 10px; font-size: 10px; background: rgba(0,0,0,0.85); z-index: 3000; color: #00ff00; padding: 10px; border-radius: 8px; border: 1px solid #444; pointer-events: none; }
        .live-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 70px 4px 80px 4px; }
        .live-card { height: 260px; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 100; }
        .btn-start-live { width: 60px; height: 60px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; transform: translateY(-15px); box-shadow: 0 4px 15px rgba(255,59,92,0.4); }
        #live-overlay { position: fixed; inset: 0; background: black; display: none; z-index: 2000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; pointer-events: auto; }
        .close-btn { position: absolute; top: 25px; right: 20px; width: 45px; height: 45px; background: rgba(0,0,0,0.5); border-radius: 50%; color: white; border: 2px solid white; font-size: 24px; z-index: 2100; }
    </style>
</head>
<body>

    <div id="debug-console">Initialisation du système...</div>
    <div id="live-list" class="live-grid"></div>

    <div class="bottom-nav">
        <div class="btn-start-live" onclick="window.startStream()"><i class="fa-solid fa-camera"></i></div>
    </div>

    <div id="live-overlay">
        <button class="close-btn" onclick="window.stopLive()">×</button>
        <video id="videoDisplay" autoplay playsinline webkit-playsinline></video>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4", 
        authDomain: "congo-streaming-51333.firebaseapp.com", 
        projectId: "congo-streaming-51333", 
        appId: "1:304286627819:android:36e0b43b8b10508a054bae" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const debug = document.getElementById('debug-console');
    const videoElem = document.getElementById('videoDisplay');

    function log(msg) { debug.innerText = "STATUS: " + msg; }

    let localStream = null;
    
    const peer = new Peer('congolive-' + Math.floor(Math.random() * 1000000), {
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' },
                { url: 'stun:stun2.l.google.com:19302' }
            ]
        }
    });

    peer.on('open', (id) => log("CongoLive est prêt"));

    // Réception de l'appel côté Streamer
    peer.on('call', (call) => {
        log("Liaison établie avec un spectateur...");
        call.answer(localStream); 
    });

    onAuthStateChanged(auth, (user) => {
        if (user) listenToLives();
    });

    function listenToLives() {
        onSnapshot(collection(db, "active_lives"), (snapshot) => {
            const list = document.getElementById('live-list');
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const live = doc.data();
                if (auth.currentUser && doc.id === auth.currentUser.uid) return;
                const card = document.createElement('div');
                card.className = 'live-card';
                card.onclick = () => window.joinLive(live.peerId);
                card.innerHTML = `<img src="https://via.placeholder.com/300x400/222/ffd700?text=VOIR+LE+DIRECT">`;
                list.appendChild(card);
            });
        });
    }

    window.startStream = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { 
                    facingMode: "user",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: true
            });
            videoElem.srcObject = localStream;
            videoElem.muted = true;
            document.getElementById('live-overlay').style.display = 'block';
            await setDoc(doc(db, "active_lives", auth.currentUser.uid), {
                peerId: peer.id,
                time: Date.now()
            });
            log("VOUS ÊTES EN DIRECT");
        } catch (e) { log("Erreur d'accès média"); }
    };

    window.joinLive = async (peerId) => {
        log("Connexion au flux vidéo...");
        document.getElementById('live-overlay').style.display = 'block';
        
        // On envoie un flux vide technique pour déclencher la vidéo
        const call = peer.call(peerId, new MediaStream());
        
        call.on('stream', (remoteStream) => {
            log("Flux reçu ! Initialisation image...");
            
            if ("srcObject" in videoElem) {
                videoElem.srcObject = remoteStream;
            } else {
                videoElem.src = window.URL.createObjectURL(remoteStream);
            }

            videoElem.onloadedmetadata = () => {
                log("IMAGE ACTIVÉE");
                videoElem.play().catch(err => {
                    log("Appuyez pour activer la vidéo");
                    document.body.addEventListener('click', () => videoElem.play(), {once: true});
                });
            };
        });

        // Sécurité : Si après 6s toujours pas d'image
        setTimeout(() => {
            if (videoElem.readyState < 2) { 
                log("Optimisation de l'image...");
                window.joinLive(peerId);
            }
        }, 6000);
    };

    window.stopLive = async () => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (auth.currentUser) await deleteDoc(doc(db, "active_lives", auth.currentUser.uid));
        window.location.reload();
    };
</script>
</body>
</html>
