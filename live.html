<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoLive Pro</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --red: #ff3b5c; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* HEADER */
        .top-tabs {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: center; 
            gap: 30px; padding: 15px 0; background: rgba(0,0,0,0.9); z-index: 100;
        }
        .tab { font-size: 16px; color: #888; font-weight: bold; cursor: pointer; }
        .tab.active { color: white; border-bottom: 2px solid var(--red); padding-bottom: 5px; }

        /* GRILLE POPPO */
        .live-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 2px;
            padding: 60px 2px 80px 2px;
        }
        .live-card { position: relative; height: 260px; background: #111; overflow: hidden; cursor: pointer; }
        .live-card img.cover { width: 100%; height: 100%; object-fit: cover; }
        
        /* Animation CongoFlix en bas à droite */
        .live-anim {
            position: absolute; bottom: 10px; right: 10px;
            background: var(--red); color: white; padding: 4px 8px;
            border-radius: 5px; font-size: 9px; font-weight: bold;
            animation: pulse-red 1.5s infinite; z-index: 5;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 92, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 59, 92, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 92, 0); }
        }

        .live-info {
            position: absolute; bottom: 0; width: 100%; padding: 30px 10px 10px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            font-size: 13px; text-align: left; box-sizing: border-box;
        }

        /* NAVIGATION BASSE */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #080808; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid #222; z-index: 100;
        }
        .nav-item { color: #555; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .nav-item i { font-size: 22px; }
        .nav-item span { font-size: 10px; margin-top: 4px; }
        .nav-item.active { color: white; }

        .btn-start-live {
            width: 55px; height: 55px; background: var(--red); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; color: white; font-size: 22px;
            box-shadow: 0 0 15px rgba(255, 59, 92, 0.4); transform: translateY(-10px);
        }

        #live-overlay { position: fixed; inset: 0; background: black; display: none; z-index: 2000; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div class="top-tabs">
        <div class="tab active" id="tab-explore">Explorer</div>
        <div class="tab" id="tab-follow">Suivis</div>
    </div>

    <div id="live-list" class="live-grid">
        <!-- Chargement des lives via Firebase -->
        <p style="grid-column: 1/3; padding: 20px; color: #444;">Recherche de lives...</p>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active"><i class="fa-solid fa-house-ripple"></i><span>Home</span></a>
        <a href="#" class="nav-item"><i class="fa-solid fa-comment-dots"></i><span>Messages</span></a>
        
        <!-- Bouton de lancement style vidéo (Play) -->
        <div class="btn-start-live" onclick="startStream()">
            <i class="fa-solid fa-play"></i>
        </div>

        <a href="#" class="nav-item"><i class="fa-solid fa-bolt"></i><span>Moments</span></a>
        <a href="index.html" class="nav-item"><i class="fa-solid fa-circle-user"></i><span>Compte</span></a>
    </div>

    <div id="live-overlay">
        <video id="videoDisplay" autoplay playsinline></video>
        <button onclick="stopLive()" style="position:absolute; top:40px; right:20px; background:rgba(0,0,0,0.5); border:none; color:white; width:40px; height:40px; border-radius:50%;"><i class="fa-solid fa-xmark"></i></button>
        <div style="position:absolute; bottom:30px; left:20px;">
            <b id="current-streamer-name" style="font-size: 18px; text-shadow: 2px 2px 4px black;">Streamer</b>
            <div style="background:var(--red); padding:5px 12px; border-radius:20px; font-size:12px; margin-top:8px;">CONGOFLIX LIVE</div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4", 
        authDomain: "congo-streaming-51333.firebaseapp.com", 
        projectId: "congo-streaming-51333", 
        appId: "1:304286627819:android:36e0b43b8b10508a054bae" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let myProfile = null;
    const peer = new Peer('congolive-' + Math.floor(Math.random() * 10000));

    // 1. CHARGER MON PROFIL
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) myProfile = snap.data();
            listenToLives();
        } else {
            window.location.href = "index.html";
        }
    });

    // 2. ÉCOUTER LES LIVES EN TEMPS RÉEL (Plus d'ID à taper !)
    function listenToLives() {
        onSnapshot(collection(db, "active_lives"), (snapshot) => {
            const list = document.getElementById('live-list');
            list.innerHTML = "";
            
            if (snapshot.empty) {
                list.innerHTML = "<p style='grid-column: 1/3; padding:20px; color:#444;'>Aucun live pour le moment.</p>";
            }

            snapshot.forEach((doc) => {
                const live = doc.data();
                const card = document.createElement('div');
                card.className = 'live-card';
                card.onclick = () => joinLive(live.peerId, live.name);
                card.innerHTML = `
                    <div class="live-anim">CONGOFLIX</div>
                    <img class="cover" src="${live.photo || 'https://via.placeholder.com/200x300'}">
                    <div class="live-info">
                        <b>${live.name}</b>
                    </div>
                `;
                list.appendChild(card);
            });
        });
    }

    // 3. LANCER UN LIVE (Envoie les infos à Firebase)
    window.startStream = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('live-overlay').style.display = 'block';
            document.getElementById('videoDisplay').srcObject = stream;
            document.getElementById('current-streamer-name').innerText = myProfile.name;

            // On publie le live dans Firestore
            await setDoc(doc(db, "active_lives", auth.currentUser.uid), {
                name: myProfile.name,
                photo: myProfile.photoURL || "",
                peerId: peer.id,
                startedAt: Date.now()
            });

            peer.on('call', (call) => {
                call.answer(stream);
            });
        } catch (e) { alert("Caméra bloquée."); }
    };

    // 4. REJOINDRE (Plus besoin de prompt !)
    window.joinLive = (peerId, name) => {
        const call = peer.call(peerId, null);
        call.on('stream', (remoteStream) => {
            document.getElementById('live-overlay').style.display = 'block';
            document.getElementById('videoDisplay').srcObject = remoteStream;
            document.getElementById('current-streamer-name').innerText = name;
        });
    };

    window.stopLive = async () => {
        await deleteDoc(doc(db, "active_lives", auth.currentUser.uid));
        window.location.reload();
    };

</script>
</body>
</html>
