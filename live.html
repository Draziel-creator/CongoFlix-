<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix Live - Salle Royale</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            color: white;
        }

        /* Arrière-plan Vidéo Playlist */
        #video-bg-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Overlay Sombre pour lisibilité */
        .overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        /* Structure de la Salle */
        .live-container {
            position: relative; z-index: 10;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            padding: 10px;
        }

        /* --- SECTION VIP (HAUT) --- */
        .vip-section {
            display: grid;
            grid-template-areas: 
                ". trone ."
                "vip1 . vip2"
                "vip3 . vip4";
            gap: 10px;
            justify-content: center;
            margin-top: 40px;
        }

        .seat { position: relative; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        
        /* Trône Central (Place 1) */
        .trone { grid-area: trone; width: 140px; height: 140px; }
        
        /* Les Cercles d'Avatar */
        .avatar-wrapper {
            position: relative;
            width: 80px; height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .trone .avatar-wrapper { width: 110px; height: 110px; }

        /* Effet de lueur CongoFlix pour place vide */
        .empty-glow {
            border: 2px dashed rgba(0, 162, 255, 0.6);
            animation: pulse-light 1.5s infinite;
        }

        @keyframes pulse-light {
            0% { box-shadow: 0 0 5px rgba(0, 162, 255, 0.5); }
            50% { box-shadow: 0 0 25px rgba(212, 175, 55, 0.8); }
            100% { box-shadow: 0 0 5px rgba(0, 162, 255, 0.5); }
        }

        /* Image de couronne (PNG de GitHub) */
        .crown-overlay {
            position: absolute;
            top: -25%; left: -25%;
            width: 150%; height: 150%;
            z-index: 5;
            pointer-events: none;
            display: none; /* Apparaît si gagnant */
        }

        .pfp { width: 90%; height: 90%; border-radius: 50%; object-fit: cover; }

        /* --- SECTION AUDIENCE (6-15) --- */
        .audience-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: auto;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .mini-seat {
            width: 55px; height: 55px;
            border: 2px solid rgba(255, 68, 68, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 68, 68, 0.4);
            background: rgba(0,0,0,0.4);
        }

        /* --- STICKERS & INFOS --- */
        .points-tag {
            background: linear-gradient(to bottom, #f9d423 0%, #ff4e50 100%);
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: bold;
            margin-top: 5px;
            border: 1px solid #fff;
        }

        .user-name { font-size: 11px; margin-top: 2px; text-shadow: 1px 1px 2px #000; }

        /* Ruban de Félicitations */
        .congrats-ribbon {
            position: absolute; bottom: 180px; width: 100%;
            background: rgba(0,0,0,0.6);
            padding: 5px; border-top: 1px solid gold; border-bottom: 1px solid gold;
            font-size: 12px; white-space: nowrap; overflow: hidden;
        }

        .scroll-text { display: inline-block; animation: scroll 10s linear infinite; color: gold; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="video-bg-container">
        <video id="myVideo" autoplay muted playsinline></video>
    </div>
    <div class="overlay"></div>

    <div class="live-container">
        <!-- Section VIP -->
        <div class="vip-section">
            <!-- Place 1 (Trône) -->
            <div class="seat trone" onclick="joinSeat(1)">
                <div class="avatar-wrapper empty-glow" id="seat-1">
                    <img src="https://github.com/Draziel-creator/CongoFlix-/raw/main/assets/OUI.png" class="crown-overlay" id="crown-1">
                    <img src="" class="pfp" style="display:none;">
                </div>
                <span class="user-name">Place du Roi</span>
                <div class="points-tag">3.45M</div>
            </div>
            <!-- ... Répéter pour places 2 à 5 ... -->
        </div>

        <!-- Section Audience (6-15) -->
        <div class="audience-grid" id="audience-box">
            <!-- Les cercles 6 à 15 seront générés ici -->
        </div>

        <!-- Stickers Info -->
        <div class="congrats-ribbon">
            <span class="scroll-text">👑 Félicitations à Samuka pour avoir atteint le niveau 69 ! La RDC est en avant ! 🇨🇩</span>
        </div>
    </div>

    <script>
        // Playlist Vidéo
        const videoList = [
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Video.2026-05-05.at.10.37.24.mp4",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Video.2026-05-05.at.10.37.45.mp4",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Video.2026-05-05.at.10.39.23.mp4",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Video.2026-05-05.at.10.39.24.1.mp4",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Video.2026-05-05.at.10.39.24.mp4",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Video.2026-05-05.at.10.39.27.mp4"
        ];

        let currentVideo = 0;
        const videoPlayer = document.getElementById('myVideo');

        function playNext() {
            videoPlayer.src = videoList[currentVideo];
            videoPlayer.play();
            currentVideo = (currentVideo + 1) % videoList.length;
        }

        videoPlayer.onended = playNext;
        playNext(); // Démarrage

        // Génération des 10 places du bas
        const audienceBox = document.getElementById('audience-box');
        for (let i = 6; i <= 15; i++) {
            audienceBox.innerHTML += `
                <div class="seat" onclick="joinSeat(${i})">
                    <div class="avatar-wrapper mini-seat" id="seat-${i}"></div>
                    <span class="user-name">P${i}</span>
                    <div class="points-tag" style="background:#444">${i * 10}K</div>
                </div>`;
        }

        // Logique de clic
        function joinSeat(num) {
            const seat = document.getElementById(`seat-${num}`);
            const crown = document.getElementById(`crown-${num}`);
            
            // Simulation : On met sa photo et sa couronne
            seat.classList.remove('empty-glow');
            const img = seat.querySelector('.pfp') || document.createElement('img');
            img.src = "https://via.placeholder.com/150"; // Remplacer par photo Firebase
            img.className = "pfp";
            img.style.display = "block";
            seat.appendChild(img);

            // Si c'est un VIP (1-5) et qu'il a la couronne
            if(num <= 5 && crown) {
                crown.style.display = "block";
            }
            
            alert("Connexion PeerJS au siège " + num + "...");
        }
    </script>
</body>
</html>
