<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoLive Ultra-Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #FFD700;
            --premium-bg: radial-gradient(circle at 50% 30%, #1e1e4a 0%, #05050a 100%);
            --glass: rgba(255, 255, 255, 0.08);
        }

        body { 
            margin: 0; background: #000; color: white; font-family: 'Poppins', sans-serif; 
            overflow: hidden; height: 100vh;
        }

        .screen {
            background: var(--premium-bg);
            height: 100vh; width: 100vw; position: relative;
            display: flex; flex-direction: column;
        }

        /* --- EFFET DE LUMIÈRE DE SCÈNE --- */
        .stage-light {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px; background: var(--royal-blue);
            filter: blur(120px); opacity: 0.3; pointer-events: none;
        }

        /* --- HEADER IDENTIQUE --- */
        .header {
            display: flex; justify-content: space-between; padding: 50px 15px 10px; align-items: center;
        }
        .user-pill {
            background: rgba(0,0,0,0.6); border-radius: 30px; padding: 4px 15px 4px 5px;
            display: flex; align-items: center; border: 1px solid rgba(255,215,0,0.3);
        }
        .pfp-main { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--gold); }

        /* --- SYSTÈME DE SIÈGES "FRAMES" (Image 4) --- */
        .seats-layout { position: relative; flex: 1; margin-top: 20px; }
        
        .seat-container { position: absolute; display: flex; flex-direction: column; align-items: center; }
        
        /* Cadre Doré Premium */
        .frame-wrapper {
            position: relative; width: 85px; height: 85px;
            display: flex; align-items: center; justify-content: center;
        }
        .profile-img { 
            width: 70%; height: 70%; border-radius: 50%; object-fit: cover; 
            z-index: 1;
        }
        .frame-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; pointer-events: none;
            /* Ici on mettra l'URL de ton PNG de couronne dorée */
            filter: drop-shadow(0 0 5px rgba(255,215,0,0.5));
        }

        /* Positions exactes comme sur ta capture */
        .pos-1 { top: 30%; left: 50%; transform: translate(-50%, -50%); width: 130px; height: 130px; } /* HÔTE */
        .pos-2 { top: 15%; left: 10%; } .pos-3 { top: 15%; right: 10%; }
        .pos-4 { top: 45%; left: 5%; } .pos-5 { top: 45%; right: 5%; }

        .seat-name { font-size: 11px; margin-top: 5px; font-weight: 600; text-shadow: 0 2px 4px #000; }
        .points-tag { background: rgba(0,0,0,0.5); font-size: 9px; color: var(--gold); padding: 1px 8px; border-radius: 10px; margin-top: 2px; }

        /* --- GRILLE DU BAS (6 à 15) --- */
        .bottom-grid {
            position: absolute; bottom: 120px; width: 100%;
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 0 10px;
        }
        .mini-seat { display: flex; flex-direction: column; align-items: center; }
        .mini-circle { 
            width: 45px; height: 45px; border-radius: 50%; 
            border: 1.5px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
        }

        /* --- MODALE CADEAUX "BOUTIQUE DES MINERAIS" --- */
        #gift-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70vh;
            background: #181921; border-radius: 30px 30px 0 0; transition: 0.4s;
            z-index: 9999; padding: 20px 15px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        #gift-modal.open { bottom: 0; }

        .gift-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            overflow-y: auto; height: 75%; padding-top: 10px;
        }
        .gift-card { text-align: center; position: relative; }
        .gift-card img { 
            width: 60px; height: 60px; object-fit: contain; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }
        .gift-card .title { font-size: 9px; color: #eee; display: block; margin-top: 5px; height: 22px; line-height: 1.1; }
        .gift-card .pts { color: var(--gold); font-size: 10px; font-weight: bold; }
        .gift-card .fc { color: #777; font-size: 8px; display: block; }

        .footer-send {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px;
            background: #111218; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<div class="screen">
    <div class="stage-light"></div>

    <div class="header">
        <div class="user-pill">
            <img src="https://via.placeholder.com/100" class="pfp-main">
            <div style="margin-left:8px">
                <div style="font-size:12px; font-weight:bold;">PoupéeNoire👑</div>
                <div style="font-size:9px; color:var(--gold);"><i class="fa-solid fa-fire"></i> Populaire No.1</div>
            </div>
        </div>
        <div style="display:flex; gap:15px; font-size:18px;">
            <i class="fa-solid fa-users"></i>
            <i class="fa-solid fa-xmark" onclick="location.reload()"></i>
        </div>
    </div>

    <!-- ZONE DES SIÈGES AVEC FRAMES -->
    <div class="seats-layout">
        <!-- HÔTE (Position 1) -->
        <div class="seat-container pos-1">
            <div class="frame-wrapper">
                <img src="https://i.ibb.co/L8N7M9y/gold-frame-circle.png" class="frame-img"> <!-- Exemple de cadre PNG -->
                <img src="https://via.placeholder.com/150" class="profile-img">
            </div>
            <span class="seat-name">PoupéeNoire</span>
            <span class="points-tag">3.45M</span>
        </div>

        <!-- VIPs (2 à 5) -->
        <div class="seat-container pos-2">
            <div class="frame-wrapper" style="width:70px; height:70px;">
                <img src="https://via.placeholder.com/150" class="profile-img" style="border: 2px solid #00f2ff;">
            </div>
            <span class="seat-name">Draziel 🇨🇩</span>
        </div>
        <div class="seat-container pos-3">
            <div class="frame-wrapper" style="width:70px; height:70px;">
                <img src="https://via.placeholder.com/150" class="profile-img" style="border: 2px solid #ff0055;">
            </div>
            <span class="seat-name">NitaK</span>
        </div>
    </div>

    <!-- PETITES PLACES (6-15) -->
    <div class="bottom-grid">
        <div class="mini-seat"><div class="mini-circle"><i class="fa-solid fa-couch"></i></div></div>
        <div class="mini-seat"><div class="mini-circle"><i class="fa-solid fa-couch"></i></div></div>
        <div class="mini-seat"><div class="mini-circle"><i class="fa-solid fa-couch"></i></div></div>
        <div class="mini-seat"><div class="mini-circle"><i class="fa-solid fa-couch"></i></div></div>
        <div class="mini-seat"><div class="mini-circle"><i class="fa-solid fa-couch"></i></div></div>
    </div>

    <!-- NAV BAS -->
    <div style="position:fixed; bottom:20px; width:100%; display:flex; justify-content:space-around; align-items:center; z-index:100;">
        <i class="fa-solid fa-comment-dots"></i>
        <i class="fa-solid fa-microphone"></i>
        <i class="fa-solid fa-face-smile" style="font-size:24px; color:var(--gold);"></i>
        <div onclick="openGifts()" style="width:50px; height:50px; background:linear-gradient(to top, #ff0055, #ff5500); border-radius:50%; display:flex; align-items:center; justify-content:center;">
            <i class="fa-solid fa-gift"></i>
        </div>
    </div>
</div>

<!-- MODALE CADEAUX MINERAIS -->
<div id="gift-modal">
    <div style="color:var(--gold); font-weight:bold; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">Cadeaux RDC</div>
    <div class="gift-grid">
        <!-- ITEM COBALT -->
        <div class="gift-card">
            <img src="https://png.pngtree.com/png-vector/20240314/ourmid/pngtree-raw-cobalt-ore-stone-png-image_11956557.png">
            <span class="title">Cobalt Congolais</span>
            <span class="pts">200 pts</span>
            <span class="fc">2,000 FC</span>
        </div>
        <!-- ITEM DIAMANT -->
        <div class="gift-card">
            <img src="https://www.pngarts.com/files/3/Diamond-PNG-Transparent-Image.png">
            <span class="title">Diamant de la RDC</span>
            <span class="pts">10,000 pts</span>
            <span class="fc">100,000 FC</span>
        </div>
        <!-- ITEM LÉOPARD -->
        <div class="gift-card">
            <img src="https://www.pngplay.com/wp-content/uploads/6/Leopard-Face-PNG-Clipart-Background.png">
            <span class="title">Léopard d'Afrique</span>
            <span class="pts">800 pts</span>
            <span class="fc">8,000 FC</span>
        </div>
    </div>
    <div class="footer-send">
        <span style="color:var(--gold); font-size:13px;"><i class="fa-solid fa-coins"></i> 525 ></span>
        <button onclick="openGifts()" style="background:#6200ee; border:none; color:white; padding:10px 30px; border-radius:25px; font-weight:bold;">Envoyer</button>
    </div>
</div>

<script>
    function openGifts() { document.getElementById('gift-modal').classList.toggle('open'); }
</script>

</body>
</html>
