<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoLive Pro - Final Fix</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #ff3b5c; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        #debug-console { position: fixed; top: 10px; left: 10px; right: 10px; font-size: 11px; background: rgba(0,0,0,0.8); z-index: 3000; color: #00ff00; padding: 8px; border-radius: 5px; border: 1px solid #333; pointer-events: none; }
        .live-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 70px 2px 80px 2px; height: 100vh; overflow-y: auto; }
        .live-card { position: relative; height: 260px; background: #111; border: 0.5px solid #222; }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #080808; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 100; }
        .btn-start-live { width: 55px; height: 55px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; transform: translateY(-10px); }
        #live-overlay { position: fixed; inset: 0; background: black; display: none; z-index: 2000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .close-btn { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; color: white; border: none; font-size: 20px; z-index: 2100; }
    </style>
</head>
<body>

    <div id="debug-console">Initialisation...</div>

    <div id="live-list" class="live-grid"></div>

    <div class="bottom-nav">
        <div class="btn-start-live" onclick="window.startStream()"><i class="fa-solid fa-video"></i></div>
    </div>

    <div id="live-overlay">
        <button class="close-btn" onclick="window.stopLive()">×</button>
        <video id="videoDisplay" autoplay playsinline muted></video>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4", 
        authDomain: "congo-streaming-51333.firebaseapp.com", 
        projectId: "congo-streaming-51333", 
        appId: "1:304286627819:android:36e0b43b8b10508a054bae" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const debug = document.getElementById('debug-console');

    function log(msg) { debug.innerText = "LOG: " + msg; console.log(msg); }

    let localStream = null;

    // CONFIGURATION SERVEURS (STUN + TURN Publics pour traverser la 4G/Wi-Fi)
    const peer = new Peer('congolive-' + Math.floor(Math.random() * 100000), {
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' },
                { url: 'stun:stun.services.mozilla.com' }
            ],
            'sdpSemantics': 'unified-plan'
        }
    });

    peer.on('open', (id) => log("Mon ID PeerJS: " + id));
    peer.on('error', (err) => log("Erreur PeerJS: " + err.type));

    // RÉPONDRE AUTOMATIQUEMENT
    peer.on('call', (call) => {
        log("Appel entrant reçu !");
        call.answer(localStream); // On envoie notre flux (si on est streamer) ou rien
        
        call.on('stream', (remoteStream) => {
            log("Flux reçu par l'appelant !");
            const video = document.getElementById('videoDisplay');
            video.srcObject = remoteStream;
            video.play().catch(() => log("Touchez l'écran pour le son"));
        });
    });

    onAuthStateChanged(auth, (user) => {
        if (user) listenToLives();
        else log("Veuillez vous connecter.");
    });

    function listenToLives() {
        onSnapshot(collection(db, "active_lives"), (snapshot) => {
            const list = document.getElementById('live-list');
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const live = doc.data();
                if (auth.currentUser && doc.id === auth.currentUser.uid) return;
                const card = document.createElement('div');
                card.className = 'live-card';
                card.onclick = () => window.joinLive(live.peerId);
                card.innerHTML = `<img src="https://via.placeholder.com/200x300/111/ffd700?text=VOIR+LE+LIVE">`;
                list.appendChild(card);
            });
        });
    }

    window.startStream = async () => {
        try {
            log("Demande accès caméra...");
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 640 } },
                audio: true
            });
            
            document.getElementById('videoDisplay').srcObject = localStream;
            document.getElementById('live-overlay').style.display = 'block';
            
            await setDoc(doc(db, "active_lives", auth.currentUser.uid), {
                peerId: peer.id,
                status: "online"
            });
            log("Vous êtes en LIVE !");
        } catch (e) { log("Erreur caméra: " + e.message); }
    };

    window.joinLive = (peerId) => {
        log("Appel de: " + peerId + "...");
        document.getElementById('live-overlay').style.display = 'block';
        
        // On envoie un flux vide technique pour forcer la connexion bidirectionnelle
        const dummyStream = new AudioContext().createMediaStreamDestination().stream;
        const call = peer.call(peerId, dummyStream);
        
        call.on('stream', (remoteStream) => {
            log("SIGNAL REÇU ! Affichage...");
            const video = document.getElementById('videoDisplay');
            video.srcObject = remoteStream;
            video.muted = false; // On active le son
            
            video.play().catch(e => {
                log("Cliquez pour forcer la lecture");
                document.onclick = () => { video.play(); video.muted = false; };
            });
        });

        setTimeout(() => {
            if (document.getElementById('videoDisplay').paused) {
                log("Délai dépassé. Vérifiez la connexion du streamer.");
            }
        }, 10000);
    };

    window.stopLive = async () => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (auth.currentUser) await deleteDoc(doc(db, "active_lives", auth.currentUser.uid));
        window.location.reload();
    };

</script>
</body>
</html>
