<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoLive Pro - Fix Final</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #ff3b5c; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Debug Log en haut pour voir ce qui se passe */
        #debug-console { position: fixed; top: 60px; left: 0; width: 100%; font-size: 10px; background: rgba(0,0,0,0.7); z-index: 3000; pointer-events: none; color: lime; padding: 5px; }

        .top-tabs { position: fixed; top: 0; width: 100%; display: flex; justify-content: center; gap: 30px; padding: 15px 0; background: #000; z-index: 100; border-bottom: 1px solid #222; }
        .tab { font-size: 16px; color: #888; font-weight: bold; }
        .tab.active { color: white; border-bottom: 2px solid var(--red); }

        .live-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 70px 2px 80px 2px; height: 100vh; overflow-y: auto; }
        .live-card { position: relative; height: 260px; background: #111; border: 0.5px solid #222; }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #080808; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 100; }
        .btn-start-live { width: 55px; height: 55px; background: var(--red); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; transform: translateY(-10px); cursor: pointer; }

        #live-overlay { position: fixed; inset: 0; background: black; display: none; z-index: 2000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .close-btn { position: absolute; top: 40px; right: 20px; width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; color: white; border: none; font-size: 20px; z-index: 2100; }
    </style>
</head>
<body>

    <div id="debug-console">Statut: Prêt</div>

    <div class="top-tabs">
        <div class="tab active">Explorer</div>
        <div class="tab">Suivis</div>
    </div>

    <div id="live-list" class="live-grid"></div>

    <div class="bottom-nav">
        <div class="nav-item"><i class="fa-solid fa-house"></i></div>
        <div class="btn-start-live" onclick="window.startStream()"><i class="fa-solid fa-play"></i></div>
        <div class="nav-item"><i class="fa-solid fa-user"></i></div>
    </div>

    <div id="live-overlay">
        <button class="close-btn" onclick="window.stopLive()">×</button>
        <video id="videoDisplay" autoplay playsinline muted></video>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4", 
        authDomain: "congo-streaming-51333.firebaseapp.com", 
        projectId: "congo-streaming-51333", 
        appId: "1:304286627819:android:36e0b43b8b10508a054bae" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const debug = document.getElementById('debug-console');

    let localStream = null;
    const peer = new Peer('congolive-' + Math.floor(Math.random() * 100000), {
        config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
    });

    function log(msg) { debug.innerText = "Statut: " + msg; console.log(msg); }

    // Repondre à un appel
    peer.on('call', (call) => {
        log("Appel entrant reçu...");
        call.answer(localStream);
    });

    onAuthStateChanged(auth, (user) => {
        if (user) listenToLives();
        else window.location.href = "index.html";
    });

    function listenToLives() {
        onSnapshot(collection(db, "active_lives"), (snapshot) => {
            const list = document.getElementById('live-list');
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const live = doc.data();
                if (auth.currentUser && doc.id === auth.currentUser.uid) return;
                const card = document.createElement('div');
                card.className = 'live-card';
                card.onclick = () => window.joinLive(live.peerId);
                card.innerHTML = `<img src="https://via.placeholder.com/200x300/111/ffd700?text=LIVE">`;
                list.appendChild(card);
            });
        });
    }

    window.startStream = async () => {
        try {
            log("Démarrage caméra...");
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user" },
                audio: true
            });
            document.getElementById('videoDisplay').srcObject = localStream;
            document.getElementById('live-overlay').style.display = 'block';
            
            await setDoc(doc(db, "active_lives", auth.currentUser.uid), {
                peerId: peer.id,
                name: "Streamer"
            });
            log("En ligne !");
        } catch (e) { log("Erreur Caméra: " + e.message); }
    };

    window.joinLive = (peerId) => {
        log("Tentative de connexion à " + peerId);
        document.getElementById('live-overlay').style.display = 'block';
        
        // On initie l'appel sans flux local pour voir celui de l'autre
        const call = peer.call(peerId, new MediaStream());
        
        call.on('stream', (remoteStream) => {
            log("Flux reçu ! Affichage...");
            const video = document.getElementById('videoDisplay');
            video.srcObject = remoteStream;
            video.muted = false;
            
            // Forcer le play sur mobile
            video.play().then(() => log("Vidéo en cours")).catch(e => {
                log("Cliquez sur l'écran pour activer le son/vidéo");
                document.addEventListener('click', () => video.play(), {once: true});
            });
        });

        call.on('error', (err) => log("Erreur d'appel: " + err));
    };

    window.stopLive = async () => {
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (auth.currentUser) await deleteDoc(doc(db, "active_lives", auth.currentUser.uid));
        window.location.reload();
    };

</script>
</body>
</html>
