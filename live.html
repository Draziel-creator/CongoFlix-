<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoLive Pro - Ultra</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; --neon-blue: #00f2ff; --dark-surface: #121212; }
        body { margin: 0; background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- MODE EXPLORER --- */
        #explore-view { padding: 15px; display: block; height: 100vh; overflow-y: auto; }
        .explore-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 80px; }
        .live-card { position: relative; height: 250px; border-radius: 15px; overflow: hidden; background: #222; }
        .live-card img { width: 100%; height: 100%; object-fit: cover; }
        .live-card .overlay-info { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }

        /* --- MODE SALLE DE LIVE (FULL SCREEN) --- */
        #live-room { display: none; height: 100vh; background: linear-gradient(180deg, #1a1a2e 0%, #000000 100%); position: relative; }
        
        /* En-tête salle */
        .room-header { display: flex; justify-content: space-between; padding: 40px 15px 10px; align-items: center; }
        .host-info { display: flex; align-items: center; background: rgba(0,0,0,0.4); border-radius: 25px; padding: 5px 15px 5px 5px; }
        .host-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--gold); margin-right: 8px; }

        /* Sièges de la salle (Style Pro) */
        .seats-container { padding: 10px; display: flex; flex-direction: column; gap: 20px; }
        .vip-seats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .normal-seats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        
        .seat { position: relative; display: flex; flex-direction: column; align-items: center; }
        .seat-circle { width: 65px; height: 65px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; position: relative; }
        .seat.vip .seat-circle { width: 85px; height: 85px; border: 2px solid var(--gold); box-shadow: 0 0 10px rgba(255,215,0,0.2); }
        .seat-circle i { color: rgba(255,255,255,0.2); font-size: 24px; }
        .seat-num { position: absolute; bottom: -5px; background: var(--gold); color: black; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        /* Chat & Actions */
        .chat-area { position: absolute; bottom: 80px; left: 15px; right: 80px; max-height: 150px; overflow-y: hidden; mask-image: linear-gradient(transparent, black 20%); }
        .chat-msg { font-size: 13px; margin-bottom: 5px; text-shadow: 1px 1px 2px black; }
        .chat-msg span { color: var(--gold); font-weight: bold; }

        .bottom-actions { position: absolute; bottom: 20px; right: 15px; display: flex; gap: 12px; }
        .action-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); font-size: 18px; }
        .gift-btn { background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%); border: none; }

        /* Modal Cadeaux (Style Sheets) */
        #gift-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1a1a1a; border-radius: 20px 20px 0 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 3000; padding: 20px 10px; }
        #gift-sheet.active { bottom: 0; }
        .gift-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .gift-card { background: rgba(255,255,255,0.03); padding: 10px 5px; border-radius: 12px; text-align: center; }
        .gift-card img { width: 40px; height: 40px; margin-bottom: 5px; }
        .gift-card .pts { color: var(--gold); font-size: 11px; font-weight: bold; display: block; }
        .gift-card .money { font-size: 9px; color: #888; }
    </style>
</head>
<body>

    <!-- VUE EXPLORER -->
    <div id="explore-view">
        <h2 style="color: var(--gold)">CongoLive Explore</h2>
        <div id="live-list" class="explore-grid"></div>
        
        <div style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);">
            <button onclick="startMyLive()" style="background: var(--gold); border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; font-size: 16px;">LANCER MON LIVE</button>
        </div>
    </div>

    <!-- VUE SALLE DE LIVE -->
    <div id="live-room">
        <div class="room-header">
            <div class="host-info">
                <img src="https://via.placeholder.com/100" class="host-avatar" id="room-host-img">
                <div>
                    <div style="font-size: 12px; font-weight: bold;" id="room-host-name">Streamer RDC</div>
                    <div style="font-size: 10px; color: #ccc;">ID: 54317120</div>
                </div>
            </div>
            <button onclick="leaveRoom()" style="background:none; border:none; color:white; font-size:24px;">&times;</button>
        </div>

        <div class="seats-container">
            <!-- 6 Grands sièges (VIP) -->
            <div class="vip-seats">
                <div class="seat vip"><div class="seat-circle"><i class="fa-solid fa-crown"></i></div><span class="seat-num">1</span></div>
                <div class="seat vip"><div class="seat-circle"><i class="fa-solid fa-crown"></i></div><span class="seat-num">2</span></div>
                <div class="seat vip"><div class="seat-circle"><i class="fa-solid fa-crown"></i></div><span class="seat-num">3</span></div>
                <div class="seat vip"><div class="seat-circle"><i class="fa-solid fa-crown"></i></div><span class="seat-num">4</span></div>
                <div class="seat vip"><div class="seat-circle"><i class="fa-solid fa-crown"></i></div><span class="seat-num">5</span></div>
                <div class="seat vip"><div class="seat-circle"><i class="fa-solid fa-crown"></i></div><span class="seat-num">6</span></div>
            </div>
            <!-- Petits sièges (Audience) -->
            <div class="normal-seats">
                <div class="seat"><div class="seat-circle"><i class="fa-solid fa-couch"></i></div></div>
                <div class="seat"><div class="seat-circle"><i class="fa-solid fa-couch"></i></div></div>
                <div class="seat"><div class="seat-circle"><i class="fa-solid fa-couch"></i></div></div>
                <div class="seat"><div class="seat-circle"><i class="fa-solid fa-couch"></i></div></div>
                <div class="seat"><div class="seat-circle"><i class="fa-solid fa-couch"></i></div></div>
                <div class="seat"><div class="seat-circle"><i class="fa-solid fa-couch"></i></div></div>
                <div class="seat"><div class="seat-circle"><i class="fa-solid fa-couch"></i></div></div>
                <div class="seat"><div class="seat-circle"><i class="fa-solid fa-couch"></i></div></div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-msg"><span>Draziel 🇨🇩:</span> a rejoint la salle</div>
            <div class="chat-msg"><span>Mary:</span> Bonjour tout le monde !</div>
        </div>

        <div class="bottom-actions">
            <button class="action-btn" id="mic-toggle" onclick="toggleMic()"><i class="fa-solid fa-microphone-slash"></i></button>
            <button class="action-btn gift-btn" onclick="toggleGiftSheet()"><i class="fa-solid fa-gift"></i></button>
        </div>
    </div>

    <!-- SHEET CADEAUX -->
    <div id="gift-sheet">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
            <span style="font-weight: bold; color: var(--gold);">BOUTIQUE CONGO</span>
            <span style="font-size: 12px;">Solde: 525 pts</span>
        </div>
        <div class="gift-grid">
            <div class="gift-card">
                <img src="https://cdn-icons-png.flaticon.com/512/305/305011.png">
                <span class="pts">100</span><span class="money">1.5$</span>
            </div>
            <div class="gift-card" style="border: 1px solid var(--gold);">
                <img src="https://cdn-icons-png.flaticon.com/512/2829/2829815.png">
                <span class="pts">1.0M</span><span class="money">10,000$</span>
            </div>
            <div class="gift-card">
                <img src="https://cdn-icons-png.flaticon.com/512/10300/10300625.png">
                <span class="pts">50K</span><span class="money">500$</span>
            </div>
            <div class="gift-card">
                <img src="https://cdn-icons-png.flaticon.com/512/10439/10439814.png">
                <span class="pts">500</span><span class="money">7.5$</span>
            </div>
        </div>
        <button onclick="toggleGiftSheet()" style="width: 100%; margin-top: 15px; padding: 12px; background: #333; border:none; color:white; border-radius:10px;">FERMER</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4", projectId: "congo-streaming-51333" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Navigation & UI
    window.startMyLive = () => {
        document.getElementById('explore-view').style.display = 'none';
        document.getElementById('live-room').style.display = 'block';
        // Logique Firebase pour s'enregistrer comme streamer...
    };

    window.joinLive = (id) => {
        document.getElementById('explore-view').style.display = 'none';
        document.getElementById('live-room').style.display = 'block';
    };

    window.leaveRoom = () => {
        document.getElementById('explore-view').style.display = 'block';
        document.getElementById('live-room').style.display = 'none';
    };

    window.toggleGiftSheet = () => {
        document.getElementById('gift-sheet').classList.toggle('active');
    };

    // Simulation de chargement des lives (Explore)
    const list = document.getElementById('live-list');
    for(let i=1; i<=4; i++) {
        const card = document.createElement('div');
        card.className = 'live-card';
        card.onclick = () => joinLive(i);
        card.innerHTML = `<img src="https://picsum.photos/400/600?random=${i}">
                         <div class="overlay-info">
                            <div style="font-weight:bold; font-size:14px;">Live Kivu ${i}</div>
                            <div style="font-size:11px;"><i class="fa-solid fa-user"></i> ${i*12} spectateurs</div>
                         </div>`;
        list.appendChild(card);
    }
</script>
</body>
</html>
