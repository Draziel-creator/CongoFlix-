<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annonce</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }
        
        /* Positionnement de la Social Bar au ras du sol */
        div[id^="at_sb_"], .at-social-bar, div[class^="adsterra-"] {
            position: fixed !important;
            bottom: 0 !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 999999 !important;
        }
    </style>
</head>
<body>

    <script type="text/javascript">
        (function() {
            var s = document.createElement('script');
            s.src = "https://pl29315759.effectivecpmnetwork.com/ac/91/ae/ac91ae3c0f08f8755cfdc77e415d3a07.js";
            s.async = true;
            document.body.appendChild(s);
        })();

        // DETECTION AUTOMATIQUE DE L'APPARITION DE LA PUB
        const detecterPub = setInterval(() => {
            // On cherche si Adsterra a injecté ses balises spécifiques
            const pubAdsterra = document.querySelector('div[id^="at_sb_"], .at-social-bar, div[class^="adsterra-"]');
            
            if (pubAdsterra) {
                // Si la pub est là, on dit à la page parente (ton lecteur) d'ouvrir l'iframe à 85px
                window.parent.postMessage("pub_chargee", "*");
                clearInterval(detecterPub); // On arrête de chercher
            }
        }, 500); // Vérifie toutes les demi-secondes
    </script>

</body>
</html>
