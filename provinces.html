<style>
  /* === STYLE GLOBAL CONGOFLIX === */
  .congo-wrapper { background: #000 !important; color: #fff !important; padding: 10px !important; width: 100% !important; box-sizing: border-box !important; }
  .province-item { position: relative; margin-bottom: 50px; cursor: pointer; }
  .titre-p { color: #ffd700 !important; font-size: 30px !important; font-family: 'Bebas Neue'; text-transform: uppercase; margin: 0; animation: floatingGold 2.5s infinite ease-in-out; }
  .sous-t { color: #aaa; font-size: 13px; font-family: 'Bebas Neue'; display: block; letter-spacing: 1px; }
  @keyframes floatingGold { 0%, 100% { text-shadow: 0 0 5px #ffd700; transform: translateY(0); } 50% { text-shadow: 0 0 20px #ffd700; transform: translateY(-5px); } }

  .cadre-p { background: #111; border: 2px solid #ffd700; position: relative; overflow: hidden; border-radius: 15px; width: 100%; aspect-ratio: 16/9; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 2; }
  .cadre-p img { width: 100%; height: 100%; object-fit: cover; transition: 0.8s ease; }
  .cadre-p::before { content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent); transform: skewX(-25deg); transition: 0.7s; z-index: 3; }
  .province-item:hover .cadre-p::before { left: 150%; }
  .province-item:hover .cadre-p img { transform: scale(1.15); filter: brightness(1.1); }

  /* CASTING & POPUP */
  #loader-congoflix { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 30000; flex-direction: column; justify-content: center; align-items: center; }
  .capcut-spinner { width: 60px; height: 60px; border: 4px solid rgba(255, 215, 0, 0.1); border-left-color: #ffd700; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #pop-film { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; overflow-y: auto; padding-bottom: 60px; }
  .close-pop { color: #ffd700; font-size: 50px; position: fixed; right: 20px; top: 5px; z-index: 20001; cursor: pointer; }
  
  /* STRUCTURE DU CASTING */
  .casting-container { display: flex; justify-content: flex-start; align-items: flex-start; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; gap: 25px; }
  .photo-strip { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: auto; max-width: 130px; }
  .mini-poster { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #ffd700; object-fit: cover; }
  .names-list { flex-grow: 1; text-align: left; }
  .casting-title { font-family: 'Bebas Neue'; color: #ffd700; font-size: 20px; border-bottom: 1px solid #ffd700; display: inline-block; margin-bottom: 12px; }
  .actor-name { color: #fff; font-family: 'Bebas Neue'; font-size: 15px; margin-bottom: 4px; display: block; letter-spacing: 0.5px; }

  /* ELEMENTS DE L'INTERFACE */
  .poche-ext { width: 95%; margin: 15px auto; border: 1px solid #ffd700; border-radius: 12px; background: #0a0a0a; overflow: hidden; }
  .poche-titre { padding: 12px; text-align: center; font-family: 'Bebas Neue'; color: #ffd700; font-size: 18px; cursor: pointer; background: #111; }
  .poche-corps { display: none; padding: 15px; border-top: 1px solid #ffd700; }
  .player-box { width: 100%; height: 220px; background: #000; border-top: 2px solid #ffd700; border-bottom: 2px solid #ffd700; }
  .player-box iframe { width: 100%; height: 100%; border: none; }
  .search-box { width: 90%; margin: 15px auto; display: block; padding: 12px; border-radius: 25px; border: 2px solid #ffd700; background: #111; color: #fff; text-align: center; font-family: 'Bebas Neue'; }
  .f-card { width: 140px; margin: 8px; cursor: pointer; text-align: center; }
  .f-card img { width: 100%; border: 1px solid #ffd700; border-radius: 10px; aspect-ratio: 110/130; object-fit: cover; }

  /* COMPTEUR DE VUES SYNCHRONISÉ */
  .view-counter { display: flex; align-items: center; justify-content: center; margin: 10px auto; background: rgba(255,215,0,0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid #ffd700; width: fit-content; }
  .eye-icon { width: 20px; height: 20px; margin-right: 8px; fill: #ffd700; }
  .view-text { color: #ffd700; font-family: 'Bebas Neue'; font-size: 16px; letter-spacing: 1.5px; }
  #count-val { font-size: 18px; margin-left: 5px; color: #fff; font-weight: bold; }
</style>

const main = document.getElementById('main-container');
provinces.forEach(p => {
  main.innerHTML += `<div class="province-item" onclick="ouvrirPop('${p.id}', '${p.nom}')"><div class="text-header"><h3 class="titre-p">${p.nom}</h3><span class="sous-t">${p.sous}</span></div><div class="cadre-p"><img src="${p.img}"></div></div>`;
});

function ouvrirPop(provinceId, nomProvince) {
  document.getElementById('loader-congoflix').style.display = "flex";
  document.getElementById('pop-grid').style.display = 'flex';
  document.getElementById('search-zone').style.display = 'block';
  document.getElementById('pop-player').style.display = 'none';
  
  document.getElementById('nom-prov-title').innerText = nomProvince;
  document.getElementById('search-zone').innerHTML = `<input type="text" id="sInput" class="search-box" placeholder="RECHERCHER DANS ${nomProvince.toUpperCase()}..." onkeyup="filtrer()">`;
  
  let grid = document.getElementById('pop-grid'); 
  grid.innerHTML = "";

  db.collection("films").where("province", "==", provinceId).get().then((querySnapshot) => {
    document.getElementById('loader-congoflix').style.display = "none";
    document.getElementById('pop-film').style.display = "block";
    
    if (querySnapshot.empty) {
      grid.innerHTML = `<div style="color:#aaa; font-family:'Bebas Neue'; text-align:center; width:100%; margin-top:20px; font-size:18px;">AUCUN FILM TROUVÉ DANS LA PROVINCE DE ${nomProvince.toUpperCase()}</div>`;
      return;
    }
    
    querySnapshot.forEach((doc) => {
      let movieKey = doc.id;
      let movieData = doc.data();
      
      let titre = movieData.titre || "Sans titre";
      let poster = movieData.poster || "https://via.placeholder.com/110x130";
      let qualite = movieData.type || "HD";
      let annee = movieData.annee || "";
      let langue = movieData.langue || "";
      
      let card = document.createElement('div'); 
      card.className = "f-card";
      card.innerHTML = `
        <img src="${poster}">
        <div style="color:#ffd700; font-family:'Bebas Neue'; font-size:12px; text-align:center; margin-top:5px; text-transform:uppercase; line-height:1.2;">
          ${titre}<br><span style="color:#888; font-size:10px;">${qualite} ${annee} <br>${langue}</span>
        </div>`;
      
      card.onclick = function() { preparerFilm(movieKey, movieData); };
      grid.appendChild(card);
    });
  }).catch(error => {
    console.error("Erreur Firestore: ", error);
    document.getElementById('loader-congoflix').style.display = "none";
  });
}

function preparerFilm(filmId, movieData) {
  let titre = movieData.titre || "Sans titre";
  let dID = movieData.dailymotion || "x8m8w88"; 

  // Déconnexion de l'écouteur précédent s'il existe
  if (deconnecterEcouteurVues) deconnecterEcouteurVues();

  // 1. COMPTEUR DE VUES SÉCURISÉ : Même logique que ton lecteur applicatif (Modifie le champ 'views')
  const filmRef = db.collection("films").doc(filmId);
  
  // Utilisation de FieldValue.increment de l'API Compat pour ajouter exactement +1 sur le serveur
  filmRef.update({ 
    views: firebase.firestore.FieldValue.increment(1) 
  }).catch(e => console.log("Erreur compteur vue:", e));

  // Préparation de la structure du lecteur
  document.getElementById('pop-grid').style.display = 'none';
  document.getElementById('search-zone').style.display = 'none';
  let p = document.getElementById('pop-player'); 
  p.style.display = 'flex';
  
  p.innerHTML = `
    <button onclick="retour()" style="background:#ffd700; border:none; padding:10px 20px; border-radius:10px; font-weight:bold; margin:15px; cursor:pointer;">← RETOUR</button>
    <div style="color:#ffd700; font-family:'Bebas Neue'; text-align:center; margin-bottom:15px;">
        <span style="font-size:14px; letter-spacing:2px;">EXTRAIT DE FILM</span><br>
        <span style="font-size:26px; color:#fff;">"${titre}"</span>
    </div>
    
    <div class="player-box">
      <iframe src="https://geo.dailymotion.com/player.html?video=${dID}" allowfullscreen></iframe>
    </div>

    <div class="view-counter">
      <svg class="eye-icon" viewBox="0 0 24 24"><path d="M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,4.5C7,4.5 2.73,7.61 1,12C2.73,16.39 7,19.5 12,19.5C17,19.5 21.27,16.39 23,12C21.27,7.61 17,4.5 12,4.5M12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17Z"/></svg>
      <span class="view-text">VUES : <span id="count-val">...</span></span>
    </div>

    <div class="poche-ext">
      <div class="poche-titre" onclick="toggleP('p-desc')">📖 SYNOPSIS & CASTING ▼</div>
      <div id="p-desc" class="poche-corps">
        <p id="fb-resume" style="color:#eee; font-size:14px; line-height:1.4; margin-bottom:20px; text-align:center;">Chargement du synopsis...</p>
        <div class="casting-container">
            <div id="fb-photos" class="photo-strip"></div>
            <div class="names-list">
              <div class="casting-title">ACTEURS</div>
              <div id="fb-acteurs"></div>
            </div>
        </div>
      </div>
    </div>

    <button style="background:#0056b3; color:#fff; padding:15px; border-radius:50px; width:90%; font-family:'Bebas Neue'; border:2px solid #fff; margin:15px 0; font-size:18px; cursor:pointer;" onclick="ouvrirApp('${filmId}')">▶ OBTENIR LE FILM COMPLET DANS L'APPLICATION</button>
  `;

  // 2. ÉCOUTE EN TEMPS RÉEL SYNCHRONISÉE (Même flux onSnapshot que ton code de lecteur)
  deconnecterEcouteurVues = filmRef.onSnapshot((docSnapshot) => {
    if (docSnapshot.exists) {
      let dataCommune = docSnapshot.data();
      // On lit le champ 'views' comme sur ton application
      let vuesSynchronisees = dataCommune.views || 0; 
      let elCompteur = document.getElementById('count-val');
      if (elCompteur) {
        elCompteur.innerText = vuesSynchronisees;
      }
    }
  });

  if(movieData.description) {
    document.getElementById('fb-resume').innerText = movieData.description;
  } else {
    document.getElementById('fb-resume').innerText = "Aucun synopsis disponible pour le moment.";
  }
  
  const zoneActeurs = document.getElementById('fb-acteurs');
  const zonePhotos = document.getElementById('fb-photos');
  
  const listePhotos = movieData.acteurs || [];
  const listeNoms = movieData.noms_acteurs || [];

  if (Array.isArray(listePhotos) && listePhotos.length > 0) {
    zonePhotos.innerHTML = listePhotos.map(url => `
      <img src="${url}" class="mini-poster" onerror="this.src='https://cdn-icons-png.flaticon.com/512/149/149071.png'">
    `).join('');
  } else {
    zonePhotos.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="mini-poster" style="opacity:0.4;">`;
  }

  if (Array.isArray(listeNoms) && listeNoms.length > 0) {
    zoneActeurs.innerHTML = listeNoms.map(nom => `
      <span class="actor-name">${nom}</span>
    `).join('');
  } else {
    zoneActeurs.innerHTML = `<span class="actor-name" style="color:#666;">Casting non spécifié</span>`;
  }
}

function ouvrirApp(filmId) {
  window.location.href = "congoflix://play?id=" + filmId;
  setTimeout(() => {
     if(!document.hidden) {
        alert("Pour regarder le film complet, veuillez installer ou lancer notre application officielle CongoFlix !");
     }
  }, 2000);
}

function toggleP(id) { 
  let target = document.getElementById(id); 
  let isOpening = (target.style.display !== 'block');
  document.querySelectorAll('.poche-corps').forEach(p => { p.style.display = 'none'; });
  if (isOpening) { target.style.display = 'block'; }
}

function filtrer() {
  let v = document.getElementById('sInput').value.toLowerCase();
  document.querySelectorAll('.f-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(v) ? "block" : "none");
}

function retour() { 
  if (deconnecterEcouteurVues) deconnecterEcouteurVues(); // Coupe l'écouteur pour économiser les lectures Firebase
  document.getElementById('pop-grid').style.display='flex'; 
  document.getElementById('search-zone').style.display='block'; 
  document.getElementById('pop-player').style.display='none'; 
}

function fermerPop() { 
  if (deconnecterEcouteurVues) deconnecterEcouteurVues();
  document.getElementById('pop-film').style.display='none'; 
}
</script>
