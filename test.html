<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page de Test - Clickadilla</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #002f6c;
            margin-bottom: 5px;
        }
        .status-box {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .grid-ads {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            justify-items: center;
            margin-top: 20px;
        }
        /* Style temporaire pour visualiser les blocs si la pub ne charge pas */
        .ad-box {
            width: 250px;
            min-height: 250px;
            background-color: #eaeaea;
            border: 2px dashed #cccccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #666;
        }
    </style>
    
    <script async src="https://js.wpadmngr.com/static/adManager.js" data-admpid="447738"></script>
</head>
<body>

    <div class="container">
        <h1>Test Clickadilla</h1>
        <p class="status-box">Si le code fonctionne, des bannières doivent remplacer les carrés gris ci-dessous.</p>
        
        <div class="grid-ads">
            
            <div class="ad-box">
                <div data-banner-id="1496058"></div>
            </div>
            
            <div class="ad-box">
                <div data-banner-id="1496059"></div>
            </div>
            
            <div class="ad-box">
                <div data-banner-id="1496060"></div>
            </div>
            
            <div class="ad-box">
                <div data-banner-id="1496061"></div>
            </div>
            
        </div>
    </div>

</body>
</html>
