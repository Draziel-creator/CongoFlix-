<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CongoFlix Slider Dynamique</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
    
    .force-slider-block {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    .slider-main-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .slides-wrapper {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      height: 100%;
      width: 100%;
    }

    .individual-slide {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      text-decoration: none;
      position: relative;
    }

    .individual-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }

    .ad-label {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0, 0, 0, 0.75);
      color: #ffd700;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: bold;
      border: 1px solid #ffd700;
      border-radius: 4px;
      z-index: 5;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .film-tag {
      position: absolute;
      bottom: 25px;
      left: 15px;
      background: rgba(0,0,0,0.75);
      padding: 8px 18px;
      border-radius: 20px;
      color: #fff;
      font-weight: bold;
      font-size: 13px;
      z-index: 6;
      border: 1px solid rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 215, 0, 0.85);
      color: #000;
      border: none;
      width: 36px;
      height: 36px;
      cursor: pointer;
      z-index: 10;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: 0.3s;
    }
    .nav-arrow:hover { background: #fff; transform: translateY(-50%) scale(1.1); }
    .prev-arrow { left: 15px; }
    .next-arrow { right: 15px; }

    .dots-nav {
      position: absolute;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 6px;
      z-index: 10;
    }

    .dot-item {
      height: 6px;
      width: 6px;
      background-color: rgba(255,255,255,0.4);
      border-radius: 50%;
      cursor: pointer;
      transition: 0.3s;
    }

    .dot-item.active {
      background-color: #ffd700;
      transform: scale(1.3);
      width: 14px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div class="force-slider-block">
    <div class="slider-main-container">
      <button class="nav-arrow prev-arrow" onclick="changeSlide(-1)"><i class="fa-solid fa-chevron-left"></i></button>
      <button class="nav-arrow next-arrow" onclick="changeSlide(1)"><i class="fa-solid fa-chevron-right"></i></button>
      
      <div class="slides-wrapper" id="engine-slider">
        <div style="color: #ffd700; text-align: center; margin: auto; font-weight: bold; font-size: 14px;">Chargement de l'accueil...</div>
      </div>
    </div>
    <div class="dots-nav" id="dots-container"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // CONFIGURATIONS FIREBASE DE CONGOFLIX :
    const firebaseConfig = { 
        apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4", 
        authDomain: "congo-streaming-51333.firebaseapp.com", 
        projectId: "congo-streaming-51333", 
        storageBucket: "congo-streaming-51333.firebasestorage.app", 
        messagingSenderId: "304286627819", 
        appId: "1:304286627819:android:36e0b43b8b10508a054bae" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentPos = 0;
    let totalSlides = 0;
    let autoTimer;
    let moviesData = []; 

    const qSlider = query(collection(db, "films"), orderBy("timestamp", "desc"), limit(10));
    
    onSnapshot(qSlider, (snapshot) => {
        moviesData = [];
        snapshot.forEach((doc) => {
            const data = doc.data();
            // On extrait uniquement ce qui est présent dans le document du slider : le tableau "site"
            if (data.site && Array.isArray(data.site) && data.site.length >= 2) {
                moviesData.push({
                    id: doc.id,
                    capture: data.site[0], // L'URL de l'image
                    titre: data.site[1]    // Le titre textuel (Ex: "AU BAR RESTO")
                });
            }
        });
        
        buildSlider();
    });

    function buildSlider() {
        const wrap = document.getElementById('engine-slider');
        const dotsContainer = document.getElementById('dots-container');
        
        let finalHtml = "";
        let dotsHtml = "";
        let slideIndex = 0;

        moviesData.forEach((movie, index) => {
            finalHtml += `
                <div class="individual-slide" data-type="movie">
                    <img src="${movie.capture}" alt="${movie.titre}" onclick="handleSliderClick(${index})">
                    <div class="film-tag">${movie.titre.toUpperCase()}</div>
                </div>`;
            dotsHtml += `<span class="dot-item ${slideIndex === 0 ? 'active' : ''}" onclick="goToSlide(${slideIndex})"></span>`;
            slideIndex++;

            // Injection triple publicité
            if ((index + 1) % 2 === 0 && index !== moviesData.length - 1) {
                finalHtml += `
                    <div class="individual-slide" data-type="ad" id="ad-slide-${slideIndex}">
                        <div class="ad-label">Publicité</div>
                        <div class="ad-holder" style="text-align:center; width:100%; max-width:468px; height:180px; margin:auto; display:flex; align-items:center; justify-content:center;">
                        </div>
                    </div>`;
                dotsHtml += `<span class="dot-item" onclick="goToSlide(${slideIndex})"></span>`;
                slideIndex++;
            }
        });

        totalSlides = slideIndex;
        if(wrap) wrap.innerHTML = finalHtml;
        if(dotsContainer) dotsContainer.innerHTML = dotsHtml;
        
        currentPos = 0;
        updateSliderVisuals();
        resetAutoPlay();
    }

    window.changeSlide = function(n) {
        if(totalSlides === 0) return;
        currentPos = (currentPos + n + totalSlides) % totalSlides;
        updateSliderVisuals();
        resetAutoPlay();
    }

    window.goToSlide = function(n) {
        currentPos = n;
        updateSliderVisuals();
        resetAutoPlay();
    }

    // MODIFICATION SUIVANT TON IDÉE : Envoi du titre du film à la page principale
    window.handleSliderClick = function(movieIndex) {
        const selectedMovie = moviesData[movieIndex];
        const titreDuFilm = selectedMovie.titre;

        // On envoie un signal contenant uniquement l'action et le titre textuel du film
        if (window.parent) {
            window.parent.postMessage({ action: "OUVRIR_VIA_SLIDER", titre: titreDuFilm }, "*");
        }
    }

    function updateSliderVisuals() {
        const wrap = document.getElementById('engine-slider');
        const dots = document.querySelectorAll('.dot-item');
        if(wrap) wrap.style.transform = `translateX(-${currentPos * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('active', i === currentPos));

        document.querySelectorAll('.individual-slide[data-type="ad"]').forEach(slide => {
            const holder = slide.querySelector('.ad-holder');
            if(holder) holder.innerHTML = ""; 
        });

        const currentSlide = document.getElementById(`ad-slide-${currentPos}`);
        if (currentSlide) {
            const holder = currentSlide.querySelector('.ad-holder');
            if (holder) {
                const iframe = document.createElement('iframe');
                iframe.style.border = "0";
                iframe.style.padding = "0";
                iframe.style.width = "468px";
                iframe.style.height = "180px"; 
                iframe.style.overflow = "hidden";
                iframe.scrolling = "no";
                
                holder.appendChild(iframe);

                const iframeDoc = iframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(`
                    <body style="margin:0; padding:0; background:transparent; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:0px;">
                        <script type="text/javascript">
                            atOptions = { 'key' : 'MON_CODE_DE_CLE_ADSTERRA_ICI', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
                        <\/script>
                        <script type="text/javascript" src="//www.highperformanceformat.com/MON_CODE_DE_CLE_ADSTERRA_ICI/invoke.js"><\/script>

                        <script type="text/javascript">
                            atOptions = { 'key' : 'MON_CODE_DE_CLE_ADSTERRA_ICI', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
                        <\/script>
                        <script type="text/javascript" src="//www.highperformanceformat.com/MON_CODE_DE_CLE_ADSTERRA_ICI/invoke.js"><\/script>

                        <script type="text/javascript">
                            atOptions = { 'key' : 'MON_CODE_DE_CLE_ADSTERRA_ICI', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
                        <\/script>
                        <script type="text/javascript" src="//www.highperformanceformat.com/MON_CODE_DE_CLE_ADSTERRA_ICI/invoke.js"><\/script>
                    </body>
                `);
                iframeDoc.close();
            }
        }
    }

    function resetAutoPlay() {
        clearInterval(autoTimer);
        if(totalSlides > 1) {
            autoTimer = setInterval(() => {
                currentPos = (currentPos + 1) % totalSlides;
                updateSliderVisuals();
            }, 6000);
        }
    }

    document.addEventListener('mouseenter', () => clearInterval(autoTimer));
    document.addEventListener('mouseleave', resetAutoPlay);
  </script>
</body>
</html>
