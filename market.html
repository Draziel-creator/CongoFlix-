<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marché RDC - Premium</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #f5d170 0%, #b88a1a 100%);
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text-gray: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
            padding-bottom: 80px;
        }

        /* --- BANNIÈRE SLIDER --- */
        .promo-slider {
            position: relative;
            width: 92%;
            height: 180px;
            margin: 15px auto;
            border-radius: 20px;
            overflow: hidden;
            background: url('https://img.freepik.com/photos-gratuite/paysage-urbain-nuit-moderne_23-2151004652.jpg') center/cover;
            display: flex;
            align-items: center;
        }

        .slider-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slider-content h2 {
            margin: 0;
            font-size: 1.4rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slider-content p {
            font-size: 0.8rem;
            color: #ddd;
            margin: 5px 0 15px 0;
            max-width: 60%;
        }

        .btn-explorer {
            background: var(--gold-gradient);
            border: none;
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: bold;
            width: fit-content;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* --- FILTRE CATÉGORIES --- */
        .categories-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 4%;
            scrollbar-width: none;
        }
        .categories-scroll::-webkit-scrollbar { display: none; }

        .cat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .cat-icon {
            width: 50px;
            height: 50px;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
        }

        .cat-item span { font-size: 0.7rem; color: var(--text-gray); }

        /* --- GRILLE DE PRODUITS --- */
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 4%;
        }
        .section-title h3 { margin: 0; font-size: 1.1rem; }
        .view-all { color: #b88a1a; font-size: 0.8rem; text-decoration: none; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 4%;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 10px;
            border: 1px solid #222;
            position: relative;
        }

        .badge-premium {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            border: 0.5px solid #f5d170;
            color: #f5d170;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.5rem;
            font-weight: bold;
            z-index: 2;
        }

        .img-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .p-name { font-size: 0.85rem; font-weight: 500; margin-bottom: 4px; }
        .p-vendor { font-size: 0.65rem; color: var(--text-gray); display: flex; align-items: center; gap: 4px; }
        .v-check { color: #4ade80; font-size: 0.7rem; }

        .p-price {
            font-size: 1rem;
            font-weight: bold;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="promo-slider">
        <div class="slider-overlay">
            <div class="slider-content">
                <h2>Tout le Congo<br>dans votre poche</h2>
                <p>Des milliers de produits, des vendeurs locaux.</p>
                <button class="btn-explorer">EXPLORER ></button>
            </div>
        </div>
    </div>

    <div class="categories-scroll">
        <div class="cat-item">
            <div class="cat-icon" style="border-color: #f5d170;">📱</div>
            <span style="color:white">Tout</span>
        </div>
        <div class="cat-item"><div class="cat-icon">📱</div><span>Télés</span></div>
        <div class="cat-item"><div class="cat-icon">💻</div><span>Électro</span></div>
        <div class="cat-item"><div class="cat-icon">👕</div><span>Mode</span></div>
        <div class="cat-item"><div class="cat-icon">🏠</div><span>Maison</span></div>
    </div>

    <div class="section-title">
        <h3>Produits populaires</h3>
        <a href="#" class="view-all">Voir tout ></a>
    </div>

    <div class="product-grid">
        <div class="product-card">
            <div class="badge-premium">PREMIUM</div>
            <div class="img-container">
                <img src="https://img.freepik.com/photos-gratuite/composition-numerique-du-smartphone_23-2151221209.jpg" alt="S24">
            </div>
            <div class="p-name">Samsung S24 Ultra</div>
            <div class="p-vendor">Tech Congo SARL <span class="v-check">✔</span></div>
            <div class="p-price">1.650 $</div>
        </div>

        <div class="product-card">
            <div class="img-container">
                <img src="https://img.freepik.com/photos-gratuite/ordinateur-portable-sur-table-dans-obscurite_23-2148187015.jpg" alt="Macbook">
            </div>
            <div class="p-name">MacBook Pro M3</div>
            <div class="p-vendor">Smart Digital <span class="v-check">✔</span></div>
            <div class="p-price">2.500 $</div>
        </div>
    </div>

</body>
</html>
