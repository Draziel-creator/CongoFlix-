<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Génie Congo - Studio TV Ultra-Live</title>
    
    <style>
        :root {
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --tiktok-pink: #fe2c55;
            --tiktok-blue: #25f4ee;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* --- ALERTE ROTATION --- */
        #rotate-device { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; color: white; text-align: center;
        }
        .phone-icon {
            width: 50px; height: 80px; border: 3px solid white; border-radius: 5px;
            animation: rotatePhone 2s infinite ease-in-out; margin-bottom: 20px;
        }
        @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(0deg); } }
        @media (orientation: landscape) { #rotate-device { display: none; } }

        .studio-container {
            position: relative; width: 100vw; height: 100vh;
            background: var(--overlay-img) no-repeat center;
            background-size: 100% 100%; display: none;
            justify-content: center; align-items: center;
            filter: brightness(1.2);
        }
        @media (orientation: landscape) { .studio-container { display: flex; } }

        /* --- PROFIL ET CONNEXION --- */
        .user-auth {
            position: absolute; top: 4%; right: 4%; display: flex; align-items: center; gap: 8px; z-index: 100;
        }
        .profile-circle {
            width: 25px; height: 25px; border-radius: 50%; border: 1.5px solid var(--tiktok-blue);
            background: #333; display: flex; align-items: center; justify-content: center;
        }
        .login-text { color: white; font-size: 0.6rem; font-weight: bold; text-transform: uppercase; }

        /* --- SPECTATEURS : AJUSTEMENT PERSPECTIVE ET TAILLE --- */
        .side-zone {
            position: absolute; width: 11%; height: 18%;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
            align-items: center; justify-items: center;
        }

        /* Décalage vertical pour suivre la ligne du décor (perspective) */
        .pos-left-1 { top: 21%; left: 6.5%; }  /* Bord gauche (poussé un peu plus haut) */
        .pos-left-2 { top: 23%; left: 19.5%; } /* Milieu gauche */
        .pos-right-1 { top: 23%; right: 19.5%; } /* Milieu droite */
        .pos-right-2 { top: 21%; right: 6.5%; }  /* Bord droite */

        .v-box { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .v-circ { 
            width: 15px; height: 15px; border-radius: 50%; 
            border: 1.2px solid var(--yellow-rdc); 
            background: rgba(0,0,0,0.8); /* Remplissage sombre */
            box-shadow: 0 0 5px rgba(255, 204, 0, 0.3);
        }
        .v-txt { color: #fff; font-size: 0.2rem; font-weight: bold; margin-top: 1px; text-align: center; white-space: nowrap; }
        .v-prov { color: var(--tiktok-blue); font-size: 0.15rem; opacity: 0.8; }

        /* --- ZONE JOUEURS CENTRE --- */
        .candidates-screen { position: absolute; top: 28%; left: 50%; transform: translateX(-50%); width: 22%; }
        .label-joueurs { position: absolute; top: -15px; left: 0; color: var(--yellow-rdc); font-size: 0.45rem; font-weight: bold; text-transform: uppercase; }
        .grid-5x2 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; }
        .c-slot { position: relative; aspect-ratio: 1/1; background: rgba(0,0,0,0.85); border: 0.5px solid rgba(255,255,255,0.2); }

        /* --- UI & CHAT --- */
        .top-menu { position: absolute; top: 4%; left: 50%; transform: translateX(-50.5%); width: 50%; height: 8%; display: flex; justify-content: space-around; align-items: center; }
        .menu-item { color: white; font-size: 0.6rem; font-weight: bold; text-transform: uppercase; }

        #chat-box { position: absolute; bottom: 5%; right: 8.5%; width: 150px; height: 90px; display: flex; flex-direction: column-reverse; overflow: hidden; }
        .chat-msg { margin-bottom: 4px; padding: 3px 6px; background: rgba(0,0,0,0.7); font-size: 0.55rem; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="rotate-device">
        <div class="phone-icon"></div>
        <p>MODE PAYSAGE REQUIS</p>
    </div>

    <div class="studio-container" id="main-studio">
        <div class="user-auth">
            <span class="login-text">Connexion</span>
            <div class="profile-circle">👤</div>
        </div>

        <div class="ui-layer" id="ui-layer">
            <div class="side-zone pos-left-1" id="sz-l1"></div>
            <div class="side-zone pos-left-2" id="sz-l2"></div>
            <div class="side-zone pos-right-1" id="sz-r1"></div>
            <div class="side-zone pos-right-2" id="sz-r2"></div>

            <nav class="top-menu">
                <div class="menu-item">Directs</div><div class="menu-item">Classement</div><div class="menu-item">Boutique</div>
            </nav>

            <div class="candidates-screen">
                <div class="label-joueurs">JOUEURS EN DIRECT</div>
                <div class="grid-5x2" id="player-grid"></div>
            </div>

            <div id="chat-box"></div>
        </div>
    </div>

    <script>
        const studio = document.getElementById('main-studio');
        const uiLayer = document.getElementById('ui-layer');
        const chat = document.getElementById('chat-box');

        // Générer 10 joueurs
        for(let i=1; i<=10; i++) {
            document.getElementById('player-grid').innerHTML += `<div class="c-slot" onclick="showPlayer(${i})"><div class="player-modal" id="m${i}"><b>J${i}</b><br>Score: 0</div></div>`;
        }

        // Générer 36 spectateurs avec Noms et Provinces
        const fans = ["Jean", "Kev", "Mado", "Ali", "Bob", "Ruth", "Marc", "Noé", "Lise"];
        const provinces = ["Kin", "Goma", "Lub", "Kng"];
        
        ['sz-l1', 'sz-l2', 'sz-r1', 'sz-r2'].forEach(id => {
            const container = document.getElementById(id);
            for(let i=0; i<9; i++) {
                const name = fans[i];
                const prov = provinces[Math.floor(Math.random()*provinces.length)];
                container.innerHTML += `
                    <div class="v-box">
                        <div class="v-circ"></div>
                        <div class="v-txt">${name}</div>
                        <div class="v-prov">${prov}</div>
                    </div>`;
            }
        });

        function checkOrientation() {
            if (window.innerWidth > window.innerHeight) {
                studio.style.display = 'flex';
                studio.classList.add('animate-zoom');
                setTimeout(() => {
                    document.querySelector('.ui-layer').style.opacity = '1';
                    document.querySelector('.ui-layer').style.pointerEvents = 'auto';
                }, 1000);
            }
        }
        window.addEventListener('load', checkOrientation);
        window.addEventListener('resize', checkOrientation);
    </script>
</body>
</html>
