<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Génie Congo - Studio TV Ultra-Live</title>
    
    <style>
        :root {
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --tiktok-pink: #fe2c55;
            --tiktok-blue: #25f4ee;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* --- ALERTE ROTATION --- */
        #rotate-device {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        @media (orientation: landscape) { #rotate-device { display: none; } }

        /* Animation du petit téléphone qui tourne */
        .phone-icon {
            width: 30px; height: 50px; border: 3px solid white; border-radius: 6px;
            position: relative; animation: rotateAnim 2s infinite ease-in-out;
        }
        @keyframes rotateAnim {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }

        /* --- CONTENEUR PRINCIPAL --- */
        .studio-container {
            position: relative; width: 100vw; height: 100vh;
            background: var(--overlay-img) no-repeat center;
            background-size: 100% 100%; display: none;
            justify-content: center; align-items: center;
        }
        @media (orientation: landscape) { .studio-container { display: flex; } }

        .animate-zoom {
            animation: cameraEntry 8s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes cameraEntry { 
            from { background-size: 180% 180%; } 
            to { background-size: 100% 100%; } 
        }

        .ui-layer { 
            position: absolute; inset: 0; pointer-events: none; z-index: 50; 
            opacity: 0; transition: opacity 1s ease-in;
        }
        .ui-layer.show { opacity: 1; pointer-events: auto; }

        /* --- MENU AJUSTÉ --- */
        .top-menu {
            position: absolute; top: 4%; left: 50%; transform: translateX(-50.5%);
            width: 58%; height: 8%; display: flex; justify-content: space-around; align-items: center;
        }
        .menu-item { 
            color: white; font-size: 0.6rem; font-weight: bold; 
            text-transform: uppercase; text-shadow: 0 1px 3px #000;
        }
        /* Décalage précis du mot Classement */
        .menu-item.offset-left { margin-right: 8px; }

        .auth-zone { 
            position: absolute; top: 4%; right: 3.5%; /* Poussé vers la droite */
            display: flex; align-items: center; gap: 8px; 
        }

        /* --- ZONE CANDIDATS : PETITS CARRÉS 1x1 --- */
        .candidates-screen {
            position: absolute; top: 31%; left: 50%; transform: translateX(-50%);
            width: 13%; display: flex; flex-direction: column; align-items: center;
        }
        
        .grid-3x2 { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 6px; width: 100%;
        }
        .c-slot { 
            position: relative; aspect-ratio: 1/1; /* Carré parfait */
            background: rgba(0,0,0,0.8); /* Fond noir */
            border: 0.5px solid rgba(255,255,255,0.2); border-radius: 1px;
            cursor: pointer;
        }

        /* --- MODALES DIRECTIONNELLES --- */
        .player-modal {
            position: absolute; width: 45px; background: rgba(0, 10, 25, 0.98);
            border-radius: 2px; padding: 2px; color: white; font-size: 0.28rem; 
            opacity: 0; transform: scale(0.5); transition: 0.3s; z-index: 100;
            pointer-events: none; border: 0.5px solid white;
        }
        .player-modal.show { opacity: 1; transform: scale(1); }

        .c-slot:nth-child(1) .player-modal, .c-slot:nth-child(4) .player-modal { right: 115%; top: 0; border-right: 2px solid var(--tiktok-pink); }
        .c-slot:nth-child(3) .player-modal, .c-slot:nth-child(6) .player-modal { left: 115%; top: 0; border-left: 2px solid var(--tiktok-blue); }
        .c-slot:nth-child(2) .player-modal { bottom: 115%; left: 50%; transform: translateX(-50%) scale(0.5); border-bottom: 2px solid var(--yellow-rdc); }
        .c-slot:nth-child(2) .player-modal.show { transform: translateX(-50%) scale(1); }
        .c-slot:nth-child(5) .player-modal { top: 115%; left: 50%; transform: translateX(-50%) scale(0.5); border-top: 2px solid var(--yellow-rdc); }
        .c-slot:nth-child(5) .player-modal.show { transform: translateX(-50%) scale(1); }

        /* --- BOX QUESTION --- */
        .question-box {
            position: absolute; bottom: 8.5%; left: 8.5%; width: 31%;
            background: rgba(0, 5, 20, 0.95); border-left: 3px solid var(--tiktok-blue);
            padding: 8px; border-radius: 4px; opacity: 0; transform: translateY(15px); transition: 0.8s;
        }
        .question-box.active { opacity: 1; transform: translateY(0); }
        .q-text { color: white; font-size: 0.55rem; font-weight: bold; margin-bottom: 6px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .btn-opt { background: rgba(255,255,255,0.1); border: 0.4px solid rgba(255,255,255,0.2); color: white; padding: 3px; font-size: 0.35rem; text-align: center; }

        #chat-box {
            position: absolute; bottom: 5%; right: 8.5%; width: 140px; height: 80px;
            display: flex; flex-direction: column-reverse; overflow: hidden;
        }
        .chat-msg { margin-bottom: 3px; padding: 2px 5px; background: rgba(0,0,0,0.6); font-size: 0.45rem; border-radius: 2px; border-left: 2px solid #333; }
    </style>
</head>
<body>

    <div id="rotate-device">
        <div class="phone-icon"></div>
        <p style="font-size: 0.8rem; margin-top: 15px; font-weight: bold;">MODE PAYSAGE REQUIS</p>
        <p style="font-size: 0.6rem; color: #ccc;">Tournez votre téléphone pour entrer dans le studio</p>
    </div>

    <div class="studio-container" id="main-studio">
        <div class="ui-layer" id="ui-layer">
            
            <nav class="top-menu">
                <div class="menu-item">Accueil</div>
                <div class="menu-item">Directs</div>
                <div class="menu-item offset-left">Classement</div>
                <div class="menu-item">Aide</div>
            </nav>

            <div class="auth-zone">
                <span style="color:white; font-size:0.55rem; font-weight:bold;">CONNEXION</span>
                <div style="width:20px; height:20px; border-radius:50%; border:1.5px solid gold; background: #222;"></div>
            </div>

            <div class="candidates-screen">
                <div class="grid-3x2">
                    <div class="c-slot" onclick="showPlayer(0)"><div class="player-modal" id="m0"><b>J1</b><br>Score: 0</div></div>
                    <div class="c-slot" onclick="showPlayer(1)"><div class="player-modal" id="m1"><b>J2</b><br>Score: 0</div></div>
                    <div class="c-slot" onclick="showPlayer(2)"><div class="player-modal" id="m2"><b>J3</b><br>Score: 0</div></div>
                    <div class="c-slot" onclick="showPlayer(3)"><div class="player-modal" id="m3"><b>J4</b><br>Score: 0</div></div>
                    <div class="c-slot" onclick="showPlayer(4)"><div class="player-modal" id="m4"><b>J5</b><br>Score: 0</div></div>
                    <div class="c-slot" onclick="showPlayer(5)"><div class="player-modal" id="m5"><b>J6</b><br>Score: 0</div></div>
                </div>
            </div>

            <div class="question-box" id="q-box">
                <div class="q-text">STUDIO EN DIRECT - PRÊT ?</div>
                <div class="options-grid">
                    <div class="btn-opt">A</div><div class="btn-opt">B</div>
                    <div class="btn-opt">C</div><div class="btn-opt">D</div>
                </div>
            </div>

            <div id="chat-box"></div>
        </div>
    </div>

    <script>
        const studio = document.getElementById('main-studio');
        const uiLayer = document.getElementById('ui-layer');
        let hasStarted = false;

        function checkOrientation() {
            if (window.innerWidth > window.innerHeight && !hasStarted) {
                hasStarted = true;
                // Lance le zoom DIRECTEMENT
                studio.classList.add('animate-zoom');
                setTimeout(() => {
                    uiLayer.classList.add('show');
                    document.getElementById('q-box').classList.add('active');
                    startChat();
                }, 8000); // UI apparaît juste avant la fin du zoom
            }
        }

        // Vérifie à l'ouverture et à chaque mouvement du téléphone
        window.addEventListener('load', checkOrientation);
        window.addEventListener('resize', checkOrientation);

        function showPlayer(id) {
            document.getElementById('m' + id).classList.toggle('show');
        }

        function startChat() {
            const chat = document.getElementById('chat-box');
            const msgs = ["Kinshasa !", "Trop beau le studio", "C'est parti !", "Force aux candidats"];
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'chat-msg';
                div.innerHTML = `<span style="color:var(--tiktok-blue)">Fan:</span> <span style="color:white">${msgs[Math.floor(Math.random()*msgs.length)]}</span>`;
                chat.prepend(div);
                if(chat.childNodes.length > 5) chat.lastChild.remove();
            }, 4000);
        }
    </script>
</body>
</html>
