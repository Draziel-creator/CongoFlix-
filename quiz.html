<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Génie Congo - Studio TV Ultra-Live</title>
    
    <style>
        :root {
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --tiktok-pink: #fe2c55;
            --tiktok-blue: #25f4ee;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;
        }

        #rotate-device {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        @media (orientation: landscape) { #rotate-device { display: none; } }

        .studio-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: var(--overlay-img) no-repeat center;
            background-size: 100% 100%;
            visibility: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        @media (orientation: landscape) { .studio-container { visibility: visible; } }

        .animate-zoom {
            animation: cameraEntry 4s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes cameraEntry { 
            from { background-size: 140% 140%; } 
            to { background-size: 100% 100%; } 
        }

        .ui-layer {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 50;
            pointer-events: none;
        }
        .ui-layer * { pointer-events: auto; }

        /* --- MENU HAUT : ÉLARGI POUR ÉVITER LA CASSE --- */
        .top-menu {
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
            width: 60%; display: flex; justify-content: space-around;
        }
        .menu-item { 
            color: white; font-size: 0.5rem; font-weight: 800; 
            text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            white-space: nowrap;
        }

        .auth-zone { position: absolute; top: 11.5%; right: 9%; display: flex; align-items: center; gap: 5px; }

        /* --- ZONE CANDIDATS : RÉDUITE AU MAXIMUM --- */
        .candidates-screen {
            position: absolute; top: 31%; left: 50%; transform: translateX(-50%);
            width: 14%; height: 16%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
        }
        .candidates-title {
            color: var(--yellow-rdc); font-size: 0.35rem; font-weight: bold;
            margin-bottom: 2px; text-shadow: 0 0 5px rgba(255, 204, 0, 0.5);
        }
        .grid-2x2 { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 3px; 
            width: 100%; height: 75%; 
        }
        .c-slot { 
            background: rgba(255,255,255,0.03); 
            border: 0.3px solid rgba(255,255,255,0.15); 
            border-radius: 1px;
        }

        /* --- MODALE QUESTION --- */
        .question-box {
            position: absolute; bottom: 8%; left: 8%; width: 32%;
            background: rgba(0, 10, 30, 0.85); border-left: 3px solid var(--tiktok-blue);
            padding: 8px; border-radius: 5px; opacity: 0; transition: 1s;
        }
        .question-box.active { opacity: 1; }
        .q-text { color: white; font-size: 0.65rem; font-weight: bold; margin-bottom: 5px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .btn-opt { 
            background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.2);
            color: white; padding: 3px; border-radius: 2px; font-size: 0.45rem; text-align: center;
        }

        /* --- CHAT --- */
        .live-chat {
            position: absolute; bottom: 5%; right: 8%; width: 160px; height: 100px;
            display: flex; flex-direction: column-reverse; overflow: hidden;
        }
        .chat-msg { 
            animation: slideIn 0.3s ease-out; margin-bottom: 3px; padding: 2px 6px; border-radius: 8px;
            background: rgba(0, 0, 0, 0.4); font-size: 0.55rem;
        }
        @keyframes slideIn { from { transform: translateX(15px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .chat-user { font-weight: 800; margin-right: 3px; }
        .user-pink { color: var(--tiktok-pink); }
        .user-blue { color: var(--tiktok-blue); }
        .user-gold { color: var(--yellow-rdc); }

    </style>
</head>
<body>

    <div id="rotate-device">
        <div style="width: 30px; height: 50px; border: 2px solid white; border-radius: 4px; animation: rotate 2s infinite;"></div>
        <p style="font-size: 0.8rem; margin-top: 10px;">BASCULEZ L'ÉCRAN</p>
    </div>

    <div class="studio-container" id="main-studio">
        <div class="ui-layer">
            
            <nav class="top-menu">
                <span class="menu-item">Accueil</span>
                <span class="menu-item">Directs</span>
                <span class="menu-item">Classement</span>
                <span class="menu-item">Aide</span>
            </nav>

            <div class="auth-zone">
                <span style="color:white; font-size:0.45rem; font-weight:800; letter-spacing: 0.5px;">CONNEXION</span>
                <div style="width:18px; height:18px; border-radius:50%; border:1px solid gold; background: radial-gradient(circle, #444, #111);"></div>
            </div>

            <div class="candidates-screen">
                <div class="candidates-title">CANDIDATS</div>
                <div class="grid-2x2">
                    <div class="c-slot"></div>
                    <div class="c-slot"></div>
                    <div class="c-slot"></div>
                    <div class="c-slot"></div>
                </div>
            </div>

            <div class="question-box" id="q-box">
                <div class="q-text">Initialisation...</div>
                <div class="options-grid">
                    <div class="btn-opt">Option A</div>
                    <div class="btn-opt">Option B</div>
                    <div class="btn-opt">Option C</div>
                    <div class="btn-opt">Option D</div>
                </div>
            </div>

            <div class="live-chat" id="chat-box"></div>
        </div>
    </div>

    <script>
        const studio = document.getElementById('main-studio');
        const qBox = document.getElementById('q-box');
        const chatBox = document.getElementById('chat-box');

        function initStudio() {
            if (window.innerWidth > window.innerHeight) {
                studio.classList.add('animate-zoom');
                
                setTimeout(() => {
                    qBox.querySelector('.q-text').innerText = "Quelle est la capitale de la RDC ?";
                    qBox.classList.add('active');
                }, 3000);

                startChat();
            }
        }

        window.addEventListener('resize', () => {
            if (window.innerWidth > window.innerHeight) location.reload();
        });
        
        window.addEventListener('load', initStudio);

        function startChat() {
            const users = [{n:"Maman", c:"user-pink"}, {n:"Kev", c:"user-gold"}, {n:"Ali", c:"user-blue"}];
            setInterval(() => {
                const u = users[Math.floor(Math.random()*users.length)];
                const msg = document.createElement('div');
                msg.className = 'chat-msg';
                msg.innerHTML = `<span class="chat-user ${u.c}">${u.n}:</span><span style="color:white">Go go go !</span>`;
                chatBox.prepend(msg);
                if(chatBox.childNodes.length > 5) chatBox.lastChild.remove();
            }, 2500);
        }
    </script>
</body>
</html>
