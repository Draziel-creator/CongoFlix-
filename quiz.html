<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, landscape">
    <title>Génie Congo - Studio TV Live</title>
    
    <style>
        :root {
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --blue-rdc: #007bff;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Arial', sans-serif;
        }

        /* --- ANIMATION ZOOM ENTRÉE --- */
        .camera-zoom {
            animation: cameraEntry 5s forwards ease-out;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center;
        }

        @keyframes cameraEntry {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .studio-container { position: relative; width: 100%; height: 100%; }

        /* --- EFFET MIROIR GLOBAL --- */
        .mirror-sheen::after {
            content: ""; position: absolute; top: -150%; left: -50%;
            width: 20%; height: 400%; background: rgba(255,255,255,0.1);
            transform: rotate(35deg); animation: mirrorSweep 10s infinite;
            z-index: 30; pointer-events: none;
        }

        @keyframes mirrorSweep {
            0% { left: -50%; } 20% { left: 150%; } 100% { left: 150%; }
        }

        .studio-mask {
            position: absolute; inset: 0;
            background: var(--overlay-img) no-repeat center;
            background-size: 100% 100%; z-index: 10;
            pointer-events: none; image-rendering: high-quality;
        }

        /* --- ZONE CANDIDATS --- */
        .candidates-display {
            position: absolute; top: 32%; width: 38%; height: 25%;
            left: 50%; transform: translateX(-50%);
            z-index: 5; display: flex; flex-direction: column; align-items: center;
        }

        .candidates-title {
            color: var(--yellow-rdc); font-size: 0.6rem; font-weight: bold;
            text-shadow: 0 0 8px var(--yellow-rdc); margin-bottom: 5px;
        }

        .candidates-grid {
            display: flex; justify-content: space-between; width: 100%; height: 100%;
        }

        .side { display: flex; flex-direction: column; gap: 5px; width: 40%; }

        .player-card {
            display: flex; align-items: center; gap: 5px;
            background: rgba(0,0,0,0.5); border-radius: 5px; padding: 2px;
        }

        .p-img { width: 25px; height: 25px; border-radius: 50%; border: 1px solid white; }
        .p-name { color: white; font-size: 0.5rem; white-space: nowrap; overflow: hidden; }

        /* --- NAVIGATION & CONNEXION --- */
        .top-menu {
            position: absolute; top: 4%; width: 58%; height: 8%;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 20; left: 50%; transform: translateX(-50.5%);
        }

        .menu-item { background: transparent; border: none; color: white; font-size: 0.7rem; font-weight: bold; }

        .auth-zone {
            position: absolute; top: 4%; right: 4.5%; z-index: 20;
            display: flex; flex-direction: row-reverse; align-items: center; gap: 8px;
        }

        .auth-label { color: white; font-size: 0.7rem; font-weight: bold; margin-top: 2px; }
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--yellow-rdc); }

        /* --- MODALE VITRINE --- */
        .question-box {
            position: absolute; bottom: -300px; width: 55%;
            background: rgba(0, 30, 60, 0.9); border: 2px solid var(--blue-rdc);
            border-radius: 15px 15px 0 0; padding: 15px; z-index: 25;
            transition: bottom 0.8s cubic-bezier(0.17, 0.84, 0.44, 1);
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.5);
        }

        .question-box.active { bottom: 0; }

        .timer-badge {
            position: absolute; top: 10px; right: 10px;
            background: var(--yellow-rdc); color: black;
            padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 0.8rem;
        }

        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-opt { background: rgba(255,255,255,0.05); border: 1px solid var(--blue-rdc); color: white; padding: 10px; border-radius: 8px; font-size: 0.8rem; }
    </style>
</head>
<body class="mirror-sheen">

    <div class="camera-zoom">
        <div class="studio-container">
            <div class="background-fx"></div>

            <nav class="top-menu">
                <button class="menu-item">Accueil</button>
                <button class="menu-item">Directs</button>
                <button class="menu-item">Classement</button>
                <button class="menu-item">À Propos</button>
            </nav>

            <div class="auth-zone">
                <span class="auth-label">CONNEXION</span>
                <div class="user-avatar"></div>
            </div>

            <!-- ZONE CANDIDATS -->
            <div class="candidates-display">
                <span class="candidates-title">CANDIDATS</span>
                <div class="candidates-grid">
                    <div class="side">
                        <div class="player-card"><div class="p-img"></div><span class="p-name">Joueur 1</span></div>
                        <div class="player-card"><div class="p-img"></div><span class="p-name">Joueur 2</span></div>
                    </div>
                    <div class="side" style="align-items: flex-end;">
                        <div class="player-card" style="flex-direction: row-reverse;"><div class="p-img"></div><span class="p-name">Joueur 3</span></div>
                        <div class="player-card" style="flex-direction: row-reverse;"><div class="p-img"></div><span class="p-name">Joueur 4</span></div>
                    </div>
                </div>
            </div>

            <div class="studio-mask"></div>

            <!-- MODALE -->
            <div class="question-box" id="q-box">
                <div class="timer-badge" id="timer">10s</div>
                <p id="q-text" style="color: white; font-weight: bold; margin-top: 10px;">En attente du match...</p>
                <div class="options-container">
                    <button class="btn-opt">Option A</button>
                    <button class="btn-opt">Option B</button>
                    <button class="btn-opt">Option C</button>
                    <button class="btn-opt">Option D</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simulation de détection de question (monte après 6s pour laisser le zoom finir)
        setTimeout(() => {
            document.getElementById('q-box').classList.add('active');
            document.getElementById('q-text').innerText = "Quelle est la capitale de la RDC ?";
        }, 6000);
    </script>
</body>
</html>
