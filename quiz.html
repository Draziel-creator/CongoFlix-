<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Génie Congo - Studio TV Ultra-Live</title>
    
    <style>
        :root {
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --tiktok-pink: #fe2c55;
            --tiktok-blue: #25f4ee;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;
        }

        #rotate-device {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        @media (orientation: landscape) { #rotate-device { display: none; } }

        .studio-container {
            position: relative; width: 100vw; height: 100vh;
            background: var(--overlay-img) no-repeat center;
            background-size: 100% 100%; visibility: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        @media (orientation: landscape) { .studio-container { visibility: visible; } }

        .animate-zoom {
            animation: cameraEntry 10s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes cameraEntry { 
            from { background-size: 170% 170%; } 
            to { background-size: 100% 100%; } 
        }

        .ui-layer { 
            position: absolute; inset: 0; pointer-events: none; z-index: 50; 
            opacity: 0; transition: opacity 1s ease-in;
        }
        .ui-layer.show { opacity: 1; pointer-events: auto; }

        /* --- MENU DANS LES CADRES SUPÉRIEURS --- */
        .top-menu {
            position: absolute; top: 12.5%; left: 50%; transform: translateX(-50%);
            width: 44.5%; height: 4.5%; display: flex; justify-content: space-between;
        }
        .menu-item { 
            width: 21%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.42rem; font-weight: 900; 
            text-transform: uppercase; text-shadow: 0 1px 2px #000;
        }

        .auth-zone { 
            position: absolute; top: 11.5%; right: 9.3%; 
            display: flex; align-items: center; gap: 5px; 
        }

        /* --- ZONE CANDIDATS : GRILLE 3x2 RÉDUITE --- */
        .candidates-screen {
            position: absolute; top: 26%; left: 50%; transform: translateX(-50%);
            width: 14%; height: 11%; display: flex; flex-direction: column; align-items: center;
        }
        .candidates-title { 
            color: var(--yellow-rdc); font-size: 0.35rem; font-weight: bold; 
            margin-bottom: 2px; letter-spacing: 1px;
        }
        
        .grid-3x2 { 
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); 
            gap: 4px; width: 100%; height: 100%;
        }
        .c-slot { 
            position: relative; background: rgba(255,255,255,0.03); 
            border: 0.3px solid rgba(255,255,255,0.15); border-radius: 1px;
        }

        /* --- MODALES DIRECTIONNELLES --- */
        .player-modal {
            position: absolute; width: 45px; background: rgba(0, 10, 25, 0.95);
            border-radius: 2px; padding: 2px; color: white; font-size: 0.28rem; 
            opacity: 0; transform: scale(0.5); transition: 0.3s; z-index: 100;
            pointer-events: none;
        }
        .player-modal.show { opacity: 1; transform: scale(1); }

        /* Gauche (Slots 1, 4) */
        .c-slot:nth-child(1) .player-modal, .c-slot:nth-child(4) .player-modal { right: 110%; top: 0; border-right: 2px solid var(--tiktok-pink); }
        /* Milieu Haut (Slot 2) */
        .c-slot:nth-child(2) .player-modal { bottom: 110%; left: 50%; transform: translateX(-50%) scale(0.5); border-bottom: 2px solid var(--yellow-rdc); }
        .c-slot:nth-child(2) .player-modal.show { transform: translateX(-50%) scale(1); }
        /* Milieu Bas (Slot 5) */
        .c-slot:nth-child(5) .player-modal { top: 110%; left: 50%; transform: translateX(-50%) scale(0.5); border-top: 2px solid var(--yellow-rdc); }
        .c-slot:nth-child(5) .player-modal.show { transform: translateX(-50%) scale(1); }
        /* Droite (Slots 3, 6) */
        .c-slot:nth-child(3) .player-modal, .c-slot:nth-child(6) .player-modal { left: 110%; top: 0; border-left: 2px solid var(--tiktok-blue); }

        /* --- QUESTION BOX --- */
        .question-box {
            position: absolute; bottom: 9%; left: 8.5%; width: 32%;
            background: rgba(0, 5, 20, 0.9); border-left: 3px solid var(--tiktok-blue);
            padding: 8px; border-radius: 4px; opacity: 0; transform: translateY(10px); transition: 0.8s;
        }
        .question-box.active { opacity: 1; transform: translateY(0); }
        .q-text { color: white; font-size: 0.55rem; font-weight: bold; margin-bottom: 6px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .btn-opt { background: rgba(255,255,255,0.08); border: 0.4px solid rgba(255,255,255,0.2); color: white; padding: 3px; font-size: 0.38rem; text-align: center; border-radius: 2px; }

        #chat-box {
            position: absolute; bottom: 5%; right: 8.5%; width: 140px; height: 80px;
            display: flex; flex-direction: column-reverse; overflow: hidden;
        }
        .chat-msg { margin-bottom: 3px; padding: 2px 6px; background: rgba(0,0,0,0.6); font-size: 0.45rem; border-radius: 3px; border-left: 2px solid #333; }
    </style>
</head>
<body>

    <div id="rotate-device">
        <div style="width: 20px; height: 40px; border: 2px solid white; border-radius: 4px; animation: rotatePhone 2s infinite;"></div>
        <p style="font-size: 0.7rem; margin-top: 10px;">MODE PAYSAGE REQUIS</p>
    </div>

    <div class="studio-container" id="main-studio">
        <div class="ui-layer" id="ui-layer">
            
            <nav class="top-menu">
                <div class="menu-item">Accueil</div>
                <div class="menu-item">Directs</div>
                <div class="menu-item">Classement</div>
                <div class="menu-item">Aide</div>
            </nav>

            <div class="auth-zone">
                <span style="color:white; font-size:0.4rem; font-weight:900;">CONNEXION</span>
                <div style="width:14px; height:14px; border-radius:50%; border:1px solid gold; background: radial-gradient(circle, #555, #000);"></div>
            </div>

            <div class="candidates-screen">
                <div class="candidates-title">CANDIDATS</div>
                <div class="grid-3x2">
                    <div class="c-slot" onclick="showPlayer(0)"><div class="player-modal" id="m0"><b>JOUEUR 1</b><br>Score: 0</div></div>
                    <div class="c-slot" onclick="showPlayer(1)"><div class="player-modal" id="m1"><b>JOUEUR 2</b><br>Score: 0</div></div>
                    <div class="c-slot" onclick="showPlayer(2)"><div class="player-modal" id="m2"><b>JOUEUR 3</b><br>Score: 0</div></div>
                    <div class="c-slot" onclick="showPlayer(3)"><div class="player-modal" id="m3"><b>JOUEUR 4</b><br>Score: 0</div></div>
                    <div class="c-slot" onclick="showPlayer(4)"><div class="player-modal" id="m4"><b>JOUEUR 5</b><br>Score: 0</div></div>
                    <div class="c-slot" onclick="showPlayer(5)"><div class="player-modal" id="m5"><b>JOUEUR 6</b><br>Score: 0</div></div>
                </div>
            </div>

            <div class="question-box" id="q-box">
                <div class="q-text">En attente...</div>
                <div class="options-grid">
                    <div class="btn-opt">A</div><div class="btn-opt">B</div>
                    <div class="btn-opt">C</div><div class="btn-opt">D</div>
                </div>
            </div>

            <div id="chat-box"></div>
        </div>
    </div>

    <script>
        const studio = document.getElementById('main-studio');
        const uiLayer = document.getElementById('ui-layer');
        const qBox = document.getElementById('q-box');

        function startStudio() {
            if (window.innerWidth > window.innerHeight) {
                studio.classList.add('animate-zoom');
                setTimeout(() => {
                    uiLayer.classList.add('show');
                    qBox.classList.add('active');
                    qBox.querySelector('.q-text').innerText = "BIENVENUE SUR GÉNIE CONGO !";
                    startChat();
                    setInterval(autoCycleModals, 15000);
                }, 10000);
            }
        }

        function autoCycleModals() {
            document.querySelectorAll('.player-modal').forEach((m, i) => {
                setTimeout(() => {
                    m.classList.add('show');
                    setTimeout(() => m.classList.remove('show'), 5000);
                }, i * 800);
            });
        }

        function showPlayer(id) {
            document.getElementById('m' + id).classList.toggle('show');
        }

        function startChat() {
            const chat = document.getElementById('chat-box');
            const msgs = ["Kinshasa en force! 🇨🇩", "Magnifique studio !", "Allez les 6 candidats!", "C'est la capitale !"];
            setInterval(() => {
                const div = document.createElement('div');
                div.className = 'chat-msg';
                div.innerHTML = `<span style="color:var(--tiktok-blue)">User:</span> <span style="color:white">${msgs[Math.floor(Math.random()*msgs.length)]}</span>`;
                chat.prepend(div);
                if(chat.childNodes.length > 4) chat.lastChild.remove();
            }, 4500);
        }

        window.onload = startStudio;
    </script>
</body>
</html>
