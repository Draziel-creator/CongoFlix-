<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Génie Congo - Studio Live</title>
    
    <style>
        :root {
            --blue-rdc: #007bff;
            --yellow-rdc: #ffcc00;
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s320/genie%20congo.png');
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* --- LE CONTENEUR PRINCIPAL --- */
        .studio-viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- COUCHE 1 : LES LUMIÈRES ANIMÉES (DERRIÈRE TOUT) --- */
        .lighting-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at 50% 50%, #001a33, #000);
        }

        .beam {
            position: absolute;
            width: 300px;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(0, 123, 255, 0.2), transparent);
            transform: skewX(-20deg);
            animation: sweep 8s infinite alternate ease-in-out;
        }

        @keyframes sweep {
            from { left: -20%; opacity: 0.3; }
            to { left: 110%; opacity: 0.6; }
        }

        /* --- COUCHE 2 : L'ÉCRAN GÉANT (SCORE) --- */
        .giant-screen-content {
            position: absolute;
            top: 35%; 
            z-index: 2;
            text-align: center;
        }
        #live-score { font-size: 80px; color: var(--yellow-rdc); text-shadow: 0 0 20px rgba(255,204,0,0.7); margin: 0; }

        /* --- COUCHE 3 : TON PNG TRANSPARENT (LE MASQUE) --- */
        .studio-mask {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: var(--overlay-img);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
            pointer-events: none; /* Laisse passer les clics vers les boutons */
        }

        /* --- COUCHE 4 : NAVIGATION HAUTE --- */
        .top-nav {
            position: absolute;
            top: 20px;
            width: 80%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--blue-rdc);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-btn:hover { background: var(--blue-rdc); }

        .user-profile {
            position: absolute;
            top: 20px;
            right: 50px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }
        .avatar-circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--yellow-rdc); overflow: hidden; }

        /* --- COUCHE 5 : MODALE QUESTION (MONTE DU BAS) --- */
        .question-modal {
            position: absolute;
            bottom: -300px; /* Caché au début */
            width: 60%;
            background: rgba(0, 20, 40, 0.95);
            border: 2px solid var(--blue-rdc);
            border-radius: 20px 20px 0 0;
            padding: 20px;
            z-index: 10;
            transition: bottom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }

        .question-modal.active { bottom: 0; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .opt-btn { background: #111; border: 1px solid #333; color: white; padding: 10px; cursor: pointer; border-radius: 10px; }
        .opt-btn:hover { background: var(--blue-rdc); }
    </style>
</head>
<body>

<div class="studio-viewport">
    <!-- Lumières -->
    <div class="lighting-layer">
        <div class="beam" style="animation-delay: 0s;"></div>
        <div class="beam" style="animation-delay: 4s; background: rgba(255,204,0,0.1);"></div>
    </div>

    <!-- Navigation -->
    <div class="top-nav">
        <button class="nav-btn">Accueil</button>
        <button class="nav-btn">Matchs en Direct</button>
        <button class="nav-btn">Classement</button>
        <button class="nav-btn">À Propos</button>
    </div>

    <!-- Profil -->
    <div class="user-profile">
        <span id="user-status">Connexion</span>
        <div class="avatar-circle">
            <img src="https://via.placeholder.com/35" alt="user" id="user-img">
        </div>
    </div>

    <!-- Score sur l'écran central -->
    <div class="giant-screen-content">
        <p style="margin:0; font-weight:bold; color:white;">SCORE ACTUEL</p>
        <h1 id="live-score">0</h1>
    </div>

    <!-- LE MASQUE PNG (Ton image) -->
    <div class="studio-mask"></div>

    <!-- MODALE QUESTION -->
    <div class="question-modal" id="q-modal">
        <h3 id="q-text" style="color:white; text-align:center;">Chargement de la question...</h3>
        <div class="options-grid" id="opt-container">
            <!-- Boutons générés par JS -->
        </div>
    </div>
</div>

<script>
    // Fonction pour faire apparaître la question après 2 secondes
    setTimeout(() => {
        document.getElementById('q-modal').classList.add('active');
    }, 2000);

    // Ta logique Firebase ici pour remplir q-text et live-score
</script>

</body>
</html>
