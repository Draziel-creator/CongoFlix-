<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Génie Congo - Studio TV Ultra-Live</title>
    
    <style>
        :root {
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --tiktok-pink: #fe2c55;
            --tiktok-blue: #25f4ee;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* --- ALERTE ROTATION --- */
        #rotate-device { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; color: white; text-align: center;
        }
        .phone-icon {
            width: 50px; height: 80px; border: 3px solid white; border-radius: 5px;
            animation: rotatePhone 2s infinite ease-in-out; margin-bottom: 20px;
        }
        @keyframes rotatePhone { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(0deg); } }
        @media (orientation: landscape) { #rotate-device { display: none; } }

        .studio-container {
            position: relative; width: 100vw; height: 100vh;
            background: var(--overlay-img) no-repeat center;
            background-size: 100% 100%; display: none;
            justify-content: center; align-items: center;
            filter: brightness(1.2);
        }
        @media (orientation: landscape) { .studio-container { display: flex; } }

        /* --- CONNEXION & PROFIL --- */
        .auth-zone {
            position: absolute; 
            top: 4%; 
            right: 2%; /* Poussé à droite pour centrer dans le cadre */
            display: flex; 
            align-items: center; 
            gap: 8px; 
            z-index: 200;
        }
        .login-txt { color: white; font-size: 0.6rem; font-weight: bold; text-transform: uppercase; }
        .prof-circ { width: 22px; height: 22px; border: 1.5px solid var(--tiktok-blue); border-radius: 50%; background: #333; }

        #mirror-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 1000;
            background: linear-gradient(135deg, transparent, var(--tiktok-blue), var(--tiktok-pink), transparent);
            background-size: 300% 300%; opacity: 0;
        }
        .mirror-active { animation: mirrorSlant 1.5s ease-in-out; }
        @keyframes mirrorSlant {
            0% { opacity: 0; background-position: 0% 0%; }
            50% { opacity: 0.5; }
            100% { opacity: 0; background-position: 100% 100%; }
        }

        .animate-zoom { animation: cameraEntry 8s forwards cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes cameraEntry { from { background-size: 180% 180%; } to { background-size: 100% 100%; } }

        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 50; opacity: 0; transition: opacity 1s ease-in; }
        .ui-layer.show { opacity: 1; pointer-events: auto; }

        /* --- SPECTATEURS : 4 BLOCS DE 9 --- */
        .side-zone {
            position: absolute; width: 10.5%; height: 16%;
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 2px; align-items: center; justify-items: center;
        }

        .pos-l1 { top: 23%; left: 1%; }    /* BORD GAUCHE */
        .pos-l2 { top: 23%; left: 20%; } 
        .pos-r1 { top: 23%; right: 18.5%; } 
        .pos-r2 { top: 23%; right: 1%; }   /* BORD DROIT */

        .v-box { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .v-circ { 
            width: 15px; height: 15px; border-radius: 50%; 
            border: 1.2px solid var(--yellow-rdc); background: rgba(0,0,0,0.8);
            box-shadow: 0 0 4px rgba(255, 204, 0, 0.4);
        }
        .v-txt { color: white; font-size: 0.2rem; font-weight: bold; margin-top: 1px; text-align: center; line-height: 1; }
        .v-prov { color: var(--tiktok-blue); font-size: 0.15rem; font-weight: normal; }

        /* --- ZONE JOUEURS CENTRE --- */
        .candidates-screen {
            position: absolute; top: 28%; left: 50%; transform: translateX(-50%); width: 22%;
        }
        .label-joueurs { position: absolute; top: -15px; left: 0; color: var(--yellow-rdc); font-size: 0.45rem; font-weight: bold; text-transform: uppercase; }
        .grid-5x2 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; width: 100%; }
        .c-slot { position: relative; aspect-ratio: 1/1; background: rgba(0,0,0,0.85); border: 0.5px solid rgba(255,255,255,0.2); }

        /* --- UI & CHAT --- */
        .question-box {
            position: absolute; bottom: 8.5%; left: 8.5%; width: 31%;
            background: rgba(0, 5, 20, 0.85); border-left: 3px solid var(--tiktok-blue);
            padding: 8px; border-radius: 4px; opacity: 0; transform: translateY(15px); transition: 0.8s;
        }
        .question-box.active { opacity: 1; transform: translateY(0); }
        .q-text { color: white; font-size: 0.55rem; font-weight: bold; margin-bottom: 6px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .btn-opt { background: rgba(255,255,255,0.15); border: 0.5px solid rgba(255,255,255,0.3); color: white; padding: 4px; font-size: 0.4rem; text-align: center; border-radius: 2px; }

        #chat-box { position: absolute; bottom: 5%; right: 8.5%; width: 150px; height: 90px; display: flex; flex-direction: column-reverse; overflow: hidden; pointer-events: none; }
        .chat-msg { margin-bottom: 4px; padding: 3px 6px; background: rgba(0,0,0,0.7); font-size: 0.55rem; border-radius: 3px; animation: chatFade 0.5s ease-out; }
        @keyframes chatFade { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .chat-name { color: var(--tiktok-blue); font-weight: bold; }
        .chat-text { color: white; }
        .chat-gift { color: var(--yellow-rdc); font-weight: bold; font-size: 0.45rem; }
        
        .top-menu { position: absolute; top: 4%; left: 50%; transform: translateX(-50.5%); width: 58%; height: 8%; display: flex; justify-content: space-around; align-items: center; }
        .menu-item { color: white; font-size: 0.6rem; font-weight: bold; text-transform: uppercase; }

        .player-modal { position: absolute; width: 48px; background: rgba(0, 10, 25, 0.98); border-radius: 2px; padding: 3px; color: white; font-size: 0.28rem; opacity: 0; transform: scale(0.5); transition: 0.3s; z-index: 100; border: 0.5px solid white; pointer-events: none; }
        .player-modal.show { opacity: 1; transform: scale(1); }
        .c-slot:nth-child(5n+1) .player-modal, .c-slot:nth-child(5n+2) .player-modal { right: 115%; top: 0; border-right: 2px solid var(--tiktok-pink); }
        .c-slot:nth-child(5n+3) .player-modal { bottom: 115%; left: 50%; transform: translateX(-50%) scale(0.5); border-bottom: 2px solid var(--yellow-rdc); }
        .c-slot:nth-child(5n+4) .player-modal, .c-slot:nth-child(5n+5) .player-modal { left: 115%; top: 0; border-left: 2px solid var(--tiktok-blue); }
    </style>
</head>
<body>

    <div id="rotate-device">
        <div class="phone-icon"></div>
        <p>MODE PAYSAGE REQUIS</p>
    </div>

    <div id="mirror-overlay"></div>

    <div class="studio-container" id="main-studio">
        <div class="auth-zone">
            <span class="login-txt">Connexion</span>
            <div class="prof-circ"></div>
        </div>

        <div class="ui-layer" id="ui-layer">
            <div class="side-zone pos-l1" id="sz-l1"></div>
            <div class="side-zone pos-l2" id="sz-l2"></div>
            <div class="side-zone pos-r1" id="sz-r1"></div>
            <div class="side-zone pos-r2" id="sz-r2"></div>

            <nav class="top-menu">
                <div class="menu-item">Accueil</div>
                <div class="menu-item">Directs</div>
                <div class="menu-item">Classement</div>
                <div class="menu-item">Aide</div>
            </nav>

            <div class="candidates-screen">
                <div class="label-joueurs">JOUEURS</div>
                <div class="grid-5x2" id="player-grid"></div>
            </div>

            <div class="question-box" id="q-box">
                <div class="q-text" id="main-q">QUI EST LE PÈRE DE L'INDÉPENDANCE DU CONGO ?</div>
                <div class="options-grid">
                    <div class="btn-opt">A: Mobutu</div><div class="btn-opt">B: Lumumba</div>
                    <div class="btn-opt">C: Kasa-Vubu</div><div class="btn-opt">D: Tshombe</div>
                </div>
            </div>

            <div id="chat-box"></div>
        </div>
    </div>

    <script>
        const studio = document.getElementById('main-studio');
        const uiLayer = document.getElementById('ui-layer');
        const mirror = document.getElementById('mirror-overlay');
        const chat = document.getElementById('chat-box');
        let currentModal = 1;

        // IA ANIMATRICE (VOIX)
        function parler(texte) {
            const synthese = window.speechSynthesis;
            const message = new SpeechSynthesisUtterance(texte);
            message.lang = 'fr-FR';
            message.pitch = 1.1; 
            message.rate = 1;
            synthese.speak(message);
        }

        for(let i=1; i<=10; i++) {
            document.getElementById('player-grid').innerHTML += `<div class="c-slot" onclick="showPlayer(${i})"><div class="player-modal" id="m${i}"><b>Joueur ${i}</b><br>Score: 0</div></div>`;
        }

        const names = ["Fan", "Rex", "Luz", "Dan", "Eve", "Madi", "Papy", "Toto", "Lia"];
        const provs = ["Kin", "Goma", "Lub", "Kng"];

        ['sz-l1', 'sz-l2', 'sz-r1', 'sz-r2'].forEach(id => {
            const container = document.getElementById(id);
            for(let i=0; i<9; i++) {
                const pr = provs[Math.floor(Math.random()*provs.length)];
                container.innerHTML += `<div class="v-box"><div class="v-circ"></div><div class="v-txt">${names[i]}</div><div class="v-prov">${pr}</div></div>`;
            }
        });

        function triggerSequence() {
            mirror.classList.add('mirror-active');
            setTimeout(() => {
                mirror.classList.remove('mirror-active');
                document.getElementById('q-box').classList.add('active');
                const question = document.getElementById('main-q').innerText;
                parler("Attention tout le monde ! Voici la question : " + question);
                showOrderly();
            }, 1500);
        }

        function showOrderly() {
            const m = document.getElementById('m' + currentModal);
            if(m) {
                m.classList.add('show');
                parler("C'est au tour du Joueur " + currentModal);
                setTimeout(() => {
                    m.classList.remove('show');
                    parler("Félicitations au joueur " + currentModal + " pour sa réponse !");
                }, 4000);
                currentModal = currentModal >= 10 ? 1 : currentModal + 1;
            }
        }

        function startChat() {
            const msgs = [{n: "Moussa", m: "Force au candidat !"}, {n: "Sarah", m: "C'est Lumumba sûr !", g: "+100 PTS"}, {n: "Gloire", m: "Vrai génie ce J4"}, {n: "Kevin", m: "Incroyable le studio", g: "DIAMANT"}, {n: "Julie", m: "Génie Congo !!!"}];
            setInterval(() => {
                const data = msgs[Math.floor(Math.random()*msgs.length)];
                const div = document.createElement('div');
                div.className = 'chat-msg';
                div.innerHTML = `<span class="chat-name">${data.n}</span>: <span class="chat-text">${data.m}</span> ${data.g ? `<br><span class="chat-gift">${data.g}</span>` : ''}`;
                chat.prepend(div);
                if(chat.childNodes.length > 5) chat.lastChild.remove();
            }, 2500);
        }

        function checkOrientation() {
            if (window.innerWidth > window.innerHeight) {
                studio.classList.add('animate-zoom');
                setTimeout(() => {
                    uiLayer.classList.add('show');
                    parler("Bienvenue dans Génie Congo ! Préparez-vous pour le direct.");
                    startChat();
                    setInterval(triggerSequence, 12000);
                }, 8000);
            }
        }
        window.addEventListener('load', checkOrientation);
        window.addEventListener('resize', checkOrientation);
        function showPlayer(id) { 
            document.getElementById('m' + id).classList.toggle('show');
            if(document.getElementById('m' + id).classList.contains('show')) parler("Présentation du Joueur " + id);
        }
    </script>
</body>
</html>
