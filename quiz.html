<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Génie Congo - Studio TV Ultra-Live</title>
    
    <style>
        :root {
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --tiktok-pink: #fe2c55;
            --tiktok-blue: #25f4ee;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* --- BLOCAGE ROTATION --- */
        #rotate-device {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        @media (orientation: landscape) { #rotate-device { display: none; } }

        /* --- STUDIO PLEIN ÉCRAN --- */
        .studio-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: var(--overlay-img) no-repeat center;
            background-size: 100% 100%;
            visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        @media (orientation: landscape) { .studio-container { visibility: visible; } }

        /* --- ANIMATION ZOOM SUR L'IMAGE SEULEMENT --- */
        .animate-zoom {
            animation: cameraEntry 4s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes cameraEntry { 
            from { background-size: 150% 150%; } 
            to { background-size: 100% 100%; } 
        }

        /* --- INTERFACE FIXE (NE ZOOM PAS) --- */
        .ui-layer {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 50;
            pointer-events: none; /* Laisse cliquer à travers si besoin */
        }
        .ui-layer * { pointer-events: auto; }

        /* --- MENU HAUT REPLACÉ --- */
        .top-menu {
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
            width: 42%; display: flex; justify-content: space-between;
        }
        .menu-item { color: white; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }

        .auth-zone { position: absolute; top: 12%; right: 9%; display: flex; align-items: center; gap: 5px; }

        /* --- ZONE CANDIDATS (Ajustée à l'écran central) --- */
        .candidates-screen {
            position: absolute; top: 29.5%; left: 50%; transform: translateX(-50%);
            width: 20%; height: 20%;
            display: flex; flex-direction: column; align-items: center;
        }
        .candidates-title {
            color: var(--yellow-rdc); font-size: 0.45rem; font-weight: bold;
            margin-bottom: 2px; /* Collé à l'étoile du décor */
        }
        .grid-2x2 { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px; 
            width: 85%; height: 80%; 
        }
        .c-slot { 
            background: rgba(255,255,255,0.05); 
            border: 0.5px solid rgba(255,255,255,0.2); 
            aspect-ratio: 1 / 1; /* Carré parfait */
            border-radius: 2px;
        }

        /* --- MODALE QUESTION --- */
        .question-box {
            position: absolute; bottom: 8%; left: 8%; width: 32%;
            background: rgba(0, 10, 30, 0.9); border-left: 4px solid var(--tiktok-blue);
            padding: 10px; border-radius: 6px; opacity: 0; transition: 1s;
        }
        .question-box.active { opacity: 1; }
        .q-text { color: white; font-size: 0.7rem; font-weight: bold; margin-bottom: 6px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .btn-opt { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 4px; border-radius: 3px; font-size: 0.5rem; text-align: center;
        }

        /* --- CHAT --- */
        .live-chat {
            position: absolute; bottom: 5%; right: 8%; width: 180px; height: 120px;
            display: flex; flex-direction: column-reverse; overflow: hidden;
        }
        .chat-msg { 
            animation: slideIn 0.3s ease-out; margin-bottom: 4px; padding: 3px 8px; border-radius: 10px;
            background: rgba(0, 0, 0, 0.4); font-size: 0.6rem;
        }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .chat-user { font-weight: 800; margin-right: 4px; }
        .user-pink { color: var(--tiktok-pink); }
        .user-blue { color: var(--tiktok-blue); }
        .user-gold { color: var(--yellow-rdc); }

    </style>
</head>
<body>

    <div id="rotate-device">
        <div style="width: 40px; height: 70px; border: 3px solid white; border-radius: 5px; animation: rotate 2s infinite;"></div>
        <p>BASCULEZ L'ÉCRAN</p>
    </div>

    <div class="studio-container" id="main-studio">
        <div class="ui-layer">
            
            <nav class="top-menu">
                <span class="menu-item">Accueil</span>
                <span class="menu-item">Directs</span>
                <span class="menu-item">Classement</span>
                <span class="menu-item">Aide</span>
            </nav>

            <div class="auth-zone">
                <span style="color:white; font-size:0.5rem; font-weight:800;">CONNEXION</span>
                <div style="width:20px; height:20px; border-radius:50%; border:1px solid gold; background:#222;"></div>
            </div>

            <div class="candidates-screen">
                <div class="candidates-title">CANDIDATS</div>
                <div class="grid-2x2">
                    <div class="c-slot"></div>
                    <div class="c-slot"></div>
                    <div class="c-slot"></div>
                    <div class="c-slot"></div>
                </div>
            </div>

            <div class="question-box" id="q-box">
                <div class="q-text">Préparation du plateau...</div>
                <div class="options-grid">
                    <div class="btn-opt">Option A</div>
                    <div class="btn-opt">Option B</div>
                    <div class="btn-opt">Option C</div>
                    <div class="btn-opt">Option D</div>
                </div>
            </div>

            <div class="live-chat" id="chat-box"></div>
        </div>
    </div>

    <script>
        const studio = document.getElementById('main-studio');
        const qBox = document.getElementById('q-box');
        const chatBox = document.getElementById('chat-box');

        function initStudio() {
            if (window.innerWidth > window.innerHeight) {
                // On applique le zoom uniquement sur le container (image de fond)
                studio.classList.add('animate-zoom');
                
                setTimeout(() => {
                    qBox.querySelector('.q-text').innerText = "Quelle est la capitale de la RDC ?";
                    qBox.classList.add('active');
                }, 3500);

                startChat();
            }
        }

        window.addEventListener('resize', initStudio);
        window.addEventListener('load', initStudio);

        function startChat() {
            const users = [{n:"Maman", c:"user-pink"}, {n:"Kev", c:"user-gold"}, {n:"Ali", c:"user-blue"}];
            setInterval(() => {
                const u = users[Math.floor(Math.random()*users.length)];
                const msg = document.createElement('div');
                msg.className = 'chat-msg';
                msg.innerHTML = `<span class="chat-user ${u.c}">${u.n}:</span><span style="color:white">Go go go !</span>`;
                chatBox.prepend(msg);
                if(chatBox.childNodes.length > 4) chatBox.lastChild.remove();
            }, 3000);
        }
    </script>
</body>
</html>
