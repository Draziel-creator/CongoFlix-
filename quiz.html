<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, landscape">
    <title>Génie Congo - Studio TV Ultra-Live</title>
    
    <style>
        :root {
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --blue-rdc: #007bff;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- INTRODUCTION ZOOM BLOQUÉE --- */
        .camera-zoom {
            animation: cameraEntry 5s forwards ease-out;
            width: 100%; height: 100%;
            position: relative;
        }

        @keyframes cameraEntry {
            from { transform: scale(1.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .studio-container { 
            position: relative; width: 100%; height: 100%; 
            display: flex; justify-content: center;
        }

        /* --- STUDIO MASK (FIXE APRÈS ZOOM) --- */
        .studio-mask {
            position: absolute; inset: 0;
            background: var(--overlay-img) no-repeat center;
            background-size: 100% 100%; z-index: 10;
            pointer-events: none;
        }

        /* --- BALAYAGE LASER STUDIO --- */
        .laser-line {
            position: absolute; top: 0; width: 2px; height: 100%;
            background: linear-gradient(to bottom, transparent, var(--blue-rdc), var(--yellow-rdc), transparent);
            z-index: 11; opacity: 0.6;
            animation: laserMove 8s infinite linear;
        }

        @keyframes laserMove {
            0% { left: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }

        /* --- ZONE CANDIDATS (4 CARRÉS) --- */
        .candidates-area {
            position: absolute; top: 35%; width: 40%; height: 20%;
            z-index: 5; display: flex; flex-direction: column; align-items: center;
        }

        .candidates-title {
            color: var(--yellow-rdc); font-size: 0.8rem; font-weight: bold;
            text-shadow: 0 0 10px var(--yellow-rdc); margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .grid-candidats {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            width: 90%; height: 60px;
        }

        .c-slot {
            border: 2px solid rgba(255, 204, 0, 0.3);
            background: rgba(0,0,0,0.6); position: relative;
            border-radius: 4px; overflow: hidden;
        }

        .c-slot::after { content: "Libre"; color: #333; font-size: 0.5rem; position: absolute; bottom: 2px; width: 100%; text-align: center; }

        /* --- CHAT LIVE (À DROITE DU MODALE) --- */
        .live-chat {
            position: absolute; bottom: 20px; right: 2%;
            width: 250px; height: 180px; z-index: 30;
            display: flex; flex-direction: column-reverse;
            mask-image: linear-gradient(to top, black 70%, transparent 100%);
            -webkit-mask-image: linear-gradient(to top, black 70%, transparent 100%);
            overflow: hidden; pointer-events: none;
        }

        .chat-msg {
            color: white; font-size: 0.7rem; padding: 4px 8px;
            animation: msgIn 0.4s ease-out; background: rgba(0,0,0,0.2);
            margin-bottom: 4px; border-radius: 4px;
        }

        .chat-msg b { color: var(--yellow-rdc); }
        .chat-msg i { color: #00ffcc; font-style: normal; }

        @keyframes msgIn { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* --- MODALE ET CONNEXION --- */
        .top-menu { position: absolute; top: 4%; width: 58%; height: 8%; display: flex; justify-content: space-around; z-index: 20; left: 50%; transform: translateX(-50.5%); }
        .menu-item { background: transparent; border: none; color: white; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; cursor: pointer; }

        .auth-zone {
            position: absolute; top: 4.5%; right: 4.5%; z-index: 20;
            display: flex; align-items: center; gap: 10px;
        }
        .user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--yellow-rdc); background: #111; order: 1; }
        .auth-label { color: white; font-size: 0.75rem; font-weight: bold; order: 2; }

        .question-box {
            position: absolute; bottom: -300px; left: 5%; width: 55%;
            background: rgba(0, 20, 50, 0.95); border: 2px solid var(--blue-rdc);
            border-radius: 15px 15px 0 0; padding: 15px; z-index: 25;
            transition: bottom 0.8s cubic-bezier(0.17, 0.84, 0.44, 1);
            box-shadow: 0 -5px 25px rgba(0, 123, 255, 0.3);
        }
        .question-box.active { bottom: 0; }

        .btn-opt { background: rgba(255,255,255,0.05); border: 1px solid var(--blue-rdc); color: white; padding: 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="camera-zoom">
        <div class="studio-container">
            <div class="laser-line"></div>
            
            <nav class="top-menu">
                <button class="menu-item">Accueil</button>
                <button class="menu-item">Directs</button>
                <button class="menu-item">Classement</button>
                <button class="menu-item">À Propos</button>
            </nav>

            <div class="auth-zone">
                <div class="user-avatar"></div>
                <span class="auth-label">CONNEXION</span>
            </div>

            <!-- RÉSERVE POUR 4 CANDIDATS -->
            <div class="candidates-area">
                <div class="candidates-title">CANDIDATS</div>
                <div class="grid-candidats">
                    <div class="c-slot" id="p1"></div>
                    <div class="c-slot" id="p2"></div>
                    <div class="c-slot" id="p3"></div>
                    <div class="c-slot" id="p4"></div>
                </div>
            </div>

            <div class="studio-mask"></div>

            <!-- CHAT LIVE -->
            <div class="live-chat" id="chat-box">
                <!-- Les messages s'insèrent ici -->
            </div>

            <!-- MODALE QUESTION -->
            <div class="question-box" id="q-box">
                <p id="q-text" style="color: white; font-weight: bold; margin: 0;">Analyse de la question en cours...</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <button class="btn-opt">Option A</button>
                    <button class="btn-opt">Option B</button>
                    <button class="btn-opt">Option C</button>
                    <button class="btn-opt">Option D</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simulation du Chat
        const chatBox = document.getElementById('chat-box');
        const events = [
            "<b>Djo</b> a rejoint la salle",
            "<b>Sarah</b> a offert <i>50 points</i> à Joueur 1",
            "<b>Admin</b>: Bonne chance aux candidats !",
            "<b>Moussa</b> a rejoint le live"
        ];

        function addChatMsg() {
            const msg = document.createElement('div');
            msg.className = 'chat-msg';
            msg.innerHTML = events[Math.floor(Math.random() * events.length)];
            chatBox.prepend(msg);
            if(chatBox.childNodes.length > 6) chatBox.lastChild.remove();
        }

        // Lancement du chat après le zoom
        setTimeout(() => {
            setInterval(addChatMsg, 3000);
            document.getElementById('q-box').classList.add('active');
            document.getElementById('q-text').innerText = "Quel est le plus grand fleuve d'Afrique ?";
        }, 6000);
    </script>
</body>
</html>
