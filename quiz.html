<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Génie Congo - Studio TV Ultra-Live</title>
    
    <style>
        :root {
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --tiktok-pink: #fe2c55;
            --tiktok-blue: #25f4ee;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* --- ALERTE ROTATION --- */
        #rotate-device {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        .phone-icon {
            width: 25px; height: 45px; border: 2px solid white; border-radius: 5px;
            position: relative; animation: rotatePhone 2s ease-in-out infinite;
        }
        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
        @media (orientation: landscape) { #rotate-device { display: none; } }

        /* --- STUDIO & ZOOM 10 SECONDES --- */
        .studio-container {
            position: relative; width: 100vw; height: 100vh;
            background: var(--overlay-img) no-repeat center;
            background-size: 100% 100%; visibility: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        @media (orientation: landscape) { .studio-container { visibility: visible; } }

        .animate-zoom {
            animation: cameraEntry 10s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes cameraEntry { 
            from { background-size: 160% 160%; } 
            to { background-size: 100% 100%; } 
        }

        .ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 50; }
        .ui-layer * { pointer-events: auto; }

        /* --- MENU DANS LES CADRES DU PNG --- */
        .top-menu {
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
            width: 42%; height: 5%; display: flex; justify-content: space-between;
        }
        .menu-item { 
            width: 23%; display: flex; align-items: center; justify-content: center;
            color: white; font-size: 0.5rem; font-weight: 900; 
            text-transform: uppercase; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* --- ZONE CANDIDATS : PETITS CADRES --- */
        .candidates-screen {
            position: absolute; top: 31%; left: 50%; transform: translateX(-50%);
            width: 12%; height: 16%; display: flex; flex-direction: column; align-items: center;
        }
        .candidates-title { color: var(--yellow-rdc); font-size: 0.35rem; font-weight: bold; margin-bottom: 2px; }
        
        .grid-2x2 { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px; 
            width: 100%; aspect-ratio: 1/1;
        }
        .c-slot { 
            position: relative; background: rgba(255,255,255,0.02); 
            border: 0.5px solid rgba(255,255,255,0.1); border-radius: 1px;
        }

        /* --- MODALES SORTANT SUR LES CÔTÉS --- */
        .player-modal {
            position: absolute; width: 55px; background: rgba(0, 10, 30, 0.9);
            border-radius: 2px; padding: 2px; color: white; font-size: 0.3rem; 
            opacity: 0; transform: scale(0.5); transition: 0.4s; z-index: 100;
        }
        .c-slot:nth-child(odd) .player-modal { right: 110%; top: 0; border-right: 2px solid var(--tiktok-pink); }
        .c-slot:nth-child(even) .player-modal { left: 110%; top: 0; border-left: 2px solid var(--tiktok-blue); }
        .player-modal.show { opacity: 1; transform: scale(1); }

        .modal-name { color: var(--yellow-rdc); font-weight: 800; border-bottom: 0.1px solid #444; }

        /* --- MODALE QUESTION --- */
        .question-box {
            position: absolute; bottom: 8%; left: 8.5%; width: 32%;
            background: rgba(0, 10, 30, 0.85); border-left: 3px solid var(--tiktok-blue);
            padding: 8px; border-radius: 5px; opacity: 0; transition: 1s;
        }
        .question-box.active { opacity: 1; }
        .q-text { color: white; font-size: 0.65rem; font-weight: bold; margin-bottom: 6px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .btn-opt { background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.2); color: white; padding: 3px; font-size: 0.4rem; text-align: center; border-radius: 2px;}

        /* --- CHAT --- */
        #chat-box {
            position: absolute; bottom: 5%; right: 8.5%; width: 170px; height: 80px;
            display: flex; flex-direction: column-reverse; overflow: hidden;
        }
        .chat-msg { margin-bottom: 2px; padding: 2px 5px; background: rgba(0,0,0,0.5); font-size: 0.5rem; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="rotate-device">
        <div class="phone-icon"></div>
        <p style="font-size: 0.75rem; margin-top: 10px; font-weight: bold;">VEUILLEZ BASCULER L'ÉCRAN</p>
    </div>

    <div class="studio-container" id="main-studio">
        <div class="ui-layer">
            
            <nav class="top-menu">
                <div class="menu-item">Accueil</div>
                <div class="menu-item">Directs</div>
                <div class="menu-item">Classement</div>
                <div class="menu-item">Aide</div>
            </nav>

            <div class="auth-zone">
                <span style="color:white; font-size:0.45rem; font-weight:900;">CONNEXION</span>
                <div style="width:18px; height:18px; border-radius:50%; border:1px solid gold; background: #111;"></div>
            </div>

            <div class="candidates-screen">
                <div class="candidates-title">CANDIDATS</div>
                <div class="grid-2x2">
                    <div class="c-slot" onclick="toggleModal(0)"><div class="player-modal" id="m0"><span class="modal-name">Candidate 1</span><br>Score: 500</div></div>
                    <div class="c-slot" onclick="toggleModal(1)"><div class="player-modal" id="m1"><span class="modal-name">Candidate 2</span><br>Score: 450</div></div>
                    <div class="c-slot" onclick="toggleModal(2)"><div class="player-modal" id="m2"><span class="modal-name">Candidate 3</span><br>Score: 300</div></div>
                    <div class="c-slot" onclick="toggleModal(3)"><div class="player-modal" id="m3"><span class="modal-name">Candidate 4</span><br>Score: 600</div></div>
                </div>
            </div>

            <div class="question-box" id="q-box">
                <div class="q-text">Mise en place du plateau...</div>
                <div class="options-grid">
                    <div class="btn-opt">Option A</div>
                    <div class="btn-opt">Option B</div>
                    <div class="btn-opt">Option C</div>
                    <div class="btn-opt">Option D</div>
                </div>
            </div>

            <div id="chat-box"></div>
        </div>
    </div>

    <script>
        const studio = document.getElementById('main-studio');
        const qBox = document.getElementById('q-box');
        const chatBox = document.getElementById('chat-box');

        function initStudio() {
            if (window.innerWidth > window.innerHeight) {
                studio.classList.add('animate-zoom');
                setTimeout(() => {
                    qBox.querySelector('.q-text').innerText = "Quelle est la capitale de la RDC ?";
                    qBox.classList.add('active');
                }, 5000);

                // Sortie automatique des noms toutes les 15s pour 4s
                setInterval(autoShowModals, 15000);
                startChat();
            }
        }

        function autoShowModals() {
            document.querySelectorAll('.player-modal').forEach((m, i) => {
                setTimeout(() => {
                    m.classList.add('show');
                    setTimeout(() => m.classList.remove('show'), 4000);
                }, i * 400);
            });
        }

        function toggleModal(id) {
            document.getElementById('m' + id).classList.toggle('show');
        }

        function startChat() {
            const users = [{n:"Jean", c:"#25f4ee"}, {n:"Sarah", c:"#fe2c55"}, {n:"RDC_User", c:"#ffcc00"}];
            setInterval(() => {
                const u = users[Math.floor(Math.random()*users.length)];
                const msg = document.createElement('div');
                msg.className = 'chat-msg';
                msg.innerHTML = `<span style="color:${u.c}; font-weight:bold">${u.n}:</span> <span style="color:white">Bonne chance !</span>`;
                chatBox.prepend(msg);
                if(chatBox.childNodes.length > 4) chatBox.lastChild.remove();
            }, 4000);
        }

        window.addEventListener('load', initStudio);
        window.addEventListener('resize', () => { if (window.innerWidth > window.innerHeight) location.reload(); });
    </script>
</body>
</html>
