<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Génie Congo - Studio TV Ultra-Live</title>
    
    <style>
        :root {
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --tiktok-pink: #fe2c55;
            --tiktok-blue: #25f4ee;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* --- BLOCAGE ROTATION --- */
        #rotate-device {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        @media (orientation: landscape) { #rotate-device { display: none; } }
        
        .phone-icon {
            width: 50px; height: 80px; border: 3px solid white; border-radius: 5px;
            animation: rotateAnim 2s infinite; margin-bottom: 20px;
        }
        @keyframes rotateAnim { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(90deg); } }

        /* --- STUDIO PLEIN ÉCRAN --- */
        .studio-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: var(--overlay-img) no-repeat center;
            background-size: 100% 100%; /* Remplit tout l'écran */
            visibility: hidden;
        }
        @media (orientation: landscape) { .studio-container { visibility: visible; } }

        /* --- ZOOM POST-ROTATION --- */
        .camera-zoom { 
            width: 100%; height: 100%; position: relative;
        }
        .animate-zoom {
            animation: cameraEntry 4s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes cameraEntry { 
            from { transform: scale(1.5); opacity: 0; } 
            to { transform: scale(1); opacity: 1; } 
        }

        /* --- MENU HAUT --- */
        .top-menu {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            width: 45%; display: flex; justify-content: space-between; z-index: 100;
        }
        .menu-item { color: white; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        .auth-zone { position: absolute; top: 10%; right: 8%; z-index: 100; display: flex; align-items: center; gap: 5px; }
        .user-avatar { width: 25px; height: 25px; border-radius: 50%; border: 1.5px solid var(--yellow-rdc); background: #333; }

        /* --- ZONE CANDIDATS (Écran Central Noir) --- */
        .candidates-screen {
            position: absolute; top: 32%; left: 50%; transform: translateX(-50%);
            width: 22%; height: 22%; z-index: 15;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .candidates-title {
            color: var(--yellow-rdc); font-size: 0.5rem; font-weight: bold; margin-bottom: 5px;
        }
        .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; width: 90%; height: 60%; }
        .c-slot { background: rgba(255,255,255,0.1); border: 0.5px solid rgba(255,255,255,0.3); border-radius: 2px; }

        /* --- MODALE QUESTION (Coins gauche) --- */
        .question-box {
            position: absolute; bottom: 5%; left: 5%; width: 35%;
            background: rgba(0, 10, 30, 0.85); border-left: 4px solid var(--tiktok-blue);
            padding: 12px; border-radius: 8px; z-index: 200;
            transform: translateY(20px); opacity: 0; transition: 0.8s;
        }
        .question-box.active { transform: translateY(0); opacity: 1; }
        .q-text { color: white; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .btn-opt { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 5px; border-radius: 4px; font-size: 0.55rem; text-align: center;
        }

        /* --- CHAT STYLE TIKTOK (Droite) --- */
        .live-chat {
            position: absolute; bottom: 5%; right: 5%; width: 200px; height: 150px;
            display: flex; flex-direction: column-reverse; overflow: hidden; z-index: 200;
        }
        .chat-msg { 
            animation: slideIn 0.3s ease-out;
            margin-bottom: 6px; padding: 4px 10px; border-radius: 15px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);
            font-size: 0.65rem; line-height: 1.2; max-width: 90%;
        }
        @keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .chat-user { font-weight: 800; margin-right: 5px; }
        .user-pink { color: var(--tiktok-pink); }
        .user-blue { color: var(--tiktok-blue); }
        .user-gold { color: var(--yellow-rdc); }
        .chat-text { color: #fff; }

    </style>
</head>
<body>

    <div id="rotate-device">
        <div class="phone-icon"></div>
        <p style="font-weight: bold;">CONNEXION AU STUDIO...</p>
        <small>Basculez votre écran pour le direct</small>
    </div>

    <div class="studio-container" id="main-studio">
        <div class="camera-zoom" id="zoom-layer">
            
            <nav class="top-menu">
                <span class="menu-item">Accueil</span>
                <span class="menu-item">Directs</span>
                <span class="menu-item">Classement</span>
                <span class="menu-item">Aide</span>
            </nav>

            <div class="auth-zone">
                <span style="color:white; font-size:0.55rem; font-weight:800;">CONNEXION</span>
                <div class="user-avatar"></div>
            </div>

            <div class="candidates-screen">
                <div class="candidates-title">CANDIDATS EN LIGNE</div>
                <div class="grid-2x2">
                    <div class="c-slot"></div>
                    <div class="c-slot"></div>
                    <div class="c-slot"></div>
                    <div class="c-slot"></div>
                </div>
            </div>

            <div class="question-box" id="q-box">
                <div class="q-text">Chargement du défi...</div>
                <div class="options-grid">
                    <div class="btn-opt">Option A</div>
                    <div class="btn-opt">Option B</div>
                    <div class="btn-opt">Option C</div>
                    <div class="btn-opt">Option D</div>
                </div>
            </div>

            <div class="live-chat" id="chat-box"></div>

        </div>
    </div>

    <script>
        const zoomLayer = document.getElementById('zoom-layer');
        const qBox = document.getElementById('q-box');
        const chatBox = document.getElementById('chat-box');

        // Détecter le passage en paysage pour lancer le zoom
        function checkOrientation() {
            if (window.innerWidth > window.innerHeight) {
                zoomLayer.classList.add('animate-zoom');
                startLiveSimulation();
            }
        }

        window.addEventListener('resize', checkOrientation);
        window.addEventListener('load', checkOrientation);

        function startLiveSimulation() {
            // Afficher la question après 3s
            setTimeout(() => {
                qBox.querySelector('.q-text').innerText = "Quelle est la capitale de la RDC ?";
                qBox.classList.add('active');
            }, 3000);

            // Simulation Chat TikTok
            const users = [
                {n: "Maman", c: "user-pink"},
                {n: "Ali_Kin", c: "user-blue"},
                {n: "Kev243", c: "user-gold"},
                {n: "Admin", c: "user-gold"}
            ];
            const texts = ["Bonne chance !", "Je connais la réponse !", "C'est Kinshasa !", "Go go go !", "Offre 10 pts 🎁"];

            setInterval(() => {
                const user = users[Math.floor(Math.random()*users.length)];
                const text = texts[Math.floor(Math.random()*texts.length)];
                
                const msg = document.createElement('div');
                msg.className = 'chat-msg';
                msg.innerHTML = `<span class="chat-user ${user.c}">${user.n}</span><span class="chat-text">${text}</span>`;
                
                chatBox.prepend(msg);
                if(chatBox.childNodes.length > 5) chatBox.lastChild.remove();
            }, 2500);
        }
    </script>
</body>
</html>
