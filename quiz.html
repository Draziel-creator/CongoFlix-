<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, landscape">
    <title>Génie Congo - Studio HD</title>
    
    <style>
        :root {
            /* Passage en s1600 pour la clarté HD */
            --overlay-img: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgv3Xb1xi808ij28d3b0nFah5mYidUcRD06nUga1R9L9d2JgQt-LAoQ0DNVZ7-6O8v4IkTc-hIrcLcvFwjUAz9LPJvjKqBPGzwwV6Byu57IWdU9BFUZfWCPk-2kCWMh1d5Naitqy1qugZ6iYGNl35-qVVqXt6GRajtV-cUpo-oqREvmUE9ORU752-J0AAEg/s1600/genie%20congo.png');
            --blue-rdc: #007bff;
            --yellow-rdc: #ffcc00;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Arial', sans-serif;
        }

        .studio-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
        }

        /* --- FOND ET LUMIÈRES --- */
        .background-fx {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #001a33, #000);
            z-index: 1;
        }

        .light-sweep {
            position: absolute;
            width: 200px; height: 100%;
            background: linear-gradient(to right, transparent, rgba(0, 123, 255, 0.15), transparent);
            transform: skewX(-25deg);
            animation: moveLight 6s infinite alternate ease-in-out;
        }

        @keyframes moveLight {
            from { left: -20%; } to { left: 110%; }
        }

        /* --- L'IMAGE MASQUE (STUDIO) --- */
        .studio-mask {
            position: absolute;
            inset: 0;
            background-image: var(--overlay-img);
            background-size: 100% 100%; /* S'adapte parfaitement à l'écran paysage */
            background-repeat: no-repeat;
            z-index: 10;
            pointer-events: none;
            /* Force la clarté */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
        }

        /* --- NAVIGATION HAUTE (Dans tes cadres noirs) --- */
        .top-menu {
            position: absolute;
            top: 4%; /* Ajusté pour Screenshot_20260514-154433.jpg */
            width: 58%;
            height: 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            left: 50%;
            transform: translateX(-50.5%);
        }

        .menu-item {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 23%; /* Correspond à tes 4 cadres */
            text-align: center;
        }

        /* --- ZONE CONNEXION --- */
        .auth-zone {
            position: absolute;
            top: 4%;
            right: 4.5%;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .user-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: 2px solid var(--yellow-rdc);
            background: #222;
        }

        /* --- ÉCRAN CENTRAL (SCORE) --- */
        .center-display {
            position: absolute;
            top: 38%;
            z-index: 5;
            text-align: center;
        }

        #score-val {
            font-size: 3.5rem;
            color: var(--yellow-rdc);
            margin: 0;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
        }

        /* --- MODALE QUESTION (BAS) --- */
        .question-box {
            position: absolute;
            bottom: -300px;
            width: 55%;
            background: rgba(0, 10, 30, 0.9);
            border: 2px solid var(--blue-rdc);
            border-bottom: none;
            border-radius: 15px 15px 0 0;
            padding: 15px;
            z-index: 25;
            transition: bottom 0.6s cubic-bezier(0.17, 0.84, 0.44, 1);
            text-align: center;
        }

        .question-box.active { bottom: 0; }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-opt {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 123, 255, 0.5);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .btn-opt:hover { background: var(--blue-rdc); }

    </style>
</head>
<body>

    <div class="studio-container">
        <!-- Effets de fond -->
        <div class="background-fx">
            <div class="light-sweep"></div>
        </div>

        <!-- Navigation (Placée dans tes cadres) -->
        <nav class="top-menu">
            <button class="menu-item">Accueil</button>
            <button class="menu-item">Directs</button>
            <button class="menu-item">Classement</button>
            <button class="menu-item">À Propos</button>
        </nav>

        <!-- Login -->
        <div class="auth-zone">
            <span id="login-text">CONNEXION</span>
            <div class="user-avatar"></div>
        </div>

        <!-- Score Central -->
        <div class="center-display">
            <h2 id="score-val">0</h2>
        </div>

        <!-- Ton Image de Studio (Le Masque) -->
        <div class="studio-mask"></div>

        <!-- La Question -->
        <div class="question-box" id="q-box">
            <p id="q-text" style="color: white; font-weight: bold; margin: 0;">Chargement du défi...</p>
            <div class="options-container">
                <button class="btn-opt">Option A</button>
                <button class="btn-opt">Option B</button>
                <button class="btn-opt">Option C</button>
                <button class="btn-opt">Option D</button>
            </div>
        </div>
    </div>

    <script>
        // Animation : La question monte après 1.5 seconde
        setTimeout(() => {
            document.getElementById('q-box').classList.add('active');
        }, 1500);
    </script>

</body>
</html>
