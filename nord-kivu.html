        .verify-icon { color: var(--blue-verify); font-size: 14px; }

        .meta-info span { color: var(--gold); font-weight: bold; }

        .btn-play { background: #fff; color: #000; border: none; padding: 8px 18px; border-radius: 6px; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; width: fit-content; }

</head>

### Les Fonctionnalités de ce Nouveau Code :

1.  **Firebase Dynamique :** Fini la modification du HTML. Ta page `nord-kivu.html` est maintenant une coquille vide intelligente. Dès qu'elle s'ouvre, elle demande à Firebase : *"Donne-moi tous les films qui sont au Nord-Kivu"*. Firebase répond, et ton code crée les miniatures automatiquement.
2.  **Mise à jour Instantanée :** Ajoute un film dans Firebase avec `province: "nord-kivu"`, et il apparaît sur ton application sans rien toucher d'autre.
3.  **Barre de Recherche avec Typewriter :** À côté du bouton retour, une barre de recherche animée affiche des mots qui changent en boucle (ex: "Mushota...", "Série...", "HD..."). Ce n'est que de la décoration pour faire pro, mais dès que l'utilisateur tape une vraie lettre, le filtrage commence.

5.  **Bouton Retour W1 :** Le bouton retour pointe vers `appcreator24://section/W1`.

                            <img src="${movie.miniature || '[https://via.placeholder.com/110x130?text=No+Image](https://via.placeholder.com/110x130?text=No+Image)'}" alt="Poster">
                            <div class="quality-tag">HD ${movie.annee || '2026'}</div>
                        </div>
                        <div class="details">
                            <div class="title-row">
                                <div class="movie-name">${movie.titre || 'Sans titre'}</div>
                                <i class="fa-solid fa-circle-check verify-icon"></i>
                            </div>
                            <div class="meta-info">
                                ${movie.type || 'Série'} <span>• Français</span>
                            </div>
                            <button class="btn-play">
                                <i class="fa-solid fa-play"></i> REGARDER
                            </button>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += card;
            });
        }

        // --- 4. GESTION DE LA RECHERCHE EN TEMPS RÉEL ---
        const searchInput = document.getElementById('searchInput');
        const searchPlaceholder = document.getElementById('searchPlaceholder');

        // Cache/Affiche le placeholder animé selon que l'utilisateur tape ou non
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value;
            searchPlaceholder.style.display = val.length > 0 ? "none" : "flex";
            
            // FILTRAGE LOCAL (Très rapide)
            const filteredMovies = allMovies.filter(movie => {
                const titre = (movie.titre || "").toLowerCase();
                return titre.includes(val.toLowerCase());
            });
            
            // Re-render avec la liste filtrée
            renderMovieList(filteredMovies);
        });

        // --- 5. ANIMATION TYPEWRITER DECORATIVE ---
        const words = ["Mushota vs Karani...", "Séries Nord-Kivu...", "Films en HD...", "CongoFlix..."];
        const textElement = document.getElementById("typewriter-text");
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function type() {
            const currentWord = words[wordIndex];
            if (isDeleting) {
                textElement.textContent = currentWord.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.textContent = currentWord.substring(0, charIndex + 1);
                charIndex++;
            }

            let typeSpeed = isDeleting ? 50 : 100; // Plus vite en effaçant

            if (!isDeleting && charIndex === currentWord.length) {
                // Mot fini, pause avant effaçage
                typeSpeed = 2000;
                isDeleting = true;
            } else if (isDeleting && charIndex === 0) {
                // Mot effacé, mot suivant
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        // Lancement initial
        window.addEventListener('load', () => {
            type();
            loadMovies();
        });

    </script>

</body>
</html>
