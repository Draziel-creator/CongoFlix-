<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CongoFlix - Nord-Kivu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --gold: #ffd700; 
            --bg: #000; 
            --card-bg: #121212; 
        }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0;
        }

        /* ZONE DU HAUT (PUB + BOUTONS FLOTTANTS) */
        .hero-container {
            position: relative;
            width: 100%;
            height: 280px; /* Taille pour la bannière pub */
            background: #111;
        }

        /* Éléments par-dessus la pub */
        .floating-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none; /* Pour cliquer sur la pub à travers */
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 50%, rgba(0,0,0,0.8) 100%);
        }

        .top-nav {
            display: flex;
            align-items: center;
            padding: 15px;
            pointer-events: auto; /* Active les clics sur retour et recherche */
        }

        /* LE BOUTON RETOUR (Inspiré de ton exemple mais transparent) */
        .back-link {
            text-decoration: none;
            margin-right: 15px;
        }

        .back-circle {
            width: 40px;
            height: 40px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(0, 0, 0, 0.4); /* Fond sombre transparent */
            backdrop-filter: blur(5px);
            transform: rotate(180deg); /* Pour que la flèche pointe à gauche */
        }

        .search-bar {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            border: 1px solid rgba(255,215,0,0.3);
            display: flex;
            align-items: center;
            padding: 0 15px;
            height: 40px;
        }

        #searchInput {
            background: transparent;
            border: none;
            color: white;
            padding-left: 10px;
            width: 100%;
            outline: none;
        }

        /* TITRE PROVINCE AVEC LUMIÈRE JAUNE LARGEUR TOTALE */
        .province-glow-bar {
            width: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.5), transparent);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
            padding: 8px 0;
            text-align: center;
        }

        .province-title {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            margin: 0;
        }

        /* LISTE DES FILMS */
        .content { padding: 15px; }
        
        #movie-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .movie-card {
            display: flex;
            background: var(--card-bg);
            border: 1.5px solid #333;
            border-radius: 12px;
            height: 110px;
            overflow: hidden;
            text-decoration: none;
        }

        .info-box {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .m-title { color: var(--gold); font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .m-meta { font-size: 11px; color: #aaa; }

        .m-poster { width: 100px; flex-shrink: 0; }
        .m-poster img { width: 100%; height: 100%; object-fit: cover; }

        #loading { text-align: center; padding: 50px; color: var(--gold); }
    </style>
</head>
<body>

    <div class="hero-container">
        <div id="ad-zone" style="width:100%; height:100%;">
            </div>

        <div class="floating-overlay">
            <div class="top-nav">
                <a href="go:W1" class="back-link">
                    <div class="back-circle">➔</div>
                </a>
                <div class="search-bar">
                    <i class="fa-solid fa-search" style="color:var(--gold)"></i>
                    <input type="text" id="searchInput" placeholder="Rechercher...">
                </div>
            </div>

            <div class="province-glow-bar">
                <h1 class="province-title">NORD-KIVU</h1>
            </div>
        </div>
    </div>

    <div class="content">
        <div id="loading"><i class="fa-solid fa-spinner fa-spin"></i> Connexion au serveur...</div>
        <div id="movie-list"></div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCSdIitm-2_0hC1a01_ssztFUPkEsSA_lY",
            authDomain: "congo-streaming-51333.firebaseapp.com",
            projectId: "congo-streaming-51333",
            storageBucket: "congo-streaming-51333.appspot.com",
            appId: "1:304286627819:web:ee606adc4f6b4002054bae"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let moviesData = [];

        function getMovies() {
            // On cherche : province = nord-kivu
            db.collection("films").where("province", "==", "nord-kivu")
            .get().then((querySnapshot) => {
                document.getElementById('loading').style.display = 'none';
                moviesData = [];
                querySnapshot.forEach((doc) => {
                    moviesData.push({ id: doc.id, ...doc.data() });
                });
                displayMovies(moviesData);
            });
        }

        function displayMovies(arr) {
            const container = document.getElementById('movie-list');
            container.innerHTML = "";
            arr.forEach(m => {
                container.innerHTML += `
                    <a href="player.html?id=${m.id}" class="movie-card">
                        <div class="info-box">
                            <div class="m-title">${m.titre}</div>
                            <div class="m-meta">${m.type || 'Série'} • <span>${m.langue || 'Français'}</span></div>
                        </div>
                        <div class="m-poster">
                            <img src="${m.miniature}">
                        </div>
                    </a>
                `;
            });
        }

        // Recherche en direct
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = moviesData.filter(m => m.titre.toLowerCase().includes(term));
            displayMovies(filtered);
        });

        window.onload = getMovies;
    </script>
</body>
</html>
