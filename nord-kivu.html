<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CongoFlix - Nord-Kivu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --gold: #ffd700; 
            --blue-verify: #1d9bf0;
            --bg: #000; 
            --card-bg: #121212; 
            --search-bg: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0;
            padding-top: env(safe-area-inset-top);
        }

        .hero-section {
            position: relative;
            width: 100%;
            height: 300px; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .overlay-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; 
            pointer-events: none; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 40%, rgba(0,0,0,0.9) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
        }

        .top-bar { display: flex; align-items: center; gap: 15px; pointer-events: auto; }
        .back-btn { color: #fff; font-size: 22px; text-decoration: none; }

        .search-box {
            flex: 1;
            height: 40px;
            background: var(--search-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.2);
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: relative;
        }

        #searchInput {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .province-label {
            width: 100%;
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            animation: shine 3s infinite alternate;
        }

        @keyframes shine {
            from { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--gold); opacity: 0.8; }
            to { text-shadow: 0 0 10px #fff, 0 0 30px var(--gold), 0 0 50px var(--gold); opacity: 1; }
        }

        .container { padding: 15px; }
        
        #movie-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .movie-card { 
            display: flex; 
            background: var(--card-bg); 
            border-radius: 12px; 
            height: 130px; 
            overflow: hidden; 
            border: 1px solid #222;
            cursor: pointer;
        }

        .poster-box { 
            width: 110px; 
            height: 100%; 
            flex-shrink: 0; 
            position: relative; 
            background: #222;
        }

        /* Ajustement pour que l'image entre toujours parfaitement */
        .poster-box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center;
        }

        .quality-tag { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); font-size: 9px; padding: 2px 4px; border-radius: 2px; color: var(--gold); }

        .details { flex: 1; padding: 12px; display: flex; flex-direction: column; justify-content: center; }
        .movie-name { font-size: 16px; font-weight: 800; color: #fff; text-transform: uppercase; margin-bottom: 5px; }
        .meta-info { font-size: 11px; color: #888; margin-bottom: 12px; }
        .meta-info span { color: var(--gold); font-weight: bold; }

        .btn-play { background: #fff; color: #000; border: none; padding: 8px 18px; border-radius: 6px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 8px; width: fit-content; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="overlay-elements">
            <div class="top-bar">
                <a href="go:W1" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Rechercher une série...">
                </div>
            </div>
            <div class="province-label">NORD-KIVU</div>
        </div>
    </div>

    <div class="container">
        <div id="loading">Connexion...</div>
        <div id="movie-list"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCSdIitm-2_0hC1a01_ssztFUPkEsSA_lY",
            authDomain: "congo-streaming-51333.firebaseapp.com",
            projectId: "congo-streaming-51333",
            storageBucket: "congo-streaming-51333.firebasestorage.app",
            appId: "1:304286627819:web:ee606adc4f6b4002054bae"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allMovies = []; 

        function loadMovies() {
            db.collection("films").where("province", "==", "nord-kivu").get().then((querySnapshot) => {
                document.getElementById('loading').style.display = "none";
                querySnapshot.forEach((doc) => { allMovies.push({ id: doc.id, ...doc.data() }); });
                renderMovieList(allMovies);
            });
        }

        function renderMovieList(movies) {
            const container = document.getElementById('movie-list');
            container.innerHTML = ""; 
            movies.forEach((movie) => {
                // Utilisation du champ 'poster' et gestion des infos vides
                const posterImg = movie.poster || 'https://via.placeholder.com/110x130?text=No+Image';
                const anneeProd = movie.annee ? `HD ${movie.annee}` : "HD";
                const langueInfo = movie.langue ? ` • ${movie.langue}` : "";

                container.innerHTML += `
                    <div class="movie-card" onclick="window.location.href='https://draziel-creator.github.io/CongoFlix-/player.html?id=${movie.id}'">
                        <div class="poster-box">
                            <img src="${posterImg}" alt="Poster">
                            <div class="quality-tag">${anneeProd}</div>
                        </div>
                        <div class="details">
                            <div class="movie-name">${movie.titre || 'Sans titre'}</div>
                            <div class="meta-info">${movie.type || 'Série'}${langueInfo}</div>
                            <button class="btn-play"><i class="fa-solid fa-play"></i> REGARDER</button>
                        </div>
                    </div>`;
            });
        }

        window.onload = loadMovies;
    </script>
</body>
</html>
