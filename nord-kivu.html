<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoFlix - Province</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --bg: #000; --card: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }

        header { padding: 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 15px; }
        .back-home { color: var(--gold); text-decoration: none; font-size: 20px; }
        h1 { font-size: 18px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .container { padding: 15px; }

        /* STYLE MINIATURE : IMAGE À DROITE, INFOS À GAUCHE */
        .movie-card { 
            background: var(--card); 
            border-radius: 15px; 
            margin-bottom: 15px; 
            display: flex; 
            overflow: hidden; 
            border: 1px solid #222;
            height: 140px;
            cursor: pointer;
        }

        .movie-info { 
            flex: 1; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }

        .movie-title { 
            font-size: 16px; 
            font-weight: bold; 
            color: var(--gold); 
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-group { display: flex; gap: 10px; }
        
        .btn-action { 
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-play { background: var(--gold); color: #000; }
        .btn-dl { background: #222; color: var(--gold); border: 1px solid var(--gold); }

        .movie-poster { 
            width: 100px; 
            height: 100%; 
            object-fit: cover; 
            border-left: 1px solid #222;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 id="provinceTitle">Films du Nord-Kivu</h1>
    </header>

    <div class="container">

        <div class="movie-card" onclick="ouvrirFilm('MAMAN_01', 'nord-kivu')">
            <div class="movie-info">
                <h2 class="movie-title">Maman (L'ouverture)</h2>
                <div class="btn-group">
                    <div class="btn-action btn-play"><i class="fa-solid fa-play"></i> VOIR</div>
                    <div class="btn-action btn-dl"><i class="fa-solid fa-download"></i></div>
                </div>
            </div>
            <img src="https://i.ibb.co/vC18txxm/Chat-GPT-Image-5-avr-2026-07-23-46.png" class="movie-poster">
        </div>

        <div class="movie-card" onclick="ouvrirFilm('MUSHOTA_01', 'nord-kivu')">
            <div class="movie-info">
                <h2 class="movie-title">Mushota vs Karani</h2>
                <div class="btn-group">
                    <div class="btn-action btn-play"><i class="fa-solid fa-play"></i> VOIR</div>
                    <div class="btn-action btn-dl"><i class="fa-solid fa-download"></i></div>
                </div>
            </div>
            <img src="https://votre-image-mushota.jpg" class="movie-poster">
        </div>

    </div>

    <script>
        function ouvrirFilm(id, province) {
            // On enregistre les infos dans la mémoire du téléphone (la poche)
            localStorage.setItem('film_choisi', id);
            localStorage.setItem('page_retour', province);
            
            // On change de page vers le lecteur
            window.location.href = "player.html";
        }
    </script>

</body>
</html>
