<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CongoFlix - Nord-Kivu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --gold: #ffd700; 
            --blue-verify: #1d9bf0;
            --bg: #000; 
            --card-bg: #121212; 
        }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0;
            padding-top: env(safe-area-inset-top);
        }

        /* SECTION PUB PLEIN ÉCRAN (HAUT) */
        .hero-ad-section {
            position: relative;
            width: 100%;
            height: 280px; /* Ajusté pour laisser de la place à la bannière 300x250 */
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .ad-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .overlay-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 50%, rgba(0,0,0,0.9) 100%);
        }

        .back-btn { 
            position: absolute; 
            top: 20px; 
            left: 15px; 
            pointer-events: auto;
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .province-label {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 2px 2px 15px rgba(0,0,0,1);
        }

        /* LISTE DES FILMS */
        .container { padding: 20px 15px; }
        
        .movie-card { 
            display: flex; 
            background: var(--card-bg); 
            border-radius: 12px; 
            margin-bottom: 20px; 
            height: 130px; 
            overflow: hidden; 
            border: 1px solid #222;
            cursor: pointer;
        }

        .poster-area { width: 110px; height: 100%; flex-shrink: 0; position: relative; }
        .poster-area img { width: 100%; height: 100%; object-fit: cover; }
        .quality-tag { 
            position: absolute; bottom: 5px; right: 5px; 
            background: rgba(0,0,0,0.7); font-size: 9px; padding: 2px 4px; border-radius: 2px; color: var(--gold);
        }

        .details { flex: 1; padding: 12px; display: flex; flex-direction: column; justify-content: center; }
        
        .title-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
        .movie-name { font-size: 16px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .verify-icon { color: var(--blue-verify); font-size: 14px; }

        .meta-info { font-size: 11px; color: #888; margin-bottom: 10px; }
        .meta-info span { color: var(--gold); font-weight: bold; }

        .btn-play-now {
            background: #fff;
            color: #000;
            border: none;
            padding: 7px 15px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: fit-content;
        }
    </style>
</head>
<body>

    <div class="hero-ad-section">
        <div class="ad-container">
            <script>
              atOptions = {
                'key' : 'e86dd4055cd86d43aa42fbae392c77d2',
                'format' : 'iframe',
                'height' : 250,
                'width' : 300,
                'params' : {}
              };
            </script>
            <script src="https://www.highperformanceformat.com/e86dd4055cd86d43aa42fbae392c77d2/invoke.js"></script>
        </div>

        <div class="overlay-elements">
            <a href="appcreator24://section/W1" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="province-label">NORD-KIVU</div>
        </div>
    </div>

    <div class="container">
        
        <div class="movie-card" onclick="ouvrirFilm('MUSHOTA_VS_KARANI_01')">
            <div class="poster-area">
                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjrbumQExEjxio8V4NZKG8nKhvHwAJjZE_OiHzE4jG5ZmtARJ1R5a_f_fIqbTHOV_WKstuXFLqGkkAM3cyzSDuko46Yp_nZpBb-Y0QJAgWkb59ffJ54I7lTP78U2Eoc_6P8pErO8NlEKQJ9hRZCgGR4bfGQkjbObcPD13vkctcaO7vvUQjLIUZxbPjgaKHR/s320/1000005334.png">
                <div class="quality-tag">HD 2026</div>
            </div>
            <div class="details">
                <div class="title-row">
                    <div class="movie-name">Mushota vs Karani</div>
                    <i class="fa-solid fa-circle-check verify-icon"></i>
                </div>
                <div class="meta-info">Série <span>• Français</span></div>
                <button class="btn-play-now">
                    <i class="fa-solid fa-play"></i> REGARDER
                </button>
            </div>
        </div>

    </div>

    <script>
        function ouvrirFilm(id) {
            window.location.href = "https://draziel-creator.github.io/CongoFlix-/player.html?id=" + id;
        }
    </script>

</body>
</html>
