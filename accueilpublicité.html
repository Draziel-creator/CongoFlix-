<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PUBLICITÉ - Accueil</title>
    <!-- Police Inter pour un style moderne épuré -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Conteneur PWA 100% Mobile --- */
        .app-container {
            width: 100%;
            height: 100%;
            max-width: 450px; /* Conserve le format smartphone sur PC */
            /* Intégration directe de ton image d'accueil */
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh8v7lgx-YpaFK3TftDROFcg3921pbDLWfi8La1NGFSA0M8T07et0r0HkXnBp-Uk4Bvd43FPHrIZ_NcbqQ_QFW6LMXh3Omvuj7CYWZRg40epSg1gnB8g9o5hnlTEhM1NXz0weccJNvMafIItTOwBJ3HY3rl8-_k174W6IbXV6ziv-kdNa6RddZyuoyc6cTj/s1600/acuueil%20ppub.png');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* --- Header Transparent (Solde & Barre de confiance) --- */
        .app-header {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
            position: relative;
            z-index: 10;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .balance-box {
            display: flex;
            flex-direction: column;
        }
        .balance-label { 
            font-size: 11px; 
            color: #b0b0b0; 
            margin: 0; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .balance-amount { 
            font-size: 22px; 
            font-weight: 700; 
            color: #2ecc71; 
            margin: 2px 0 0 0;
        }
        .activation-status { 
            font-size: 11px; 
            color: #ff9f43; 
            margin: 0;
            background: rgba(255, 159, 67, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 159, 67, 0.2);
        }

        /* --- Zone centrale invisible pour laisser voir l'arrière-plan --- */
        .app-feed {
            flex: 1;
            width: 100%;
            position: relative;
        }

        /* --- Écrits en superposition (Style Instagram) --- */
        .insta-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 20;
            pointer-events: none;
        }
        .insta-partner {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .insta-desc {
            font-size: 12px;
            font-weight: 400;
            color: #f0f0f0;
            margin: 4px 0 0 0;
            max-width: 85%;
            line-height: 1.4;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* --- Barre d'action basse (Vues, Likes, Clic) --- */
        .engagement-bar {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .action-group { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }
        .action-item { 
            text-align: center; 
            color: #ffffff; 
            cursor: pointer; 
            transition: transform 0.2s;
        }
        .action-item:active {
            transform: scale(0.9);
        }
        .action-icon { 
            font-size: 26px; 
            display: block;
        }
        .action-count { 
            font-size: 11px; 
            color: #cccccc; 
            margin: 4px 0 0 0;
            font-weight: 500;
        }

        /* --- Bouton principal : LE CLIC RÉMUNÉRATEUR --- */
        .click-action {
            flex: 1;
            max-width: 160px;
            background: linear-gradient(45deg, #007aff, #00c6ff);
            padding: 12px 0;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,122,255,0.4);
            transition: transform 0.1s, background 0.2s;
            margin: 0 15px;
        }
        .click-action:active { 
            transform: scale(0.96); 
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Header avec Solde de confiance -->
        <header class="app-header">
            <div class="header-content">
                <div class="balance-box">
                    <p class="balance-label">Mon Solde</p>
                    <p class="balance-amount">0.00 $</p>
                </div>
                <p class="activation-status">🔒 Seuil de retrait : 65%</p>
            </div>
        </header>

        <!-- Flux Principal -->
        <div class="app-feed">
            <!-- Les écrits de la vidéo / pub par-dessus l'arrière-plan -->
            <div class="insta-overlay">
                <p class="insta-partner">@Annonceur_Officiel</p>
                <p class="insta-desc">Regardez cette annonce attentivement. Effectuez un clic sur le bouton bleu pour valider vos gains du moment.</p>
            </div>
        </div>

        <!-- Barre d'Engagement Basse -->
        <div class="engagement-bar">
            <div class="action-group">
                <div class="action-item" id="likeBtn">
                    <span class="action-icon">❤️</span>
                    <p class="action-count" id="likeCount">1.2k</p>
                </div>
                <div class="action-item">
                    <span class="action-icon">👁️</span>
                    <p class="action-count">10.4k</p>
                </div>
            </div>

            <!-- BOUTON D'ACTION (CLIC ADSTERRA) -->
            <div class="click-action" id="adClick">
                Cliquer
            </div>

            <div class="action-group">
                <div class="action-item">
                    <span class="action-icon">🖱️</span>
                    <p class="action-count">0 / 5 j</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Gestion basique du bouton Like pour l'interactivité
        let liked = false;
        const likeBtn = document.getElementById('likeBtn');
        const likeCount = document.getElementById('likeCount');
        
        likeBtn.addEventListener('click', () => {
            if(!liked) {
                likeCount.innerText = "1.2k";
                likeBtn.style.transform = "scale(1.2)";
                setTimeout(() => likeBtn.style.transform = "scale(1)", 200);
                liked = true;
            }
        });

        // Event de clic sur le bouton Adsterra (Prêt pour y lier ton script ou popunder)
        document.getElementById('adClick').addEventListener('click', function() {
            // Ici viendra la redirection ou l'ouverture du lien AdSterra
            console.log("Clic enregistré, ouverture de la publicité...");
        });
    </script>
</body>
</html>
