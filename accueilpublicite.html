<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PUBLICITÉ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ==========================================================================
           1. ÉCRAN DE DÉMARRAGE (SPLASH) - 100% VIDE, UNIQUEMENT TON IMAGE
           ========================================================================== */
        #custom-splash { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh8v7lgx-YpaFK3TftDROFcg3921pbDLWfi8La1NGFSA0M8T07et0r0HkXnBp-Uk4Bvd43FPHrIZ_NcbqQ_QFW6LMXh3Omvuj7CYWZRg40epSg1gnB8g9o5hnlTEhM1NXz0weccJNvMafIItTOwBJ3HY3rl8-_k174W6IbXV6ziv-kdNa6RddZyuoyc6cTj/s1600/acuueil%20ppub.png') center/cover no-repeat; 
            z-index: 30000; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ==========================================================================
           2. PAGE TRANSITOIRE : TRIPLE PUBLICITÉ ADSTERRA (STYLE CORRIGÉ)
           ========================================================================== */
        #pub-page { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000000; 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 20000; 
        }

        /* Nouveau conteneur épuré et stylisé (sans les pointillés bleus de Congoflix) */
        .pub-box {
            border: 1px solid #1a1a1a; 
            padding: 25px 20px; 
            border-radius: 20px; 
            text-align: center;
            max-height: 92vh;
            max-width: 95%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #030303;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        /* Ligne de séparation supérieure moderne */
        .pub-header-line {
            width: 80%;
            height: 1px;
            background: linear-gradient(to right, transparent, #333, transparent);
            margin: 12px 0;
        }

        /* Ligne de séparation inférieure moderne */
        .pub-footer-line {
            width: 60%;
            height: 1px;
            background: linear-gradient(to right, transparent, #222, transparent);
            margin: 12px 0 15px 0;
        }

        .ad-triple-wrapper {
            display: flex;
            flex-direction: row; 
            justify-content: center;
            align-items: center;
            gap: 0px; 
            margin-top: 5px;
            margin-bottom: 5px;
            background-color: #0b0b0b;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #111;
        }

        .ad-zone-160x600 {
            width: 160px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #skip-container {
            position: absolute;
            top: 25px;
            right: 20px;
            z-index: 25000;
        }

        .skip-btn {
            width: 45px;
            height: 45px;
            border: 2px solid #007aff;
            border-radius: 50%;
            background: rgba(0,0,0,0.8);
            color: #007aff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            text-decoration: none;
            pointer-events: none; 
            opacity: 0.7;
            transition: all 0.2s;
        }

        .skip-btn.ready {
            pointer-events: auto; 
            background: #007aff;
            color: #fff;
            box-shadow: 0 0 15px #007aff;
            opacity: 1;
            cursor: pointer;
        }

        /* ==========================================================================
           3. APPLICATION PRINCIPALE (L'ACCUEIL APRÈS LA PUB)
           ========================================================================== */
        .app-container {
            width: 100%;
            height: 100%;
            max-width: 450px; 
            background-color: #0d0d0d;
            position: relative;
            display: none;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            z-index: 10000;
        }

        .app-header {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0));
            position: relative;
            z-index: 10;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .balance-box { display: flex; flex-direction: column; }
        .balance-label { font-size: 11px; color: #b0b0b0; margin: 0; text-transform: uppercase; letter-spacing: 0.5px;}
        .balance-amount { font-size: 22px; font-weight: 700; color: #2ecc71; margin: 2px 0 0 0;}
        .activation-status { 
            font-size: 11px; color: #ff9f43; margin: 0;
            background: rgba(255, 159, 67, 0.1); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(255, 159, 67, 0.2);
        }

        .app-feed {
            flex: 1;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
        }

        .insta-overlay {
            position: absolute;
            bottom: 20px; left: 20px; right: 20px;
            z-index: 20;
            pointer-events: none;
        }
        .insta-partner { font-size: 14px; font-weight: 700; color: #ffffff; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.8);}
        .insta-desc { font-size: 12px; font-weight: 400; color: #f0f0f0; margin: 4px 0 0 0; max-width: 85%; line-height: 1.4; text-shadow: 0 2px 4px rgba(0,0,0,0.8);}

        .engagement-bar {
            width: 100%; padding: 20px; box-sizing: border-box;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0));
            position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
        }
        .action-group { display: flex; align-items: center; gap: 20px; }
        .action-item { text-align: center; color: #ffffff; cursor: pointer; transition: transform 0.2s;}
        .action-item:active { transform: scale(0.9); }
        .action-icon { font-size: 26px; display: block;}
        .action-count { font-size: 11px; color: #cccccc; margin: 4px 0 0 0; font-weight: 500;}

        .click-action {
            flex: 1; max-width: 160px;
            background: linear-gradient(45deg, #007aff, #00c6ff);
            padding: 12px 0; border-radius: 25px;
            font-size: 14px; font-weight: 700; text-align: center; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,122,255,0.4);
            transition: transform 0.1s, background 0.2s; margin: 0 15px;
        }
        .click-action:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div id="custom-splash"></div>

    <div id="pub-page">
        <div id="skip-container">
            <a href="go:w1" id="btn-skip" class="skip-btn">5</a>
        </div>

        <div class="pub-box">
            <h2 style="color:#ffffff; margin:0; font-family: sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 3px;">SPONSORS</h2>
            <p style="color:#666; font-size:11px; font-family: sans-serif; margin: 4px 0 0 0; text-transform: uppercase;">Contenu Partenaire</p>
            
            <div class="pub-header-line"></div>
            
            <div class="ad-triple-wrapper">
                <div class="ad-zone-160x600">
                    <script type="text/javascript">
                        atOptions = {
                            'key' : '355c9d0ee6ac5ec71d84d7f879fdc153',
                            'format' : 'iframe',
                            'height' : 600,
                            'width' : 160,
                            'params' : {}
                        };
                    </script>
                    <script type="text/javascript" src="https://www.highperformanceformat.com/355c9d0ee6ac5ec71d84d7f879fdc153/invoke.js"></script>
                </div>

                <div class="ad-zone-160x600">
                    <script type="text/javascript">
                        atOptions = {
                            'key' : '355c9d0ee6ac5ec71d84d7f879fdc153',
                            'format' : 'iframe',
                            'height' : 600,
                            'width' : 160,
                            'params' : {}
                        };
                    </script>
                    <script type="text/javascript" src="https://www.highperformanceformat.com/355c9d0ee6ac5ec71d84d7f879fdc153/invoke.js"></script>
                </div>

                <div class="ad-zone-160x600">
                    <script type="text/javascript">
                        atOptions = {
                            'key' : '355c9d0ee6ac5ec71d84d7f879fdc153',
                            'format' : 'iframe',
                            'height' : 600,
                            'width' : 160,
                            'params' : {}
                        };
                    </script>
                    <script type="text/javascript" src="https://www.highperformanceformat.com/355c9d0ee6ac5ec71d84d7f879fdc153/invoke.js"></script>
                </div>
            </div>

            <div class="pub-footer-line"></div>

            <div style="color: #444; font-size: 10px; font-family: sans-serif; letter-spacing: 0.5px;">Veuillez patienter pendant le chargement</div>
        </div>
    </div>

    <div class="app-container" id="main-app">
        <header class="app-header">
            <div class="header-content">
                <div class="balance-box">
                    <p class="balance-label">Mon Solde</p>
                    <p class="balance-amount">0.00 $</p>
                </div>
                <p class="activation-status">🔒 Seuil de retrait : 65%</p>
            </div>
        </header>

        <div class="app-feed">
            <div class="insta-overlay">
                <p class="insta-partner">@Annonceur_Premium</p>
                <p class="insta-desc">Regardez cette vidéo. Cliquez sur le bouton central bleu pour augmenter directement votre cagnotte journalière.</p>
            </div>
        </div>

        <div class="engagement-bar">
            <div class="action-group">
                <div class="action-item" id="likeBtn">
                    <span class="action-icon">❤️</span>
                    <p class="action-count" id="likeCount">1.2k</p>
                </div>
                <div class="action-item">
                    <span class="action-icon">👁️</span>
                    <p class="action-count">10.4k</p>
                </div>
            </div>

            <div class="click-action" id="adClick">
                Cliquer
            </div>

            <div class="action-group">
                <div class="action-item">
                    <span class="action-icon">🖱️</span>
                    <p class="action-count">0 / 5 j</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const splash = document.getElementById('custom-splash');
        const pubPage = document.getElementById('pub-page');
        const mainApp = document.getElementById('main-app');
        const btnSkip = document.getElementById('btn-skip');

        // 1. Fermeture du Splash Screen après exactement 5 secondes (5000ms) et apparition des Pubs
        setTimeout(() => {
            splash.style.display = 'none';
            pubPage.style.display = 'flex';
            demarrerCompteur();
        }, 5000);

        // 2. Lancement du compte à rebours de 5 secondes
        function demarrerCompteur() {
            let temps = 5;
            const interval = setInterval(() => {
                temps--;
                if (temps > 0) {
                    btnSkip.innerText = temps;
                } else {
                    clearInterval(interval);
                    btnSkip.innerText = "✕";
                    btnSkip.classList.add('ready');
                }
            }, 1000);
        }

        // 3. Gestion du comportement au clic sur le lien "✕"
        btnSkip.addEventListener('click', (e) => {
            if (!btnSkip.classList.contains('ready')) {
                e.preventDefault();
            } else {
                pubPage.style.display = 'none';
            }
        });

        // Interactions de base
        let liked = false;
        const likeBtn = document.getElementById('likeBtn');
        const likeCount = document.getElementById('likeCount');
        
        likeBtn.addEventListener('click', () => {
            if(!liked) {
                likeCount.innerText = "1.2k";
                likeBtn.style.transform = "scale(1.2)";
                setTimeout(() => likeBtn.style.transform = "scale(1)", 200);
                liked = true;
            }
        });

        document.getElementById('adClick').addEventListener('click', function() {
            console.log("Redirection AdSterra activée.");
        });
    </script>
</body>
</html>
