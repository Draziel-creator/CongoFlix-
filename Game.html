<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoGames - L'Arène des Élites</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #ffcc00;
            --chrome-gold: linear-gradient(180deg, #ffffff 0%, #ffcc00 45%, #b38f00 100%);
            --bg-dark: #010102;
            --glow-color: rgba(255, 204, 0, 0.4);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- HEADER : TITRE HAUTE QUALITÉ --- */
        header {
            padding: 40px 15px;
            text-align: center;
            background: radial-gradient(circle at top, #1a1a1e 0%, transparent 75%);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.8rem;
            text-transform: uppercase;
            background: var(--chrome-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--glow-color));
            letter-spacing: -2px;
            margin: 0;
            line-height: 0.9;
        }

        .description {
            font-size: 0.85rem;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 12px;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* --- CONTAINER SANS BORDURES --- */
        .games-container {
            display: flex;
            flex-direction: column;
            gap: 0;
            padding: 0;
        }

        /* --- CARTES PLEIN ÉCRAN + MIROIR RALENTI --- */
        .game-card {
            width: 100%;
            background: #000;
            overflow: hidden;
            position: relative;
            margin-bottom: 55px; /* Espace pour le reflet ralenti */
            /* Effet Miroir très fluide */
            -webkit-box-reflect: below 2px linear-gradient(transparent 60%, rgba(0,0,0,0.15));
            transition: transform 0.8s ease; 
        }

        .img-container {
            position: relative;
            width: 100vw;
            height: 240px;
            overflow: hidden;
        }

        .game-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.1) brightness(0.8);
            transition: 1.5s cubic-bezier(0.2, 1, 0.3, 1); /* RALENTI */
        }

        .game-card:hover .game-img {
            filter: brightness(1.1);
            transform: scale(1.08);
        }

        /* Info par-dessus l'image */
        .game-info {
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,1) 30%, transparent);
            position: absolute;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 204, 0, 0.2);
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,0,0,1);
        }

        .btn-play {
            padding: 12px 25px;
            background: var(--primary-gold);
            color: black;
            text-decoration: none;
            font-weight: 900;
            border-radius: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 0;
            z-index: 5;
            background: rgba(255, 204, 0, 0.95);
            color: black;
            padding: 6px 18px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
        }
    </style>
</head>
