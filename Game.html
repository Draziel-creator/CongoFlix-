<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoGames - L'Arène des Élites</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #ffcc00;
            --bg-dark: #060608;
            --card-bg: #111115;
            --glow-color: rgba(255, 204, 0, 0.6);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- HEADER & NAVIGATION REFAITE --- */
        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1e, transparent);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--primary-gold);
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--glow-color);
            margin-bottom: 15px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        nav a {
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
            color: white;
            font-size: 0.75rem;
            padding: 8px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.05);
        }

        nav a:hover, nav a.active {
            border-color: var(--primary-gold);
            color: var(--primary-gold);
            box-shadow: 0 0 10px var(--glow-color);
        }

        /* --- GRID DES JEUX --- */
        .games-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* --- EFFET MIROIR ET BORDURE GLOW --- */
        .game-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            /* Effet Miroir / Réflexion sous la carte */
            -webkit-box-reflect: below 5px linear-gradient(transparent, rgba(0,0,0,0.2));
        }

        .game-card:hover {
            transform: scale(1.03);
            border-color: var(--primary-gold);
            box-shadow: 0 0 25px var(--glow-color);
        }

        .img-container {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .game-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        /* Effet de balayage brillant au survol */
        .game-card:after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
        }

        .game-card:hover:after {
            left: 150%;
        }

        .game-info {
            padding: 15px;
            background: #111115;
            text-align: center;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin: 0 0 15px 0;
            color: #fff;
            letter-spacing: 1px;
        }

        .btn-play {
            display: block;
            padding: 12px;
            background: linear-gradient(45deg, var(--primary-gold), #ffaa00);
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
        }

        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 2;
            background: var(--primary-gold);
            color: black;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.65rem;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 10px black;
        }
    </style>
</head>
