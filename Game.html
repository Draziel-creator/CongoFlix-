<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoGames - L'Arène des Élites</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #ffcc00;
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
            --text-gray: #b0b0b0;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* --- HEADER NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: linear-gradient(to bottom, #1a1a1e, transparent);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--primary-gold);
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .nav-center a {
            font-family: 'Orbitron', sans-serif;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary-gold);
            padding-bottom: 3px;
        }

        .nav-right a {
            background: rgba(255, 204, 0, 0.1);
            color: var(--primary-gold);
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid var(--primary-gold);
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* --- GRID DES JEUX --- */
        .games-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2e;
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-gold);
        }

        .game-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .game-info {
            padding: 15px;
            background: linear-gradient(to top, #000, transparent);
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            margin: 0 0 10px 0;
            color: white;
        }

        .btn-play {
            display: inline-block;
            width: 100%;
            padding: 10px;
            background: var(--primary-gold);
            color: black;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* --- EFFET BADGE --- */
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--primary-gold);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid var(--primary-gold);
        }
    </style>
</head>
<body>
