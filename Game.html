<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - Arène Élite</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Empêche le défilement du site parent */
            background-color: #000;
        }
        .header-bar {
            height: 50px;
            background: linear-gradient(to right, #ff0000, #000);
            display: flex;
            align-items: center;
            padding-left: 15px;
            color: white;
            font-family: Arial, sans-serif;
            font-weight: bold;
            border-bottom: 2px solid #333;
        }
        iframe {
            width: 100%;
            height: calc(100% - 50px); /* Prend tout l'espace restant sous la barre */
            border: none;
        }
    </style>
</head>
<body>

    <!-- Barre de navigation CongoFlix -->
    <div class="header-bar">
        🎮 CONGOFLIX ARÈNE : CATALOGUE ÉLITE
    </div>

    <!-- Le catalogue CrazyGames direct -->
    <iframe 
        src="https://www.crazygames.com/t/fps" 
        allow="autoplay; gamepad; fullscreen" 
        allowfullscreen>
    </iframe>

</body>
</html>
