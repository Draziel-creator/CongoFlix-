<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoGames - L'Arène des Élites</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #ffcc00;
            --chrome: linear-gradient(180deg, #fff 0%, #ffcc00 50%, #997a00 100%);
            --bg-dark: #020203;
            --glow-color: rgba(255, 204, 0, 0.5);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- HEADER & TITRE HAUTE QUALITÉ --- */
        header {
            padding: 30px 10px;
            text-align: center;
            background: radial-gradient(circle at top, #1a1a1e 0%, transparent 70%);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            text-transform: uppercase;
            background: var(--chrome);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--glow-color));
            letter-spacing: -1px;
            margin: 0;
            line-height: 1;
        }

        .description {
            font-size: 0.9rem;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            opacity: 0.8;
            font-weight: 600;
        }

        /* --- LAYOUT PLEIN ÉCRAN (SANS BORDURES) --- */
        .games-container {
            display: flex;
            flex-direction: column;
            gap: 0; /* Les cartes se touchent presque */
            padding: 0;
        }

        /* --- EFFET MIROIR RALENTI ET DESIGN SANS BORDURES --- */
        .game-card {
            width: 100%;
            background: #000;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 204, 0, 0.1);
            transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1); /* RALENTI */
            position: relative;
            /* Effet Miroir très doux */
            -webkit-box-reflect: below 2px linear-gradient(transparent 70%, rgba(0,0,0,0.1));
            margin-bottom: 40px; /* Espace pour le reflet */
        }

        .img-container {
            position: relative;
            width: 100vw; /* Touche les bords */
            height: 220px;
        }

        .game-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%) contrast(1.1);
            transition: 1.2s ease-in-out;
        }

        .game-card:hover .game-img {
            filter: grayscale(0%) scale(1.1);
        }

        /* Bordure lumineuse dynamique au toucher */
        .game-card:active, .game-card:hover {
            box-shadow: inset 0 0 50px rgba(255, 204, 0, 0.4);
        }

        .game-info {
            padding: 20px;
            background: linear-gradient(to top, #000 80%, transparent);
            position: absolute;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            margin: 0;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
        }

        .btn-play {
            padding: 10px 20px;
            background: var(--primary-gold);
            color: black;
            text-decoration: none;
            font-weight: 900;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 0.75rem;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); /* Look futuriste */
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 0;
            background: rgba(255, 204, 0, 0.9);
            color: black;
            padding: 5px 15px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%);
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo">CongoGames</h1>
    <div class="description">Affrontez des rivaux et doublez vos gains</div>
</header>

<div class="games-container">

    <div class="game-card">
        <span class="badge">Guerre de Gang</span>
        <div class="img-container">

        </div>
        <div class="game-info">
            <h3 class="game-title">Payback 2</h3>

        </div>
    </div>

    <div class="game-card">
        <span class="badge">Élite FPS</span>
        <div class="img-container">
            <img class="game-img" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiZ_bepLw6zKYzXBQsURINxUvvzUX_pMYSpFCVuELN54bbFUoG1qaOKD7W300yJ_vMd0wNOJy-KGXDWlew0jbCP_tMAaza60Daqs6v-guoRjBo31uos1rcZnOb-9yGHqEM3s85S7__TC-_WJ2ItEz5Qj-Awf1H7nc2FtiuSf8DYF-0bEp80dI1BFiulHErf/s320/1000010899.jpg">
        </div>
        <div class="game-info">
            <h3 class="game-title">MC5</h3>
            <a href="#" class="btn-play">Défier</a>
        </div>
    </div>

    <div class="game-card">
        <span class="badge">Football</span>
        <div class="img-container">
            <img class="game-img" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj3sDdL02Xt-eFzs8Z3D1FZroFK6Mb5Ny8rj4yTk_H9uCr8auPmKZWbtNrt76EKi6r0bPpzuaLywm9oTA_pFx8srX6pcT7X3oSlWJMTyly6eoEGBSvL5Be6lWaxYDo7Sc4OgLz7YJv1WWt7QjCQZPmZ3ZoPWK79DidmU3_U_qlWlDuTlwKLgn8VtqvplGEa/s320/1000010894.jpg">
