<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium - Marché RDC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --gold: #f5d170;
            --gold-glow: #f5d17088;
            --bg-dark: #070707;
            --card-bg: #0f0f0f;
        }

        body {
            margin: 0; background-color: var(--bg-dark);
            font-family: -apple-system, sans-serif; color: #efefef;
            overflow-x: hidden;
        }

        /* HEADER EXTERNE (Logo & Retour) */
        .external-header {
            padding: 45px 20px 10px; display: flex; align-items: center; justify-content: space-between;
        }
        .top-logo { height: 35px; width: auto; position: absolute; left: 50%; transform: translateX(-50%); }
        .back-link { color: white; font-size: 1.2rem; text-decoration: none; }

        /* VITRINE LUMINEUSE PULSANTE */
        .showcase-container {
            margin: 10px; border-radius: 30px; position: relative;
            background: var(--bg-dark); overflow: hidden;
            border: 1px solid var(--gold);
            animation: pulse-border 2s infinite ease-in-out;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 5px var(--gold-glow); border-color: var(--gold-muted); }
            50% { box-shadow: 0 0 20px var(--gold-glow); border-color: var(--gold); }
            100% { box-shadow: 0 0 5px var(--gold-glow); border-color: var(--gold-muted); }
        }

        /* IMAGE AVEC COURBE LUMINEUSE */
        .product-header { position: relative; width: 100%; height: 32vh; background: #000; }
        .main-img { width: 100%; height: 100%; object-fit: contain; }
        
        .curve-separator {
            position: absolute; bottom: -1px; left: 0; width: 100%; height: 40px;
            background: var(--bg-dark);
            clip-path: ellipse(60% 100% at 50% 100%);
            border-top: 1px solid var(--gold);
            filter: drop-shadow(0px -2px 5px var(--gold));
        }

        .fav-btn {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.4);
            border: none; color: white; width: 35px; height: 35px; border-radius: 50%;
        }

        /* DETAILS PRODUIT */
        .product-content { padding: 15px; font-size: 0.7rem; }
        h1 { font-size: 1.1rem; margin: 0 0 8px 0; font-weight: 500; letter-spacing: 0.5px; }
        
        .price-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .price-group .amt { font-size: 1.4rem; color: var(--gold); font-weight: 700; display: block; }
        .price-group .negoc { font-size: 0.55rem; color: #888; display: flex; align-items: center; gap: 3px; }
        .v-check { color: #4cd137; border: 0.3px solid #4cd137; padding: 3px 8px; border-radius: 20px; font-size: 0.55rem; }

        .section-title { font-size: 0.55rem; color: #666; text-transform: uppercase; margin-top: 15px; letter-spacing: 1px; }
        .description { color: #aaa; line-height: 1.5; font-weight: 300; margin-bottom: 20px; }

        /* CONTACT STYLE CONGOCHAT */
        .contact-box { display: flex; gap: 10px; margin: 15px 0; }
        .btn-congo {
            flex: 1; height: 42px; background: #111; border: 0.3px solid #222; border-radius: 12px;
            color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .cc-logo { width: 18px; height: 18px; border: 1px solid #4cd137; border-radius: 50%; color: var(--gold); font-weight: bold; font-size: 10px; display: grid; place-items: center; }

        .security-footer { text-align: center; color: #4cd137; font-size: 0.55rem; padding: 10px; opacity: 0.7; }

        /* BOUTON ACHETER STYLE STYLO */
        .buy-area { padding: 20px; }
        .btn-buy-pen {
            width: 100%; height: 36px; border-radius: 40px;
            background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
            border: 0.8px solid var(--gold-muted);
            color: var(--gold); font-size: 0.7rem; letter-spacing: 1.5px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
        }
    </style>
</head>
<body>

    <header class="external-header">
        <a href="#" onclick="history.back()" class="back-link"><i class="fa-solid fa-arrow-left-long"></i></a>
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg479E695i6rWzxekKSwk7Ya5iuO0mQrbAJpgTOQ6mJmSFMQ72osIkbynPA8ZKuWZH_2pY4A0Uiy5MXTI846YxoB8D7Dvr8Ibk4GnraCVvdAwCbEbHFWdEjfKFsETjxs1JDeys67rvVmj7RwcOMgJHQV1ujb4_p8eKt1bT1fuX7ra6shkuGVDP1Ng0SXifQ/w200-h133/24.png" class="top-logo">
        <div style="width:20px"></div> </header>

    <div class="showcase-container">
        
        <div class="product-header">
            <img src="" id="prodImg" class="main-img">
            <button class="fav-btn" onclick="this.style.color='#ff4757'"><i class="fa-regular fa-heart"></i></button>
            <div class="curve-separator"></div>
        </div>

        <div class="product-content">
            <h1 id="prodName">Chargement...</h1>
            
            <div class="price-line">
                <div class="price-group">
                    <span class="amt" id="prodPrice">... $</span>
                    <span class="negoc"><i class="fa-solid fa-tag"></i> Prix négociable</span>
                </div>
                <div class="v-check"><i class="fa-solid fa-check-circle"></i> Vendeur Vérifié</div>
            </div>

            <div class="section-title">Description</div>
            <p class="description" id="prodDesc">...</p>

            <div class="contact-box">
                <a href="#" id="chatLink" class="btn-congo">
                    <div class="cc-logo">C</div> CongoChat
                </a>
                <a href="#" id="callLink" class="btn-congo" style="flex:0; width:42px;"><i class="fa-solid fa-phone"></i></a>
            </div>

            <div class="security-footer">
                <i class="fa-solid fa-shield-halved"></i> Paiement 100% sécurisé via Marché RDC
            </div>

            <div class="buy-area">
                <button class="btn-buy-pen" onclick="alert('Commande lancée')">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span>ACHETER MAINTENANT</span>
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4", projectId: "congo-streaming-51333" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function load() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(!id) return;
            const doc = await db.collection("marche_produits").doc(id).get();
            if(doc.exists) {
                const p = doc.data();
                document.getElementById('prodImg').src = p.image;
                document.getElementById('prodName').innerText = p.nom;
                document.getElementById('prodPrice').innerText = p.prix + " $";
                document.getElementById('prodDesc').innerText = p.description;
                document.getElementById('chatLink').href = `https://draziel-creator.github.io/CongoChat/?id=${id}`;
                document.getElementById('callLink').href = `tel:${p.telephone}`;
            }
        }
        window.onload = load;
    </script>
</body>
</html>
