<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoChat - Elite Pro Hybrid</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --whatsapp-yellow: #ffcc00; --chat-bg: #ece5dd; --bg-body: #050507; --rdc-blue: #0088cc; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-body); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }
        header { background: var(--whatsapp-yellow); color: black; padding-top: 10px; z-index: 1000; flex-shrink: 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 5px 20px; font-weight: 900; font-size: 1.4rem; }
        .tabs { display: flex; justify-content: space-around; }
        .tab { padding: 15px 5px; flex: 1; text-align: center; cursor: pointer; font-weight: bold; font-size: 0.7rem; color: rgba(0,0,0,0.5); text-transform: uppercase; }
        .tab.active { color: black; border-bottom: 4px solid black; }
        .chat-container { flex: 1; background: var(--chat-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); overflow-y: auto; padding: 10px; display: none; flex-direction: column; }
        .chat-container.active { display: flex; }
        .msg-wrapper { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 12px; max-width: 85%; }
        .msg-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message { padding: 8px 12px; border-radius: 15px; color: black; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sent .message { background: #dcf8c6; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .input-area { background: #f0f0f0; padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .input-wrapper { flex: 1; background: white; border-radius: 25px; padding: 0 15px; display: flex; align-items: center; }
        .input-wrapper input { border: none; padding: 10px 0; outline: none; width: 100%; }
        .btn-action { background: var(--whatsapp-yellow); width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; }
        #privateHeader { background: #ededed; color: black; padding: 10px 15px; display: none; align-items: center; justify-content: space-between; }
        #callScreen { position: fixed; inset: 0; background: #0f172a; z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 0; }
        #remote-video { position: absolute; inset: 0; }
        #local-video { position: absolute; bottom: 120px; right: 20px; width: 100px; height: 150px; border-radius: 10px; border: 2px solid white; z-index: 30001; }
        .timer-badge { position: absolute; top: 20px; left: 20px; background: rgba(206, 16, 33, 0.8); padding: 5px 15px; border-radius: 20px; font-weight: bold; z-index: 30005; display: none;}
        .contact-item { background: white; padding: 12px 15px; display: flex; align-items: center; gap: 15px; color: #000; border-bottom: 1px solid #eee; }
        .contact-item img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="header-top"><span>CongoChat</span><div id="onlineDisplay">0 en ligne</div></div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('live')">Live</div>
            <div class="tab" onclick="switchTab('private')">Privé</div>
        </div>
    </header>

    <div id="privateHeader">
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-arrow-left" onclick="exitPrivateChat()"></i>
            <img id="pHeadImg" style="width:40px; height:40px; border-radius:50%;">
            <div id="pHeadName">...</div>
        </div>
        <div style="display:flex; gap:18px;">
            <i class="fas fa-video" onclick="initiateCall('video')" style="color:var(--rdc-blue)"></i>
            <i class="fas fa-phone" onclick="initiateCall('audio')"></i>
        </div>
    </div>

    <div id="callScreen">
        <div id="timerDisplay" class="timer-badge">Points restants: <span id="ptsLeft">0</span></div>
        <div id="remote-video"></div>
        <div id="local-video"></div>
        <div class="call-info">
            <img id="callAvatar" src="" style="width:120px; border-radius:50%;">
            <h2 id="callName">Nom</h2>
            <p id="callStatusText">Connexion...</p>
        </div>
        <div class="call-controls">
            <button class="btn-call" id="acceptBtn" style="display:none; background:#4cd964;" onclick="answerCall()"><i class="fas fa-phone"></i></button>
            <button class="btn-call hangup" style="background:#ff3b30; width:60px; height:60px; border-radius:50%;" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="live" class="chat-container active"></div>
    <div id="private" class="chat-container" style="background:#fff; padding:0;"></div>
    <div id="privateWindow" class="chat-container"></div>

    <div class="input-area" id="inputBar">
        <div class="input-wrapper"><input type="text" id="msgInput" placeholder="Message..."></div>
        <button class="btn-action" onclick="handleSendAction()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <!-- Scripts -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc, collection, addDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
            authDomain: "congo-streaming-51333.firebaseapp.com",
            projectId: "congo-streaming-51333",
            appId: "1:304286627819:web:1094765664a781e6054bae"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- CONFIG ---
        const AGORA_APP_ID = "395bf61671f44c9284be2f8f49daa884";
        let agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let peer = null;
        let localTracks = { video: null, audio: null };
        let currentUser = null;
        let targetUser = null;
        let currentRoom = 'live';
        let userCache = {};
        let countdownInterval = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Initialiser PeerJS pour l'audio gratuit
                peer = new Peer(user.uid);
                
                // Mettre à jour profil
                await setDoc(doc(db, "online_users", user.uid), { name: user.displayName || "Elite", photo: user.photoURL, points: 50 }, {merge:true});
                
                onSnapshot(collection(db, "online_users"), (snap) => {
                    snap.forEach(d => userCache[d.id] = d.data());
                    document.getElementById('onlineDisplay').innerText = `${snap.size} en ligne`;
                });

                listenForCalls();
                loadContacts();
            }
        });

        // --- GESTION DES APPELS ---

        window.initiateCall = async (type) => {
            if (!targetUser) return;
            const userRef = doc(db, "online_users", currentUser.uid);
            const userSnap = await getDoc(userRef);
            const userPoints = userSnap.data().points || 0;

            if (type === 'video' && userPoints <= 0) {
                alert("Pas assez de points pour la vidéo ! Recharges ton compte.");
                return;
            }

            const channel = [currentUser.uid, targetUser.id].sort().join('_');
            await setDoc(doc(db, "calls", targetUser.id), {
                callerId: currentUser.uid,
                callerName: userCache[currentUser.uid].name,
                type: type,
                channel: channel,
                status: 'ringing'
            });

            showCallUI(targetUser.name, targetUser.photo, "Appel...");
            
            const unsub = onSnapshot(doc(db, "calls", targetUser.id), (snap) => {
                if (snap.exists() && snap.data().status === 'accepted') {
                    unsub();
                    startSession(type, channel, userPoints);
                }
            });
        };

        function listenForCalls() {
            onSnapshot(doc(db, "calls", currentUser.uid), (snap) => {
                if (snap.exists() && snap.data().status === 'ringing') {
                    const data = snap.data();
                    showCallUI(data.callerName, "", "Entrant...", true);
                    window.incomingData = data;
                }
            });
        }

        window.answerCall = async () => {
            const data = window.incomingData;
            await updateDoc(doc(db, "calls", currentUser.uid), { status: 'accepted' });
            document.getElementById('acceptBtn').style.display = 'none';
            
            const userSnap = await getDoc(doc(db, "online_users", currentUser.uid));
            startSession(data.type, data.channel, userSnap.data().points);
        };

        async function startSession(type, channel, points) {
            if (type === 'video') {
                // AGORA (PAYANT)
                document.getElementById('timerDisplay').style.display = 'block';
                document.getElementById('ptsLeft').innerText = points;
                
                await agoraClient.join(AGORA_APP_ID, channel, null, Math.floor(Math.random()*10000));
                localTracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.video = await AgoraRTC.createCameraVideoTrack();
                localTracks.video.play("local-video");
                await agoraClient.publish([localTracks.audio, localTracks.video]);

                agoraClient.on("user-published", async (user, mType) => {
                    await agoraClient.subscribe(user, mType);
                    if (mType === "video") user.videoTrack.play("remote-video");
                    if (mType === "audio") user.audioTrack.play();
                });

                // Lancer le décompte des points
                startCountdown();
            } else {
                // PEERJS (GRATUIT)
                document.getElementById('callStatusText').innerText = "Audio Gratuit";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const call = peer.call(targetUser?.id || window.incomingData.callerId, stream);
                call.on('stream', (remoteStream) => {
                    const audio = new Audio();
                    audio.srcObject = remoteStream;
                    audio.play();
                });
            }
        }

        function startCountdown() {
            let pts = parseInt(document.getElementById('ptsLeft').innerText);
            countdownInterval = setInterval(async () => {
                pts -= 1; // 1 point par seconde (ajustable)
                document.getElementById('ptsLeft').innerText = pts;
                
                if (pts <= 0) {
                    clearInterval(countdownInterval);
                    alert("Points terminés !");
                    endCall();
                }
                // Optionnel : Mettre à jour la DB toutes les 10 sec pour économiser Firebase
                if (pts % 10 === 0) {
                    await updateDoc(doc(db, "online_users", currentUser.uid), { points: pts });
                }
            }, 1000);
        }

        window.endCall = async () => {
            clearInterval(countdownInterval);
            if (localTracks.audio) localTracks.audio.close();
            if (localTracks.video) localTracks.video.close();
            await agoraClient.leave();
            await deleteDoc(doc(db, "calls", currentUser.uid)).catch(()=>{});
            document.getElementById('callScreen').style.display = 'none';
        };

        function showCallUI(name, photo, status, incoming = false) {
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('callName').innerText = name;
            document.getElementById('callStatusText').innerText = status;
            document.getElementById('acceptBtn').style.display = incoming ? 'inline-block' : 'none';
        }

        // --- RESTE DU CHAT ---
        window.switchTab = (t) => {
            document.querySelectorAll('.chat-container').forEach(c => c.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            currentRoom = t;
        };
        
        window.exitPrivateChat = () => {
            document.getElementById('privateHeader').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'block';
            switchTab('private');
        };

        window.handleSendAction = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value) return;
            await addDoc(collection(db, currentRoom), { text: input.value, userId: currentUser.uid, timestamp: serverTimestamp() });
            input.value = "";
        };

        function loadContacts() {
            onSnapshot(collection(db, "online_users"), (snap) => {
                const cont = document.getElementById('private');
                cont.innerHTML = "";
                snap.forEach(d => {
                    if(d.id === currentUser.uid) return;
                    const u = d.data();
                    const item = document.createElement('div');
                    item.className = "contact-item";
                    item.innerHTML = `<img src="${u.photo || ''}"> <div><strong>${u.name}</strong><br><small>${u.points} pts</small></div>`;
                    item.onclick = () => {
                        targetUser = {id: d.id, name: u.name, photo: u.photo};
                        document.getElementById('privateHeader').style.display = 'flex';
                        document.getElementById('mainHeader').style.display = 'none';
                        document.getElementById('pHeadName').innerText = u.name;
                        switchTab('privateWindow');
                    };
                    cont.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
