<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoChat - Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --whatsapp-yellow: #ffcc00; --chat-bg: #ece5dd; --bg-body: #050507; --rdc-blue: #007fff; --rdc-red: #ce1021; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-body); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--whatsapp-yellow); color: black; padding-top: 10px; z-index: 1000; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 5px 20px; font-weight: 900; font-size: 1.4rem; }
        .tabs { display: flex; justify-content: space-around; }
        .tab { padding: 15px 5px; flex: 1; text-align: center; cursor: pointer; font-weight: bold; color: rgba(0,0,0,0.5); }
        .tab.active { color: black; border-bottom: 4px solid black; }
        .chat-container { flex: 1; background: var(--chat-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); overflow-y: auto; padding: 15px; display: none; flex-direction: column; }
        .chat-container.active { display: flex; }
        .message { max-width: 80%; padding: 8px 12px; margin-bottom: 8px; border-radius: 12px; color: black; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: white; align-self: flex-start; }
        .input-area { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; }
        .input-wrapper { flex: 1; background: white; border-radius: 25px; padding: 5px 15px; }
        .input-wrapper input { width: 100%; border: none; padding: 10px 0; outline: none; }
        #authModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; text-align: center; max-width: 300px; }
        .btn-link { display: block; background: var(--rdc-blue); color: white; padding: 15px; border-radius: 30px; text-decoration: none; margin-top: 20px; font-weight: bold; }
        #userImg { width: 35px; height: 35px; border-radius: 50%; border: 2px solid black; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <span>CongoChat</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <img id="userImg" src="" alt="Profile">
                <i id="userIcon" class="fas fa-user-circle" style="font-size: 1.8rem;"></i>
            </div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('live')">LIVE</div>
            <div class="tab" onclick="switchTab('private')">PRIVÉ</div>
        </div>
    </header>

    <div id="live" class="chat-container active"></div>
    <div id="private" class="chat-container">
        <div style="color:black; text-align:center; padding:20px;">Section Privée (Connectez-vous pour voir vos amis)</div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="Tapez un message...">
        </div>
        <button onclick="checkAuthAndSend()" style="border:none; background:var(--whatsapp-yellow); width:45px; height:45px; border-radius:50%;">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <div id="authModal">
        <div class="modal-content">
            <i class="fas fa-user-lock" style="font-size: 3rem; color: var(--rdc-blue);"></i>
            <h3>Connexion requise</h3>
            <p>Connectez-vous pour participer au chat.</p>
            <a href="https://draziel-creator.github.io/CongoFlix-/index.html" class="btn-link">SE CONNECTER</a>
            <button onclick="closeModal()" style="background:none; border:none; color:grey; margin-top:10px;">Plus tard</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ON UTILISE LES IDS DE CONGOLIVE (CELUI QUI MARCHE)
        const firebaseConfig = {
            apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
            authDomain: "congo-streaming-51333.firebaseapp.com",
            projectId: "congo-streaming-51333",
            appId: "1:304286627819:android:36e0b43b8b10508a054bae" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;

        // --- TRACKING CONNEXION + IMAGE PROFILE ---
        onAuthStateChanged(auth, async (user) => {
            const imgEl = document.getElementById('userImg');
            const iconEl = document.getElementById('userIcon');

            if (user) {
                currentUser = user;
                // On fait comme dans CongoLive : on cherche la photo dans la DB
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists() && userSnap.data().photoURL) {
                    imgEl.src = userSnap.data().photoURL;
                    imgEl.style.display = "block";
                    iconEl.style.display = "none";
                } else if (user.photoURL) {
                    imgEl.src = user.photoURL;
                    imgEl.style.display = "block";
                    iconEl.style.display = "none";
                }
            } else {
                currentUser = null;
                imgEl.style.display = "none";
                iconEl.style.display = "block";
            }
        });

        // --- ENVOI MESSAGE ---
        window.checkAuthAndSend = async () => {
            if (!currentUser) {
                document.getElementById('authModal').style.display = 'flex';
                return;
            }
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;

            await addDoc(collection(db, "live_chat"), {
                text: input.value,
                userName: currentUser.displayName || "Membre Congo",
                userId: currentUser.uid,
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

        // --- LECTURE MESSAGES ---
        const q = query(collection(db, "live_chat"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('live');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = `message ${data.userId === currentUser?.uid ? 'sent' : 'received'}`;
                div.innerHTML = `<strong>${data.userName}</strong><br>${data.text}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        });

        window.switchTab = (tab) => {
            document.querySelectorAll('.chat-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        };

        window.closeModal = () => document.getElementById('authModal').style.display = 'none';
    </script>
</body>
</html>
