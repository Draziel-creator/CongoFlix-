<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix Live - La Vitrine de la RDC</title>
    
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --rdc-blue: #007FFF;
            --rdc-yellow: #F7D618;
            --rdc-red: #CE1021;
            --whatsapp-yellow: #ffcc00;
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body { 
            background: var(--bg-dark); 
            color: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- HEADERS --- */
        header {
            background: #202c33;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--rdc-blue);
            z-index: 100;
        }

        .user-profile { display: flex; align-items: center; gap: 10px; }
        .user-profile img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--rdc-yellow); object-fit: cover; }
        
        .status-bar { font-size: 12px; color: #aaa; }

        /* --- TABS NAVIGATION --- */
        .tabs {
            display: flex;
            background: #202c33;
            border-bottom: 1px solid #333;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: #8696a0;
            cursor: pointer;
            position: relative;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab.active { color: var(--rdc-blue); border-bottom: 3px solid var(--rdc-blue); }

        .badge {
            position: absolute;
            top: 5px;
            right: 10px;
            background: var(--rdc-red);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }

        /* --- CONTAINERS --- */
        #content { flex: 1; position: relative; overflow: hidden; }
        
        .chat-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        .chat-container.active { display: flex; }

        /* --- PRIVATE WINDOW (Overlay) --- */
        #privateWindow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 200;
            display: none;
            flex-direction: column;
        }
        #privateWindow.active { display: flex; }

        .p-header {
            background: #202c33;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- MESSAGES UI --- */
        .msg-wrapper { display: flex; margin-bottom: 15px; max-width: 85%; position: relative; }
        .msg-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.received { align-self: flex-start; }

        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; margin: 0 8px; cursor: pointer; }

        .message {
            padding: 10px 15px;
            border-radius: 15px;
            position: relative;
            font-size: 14px;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .sent .message { background: #005c4b; color: #e9edef; border-top-right-radius: 2px; }
        .received .message { background: #202c33; color: #e9edef; border-top-left-radius: 2px; }

        .msg-name { display: block; font-weight: bold; font-size: 11px; margin-bottom: 4px; color: var(--rdc-yellow); cursor: pointer; }
        .msg-time { font-size: 10px; text-align: right; opacity: 0.6; display: block; margin-top: 5px; }

        /* --- REACTIONS & STICKERS --- */
        .reaction-trigger { opacity: 0; transition: 0.3s; padding: 5px; cursor: pointer; color: #aaa; }
        .msg-wrapper:hover .reaction-trigger { opacity: 1; }

        .sticker-modal {
            position: absolute;
            bottom: 40px;
            background: #2a3942;
            padding: 10px;
            border-radius: 20px;
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            z-index: 10;
        }

        .reactions-container { display: flex; gap: 4px; margin-top: 5px; }
        .reaction-pill { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 10px; font-size: 11px; }

        /* --- INPUT BAR --- */
        #inputBar {
            background: #202c33;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #msgInput {
            flex: 1;
            background: #2a3942;
            border: none;
            padding: 12px;
            border-radius: 25px;
            color: white;
            outline: none;
        }

        .send-btn {
            width: 45px; height: 45px;
            border-radius: 50%;
            background: var(--whatsapp-yellow);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* --- CALL SCREEN --- */
        #callScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 50px 0;
        }

        .call-avatar-large { width: 150px; height: 150px; border-radius: 50%; border: 5px solid white; object-fit: cover; }
        
        .video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; }
        #remote-video { width: 100%; height: 100%; }
        #local-video { width: 100px; height: 150px; position: absolute; bottom: 100px; right: 20px; border-radius: 10px; z-index: 11; border: 2px solid white; display: none; }

        .call-btns { display: flex; gap: 30px; }
        .btn-round { width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 24px; color: white; border: none; }
        .btn-hangup { background: var(--rdc-red); }
        .btn-accept { background: #25d366; }

        /* --- MODALS --- */
        .custom-modal {
            position: fixed;
            top:0; left:0; width: 100%; height:100%;
            background: rgba(0,0,0,0.8);
            z-index: 500;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-card {
            background: var(--card-dark);
            width: 85%;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .modal-card button {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;
        }

        .contact-item {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            background: #2a3942; border-radius: 10px; margin-bottom: 10px;
        }
        .contact-item img { width: 50px; height: 50px; border-radius: 50%; }

        .new-msg-divider {
            text-align: center; margin: 20px 0; position: relative;
        }
        .new-msg-divider span { background: #1e2a30; padding: 5px 15px; border-radius: 5px; font-size: 11px; color: #8696a0; }

        #typing-status { font-size: 11px; color: var(--rdc-yellow); height: 15px; padding-left: 15px; }

    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="user-profile">
            <img id="myAvatar" src="https://via.placeholder.com/40">
            <div>
                <h4 id="userName">CongoFlix Live</h4>
                <p class="status-bar" id="onlineDisplay">Chargement...</p>
            </div>
        </div>
        <div style="color: white; font-size: 1.2rem;">
            <i class="fas fa-search" style="margin-right: 15px;"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <header id="privateHeader" style="display:none;">
        <div class="user-profile">
            <i class="fas fa-arrow-left" onclick="exitPrivateChat()"></i>
            <img id="pHeadImg" src="">
            <div>
                <h4 id="pHeadName">Nom</h4>
                <p id="typing-status"></p>
            </div>
        </div>
        <div style="display:flex; gap: 20px; align-items:center;">
            <i class="fas fa-video" onclick="initiateCall('video')"></i>
            <i class="fas fa-phone-alt" onclick="initiateCall('audio')"></i>
            <i class="fas fa-ellipsis-v" onclick="openContactOptions()"></i>
        </div>
    </header>

    <nav class="tabs" id="tabsNav">
        <div class="tab active" id="tab-live" onclick="switchTab('live')">LIVE <span class="badge" id="badge-live">0</span></div>
        <div class="tab" id="tab-games" onclick="switchTab('games')">GAMES <span class="badge" id="badge-games">0</span></div>
        <div class="tab" id="tab-market" onclick="switchTab('market')">MARKET <span class="badge" id="badge-market">0</span></div>
        <div class="tab" id="tab-private" onclick="switchTab('private')">PRIVÉ <span class="badge" id="badge-private">0</span></div>
    </nav>

    <main id="content">
        <div id="live" class="chat-container active"></div>
        <div id="games" class="chat-container"></div>
        <div id="market" class="chat-container"></div>
        <div id="private" class="chat-container"></div>
        
        <div id="privateWindow">
            <div id="privateActiveMsgs" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');"></div>
        </div>
    </main>

    <div id="inputBar">
        <i class="far fa-laugh" style="font-size: 1.5rem; color: #8696a0;"></i>
        <i class="fas fa-paperclip" style="font-size: 1.5rem; color: #8696a0;"></i>
        <input type="text" id="msgInput" placeholder="Tapez votre message...">
        <button class="send-btn" id="sendBtn" onclick="handleSendAction()">
            <i id="btnIcon" class="fas fa-microphone" style="font-size: 1.2rem;"></i>
        </button>
    </div>

    <div id="callScreen">
        <div class="video-container" id="videoArea">
            <div id="remote-video"></div>
            <div id="local-video"></div>
        </div>

        <div id="callInfo">
            <img id="callAvatar" class="call-avatar-large" src="">
            <h1 id="callName" style="margin-top:20px;">Nom</h1>
            <p id="callStatusText">Appel en cours...</p>
        </div>

        <div class="call-btns">
            <button class="btn-round btn-hangup" onclick="endAgoraCall()"><i class="fas fa-phone-slash"></i></button>
            <button class="btn-round btn-accept" id="acceptBtn" onclick="handleUserAcceptCall()" style="display:none;"><i class="fas fa-phone"></i></button>
        </div>
    </div>

    <div id="contactOptionsModal" class="custom-modal">
        <div class="modal-card">
            <h3 id="optContactName">Options</h3>
            <button style="background:var(--rdc-red); color:white;" onclick="toggleBlockUser()">BLOQUER CE CONTACT</button>
            <button style="background:#ff9800; color:white;" onclick="removeContact()">RETIRER DE MA LISTE</button>
            <button style="background:#eee; color:#333;" onclick="closeAllModals()">ANNULER</button>
        </div>
    </div>

    <div id="addContactModal" class="custom-modal">
        <div class="modal-card">
            <h3 id="targetNameDisplay">Nouvel Ami ?</h3>
            <p>Voulez-vous ajouter cet utilisateur à vos contacts privés ?</p>
            <button style="background:var(--rdc-blue); color:white;" onclick="confirmAddContact()">OUI, AJOUTER</button>
            <button style="background:#eee;" onclick="closeAllModals()">PAS MAINTENANT</button>
        </div>
    </div>

    <div id="zoomModal" class="custom-modal" onclick="closeAllModals()">
        <img id="zoomedImg" style="max-width:90%; max-height:80%; border-radius:10px;">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, deleteDoc, runTransaction, where, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
            authDomain: "congo-streaming-51333.firebaseapp.com",
            projectId: "congo-streaming-51333",
            appId: "1:304286627819:android:36e0b43b8b10508a054bae"
        };

        const AGORA_APP_ID = "395bf61671f44c9284be2f8f49daa884";
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let currentUser = null;
        let currentRoom = 'live';
        let targetUser = null; 
        let userCache = {};
        let activeListeners = {};
        let localTracks = { videoTrack: null, audioTrack: null };
        let badgeCounters = { live: 0, games: 0, market: 0, private: 0 };
        let currentCallDocId = null;

        // --- AUTH ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                const userData = snap.exists() ? snap.data() : {};
                
                const myPhoto = userData.photoURL || user.photoURL || "https://via.placeholder.com/40";
                document.getElementById('myAvatar').src = myPhoto;
                
                // Statut Online
                setDoc(doc(db, "online_users", user.uid), {
                    name: userData.name || user.displayName || "Membre",
                    photo: myPhoto, status: 'online', lastSeen: serverTimestamp()
                }, { merge: true });

                // Cache global
                onSnapshot(collection(db, "online_users"), (snap) => {
                    let count = 0;
                    snap.forEach(d => { userCache[d.id] = d.data(); count++; });
                    document.getElementById('onlineDisplay').innerText = `${count} en ligne`;
                });

                listenMessages('live');
                loadContacts();
                setupGlobalNotifications();
                listenIncomingCalls();
            }
        });

        // --- NAVIGATION ---
        window.switchTab = (tab) => {
            currentRoom = tab;
            document.querySelectorAll('.chat-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            badgeCounters[tab] = 0;
            const b = document.getElementById(`badge-${tab}`);
            b.innerText = "0"; b.style.display = "none";

            if(tab === 'private') {
                document.getElementById('inputBar').style.display = 'none';
            } else {
                document.getElementById('inputBar').style.display = 'flex';
                listenMessages(tab);
            }
        };

        // --- CHAT PRIVÉ ---
        window.enterPrivateChat = async (id, name, photo) => {
            targetUser = { id, name, photo };
            currentRoom = 'private_active';
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('privateHeader').style.display = 'flex';
            document.getElementById('privateWindow').classList.add('active');
            document.getElementById('inputBar').style.display = 'flex';
            document.getElementById('pHeadName').innerText = name;
            document.getElementById('pHeadImg').src = photo;

            const chatId = getChatId(currentUser.uid, id);
            await setDoc(doc(db, `private_chats/${chatId}/read_status`, currentUser.uid), { lastRead: serverTimestamp() });
            listenMessages('private_active');
        };

        window.exitPrivateChat = () => {
            document.getElementById('privateHeader').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            document.getElementById('privateWindow').classList.remove('active');
            switchTab('private');
        };

        // --- MOTEUR DE MESSAGES ---
        async function listenMessages(room) {
            if(activeListeners.msgs) activeListeners.msgs();
            
            const isPrivate = room === 'private_active';
            const chatId = isPrivate ? getChatId(currentUser.uid, targetUser.id) : null;
            const path = isPrivate ? `private_chats/${chatId}/messages` : room;
            const container = isPrivate ? document.getElementById('privateActiveMsgs') : document.getElementById(room);

            let lastReadDate = null;
            if(isPrivate) {
                const rs = await getDoc(doc(db, `private_chats/${chatId}/read_status`, currentUser.uid));
                if(rs.exists() && rs.data().lastRead) lastReadDate = rs.data().lastRead.toDate();
            }

            const q = query(collection(db, path), orderBy("timestamp", "asc"), limit(100));
            activeListeners.msgs = onSnapshot(q, (snap) => {
                let html = ""; let dividerPlaced = false;
                snap.forEach(d => {
                    const m = d.data(); if(!m.timestamp) return;
                    const msgDate = m.timestamp.toDate();
                    const isMe = m.userId === currentUser.uid;
                    const info = userCache[m.userId] || { name: "Membre", photo: "https://via.placeholder.com/40" };
                    const timeStr = msgDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    if(isPrivate && !isMe && lastReadDate && msgDate > lastReadDate && !dividerPlaced) {
                        html += `<div class="new-msg-divider"><span>Nouveaux messages</span></div>`;
                        dividerPlaced = true;
                    }

                    let reactHtml = '<div class="reactions-container">';
                    for(let emoji in (m.reactions || {})) { reactHtml += `<div class="reaction-pill">${emoji} ${m.reactions[emoji].count}</div>`; }
                    reactHtml += '</div>';

                    html += `
                        <div class="msg-wrapper ${isMe ? 'sent' : 'received'}">
                            <img src="${info.photo}" class="msg-avatar" onclick="zoomImg('${info.photo}')">
                            <div class="message">
                                <span class="msg-name" onclick="openAddModal('${m.userId}', '${info.name}')">${isMe ? 'Moi' : info.name}</span>
                                ${m.text} ${reactHtml}
                                <span class="msg-time">${timeStr}</span>
                            </div>
                            <div class="reaction-trigger" onclick="toggleStickers('${d.id}')"><i class="far fa-smile"></i></div>
                            <div class="sticker-modal" id="stickers-${d.id}">
                                <span onclick="addReaction('${d.id}', '${path}', '❤️')">❤️</span>
                                <span onclick="addReaction('${d.id}', '${path}', '😂')">😂</span>
                                <span onclick="addReaction('${d.id}', '${path}', '🔥')">🔥</span>
                                <span onclick="addReaction('${d.id}', '${path}', '👍')">👍</span>
                            </div>
                        </div>`;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
            listenTyping(isPrivate ? chatId : room);
        }

        // --- ENVOI ---
        window.handleSendAction = async () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim(); if(!text) return;

            if(currentRoom === 'private_active') {
                const bCheck = await getDoc(doc(db, `users/${targetUser.id}/blocked`, currentUser.uid));
                if(bCheck.exists()) { alert("⚠️ Vous ne pouvez plus contacter ce membre."); return; }
            }

            const path = (currentRoom === 'private_active') 
                ? `private_chats/${getChatId(currentUser.uid, targetUser.id)}/messages` 
                : currentRoom;

            await addDoc(collection(db, path), { text, userId: currentUser.uid, timestamp: serverTimestamp(), reactions: {} });
            input.value = ""; updateTyping(false);
        };

        // --- APPELS AGORA ---
        async function requestHardwarePermissions() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                stream.getTracks().forEach(track => track.stop());
                return true;
            } catch (err) {
                alert("Permission micro/caméra refusée."); return false;
            }
        }

        window.initiateCall = async (type) => {
            if(!(await requestHardwarePermissions())) return;
            const channel = getChatId(currentUser.uid, targetUser.id);
            currentCallDocId = targetUser.id; 

            await setDoc(doc(db, "calls", targetUser.id), {
                callerId: currentUser.uid, callerName: userCache[currentUser.uid].name,
                callerPhoto: userCache[currentUser.uid].photo, type, channel, status: 'ringing', timestamp: serverTimestamp()
            });

            showCallScreen(targetUser.name, targetUser.photo, "Appel sortant...");
            onSnapshot(doc(db, "calls", targetUser.id), (snap) => {
                if(!snap.exists()) cleanupAgora();
                else if(snap.data().status === 'accepted') startAgoraSession(channel, type);
            });
        };

        function listenIncomingCalls() {
            onSnapshot(doc(db, "calls", currentUser.uid), (snap) => {
                if(snap.exists()) {
                    const d = snap.data(); currentCallDocId = currentUser.uid;
                    if(d.status === 'ringing') showCallScreen(d.callerName, d.callerPhoto, "Appel entrant...", true);
                } else cleanupAgora();
            });
        }

        window.handleUserAcceptCall = async () => {
            if(!(await requestHardwarePermissions())) return;
            const callRef = doc(db, "calls", currentUser.uid);
            const snap = await getDoc(callRef);
            if(snap.exists()) {
                await updateDoc(callRef, { status: 'accepted' });
                startAgoraSession(snap.data().channel, snap.data().type);
            }
        };

        async function startAgoraSession(channel, type) {
            document.getElementById('acceptBtn').style.display = 'none';
            document.getElementById('callStatusText').innerText = "Connexion...";
            try {
                await agoraClient.join(AGORA_APP_ID, channel, null, Math.floor(Math.random() * 10000));
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                let pubs = [localTracks.audioTrack];
                if(type === 'video') {
                    document.getElementById('videoArea').style.display = 'block';
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();
                    localTracks.videoTrack.play("local-video");
                    document.getElementById('local-video').style.display = 'block';
                    pubs.push(localTracks.videoTrack);
                }
                await agoraClient.publish(pubs);
                agoraClient.on("user-published", async (user, mediaType) => {
                    await agoraClient.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        document.getElementById('remote-video').style.display = 'block';
                        user.videoTrack.play("remote-video");
                    }
                    if (mediaType === "audio") user.audioTrack.play();
                });
            } catch (e) { endAgoraCall(); }
        }

        window.endAgoraCall = async () => {
            if(currentCallDocId) await deleteDoc(doc(db, "calls", currentCallDocId)).catch(()=>{});
            cleanupAgora();
        };

        function cleanupAgora() {
            if(localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
            if(localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            agoraClient.leave();
            document.getElementById('callScreen').style.display = 'none';
            document.getElementById('videoArea').style.display = 'none';
        }

        function showCallScreen(name, photo, status, incoming = false) {
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('callName').innerText = name;
            document.getElementById('callAvatar').src = photo;
            document.getElementById('callStatusText').innerText = status;
            document.getElementById('acceptBtn').style.display = incoming ? 'flex' : 'none';
        }

        // --- NOTIFICATIONS & CONTACTS ---
        function setupGlobalNotifications() {
            ['live', 'games', 'market'].forEach(room => {
                const q = query(collection(db, room), orderBy("timestamp", "desc"), limit(1));
                onSnapshot(q, (snap) => {
                    if(!snap.empty && currentRoom !== room) {
                        const m = snap.docs[0].data();
                        if(m.userId !== currentUser.uid) {
                            badgeCounters[room]++;
                            const b = document.getElementById(`badge-${room}`);
                            b.innerText = badgeCounters[room] > 99 ? "99+" : badgeCounters[room];
                            b.style.display = "block";
                        }
                    }
                });
            });
        }

        function loadContacts() {
            onSnapshot(collection(db, `users/${currentUser.uid}/contacts`), (snap) => {
                const cont = document.getElementById('private'); cont.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.innerHTML = `<img src="${c.photo}"><div><strong>${c.name}</strong><p>Cliquer pour discuter</p></div>`;
                    div.onclick = () => enterPrivateChat(d.id, c.name, c.photo);
                    cont.appendChild(div);
                });
            });
        }

        window.openAddModal = (id, name) => {
            if(id === currentUser.uid) return;
            targetUser = { id, name };
            document.getElementById('targetNameDisplay').innerText = name;
            document.getElementById('addContactModal').style.display = 'flex';
        };

        window.confirmAddContact = async () => {
            const info = userCache[targetUser.id];
            await setDoc(doc(db, `users/${currentUser.uid}/contacts`, targetUser.id), {
                name: info.name, photo: info.photo, addedAt: serverTimestamp()
            });
            closeAllModals(); alert("Ami ajouté !");
        };

        window.toggleBlockUser = async () => {
            await setDoc(doc(db, `users/${currentUser.uid}/blocked`, targetUser.id), { blockedAt: serverTimestamp() });
            exitPrivateChat(); closeAllModals();
        };

        window.removeContact = async () => {
            await deleteDoc(doc(db, `users/${currentUser.uid}/contacts`, targetUser.id));
            exitPrivateChat(); closeAllModals();
        };

        // --- UTILS ---
        const getChatId = (u1, u2) => [u1, u2].sort().join('_');
        window.closeAllModals = () => document.querySelectorAll('.custom-modal').forEach(m => m.style.display = 'none');
        window.zoomImg = (url) => { document.getElementById('zoomedImg').src = url; document.getElementById('zoomModal').style.display = 'flex'; };

        function updateTyping(isTyping) {
            const rid = (currentRoom === 'private_active') ? getChatId(currentUser.uid, targetUser.id) : currentRoom;
            setDoc(doc(db, "typing", rid), { [currentUser.uid]: { typing: isTyping, name: userCache[currentUser.uid].name }}, { merge: true });
        }

        function listenTyping(rid) {
            onSnapshot(doc(db, "typing", rid), (snap) => {
                if(!snap.exists()) return;
                const d = snap.data(); let txt = "";
                for(let id in d) if(id !== currentUser.uid && d[id].typing) txt = `${d[id].name} écrit...`;
                document.getElementById('typing-status').innerText = txt;
            });
        }

        window.addReaction = async (mid, path, emoji) => {
            const ref = doc(db, path, mid);
            await runTransaction(db, async (t) => {
                const s = await t.get(ref); const r = s.data().reactions || {};
                if(!r[emoji]) r[emoji] = { count: 0 };
                r[emoji].count++; t.update(ref, { reactions: r });
            });
            document.getElementById(`stickers-${mid}`).style.display = 'none';
        };

        window.toggleStickers = (id) => {
            const m = document.getElementById(`stickers-${id}`);
            const vis = m.style.display === 'grid';
            document.querySelectorAll('.sticker-modal').forEach(sm => sm.style.display = 'none');
            m.style.display = vis ? 'none' : 'grid';
        };

        document.getElementById('msgInput').oninput = (e) => {
            const v = e.target.value; updateTyping(v.length > 0);
            const icon = document.getElementById('btnIcon');
            icon.className = v.length > 0 ? "fas fa-paper-plane" : "fas fa-microphone";
        };

        window.openContactOptions = () => {
            document.getElementById('optContactName').innerText = targetUser.name;
            document.getElementById('contactOptionsModal').style.display = 'flex';
        };
    </script>
</body>
</html>
