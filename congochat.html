<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix - Communauté</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>

    <style>
        :root {
            --rdc-blue: #007FFF;
            --rdc-red: #CE1021;
            --rdc-yellow: #F7D417;
            --whatsapp-green: #25D366;
            --whatsapp-yellow: #ffeb3b;
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-dark); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- HEADER --- */
        header { 
            background: #1f1f1f; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid var(--rdc-blue);
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--rdc-yellow); cursor: pointer; }
        .status-info h1 { font-size: 1.1rem; color: var(--rdc-yellow); }
        .status-info p { font-size: 0.75rem; color: #aaa; }

        /* --- TABS --- */
        .tabs { display: flex; background: #1f1f1f; position: sticky; top: 0; z-index: 10; }
        .tab { 
            flex: 1; text-align: center; padding: 12px 0; font-size: 0.85rem; 
            color: #888; cursor: pointer; position: relative; transition: 0.3s;
        }
        .tab.active { color: white; border-bottom: 3px solid var(--rdc-blue); }
        .badge {
            position: absolute; top: 5px; right: 15%; background: var(--rdc-red);
            color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; display: none;
        }

        /* --- CHAT AREA --- */
        .chat-container { flex: 1; overflow-y: auto; padding: 15px; display: none; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .chat-container.active { display: flex; }

        /* Bulle de Message */
        .msg-wrapper { display: flex; gap: 10px; max-width: 85%; position: relative; margin-bottom: 10px; }
        .msg-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        
        .message { 
            padding: 10px 15px; border-radius: 18px; font-size: 0.9rem; position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); line-height: 1.4;
        }
        .sent .message { background: var(--rdc-blue); color: white; border-bottom-right-radius: 2px; }
        .received .message { background: #333; color: white; border-bottom-left-radius: 2px; }

        .msg-name { display: block; font-size: 0.7rem; font-weight: bold; margin-bottom: 3px; color: var(--rdc-yellow); cursor: pointer; }
        .msg-time { display: block; font-size: 0.6rem; margin-top: 5px; text-align: right; opacity: 0.7; }

        /* --- REACTIONS --- */
        .reaction-trigger { 
            font-size: 0.8rem; cursor: pointer; align-self: center; color: #666; 
            margin: 0 5px; opacity: 0; transition: 0.3s; 
        }
        .msg-wrapper:hover .reaction-trigger { opacity: 1; }
        
        .reactions-container { display: flex; gap: 3px; margin-top: -8px; margin-left: 10px; }
        .reaction-pill { 
            background: #444; border-radius: 12px; padding: 2px 6px; font-size: 0.7rem; 
            border: 1px solid #555; display: flex; align-items: center; gap: 3px;
        }
        .sticker-modal {
            position: absolute; bottom: 100%; background: #222; border: 1px solid #444;
            padding: 8px; border-radius: 15px; display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; z-index: 100;
        }
        .sticker-modal span { font-size: 1.2rem; cursor: pointer; }

        /* --- INPUT BAR --- */
        .input-bar { 
            background: #1f1f1f; padding: 10px; display: flex; align-items: center; gap: 10px;
            border-top: 1px solid #333; position: fixed; bottom: 0; width: 100%;
        }
        .input-bar input { 
            flex: 1; background: #333; border: none; padding: 12px 15px; border-radius: 25px; 
            color: white; outline: none; font-size: 0.9rem;
        }
        .send-btn { 
            background: var(--whatsapp-yellow); border: none; width: 45px; height: 45px; 
            border-radius: 50%; color: black; font-size: 1.2rem; display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
        }

        /* --- PRIVATE SECTION & CONTACTS --- */
        .contact-item {
            display: flex; align-items: center; gap: 15px; padding: 12px;
            background: #1e1e1e; border-radius: 12px; margin-bottom: 10px; cursor: pointer;
        }
        .contact-item img { width: 50px; height: 50px; border-radius: 50%; }
        .contact-info strong { font-size: 0.95rem; display: block; }
        .contact-info p { font-size: 0.8rem; color: #888; }

        /* --- PRIVATE HEADER --- */
        .private-header { 
            display: none; background: #1f1f1f; padding: 10px 15px; align-items: center; 
            justify-content: space-between; border-bottom: 1px solid #333;
        }
        .p-head-user { display: flex; align-items: center; gap: 10px; }
        .p-head-user img { width: 35px; height: 35px; border-radius: 50%; }
        .p-head-actions { display: flex; gap: 15px; font-size: 1.2rem; color: var(--rdc-blue); }

        /* --- CALL SCREEN --- */
        #callScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .call-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--rdc-blue); margin-bottom: 20px; }
        .call-btns { display: flex; gap: 30px; margin-top: 50px; }
        .call-btn { 
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 1.5rem; cursor: pointer; 
        }
        .btn-end { background: var(--rdc-red); color: white; }
        .btn-accept { background: var(--whatsapp-green); color: white; }

        #remote-video, #local-video { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        #local-video { width: 100px; height: 150px; bottom: 100px; right: 20px; border: 2px solid white; border-radius: 8px; z-index: 10; }

        /* --- MODALS --- */
        .custom-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-card { background: #222; width: 85%; max-width: 350px; padding: 25px; border-radius: 20px; text-align: center; }
        .modal-card h3 { margin-bottom: 15px; color: var(--rdc-yellow); }
        .modal-card button { 
            width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; 
        }

        .typing-indicator { font-size: 0.75rem; color: var(--whatsapp-green); margin-left: 15px; height: 15px; }
        .new-msg-divider { text-align: center; margin: 15px 0; position: relative; }
        .new-msg-divider span { background: var(--rdc-red); color: white; font-size: 0.65rem; padding: 2px 10px; border-radius: 10px; }

        /* --- UTILS --- */
        #zoomModal img { max-width: 95%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="header-left">
            <img id="myAvatar" src="https://via.placeholder.com/40" class="logo-img" onclick="zoomImg(this.src)">
            <div class="status-info">
                <h1>CongoFlix</h1>
                <p id="onlineDisplay">0 en ligne</p>
            </div>
        </div>
        <div style="display: flex; gap: 15px; font-size: 1.1rem;">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <header id="privateHeader" class="private-header">
        <div class="p-head-user">
            <i class="fas fa-arrow-left" onclick="exitPrivateChat()"></i>
            <img id="pHeadImg" src="">
            <div>
                <strong id="pHeadName">Utilisateur</strong>
                <p id="pStatus" style="font-size: 0.65rem; color: var(--whatsapp-green);">En ligne</p>
            </div>
        </div>
        <div class="p-head-actions">
            <i class="fas fa-video" onclick="initiateCall('video')"></i>
            <i class="fas fa-phone" onclick="initiateCall('audio')"></i>
            <i class="fas fa-cog" onclick="openContactOptions()"></i>
        </div>
    </header>

    <div class="tabs" id="mainTabs">
        <div class="tab active" id="tab-live" onclick="switchTab('live')">GÉNÉRAL <span class="badge" id="badge-live">0</span></div>
        <div class="tab" id="tab-games" onclick="switchTab('games')">CINÉ-CLUB <span class="badge" id="badge-games">0</span></div>
        <div class="tab" id="tab-market" onclick="switchTab('market')">MARCHÉ <span class="badge" id="badge-market">0</span></div>
        <div class="tab" id="tab-private" onclick="switchTab('private')">PRIVÉ <span class="badge" id="badge-private">0</span></div>
    </div>

    <div id="live" class="chat-container active"></div>
    <div id="games" class="chat-container"></div>
    <div id="market" class="chat-container"></div>
    
    <div id="private" class="chat-container">
        <p style="text-align: center; color: #666; font-size: 0.9rem; margin-top: 20px;">
            Cliquez sur le nom d'un membre dans les salons publics pour l'ajouter en contact privé.
        </p>
    </div>

    <div id="privateWindow" class="chat-container"></div>

    <div id="typing-status" class="typing-indicator"></div>

    <div class="input-bar" id="inputBar">
        <i class="far fa-smile" style="font-size: 1.3rem; color: #888;"></i>
        <input type="text" id="msgInput" placeholder="Écrire un message...">
        <button class="send-btn" id="sendBtn" onclick="handleSendAction()">
            <i id="btnIcon" class="fas fa-microphone"></i>
        </button>
    </div>

    <div id="callScreen">
        <div id="remote-video" style="display: none;"></div>
        <div id="local-video" style="display: none;"></div>
        <div id="callUI" style="position: relative; z-index: 100;">
            <img id="callAvatar" src="" class="call-avatar">
            <h2 id="callName">Nom</h2>
            <p id="callStatusText" style="color: #aaa; margin-top: 10px;">Appel en cours...</p>
            <div class="call-btns">
                <div class="call-btn btn-end" onclick="endAgoraCall()">
                    <i class="fas fa-phone-slash"></i>
                </div>
                <div class="call-btn btn-accept" id="acceptBtn" onclick="handleUserAcceptCall()" style="display: none;">
                    <i class="fas fa-phone"></i>
                </div>
            </div>
        </div>
    </div>

    <div id="zoomModal" class="custom-modal" onclick="this.style.display='none'">
        <img id="zoomedImg" src="">
    </div>

    <div id="contactOptionsModal" class="custom-modal">
        <div class="modal-card">
            <h3 id="optContactName">Options</h3>
            <button style="background:var(--rdc-red); color:white;" onclick="toggleBlockUser()">BLOQUER CE CONTACT</button>
            <button style="background:#ff9800; color:white;" onclick="removeContact()">RETIRER DE MA LISTE</button>
            <button style="background:#eee; color:#333;" onclick="closeAllModals()">ANNULER</button>
        </div>
    </div>

    <div id="addContactModal" class="custom-modal">
        <div class="modal-card">
            <h3 id="targetNameDisplay">Nouvel Ami ?</h3>
            <p style="color: #ccc; margin-bottom: 15px;">Voulez-vous ajouter cet utilisateur à vos contacts privés ?</p>
            <button style="background:var(--rdc-blue); color:white;" onclick="confirmAddContact()">OUI, AJOUTER</button>
            <button style="background:#eee;" onclick="closeAllModals()">PAS MAINTENANT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, updateDoc, deleteDoc, runTransaction, where, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4",
            authDomain: "congo-streaming-51333.firebaseapp.com",
            projectId: "congo-streaming-51333",
            appId: "1:304286627819:android:36e0b43b8b10508a054bae"
        };

        const AGORA_APP_ID = "395bf61671f44c9284be2f8f49daa884";
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let currentUser = null;
        let currentRoom = 'live';
        let targetUser = null; 
        let userCache = {};
        let activeListeners = {};
        let localTracks = { videoTrack: null, audioTrack: null };
        let badgeCounters = { live: 0, games: 0, market: 0, private: 0 };
        let currentCallDocId = null;

        // --- AUTH & INITIALISATION ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);
                const userData = snap.exists() ? snap.data() : {};
                
                const myPhoto = userData.photoURL || user.photoURL || "https://via.placeholder.com/40";
                document.getElementById('myAvatar').src = myPhoto;
                
                // Statut Online
                const onlineRef = doc(db, "online_users", user.uid);
                setDoc(onlineRef, {
                    name: userData.name || user.displayName || "Membre",
                    photo: myPhoto,
                    status: 'online',
                    lastSeen: serverTimestamp()
                }, { merge: true });

                onSnapshot(collection(db, "online_users"), (snap) => {
                    let count = 0;
                    snap.forEach(d => {
                        userCache[d.id] = d.data();
                        count++;
                    });
                    document.getElementById('onlineDisplay').innerText = `${count} en ligne`;
                });

                listenMessages('live');
                loadContacts();
                setupGlobalNotifications();
                listenIncomingCalls();
            }
        });

        // --- GESTION DES ONGLETS ---
        window.switchTab = (tab) => {
            currentRoom = tab;
            document.querySelectorAll('.chat-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            badgeCounters[tab] = 0;
            const b = document.getElementById(`badge-${tab}`);
            b.innerText = "0"; b.style.display = "none";

            if(tab === 'private') {
                document.getElementById('inputBar').style.display = 'none';
            } else {
                document.getElementById('inputBar').style.display = 'flex';
                listenMessages(tab);
            }
        };

        // --- CHAT PRIVÉ ---
        window.enterPrivateChat = async (id, name, photo) => {
            targetUser = { id, name, photo };
            currentRoom = 'private_active';
            
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('privateHeader').style.display = 'flex';
            document.getElementById('privateWindow').classList.add('active');
            document.getElementById('private').classList.remove('active');
            document.getElementById('mainTabs').style.display = 'none';
            document.getElementById('inputBar').style.display = 'flex';
            
            document.getElementById('pHeadName').innerText = name;
            document.getElementById('pHeadImg').src = photo;

            const chatId = getChatId(currentUser.uid, id);
            await setDoc(doc(db, `private_chats/${chatId}/read_status`, currentUser.uid), { 
                lastRead: serverTimestamp() 
            });

            listenMessages('private_active');
        };

        window.exitPrivateChat = () => {
            document.getElementById('privateHeader').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'flex';
            document.getElementById('mainTabs').style.display = 'flex';
            document.getElementById('privateWindow').classList.remove('active');
            switchTab('private');
        };

        // --- MESSAGES ENGINE ---
        async function listenMessages(room) {
            if(activeListeners.msgs) activeListeners.msgs();
            
            const isPrivate = room === 'private_active';
            const chatId = isPrivate ? getChatId(currentUser.uid, targetUser.id) : null;
            const path = isPrivate ? `private_chats/${chatId}/messages` : room;
            const container = isPrivate ? document.getElementById('privateWindow') : document.getElementById(room);

            let lastReadDate = null;
            if(isPrivate) {
                const rs = await getDoc(doc(db, `private_chats/${chatId}/read_status`, currentUser.uid));
                if(rs.exists() && rs.data().lastRead) lastReadDate = rs.data().lastRead.toDate();
            }

            const q = query(collection(db, path), orderBy("timestamp", "asc"), limit(100));
            
            activeListeners.msgs = onSnapshot(q, (snap) => {
                let html = "";
                let dividerPlaced = false;

                snap.forEach(d => {
                    const m = d.data();
                    if(!m.timestamp) return;

                    const msgDate = m.timestamp.toDate();
                    const isMe = m.userId === currentUser.uid;
                    const info = userCache[m.userId] || { name: "Anonyme", photo: "https://via.placeholder.com/40" };
                    const timeStr = msgDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    if(isPrivate && !isMe && lastReadDate && msgDate > lastReadDate && !dividerPlaced) {
                        html += `<div class="new-msg-divider"><span>Nouveaux messages</span></div>`;
                        dividerPlaced = true;
                    }

                    let reactHtml = '<div class="reactions-container">';
                    for(let emoji in (m.reactions || {})) {
                        reactHtml += `<div class="reaction-pill"><span>${emoji}</span> ${m.reactions[emoji].count}</div>`;
                    }
                    reactHtml += '</div>';

                    html += `
                        <div class="msg-wrapper ${isMe ? 'sent' : 'received'}">
                            <img src="${info.photo}" class="msg-avatar" onclick="zoomImg('${info.photo}')">
                            <div class="message">
                                <span class="msg-name" onclick="openAddModal('${m.userId}', '${info.name}')">${isMe ? 'Moi' : info.name}</span>
                                ${m.text}
                                ${reactHtml}
                                <span class="msg-time">${timeStr}</span>
                            </div>
                            <div class="reaction-trigger" onclick="toggleStickers('${d.id}')"><i class="far fa-smile"></i></div>
                            <div class="sticker-modal" id="stickers-${d.id}">
                                <span onclick="addReaction('${d.id}', '${path}', '❤️')">❤️</span>
                                <span onclick="addReaction('${d.id}', '${path}', '😂')">😂</span>
                                <span onclick="addReaction('${d.id}', '${path}', '🔥')">🔥</span>
                                <span onclick="addReaction('${d.id}', '${path}', '👍')">👍</span>
                            </div>
                        </div>`;
                });

                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
            
            listenTyping(isPrivate ? chatId : room);
        }

        // --- ENVOI MESSAGE ---
        window.handleSendAction = async () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            if(currentRoom === 'private_active') {
                const bCheck = await getDoc(doc(db, `users/${targetUser.id}/blocked`, currentUser.uid));
                if(bCheck.exists()) {
                    alert("⚠️ Action impossible : Vous n'êtes plus autorisé à contacter ce membre.");
                    return;
                }
            }

            const path = (currentRoom === 'private_active') 
                ? `private_chats/${getChatId(currentUser.uid, targetUser.id)}/messages` 
                : currentRoom;

            try {
                await addDoc(collection(db, path), {
                    text,
                    userId: currentUser.uid,
                    timestamp: serverTimestamp(),
                    reactions: {}
                });
                input.value = "";
                updateTyping(false);
            } catch(e) { console.error(e); }
        };

        // --- APPELS (HARDWARE & AGORA) ---
        async function requestHardwarePermissions() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                stream.getTracks().forEach(track => track.stop());
                return true;
            } catch (err) {
                alert("Veuillez autoriser l'accès micro/caméra dans les paramètres de votre navigateur.");
                return false;
            }
        }

        window.initiateCall = async (type) => {
            const hasPermission = await requestHardwarePermissions();
            if(!hasPermission) return;

            const channel = getChatId(currentUser.uid, targetUser.id);
            currentCallDocId = targetUser.id; 

            await setDoc(doc(db, "calls", targetUser.id), {
                callerId: currentUser.uid,
                callerName: userCache[currentUser.uid].name,
                callerPhoto: userCache[currentUser.uid].photo,
                type, channel, status: 'ringing',
                timestamp: serverTimestamp()
            });

            showCallScreen(targetUser.name, targetUser.photo, "Appel sortant...");
            
            onSnapshot(doc(db, "calls", targetUser.id), (snap) => {
                if(!snap.exists()) cleanupAgora();
                else if(snap.data().status === 'accepted') startAgoraSession(channel, type);
            });
        };

        function listenIncomingCalls() {
            onSnapshot(doc(db, "calls", currentUser.uid), (snap) => {
                if(snap.exists()) {
                    const data = snap.data();
                    currentCallDocId = currentUser.uid;
                    if(data.status === 'ringing') showCallScreen(data.callerName, data.callerPhoto, "Appel entrant...", true);
                } else {
                    cleanupAgora();
                }
            });
        }

        window.handleUserAcceptCall = async () => {
            const hasPermission = await requestHardwarePermissions();
            if(hasPermission) {
                const callRef = doc(db, "calls", currentUser.uid);
                const snap = await getDoc(callRef);
                if(snap.exists()) {
                    await updateDoc(callRef, { status: 'accepted' });
                    startAgoraSession(snap.data().channel, snap.data().type);
                }
            }
        };

        async function startAgoraSession(channel, type) {
            document.getElementById('acceptBtn').style.display = 'none';
            document.getElementById('callStatusText').innerText = "Connexion...";
            
            try {
                await agoraClient.join(AGORA_APP_ID, channel, null, Math.floor(Math.random() * 10000));
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                let tracks = [localTracks.audioTrack];
                
                if(type === 'video') {
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();
                    localTracks.videoTrack.play("local-video");
                    document.getElementById('local-video').style.display = 'block';
                    tracks.push(localTracks.videoTrack);
                }

                await agoraClient.publish(tracks);
                document.getElementById('callStatusText').innerText = "En ligne";

                agoraClient.on("user-published", async (user, mediaType) => {
                    await agoraClient.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        document.getElementById('remote-video').style.display = 'block';
                        user.videoTrack.play("remote-video");
                    }
                    if (mediaType === "audio") user.audioTrack.play();
                });
            } catch (err) { endAgoraCall(); }
        }

        window.endAgoraCall = async () => {
            if(currentCallDocId) await deleteDoc(doc(db, "calls", currentCallDocId)).catch(()=>{});
            cleanupAgora();
        };

        function cleanupAgora() {
            if(localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
            if(localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            agoraClient.leave();
            document.getElementById('callScreen').style.display = 'none';
            document.getElementById('remote-video').style.display = 'none';
            document.getElementById('local-video').style.display = 'none';
        }

        function showCallScreen(name, photo, status, incoming = false) {
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('callName').innerText = name;
            document.getElementById('callAvatar').src = photo;
            document.getElementById('callStatusText').innerText = status;
            document.getElementById('acceptBtn').style.display = incoming ? 'flex' : 'none';
        }

        // --- BADGES ---
        function setupGlobalNotifications() {
            ['live', 'games', 'market'].forEach(room => {
                const q = query(collection(db, room), orderBy("timestamp", "desc"), limit(1));
                onSnapshot(q, (snap) => {
                    if(!snap.empty && currentRoom !== room) {
                        const m = snap.docs[0].data();
                        if(m.userId !== currentUser.uid) {
                            badgeCounters[room]++;
                            const b = document.getElementById(`badge-${room}`);
                            b.innerText = badgeCounters[room] > 99 ? "99+" : badgeCounters[room];
                            b.style.display = "block";
                        }
                    }
                });
            });
        }

        // --- CONTACTS ---
        function loadContacts() {
            onSnapshot(collection(db, `users/${currentUser.uid}/contacts`), (snap) => {
                const cont = document.getElementById('private');
                cont.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    const div = document.createElement('div');
                    div.className = 'contact-item';
                    div.innerHTML = `<img src="${c.photo}"><div><strong>${c.name}</strong><p>Cliquer pour discuter</p></div>`;
                    div.onclick = () => enterPrivateChat(d.id, c.name, c.photo);
                    cont.appendChild(div);
                });
            });
        }

        window.openAddModal = (id, name) => {
            if(id === currentUser.uid) return;
            targetUser = { id, name };
            document.getElementById('targetNameDisplay').innerText = name;
            document.getElementById('addContactModal').style.display = 'flex';
        };

        window.confirmAddContact = async () => {
            const info = userCache[targetUser.id];
            await setDoc(doc(db, `users/${currentUser.uid}/contacts`, targetUser.id), {
                name: info.name, photo: info.photo, addedAt: serverTimestamp()
            });
            closeAllModals();
            alert("Ajouté aux contacts !");
        };

        window.closeAllModals = () => {
            document.querySelectorAll('.custom-modal').forEach(m => m.style.display = 'none');
        };

        const getChatId = (u1, u2) => [u1, u2].sort().join('_');

        function updateTyping(isTyping) {
            const roomId = (currentRoom === 'private_active') ? getChatId(currentUser.uid, targetUser.id) : currentRoom;
            setDoc(doc(db, "typing", roomId), {
                [currentUser.uid]: { typing: isTyping, name: userCache[currentUser.uid].name }
            }, { merge: true });
        }

        function listenTyping(roomId) {
            onSnapshot(doc(db, "typing", roomId), (snap) => {
                if(!snap.exists()) return;
                const data = snap.data();
                let text = "";
                for(let id in data) if(id !== currentUser.uid && data[id].typing) text = `${data[id].name} écrit...`;
                document.getElementById('typing-status').innerText = text;
            });
        }

        window.addReaction = async (msgId, path, emoji) => {
            const ref = doc(db, path, msgId);
            await runTransaction(db, async (transaction) => {
                const snap = await transaction.get(ref);
                const reacts = snap.data().reactions || {};
                if(!reacts[emoji]) reacts[emoji] = { count: 0 };
                reacts[emoji].count += 1;
                transaction.update(ref, { reactions: reacts });
            });
            document.getElementById(`stickers-${msgId}`).style.display = 'none';
        };

        window.toggleStickers = (id) => {
            const m = document.getElementById(`stickers-${id}`);
            const isVisible = m.style.display === 'grid';
            document.querySelectorAll('.sticker-modal').forEach(sm => sm.style.display = 'none');
            m.style.display = isVisible ? 'none' : 'grid';
        };

        window.zoomImg = (url) => {
            document.getElementById('zoomedImg').src = url;
            document.getElementById('zoomModal').style.display = 'flex';
        };

        document.getElementById('msgInput').oninput = (e) => {
            const val = e.target.value;
            updateTyping(val.length > 0);
            const icon = document.getElementById('btnIcon');
            const btn = document.getElementById('sendBtn');
            if(val.length > 0) {
                icon.className = "fas fa-paper-plane";
                btn.style.background = "var(--rdc-blue)";
                btn.style.color = "white";
            } else {
                icon.className = "fas fa-microphone";
                btn.style.background = "var(--whatsapp-yellow)";
                btn.style.color = "black";
            }
        };

        window.openContactOptions = () => {
            document.getElementById('optContactName').innerText = targetUser.name;
            document.getElementById('contactOptionsModal').style.display = 'flex';
        };

        window.toggleBlockUser = async () => {
            if(!confirm(`Bloquer ${targetUser.name} ?`)) return;
            await setDoc(doc(db, `users/${currentUser.uid}/blocked`, targetUser.id), { blockedAt: serverTimestamp() });
            closeAllModals();
            exitPrivateChat();
        };

        window.removeContact = async () => {
            if(!confirm("Supprimer ce contact ?")) return;
            await deleteDoc(doc(db, `users/${currentUser.uid}/contacts`, targetUser.id));
            closeAllModals();
            exitPrivateChat();
        };

    </script>
</body>
</html>
