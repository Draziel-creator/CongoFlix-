<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CongoChat - Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --whatsapp-yellow: #ffcc00;
            --chat-bg: #ece5dd;
            --bg-body: #050507;
            --rdc-blue: #007fff;
            --rdc-red: #ce1021;
        }

        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-body); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: var(--whatsapp-yellow); color: black; padding-top: 10px; z-index: 1000; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 5px 20px; font-weight: 900; font-size: 1.4rem; }
        
        .tabs { display: flex; justify-content: space-around; }
        .tab { padding: 15px 5px; flex: 1; text-align: center; cursor: pointer; font-weight: bold; font-size: 0.8rem; color: rgba(0,0,0,0.5); }
        .tab.active { color: black; border-bottom: 4px solid black; }

        .chat-container { flex: 1; background: var(--chat-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); overflow-y: auto; padding: 15px; display: none; flex-direction: column; }
        .chat-container.active { display: flex; }
        .message { max-width: 80%; padding: 8px 12px; margin-bottom: 8px; border-radius: 12px; color: black; font-size: 0.95rem; }
        .sent { background: #dcf8c6; align-self: flex-end; }
        .received { background: white; align-self: flex-start; }

        /* --- ZONE INPUT AVEC ROND DE PROFIL --- */
        .input-area { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 8px; }
        .input-wrapper { flex: 1; background: white; border-radius: 25px; padding: 5px 15px; display: flex; align-items: center; min-height: 45px; }
        .input-wrapper input { flex: 1; border: none; padding: 10px 0; outline: none; font-size: 1rem; background: transparent; }
        
        /* Ton rond de profil à gauche de l'écriture */
        #userChatImg { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            margin-right: 10px; 
            display: none; /* Apparaîtra dès que connecté */
            object-fit: cover; 
            border: 2px solid var(--rdc-blue);
        }

        .btn-action { background: var(--whatsapp-yellow); width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; }

        #authModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .btn-link { display: block; background: var(--rdc-blue); color: white; padding: 15px; border-radius: 30px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="header-top">
            <span>CongoChat</span>
            <div style="font-size: 0.8rem;"><span id="onlineDisplay">0</span> en ligne</div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('live')">Live</div>
            <div class="tab" onclick="switchTab('private')">Privé</div>
        </div>
    </header>

    <div id="live" class="chat-container active"></div>
    <div id="private" class="chat-container"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <img id="userChatImg" src="" alt="">
            <input type="text" id="msgInput" placeholder="Tapez un message...">
        </div>
        <button class="btn-action" id="mainBtn" onclick="checkAuthAndAction(sendMessage)">
            <span id="btnIcon">🎤</span>
        </button>
    </div>

    <div id="authModal">
        <div class="modal-content">
            <h3>Connexion requise</h3>
            <a href="https://draziel-creator.github.io/CongoFlix-/index.html" class="btn-link">SE CONNECTER SUR CONGOFLIX</a>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCSdIitm-2_0hC1a01_ssztFUPkEsSA_lY",
        authDomain: "congo-streaming-51333.firebaseapp.com",
        projectId: "congo-streaming-51333",
        appId: "1:304286627819:web:ee606adc4f6b4002054bae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUser = null;
    let userData = null;

    // --- CETTE FONCTION EST LA SEULE QUI DOIT TOUT LANCER ---
    onAuthStateChanged(auth, async (user) => {
        const userImg = document.getElementById('userChatImg');
        const authModal = document.getElementById('authModal');

        if (user) {
            console.log("✅ Connexion détectée !");
            currentUser = user;
            authModal.style.display = 'none';

            // 1. On récupère le profil (maintenant que request.auth n'est plus nul, la règle 4 te laisse passer)
            try {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists()) {
                    userData = userSnap.data();
                    if (userData.photoURL) {
                        userImg.src = userData.photoURL;
                        userImg.style.display = "block"; // TON ROND APPARAÎT ENFIN
                    }
                }
            } catch (e) { console.log("Erreur profil:", e); }

            // 2. On lance les messages SEULEMENT après la connexion
            listenMessages('live');
            
            // 3. On active le compteur
            startPresence(user.uid);

        } else {
            console.log("❌ Non connecté");
            currentUser = null;
            userImg.style.display = "none";
            authModal.style.display = 'flex'; // On affiche le bouton Se Connecter
        }
    });

    // --- FONCTION PRÉSENCE CORRIGÉE ---
    async function startPresence(uid) {
        const presenceRef = doc(db, "online_users", uid);
        await setDoc(presenceRef, { uid: uid, timestamp: serverTimestamp() });
        
        // On écoute le compteur global
        onSnapshot(collection(db, "online_users"), (snap) => {
            document.getElementById('onlineDisplay').innerText = `${snap.size} en ligne`;
        });
    }

    // --- FONCTION MESSAGES ---
    window.listenMessages = (room) => {
        // Important: La règle 4 bloque la lecture si pas connecté, 
        // donc on s'assure d'avoir l'UID avant de lancer le snapshot
        if(!currentUser) return;

        const q = query(collection(db, room), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById(room);
            if(!container) return;
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMe = data.userId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `message ${isMe ? 'sent' : 'received'}`;
                div.innerHTML = `<small style="font-size:0.6rem; color:#888;">${data.userName}</small><br>${data.text}`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }, (error) => {
            console.log("Erreur snapshot (souvent règle 4):", error);
        });
    };

    window.sendMessage = async () => {
        const input = document.getElementById('msgInput');
        if(!input.value || !currentUser) return;
        
        await addDoc(collection(db, 'live'), {
            text: input.value,
            timestamp: serverTimestamp(),
            userId: currentUser.uid,
            userName: userData?.pseudo || "Membre Congo",
            userPhoto: userData?.photoURL || ""
        });
        input.value = "";
    };

    window.checkAuthAndAction = (action) => {
        if (currentUser) action();
        else document.getElementById('authModal').style.display = 'flex';
    };

</script>
</body>
</html>
