<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoChat - Elite Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --whatsapp-yellow: #ffcc00; --chat-bg: #ece5dd; --bg-body: #050507; --rdc-blue: #0088cc; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-body); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; width: 100%; }
        header { background: var(--whatsapp-yellow); color: black; padding-top: 10px; z-index: 1000; flex-shrink: 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 5px 20px; font-weight: 900; font-size: 1.4rem; }
        .tabs { display: flex; justify-content: space-around; }
        .tab { padding: 15px 5px; flex: 1; text-align: center; cursor: pointer; font-weight: bold; font-size: 0.7rem; color: rgba(0,0,0,0.5); }
        .tab.active { color: black; border-bottom: 4px solid black; }
        .chat-container { flex: 1; background: var(--chat-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); overflow-y: auto; padding: 10px; display: none; flex-direction: column; }
        .chat-container.active { display: flex; }
        .msg-wrapper { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 12px; max-width: 85%; }
        .msg-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message { padding: 8px 12px; border-radius: 15px; color: black; font-size: 0.95rem; background: white; }
        .sent .message { background: #dcf8c6; }
        .input-area { background: #f0f0f0; padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #ddd; }
        .input-wrapper { flex: 1; background: white; border-radius: 25px; padding: 0 15px; display: flex; }
        .input-wrapper input { flex: 1; border: none; padding: 10px 0; outline: none; }
        #privateHeader { background: #ededed; color: black; padding: 10px 15px; display: none; align-items: center; justify-content: space-between; }
        
        /* Interface Appel */
        #callScreen { position: fixed; inset: 0; background: #0f172a; z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 60px 0; }
        #remote-video { position: absolute; inset: 0; }
        #local-video { position: absolute; bottom: 120px; right: 20px; width: 100px; height: 150px; border-radius: 10px; border: 2px solid white; z-index: 30001; }
        .call-info { z-index: 30002; text-align: center; }
        .call-info img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--whatsapp-yellow); }
        .call-controls { z-index: 30002; display: flex; gap: 20px; }
        .btn-call { width: 60px; height: 60px; border-radius: 50%; border: none; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }
        .hangup { background: #ff3b30; }
        .accept { background: #4cd964; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="header-top"><span>CongoChat</span> <small id="onlineDisplay">0 en ligne</small></div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('live')">Live</div>
            <div class="tab" onclick="switchTab('private')">Privé</div>
        </div>
    </header>

    <div id="privateHeader">
        <div style="display:flex; align-items:center; gap:12px;">
            <i class="fas fa-arrow-left" onclick="exitPrivateChat()"></i>
            <img id="pHeadImg" src="" style="width:40px; height:40px; border-radius:50%;">
            <strong id="pHeadName">...</strong>
        </div>
        <div style="display:flex; gap:20px;">
            <i class="fas fa-video" onclick="initiateCall('video')" style="color:var(--rdc-blue); font-size: 1.3rem;"></i>
            <i class="fas fa-phone" onclick="initiateCall('audio')" style="font-size: 1.3rem;"></i>
        </div>
    </div>

    <div id="callScreen">
        <div id="remote-video"></div>
        <div id="local-video"></div>
        <div class="call-info">
            <img id="callAvatar" src="">
            <h2 id="callName">Nom</h2>
            <p id="callStatusText">Connexion...</p>
        </div>
        <div class="call-controls">
            <button class="btn-call accept" id="acceptBtn" style="display:none;" onclick="handleIncomingCallAccept()"><i class="fas fa-phone"></i></button>
            <button class="btn-call hangup" onclick="endAllCalls()"><i class="fas fa-phone-slash"></i></button>
        </div>
    </div>

    <div id="live" class="chat-container active"></div>
    <div id="private" class="chat-container" style="background:#fff; padding:0;"></div>
    <div id="privateWindow" class="chat-container"></div>

    <div class="input-area" id="inputBar">
        <div class="input-wrapper"><input type="text" id="msgInput" placeholder="Message..."></div>
        <button class="btn-call" style="width:45px; height:45px; background:var(--whatsapp-yellow)" onclick="handleSendAction()"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4", authDomain: "congo-streaming-51333.firebaseapp.com", projectId: "congo-streaming-51333", appId: "1:304286627819:web:1094765664a781e6054bae" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- CONFIG ---
        const AGORA_APP_ID = "395bf61671f44c9284be2f8f49daa884";
        let agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { video: null, audio: null };
        let peer; 
        let currentPeerCall;
        let currentUser, targetUser, currentRoom = 'live', userCache = {};

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                peer = new Peer(user.uid);
                
                // Ecouter les appels PeerJS (AUDIO GRATUIT)
                peer.on('call', async (call) => {
                    currentPeerCall = call;
                    showCallScreen("Appel Audio", "", "Appel entrant (Gratuit)...", true);
                });

                listenForFirebaseSignaling();
                listenMessages('live');
            }
        });

        // --- LOGIQUE APPEL SEPAREE ---

        window.initiateCall = async (type) => {
            if (!targetUser) return;
            const callRef = doc(db, "calls", targetUser.id);

            if (type === 'audio') {
                // LOGIQUE PEERJS (GRATUIT)
                showCallScreen(targetUser.name, targetUser.photo, "Appel Audio (PeerJS)...");
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentPeerCall = peer.call(targetUser.id, stream);
                currentPeerCall.on('stream', (remoteStream) => playStream(remoteStream));
            } else {
                // LOGIQUE AGORA (PAYANT)
                const channel = [currentUser.uid, targetUser.id].sort().join('_');
                await setDoc(callRef, { callerId: currentUser.uid, type: 'video', channel: channel, status: 'ringing' });
                showCallScreen(targetUser.name, targetUser.photo, "Appel Vidéo (Agora Payant)...");
            }
        };

        window.handleIncomingCallAccept = async () => {
            document.getElementById('acceptBtn').style.display = 'none';
            
            if (currentPeerCall) { 
                // Accepter PeerJS
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentPeerCall.answer(stream);
                currentPeerCall.on('stream', (remoteStream) => playStream(remoteStream));
            } else {
                // Accepter Agora
                const callRef = doc(db, "calls", currentUser.uid);
                await updateDoc(callRef, { status: 'accepted' });
            }
        };

        async function startAgoraVideo(channel) {
            await agoraClient.join(AGORA_APP_ID, channel, null, null);
            localTracks.audio = await AgoraRTC.createMicrophoneAudioTrack();
            localTracks.video = await AgoraRTC.createCameraVideoTrack();
            localTracks.video.play("local-video");
            await agoraClient.publish([localTracks.audio, localTracks.video]);
            
            agoraClient.on("user-published", async (user, mediaType) => {
                await agoraClient.subscribe(user, mediaType);
                if (mediaType === "video") user.videoTrack.play("remote-video");
                if (mediaType === "audio") user.audioTrack.play();
            });
        }

        function playStream(stream) {
            const audio = new Audio();
            audio.srcObject = stream;
            audio.play();
            document.getElementById('callStatusText').innerText = "En communication...";
        }

        window.endAllCalls = async () => {
            if (currentPeerCall) currentPeerCall.close();
            if (localTracks.video) { localTracks.video.close(); localTracks.audio.close(); }
            await agoraClient.leave();
            await deleteDoc(doc(db, "calls", currentUser.uid)).catch(()=>{});
            document.getElementById('callScreen').style.display = 'none';
        };

        function listenForFirebaseSignaling() {
            onSnapshot(doc(db, "calls", currentUser.uid), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.status === 'ringing' && data.type === 'video') {
                        showCallScreen("Vidéo Pro", "", "Appel Vidéo Entrant...", true);
                    } else if (data.status === 'accepted') {
                        startAgoraVideo(data.channel);
                    }
                }
            });
        }

        // --- HELPERS UI ---
        function showCallScreen(name, photo, status, incoming = false) {
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('callName').innerText = name;
            document.getElementById('callStatusText').innerText = status;
            document.getElementById('acceptBtn').style.display = incoming ? 'flex' : 'none';
        }

        window.switchTab = (tab) => {
            document.querySelectorAll('.chat-container').forEach(c => c.style.display = 'none');
            document.getElementById(tab).style.display = 'flex';
            currentRoom = tab;
        };
        
        window.exitPrivateChat = () => {
            document.getElementById('privateHeader').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'block';
            switchTab('private');
        };
    </script>
</body>
</html>
