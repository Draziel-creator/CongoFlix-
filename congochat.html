<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoChat - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --whatsapp-yellow: #ffcc00; --chat-bg: #ece5dd; --bg-body: #050507; --rdc-blue: #0088cc; --rdc-red: #ce1021; }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg-body); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--whatsapp-yellow); color: black; padding-top: 10px; z-index: 1000; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 5px 20px; font-weight: 900; font-size: 1.2rem; }
        .tabs { display: flex; justify-content: space-around; }
        .tab { padding: 12px 5px; flex: 1; text-align: center; cursor: pointer; font-weight: bold; font-size: 0.75rem; position: relative; color: rgba(0,0,0,0.5); }
        .tab.active { color: black; border-bottom: 4px solid black; }
        .badge { position: absolute; top: 5px; right: 5px; background: var(--rdc-red); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; border: 1px solid white; display: none; }

        .chat-container { flex: 1; background: var(--chat-bg) url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); overflow-y: auto; padding: 10px; display: none; flex-direction: column; }
        .chat-container.active { display: flex; }
        .new-separator { width: 100%; text-align: center; margin: 15px 0; color: #555; font-size: 0.7rem; font-weight: bold; }

        /* --- MESSAGES FIXÉS --- */
        .msg-wrapper { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; max-width: 90%; }
        .msg-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message { padding: 8px 12px; border-radius: 12px; color: black; font-size: 0.95rem; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-word; position: relative; }
        .sent .message { background: #dcf8c6; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .msg-name { display: block; font-weight: bold; font-size: 0.75rem; color: var(--rdc-blue); margin-bottom: 2px; }
        .msg-time { font-size: 0.6rem; color: #888; margin-left: 10px; float: right; margin-top: 4px; }

        /* --- INPUT AREA FIXÉE --- */
        .input-area { background: #f0f0f0; padding: 8px 10px; display: flex !important; align-items: center; gap: 8px; border-top: 1px solid #ddd; }
        .profile-me { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--whatsapp-yellow); }
        .input-wrapper { flex: 1; background: white; border-radius: 20px; padding: 2px 12px; display: flex; align-items: center; }
        .input-wrapper input { flex: 1; border: none; padding: 10px 0; outline: none; font-size: 0.95rem; }
        .btn-action { background: var(--whatsapp-yellow); width: 45px; height: 45px; border-radius: 50%; border: none; color: white; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; flex-shrink: 0; }

        .custom-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10000; }
        .modal-card { background: #fff; color: #000; padding: 20px; border-radius: 15px; width: 85%; max-width: 300px; text-align: center; }
        .modal-card button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px; border: none; font-weight: bold; }

        #privateHeader { background: #ededed; color: black; padding: 10px; display: none; align-items: center; gap: 10px; }
        #typing-status { font-size: 0.7rem; color: #25d366; font-weight: bold; margin-left: 15px; height: 14px; background: #f0f0f0; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="header-top"><span>CongoChat</span> <small id="onlineDisplay">0 en ligne</small></div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('live')">LIVE <span class="badge" id="badge-live"></span></div>
            <div class="tab" onclick="switchTab('games')">GAMES <span class="badge" id="badge-games"></span></div>
            <div class="tab" onclick="switchTab('market')">MARKET <span class="badge" id="badge-market"></span></div>
            <div class="tab" onclick="switchTab('private')">PRIVÉ <span class="badge" id="badge-private"></span></div>
        </div>
    </header>

    <div id="privateHeader">
        <i class="fas fa-arrow-left" onclick="exitPrivateChat()"></i>
        <img id="pHeadImg" src="" style="width:35px; height:35px; border-radius:50%">
        <div><strong id="pHeadName">Nom</strong><br><small id="pHeadStatus">...</small></div>
    </div>

    <div id="live" class="chat-container active"></div>
    <div id="games" class="chat-container"></div>
    <div id="market" class="chat-container"></div>
    <div id="private" class="chat-container" style="background:#fff; padding:0;"></div>
    <div id="privateWindow" class="chat-container"></div>

    <div id="typing-status"></div>

    <div class="input-area" id="inputBar">
        <img id="myAvatar" src="https://via.placeholder.com/40" class="profile-me">
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
        </div>
        <button class="btn-action" id="mainBtn" onclick="handleSendAction()">
            <i id="btnIcon" class="fas fa-microphone"></i>
        </button>
    </div>

    <div id="contactModal" class="custom-modal"><div class="modal-card"><h3 id="cModalTitle">Contact</h3><button style="background:var(--rdc-blue);color:#fff" id="btnC1">AJOUTER</button><button style="background:var(--rdc-red);color:#fff" id="btnC2">BLOQUER</button><button onclick="closeModals()">ANNULER</button></div></div>
    <div id="msgModal" class="custom-modal"><div class="modal-card"><h3>Supprimer?</h3><button style="background:var(--rdc-red);color:#fff" id="btnDelMsg">OUI, SUPPRIMER</button><button onclick="closeModals()">ANNULER</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDoc, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCoWWXJB7X6_j9A65UhmFse_fqUlk0FGL4", authDomain: "congo-streaming-51333.firebaseapp.com", projectId: "congo-streaming-51333", appId: "1:304286627819:android:36e0b43b8b10508a054bae" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let currentRoom = 'live';
        let targetUser = null;
        let lastSeen = {};

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('myAvatar').src = user.photoURL || "https://via.placeholder.com/40";
                setDoc(doc(db, "online_users", user.uid), { name: user.displayName, photo: user.photoURL, lastLogin: Date.now() }, {merge: true});
                listenMessages('live');
                loadContacts();
            }
        });

        onSnapshot(collection(db, "online_users"), (snap) => {
            document.getElementById('onlineDisplay').innerText = `${snap.size} en ligne`;
        });

        window.handleSendAction = async () => {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text || !currentUser) return;

            let path = currentRoom === 'private_active' ? `private_chats/${getChatId(currentUser.uid, targetUser.id)}/messages` : currentRoom;
            
            await addDoc(collection(db, path), {
                text, userId: currentUser.uid, userName: currentUser.displayName, 
                userPhoto: currentUser.photoURL, timestamp: serverTimestamp()
            });
            
            input.value = "";
            updateBtnIcon("");
            setTyping(false);
        };

        window.listenMessages = (room) => {
            let path = room === 'private_active' ? `private_chats/${getChatId(currentUser.uid, targetUser.id)}/messages` : room;
            const q = query(collection(db, path), orderBy("timestamp", "asc"));
            
            onSnapshot(q, (snap) => {
                const container = room === 'private_active' ? document.getElementById('privateWindow') : document.getElementById(room);
                if(!container) return;
                
                let html = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.userId === currentUser.uid;
                    const time = m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "...";
                    
                    // Nouveaux messages seulement pour le destinataire
                    if(!isMe && m.timestamp && m.timestamp.toMillis() > lastSeen[room]) {
                        html += `<div class="new-separator">--- NOUVEAU MESSAGE ---</div>`;
                    }

                    html += `
                    <div class="msg-wrapper ${isMe ? 'sent' : 'received'}" onclick="${isMe ? `askDelete('${d.id}','${path}')` : `askAdd('${m.userId}','${m.userName}','${m.userPhoto}')`}">
                        <img src="${m.userPhoto || 'https://via.placeholder.com/40'}" class="msg-avatar">
                        <div class="message">
                            <span class="msg-name">${isMe ? currentUser.displayName : (m.userName || "Anonyme")}</span>
                            ${m.text} <span class="msg-time">${time}</span>
                        </div>
                    </div>`;
                });
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
            listenTyping(room);
        };

        window.switchTab = (tab) => {
            lastSeen[currentRoom] = Date.now();
            currentRoom = tab;
            document.querySelectorAll('.chat-container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.currentTarget.classList.add('active');
            
            document.getElementById('inputBar').style.display = (tab === 'private') ? 'none' : 'flex';
            if(tab !== 'private') listenMessages(tab);
        };

        window.enterPrivateChat = async (id, name, photo) => {
            targetUser = { id, name, photo };
            currentRoom = 'private_active';
            document.getElementById('mainHeader').style.display = 'none';
            document.getElementById('privateHeader').style.display = 'flex';
            document.getElementById('privateWindow').classList.add('active');
            document.getElementById('private').classList.remove('active');
            document.getElementById('inputBar').style.display = 'flex';
            document.getElementById('pHeadName').innerText = name;
            document.getElementById('pHeadImg').src = photo;
            
            // Status En ligne Réel
            const docSnap = await getDoc(doc(db, "online_users", id));
            if(docSnap.exists()){
                const diff = Date.now() - docSnap.data().lastLogin;
                document.getElementById('pHeadStatus').innerText = diff < 120000 ? "En ligne" : "Vu le " + new Date(docSnap.data().lastLogin).toLocaleDateString();
            }
            listenMessages('private_active');
        };

        window.exitPrivateChat = () => {
            document.getElementById('privateHeader').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'block';
            switchTab('private');
        };

        // --- FONCTIONS SECONDAIRES ---
        window.askAdd = (id, name, photo) => {
            if(id === currentUser.uid) return;
            targetUser = { id, name, photo };
            document.getElementById('cModalTitle').innerText = name;
            document.getElementById('contactModal').style.display = 'flex';
            document.getElementById('btnC1').onclick = async () => {
                await setDoc(doc(db, `users/${currentUser.uid}/contacts`, id), targetUser);
                closeModals();
            };
            document.getElementById('btnC2').onclick = async () => {
                await setDoc(doc(db, `users/${currentUser.uid}/blocks`, id), {blocked:true});
                closeModals();
            };
        };

        window.askDelete = (msgId, path) => {
            document.getElementById('msgModal').style.display = 'flex';
            document.getElementById('btnDelMsg').onclick = async () => {
                await deleteDoc(doc(db, path, msgId));
                closeModals();
            };
        };

        const setTyping = (is) => {
            const path = currentRoom === 'private_active' ? getChatId(currentUser.uid, targetUser.id) : currentRoom;
            setDoc(doc(db, "typing", path), { [currentUser.uid]: is ? currentUser.displayName : false }, {merge:true});
        };

        const listenTyping = (room) => {
            const path = room === 'private_active' ? getChatId(currentUser.uid, targetUser.id) : room;
            onSnapshot(doc(db, "typing", path), (s) => {
                if(!s.exists()) return;
                const data = s.data();
                let typingName = "";
                for(let key in data) { if(key !== currentUser.uid && data[key]) typingName = data[key]; }
                document.getElementById('typing-status').innerText = typingName ? typingName + " écrit..." : "";
            });
        };

        const getChatId = (a, b) => a < b ? a + "_" + b : b + "_" + a;
        window.closeModals = () => document.querySelectorAll('.custom-modal').forEach(m => m.style.display='none');
        
        const input = document.getElementById('msgInput');
        input.oninput = (e) => { 
            updateBtnIcon(e.target.value); 
            setTyping(e.target.value.length > 0); 
        };

        function updateBtnIcon(v) {
            const icon = document.getElementById('btnIcon');
            icon.className = v.length > 0 ? "fas fa-paper-plane" : "fas fa-microphone";
        }

        async function loadContacts() {
            onSnapshot(collection(db, `users/${currentUser.uid}/contacts`), (snap) => {
                const container = document.getElementById('private');
                container.innerHTML = "";
                snap.forEach(d => {
                    const c = d.data();
                    const div = document.createElement('div');
                    div.style = "display:flex; align-items:center; gap:10px; padding:15px; border-bottom:1px solid #eee; color:#000";
                    div.innerHTML = `<img src="${c.photo}" style="width:50px; height:50px; border-radius:50%"> <strong>${c.name}</strong>`;
                    div.onclick = () => enterPrivateChat(d.id, c.name, c.photo);
                    container.appendChild(div);
                });
            });
        }
    </script>
</body>
</html>
