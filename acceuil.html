<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body { background-color: #000; margin: 0; padding: 0; overflow: hidden; height: 100%; }
  
  /* --- SPLASH ANIMATION (Cœur du début) --- */
  #custom-splash { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: url('https://i.ibb.co/8LqBJJW3/file-00000000706471fd84451e9200d37cfb.png') center/cover no-repeat; 
    display: flex; justify-content: center; align-items: center; z-index: 25000; 
  }
  
  .logo-container { 
    width: 100px; height: 100px; 
    background: url('https://i.ibb.co/RpWsGk3D/IMG-20260416-WA0039.jpg') center/contain no-repeat; 
    border-radius: 20px; 
    box-shadow: 0 0 35px 10px rgba(255, 215, 0, 0.7); 
    animation: heartbeat 2s infinite ease-in-out; 
  }
  
  @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

  /* --- PAGE PUBLICITÉ --- */
  #pub-page { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: #000; display: none; flex-direction: column; 
    justify-content: center; align-items: center; z-index: 24000; 
  }

  .pub-box {
    border: 1px dashed #ffd700; 
    padding: 20px; 
    border-radius: 15px; 
    text-align: center;
    max-height: 90vh; /* Ajusté pour donner de l'espace au bloc triple */
    max-width: 95%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* --- CONTENEUR TRIPLE PUBLICITÉ (Côte à côte) --- */
  .ad-triple-wrapper {
    display: flex;
    flex-direction: row; /* Aligne les trois pubs horizontalement */
    justify-content: center;
    align-items: center;
    gap: 0px; /* Colle les pubs les unes aux autres pour faire l'épaisseur */
    margin-top: 15px;
    margin-bottom: 15px;
    background-color: #0b0b0b;
    border-radius: 4px;
    overflow: hidden;
  }

  /* Zone individuelle pour chaque unité de 160x600 */
  .ad-zone-160x600 {
    width: 160px;
    height: 600px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* --- LE COMPTEUR / BOUTON X --- */
  #skip-container {
    position: absolute;
    top: 25px;
    left: 20px;
    z-index: 30000;
  }

  .skip-btn {
    width: 45px;
    height: 45px;
    border: 2px solid #ffd700;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    color: #ffd700;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 18px;
    text-decoration: none;
    pointer-events: none; /* Désactivé au début */
    opacity: 0.8;
  }

  .skip-btn.ready {
    pointer-events: auto; /* Activé quand c'est fini */
    background: #ffd700;
    color: #000;
    box-shadow: 0 0 15px #ffd700;
    opacity: 1;
  }
</style>
</head>
<body>

  <div id="custom-splash">
    <div class="logo-container"></div>
  </div>

  <div id="pub-page">
    
    <div id="skip-container">
      <a href="go:w1" id="btn-skip" class="skip-btn">5</a>
    </div>

    <div class="pub-box">
      <h2 style="color:#ffd700; margin:0; font-family: sans-serif; letter-spacing: 2px;">CONGOFLIX</h2>
      <p style="color:#fff; font-size:12px; font-family: sans-serif; margin: 5px 0 0 0;">LA VITRINE DE LA RDC</p>
      
      <!-- Bloc Triple : Trois unités 160x600 fusionnées pour l'épaisseur -->
      <div class="ad-triple-wrapper">
        
        <!-- Pub 1 -->
        <div class="ad-zone-160x600">
          <script type="text/javascript">
            atOptions = {
              'key' : '355c9d0ee6ac5ec71d84d7f879fdc153',
              'format' : 'iframe',
              'height' : 600,
              'width' : 160,
              'params' : {}
            };
          </script>
          <script type="text/javascript" src="https://www.highperformanceformat.com/355c9d0ee6ac5ec71d84d7f879fdc153/invoke.js"></script>
        </div>

        <!-- Pub 2 -->
        <div class="ad-zone-160x600">
          <script type="text/javascript">
            atOptions = {
              'key' : '355c9d0ee6ac5ec71d84d7f879fdc153',
              'format' : 'iframe',
              'height' : 600,
              'width' : 160,
              'params' : {}
            };
          </script>
          <script type="text/javascript" src="https://www.highperformanceformat.com/355c9d0ee6ac5ec71d84d7f879fdc153/invoke.js"></script>
        </div>

        <!-- Pub 3 -->
        <div class="ad-zone-160x600">
          <script type="text/javascript">
            atOptions = {
              'key' : '355c9d0ee6ac5ec71d84d7f879fdc153',
              'format' : 'iframe',
              'height' : 600,
              'width' : 160,
              'params' : {}
            };
          </script>
          <script type="text/javascript" src="https://www.highperformanceformat.com/355c9d0ee6ac5ec71d84d7f879fdc153/invoke.js"></script>
        </div>

      </div>

      <div style="color: #555; font-size: 10px; font-family: sans-serif;">Publicité</div>
    </div>
  </div>

  <script>
    const splash = document.getElementById('custom-splash');
    const pubPage = document.getElementById('pub-page');
    const btnSkip = document.getElementById('btn-skip');

    // ÉTAPE 1 : Animation de 3 secondes
    setTimeout(() => {
      splash.style.display = 'none';
      pubPage.style.display = 'flex';
      demarrerCompteur();
    }, 3000);

    // ÉTAPE 2 : Le compteur de 5 secondes
    function demarrerCompteur() {
      let temps = 5;
      const interval = setInterval(() => {
        temps--;
        if (temps > 0) {
          btnSkip.innerText = temps;
        } else {
          clearInterval(interval);
          btnSkip.innerText = "✕";
          btnSkip.classList.add('ready');
        }
      }, 1000);
    }
  </script>

</body>
</html>
