<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PUBLICITÉ - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Intégration de Font Awesome pour des icônes professionnelles réelles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', sans-serif; background-color: #050508; color: #ffffff;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        /* Conteneur de l'application type Smartphone */
        .app-container {
            width: 100%; height: 100%; max-width: 450px;
            background: linear-gradient(135deg, #060713 0%, #020308 100%);
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* --- HEADER EN SUPERPOSITION AVEC TON IMAGE --- */
        .app-header {
            position: relative;
            padding: 30px 20px 20px 20px; 
            height: 200px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* Pousse les textes vers le bas de l'image */
            background: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi-pCxzWWscwtmrqtBhAc-5YiQPGaC28kP6kYdDaZJ0aCo0ovYZgMTs8hlHk33FMo90174at3NEJickD6gwhFx2Xnkx8zreeRG9TZf-kGY482sm0nE63w6IMN3XwFlT3T1KffsLZC0yCIpZRI9zF3mEhNfcaoq-a33vmGAkqp2nLLFVXLHsdKu5FlD0YPob/s1600/09d6e226-c1ab-4d0e-845d-759b02e01d26.png') center/cover no-repeat;
        }

        /* Dégradé pour que le bas de l'image s'intègre au fond noir */
        .app-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; top: 0;
            background: linear-gradient(to bottom, rgba(5,5,8,0.2) 0%, rgba(5,5,8,0.8) 85%, #050508 100%);
            z-index: 1;
        }

        .header-text-group {
            position: relative;
            z-index: 2;
        }
        .user-welcome { font-size: 13px; color: #00ffcc; margin: 0; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .user-title { font-size: 24px; font-weight: 700; margin: 4px 0 0 0; letter-spacing: -0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .user-title span { color: #00ffcc; }

        /* Pilule de solde en superposition absolue (En haut à droite sur le nuage) */
        .balance-pill {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 3;
            background: rgba(0, 0, 0, 0.75); 
            border: 1px solid rgba(0, 255, 204, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 14px; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
        }
        .balance-amount { font-size: 14px; font-weight: 700; color: #00ffcc; letter-spacing: 0.5px; }
        .balance-plus { background: #00ffcc; color: #000; width: 16px; height: 16px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 11px; }

        /* --- BARRE DE SEUIL / PROGRESSION --- */
        .level-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 5px 20px; padding: 15px; border-radius: 16px;
        }
        .level-info { display: flex; justify-content: space-between; font-size: 12px; color: #b3b6d4; margin-bottom: 8px; }
        .level-progress-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
        .level-progress-bar { width: 65%; height: 100%; background: linear-gradient(90deg, #9b51e0, #00ffcc); border-radius: 3px; }

        /* --- CORPS CENTRAL : ZONE DE PUBLICITÉ UNIQUE --- */
        .main-content {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; padding: 10px 20px; box-sizing: border-box;
        }
        .section-title { font-size: 13px; text-transform: uppercase; color: #9b51e0; font-weight: 600; letter-spacing: 1px; margin-bottom: 10px; }
        
        /* Carte de la Pub */
        .ad-card {
            width: 100%; height: 250px; position: relative; border-radius: 24px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05);
            background: #090a14;
        }
        .ad-image {
            width: 100%; height: 100%; object-fit: cover;
            background: url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=600&auto=format&fit=crop') center/cover;
            opacity: 0.7;
        }
        .ad-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px; background: linear-gradient(to top, rgba(2,3,8,1) 30%, rgba(2,3,8,0) 100%);
            display: flex; flex-direction: column; gap: 8px;
        }
        .ad-tag { background: rgba(155, 81, 224, 0.2); color: #cca3ff; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; align-self: flex-start; }
        .ad-name { font-size: 18px; font-weight: 700; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .ad-desc { font-size: 12px; color: #cdcee0; margin: 0; line-height: 1.4; }

        /* BOUTON CLIC RÉMUNÉRATEUR */
        .btn-action {
            margin-top: 15px; width: 100%; background: linear-gradient(90deg, #0055ff, #00ffcc);
            padding: 16px 0; border: none; border-radius: 16px; color: #ffffff;
            font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
            cursor: pointer; transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.2);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-action:active { transform: scale(0.98); }

        .daily-limit { text-align: center; font-size: 12px; color: #6e729a; margin-top: 10px; margin-bottom: 5px; }

        /* --- NAV BAR PROFESSIONNELLE STYLE RÉSEAUX SOCIAUX --- */
        .nav-bar {
            background: #03040b; border-top: 1px solid rgba(255,255,255,0.06);
            padding: 14px 20px 22px 20px; display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: #555875; text-decoration: none; font-size: 11px; font-weight: 500; cursor: pointer;
            transition: color 0.2s;
        }
        .nav-item.active { color: #00ffcc; }
        .nav-icon { 
            font-size: 20px; /* Taille optimisée pour les glyphes vectoriels */
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- En-tête avec superposition de l'image et du solde en haut à droite -->
        <header class="app-header">
            <div class="balance-pill">
                <span class="balance-amount" id="balanceText">0,00 €</span>
                <div class="balance-plus">+</div>
            </div>
            <div class="header-text-group">
                <p class="user-welcome"></p>
                <h1 class="user-title"><span></span></h1>
            </div>
        </header>

        <div class="level-card">
            <div class="level-info">
                <span>Niveau 1 (Débutant)</span>
                <span>Seuil de retrait : 65%</span>
            </div>
            <div class="level-progress-bg">
                <div class="level-progress-bar"></div>
            </div>
        </div>

        <main class="main-content">
            <h2 class="section-title">⚡ Publicité du moment</h2>
            
            <div class="ad-card">
                <div class="ad-image"></div>
                <div class="ad-overlay">
                    <span class="ad-tag">+0,45 €</span>
                    <h3 class="ad-name">Offre Exclusive Nike</h3>
                    <p class="ad-desc">Découvre la nouvelle collection et profite de jusqu'à -50% de réduction immédiate.</p>
                </div>
            </div>

            <button class="btn-action" id="watchAdBtn">
                Regarder et gagner <i class="fa-solid fa-play" style="font-size: 12px;"></i>
            </button>
            <p class="daily-limit">Tâches du jour accomplies : <strong id="taskCount">0 / 5</strong></p>
        </main>

        <!-- Barre de navigation avec de vraies icônes vectorielles réseaux sociaux -->
        <nav class="nav-bar">
            <div class="nav-item active">
                <i class="fa-solid fa-house nav-icon"></i>
                <span>Accueil</span>
            </div>
            <div class="nav-item">
                <i class="fa-regular fa-comment-dots nav-icon"></i>
                <span>Messages</span>
            </div>
            <div class="nav-item" id="goToStats">
                <i class="fa-solid fa-chart-simple nav-icon"></i>
                <span>Stats</span>
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-bolt nav-icon"></i>
                <span>Activités</span>
            </div>
        </nav>

    </div>

    <script>
        let balance = 0.00;
        let tasks = 0;
        
        const balanceText = document.getElementById('balanceText');
        const taskCount = document.getElementById('taskCount');
        const watchAdBtn = document.getElementById('watchAdBtn');

        watchAdBtn.addEventListener('click', () => {
            if (tasks < 5) {
                console.log("Ouverture du lien AdSterra...");
                
                balance += 0.45;
                tasks += 1;
                
                balanceText.innerText = balance.toFixed(2).replace('.', ',') + " €";
                taskCount.innerText = `${tasks} / 5`;
                
                if (tasks === 5) {
                    watchAdBtn.innerHTML = "Limite atteinte <i class='fa-solid fa-lock'></i>";
                    watchAdBtn.style.background = "#222";
                    watchAdBtn.style.color = "#555";
                    watchAdBtn.disabled = true;
                }
            }
        });

        document.getElementById('goToStats').addEventListener('click', () => {
            alert("Ici on affichera la page avec TOUTES les statistiques détaillées (Vues, totaux gagnés, graphiques) !");
        });
    </script>
</body>
</html>
