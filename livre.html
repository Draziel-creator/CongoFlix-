<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CongoFlix Live - Salle Royale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body, html { 
            width: 100%; height: 100%; 
            background: #000; color: white; overflow: hidden;
        }

        /* Système d'arrière-plan animé (Images) */
        #bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: background-image 2s ease-in-out; /* Effet de fondu doux */
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 0;
        }

        .live-container {
            position: relative; z-index: 10;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 15px 5px;
        }

        /* --- PLACES VIP (HAUT) --- */
        .vip-section {
            display: grid;
            grid-template-areas: 
                ". trone ."
                "v2 . v3"
                "v4 . v5";
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }

        .seat { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        
        .avatar-wrapper {
            position: relative; width: 75px; height: 75px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* Effet "Incitation à cliquer" de CongoFlix */
        .empty-glow {
            border: 2px dashed rgba(255, 215, 0, 0.5);
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
            100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.4); }
        }

        /* Couronne / Contour de GitHub (PNG) */
        .crown-overlay {
            position: absolute; top: -20%; left: -20%;
            width: 140%; height: 140%;
            z-index: 5; pointer-events: none; display: none;
        }

        /* Trône Central Spécifique */
        .trone { grid-area: trone; }
        .trone .avatar-wrapper { width: 100px; height: 100px; border: 2px solid gold; }

        /* --- PLACES AUDIENCE (BAS) --- */
        .audience-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; padding: 0 10px; margin-bottom: 20px;
        }

        .mini-seat {
            width: 50px; height: 50px;
            border: 2px solid #ff4444; border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
            background: rgba(0,0,0,0.6);
        }

        /* Stickers & Badges */
        .pts {
            background: linear-gradient(180deg, #FFD700, #FFA500);
            color: black; font-weight: bold; font-size: 9px;
            padding: 1px 6px; border-radius: 10px; margin-top: 3px;
        }

        .name { font-size: 10px; margin-top: 2px; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>

    <div id="bg-container"></div>
    <div class="overlay"></div>

    <div class="live-container">
        <!-- VIP Section -->
        <div class="vip-section">
            <div class="seat trone" onclick="prendrePlace(1)">
                <div class="avatar-wrapper empty-glow" id="seat-1">
                    <img src="https://github.com/Draziel-creator/CongoFlix-/raw/main/assets/OUI.png" class="crown-overlay" id="crown-1">
                </div>
                <span class="name">Hôte</span>
                <div class="pts">0 PTS</div>
            </div>
            <!-- Autres VIP (v2, v3, v4, v5) ajoutés dynamiquement ou manuellement ici -->
        </div>

        <!-- Audience Section (6-15) -->
        <div class="audience-grid" id="audience-box"></div>
    </div>

    <script>
        // Liste de tes images d'arrière-plan (SANS expiration)
        const bgList = [
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Image.2026-05-05.at.10.39.24.jpeg",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Image.2026-05-05.at.10.39.25.1.jpeg",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Image.2026-05-05.at.10.39.25.2.jpeg",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Image.2026-05-05.at.10.39.25.jpeg",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Image.2026-05-05.at.10.39.26.1.jpeg",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Image.2026-05-05.at.10.39.26.2.jpeg",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Image.2026-05-05.at.10.39.26.jpeg",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Image.2026-05-05.at.10.39.27.1.jpeg",
            "https://github.com/Draziel-creator/CongoFlix-/releases/download/v1.0.0/WhatsApp.Image.2026-05-05.at.10.39.28.jpeg"
        ];

        let currentBg = 0;
        const bgContainer = document.getElementById('bg-container');

        function changeBg() {
            bgContainer.style.backgroundImage = `url('${bgList[currentBg]}')`;
            currentBg = (currentBg + 1) % bgList.length;
        }
        setInterval(changeBg, 10000); // Change toutes les 10 secondes
        changeBg();

        // Générer les places 6 à 15
        const audienceBox = document.getElementById('audience-box');
        for (let i = 6; i <= 15; i++) {
            audienceBox.innerHTML += `
                <div class="seat" onclick="prendrePlace(${i})">
                    <div class="avatar-wrapper mini-seat" id="seat-${i}"></div>
                    <span class="name">P${i}</span>
                    <div class="pts" style="background:#555; color:white;">0K</div>
                </div>`;
        }

        // Simuler le clic : Photo + Couronne si gagnant
        function prendrePlace(num) {
            const seat = document.getElementById(`seat-${num}`);
            const crown = document.getElementById(`crown-${num}`);
            
            seat.classList.remove('empty-glow');
            seat.innerHTML = `<img src="https://via.placeholder.com/100" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
            
            if(num === 1 && crown) {
                crown.style.display = "block";
                seat.appendChild(crown);
            }
            alert("Siège " + num + " occupé. Firebase synchronise...");
        }
    </script>
</body>
</html>
